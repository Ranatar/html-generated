<!-- Контейнер, куда клиентский пагинатор вложит все развороты. -->
<div id="codex-book"></div>

<div class="book-label" style="margin-top:40px;margin-bottom:20px;">
  Explicit · Anno Domini DCCCXCVI
</div>

<script>
(function() {
  'use strict';

  // ═══════════════════════════════════════════════════════════════
  // Клиентский пагинатор — через реальное измерение в DOM.
  //
  // Идея: завести скрытый «измерительный» folio с тем же CSS, что и
  // у настоящих страниц, и жадно наполнять его блоками один за другим,
  // проверяя scrollHeight > clientHeight. Когда перестаёт влезать —
  // режем параграф (по границам предложений, бинарным поиском) либо
  // переносим блок целиком на следующую страницу.
  // ═══════════════════════════════════════════════════════════════

  function toRoman(n) {
    const romans = [[1000,'M'],[900,'CM'],[500,'D'],[400,'CD'],
                    [100,'C'],[90,'XC'],[50,'L'],[40,'XL'],
                    [10,'X'],[9,'IX'],[5,'V'],[4,'IV'],[1,'I']];
    let r = '';
    for (const [v, s] of romans) {
      while (n >= v) { r += s; n -= v; }
    }
    return r.toLowerCase();
  }

  function createMeasurer() {
    const spread = document.createElement('div');
    spread.className = 'spread';
    // ВАЖНО: не используем visibility:hidden. При нём браузер может
    // отложить fonts layout, и measurer измеряет в fallback-шрифте
    // (Georgia вместо Kells/Uncialis). Прячем геометрически —
    // off-screen, с transform для надёжности против рендера.
    spread.style.position = 'absolute';
    spread.style.top = '0';
    spread.style.left = '0';
    spread.style.transform = 'translate(-20000px, -20000px)';
    spread.style.pointerEvents = 'none';
    spread.setAttribute('aria-hidden', 'true');
    spread.innerHTML =
      '<div class="folio page-recto">' +
        '<div class="parchment-bg" aria-hidden="true"></div>' +
        '<div class="folio-content"></div>' +
      '</div>';
    return spread;
  }

  function blockType(el) {
    if (el.nodeType !== 1) return 'other';
    if (el.classList && el.classList.contains('marginalia')) return 'marginalia';
    if (el.tagName === 'SPAN' && el.classList.contains('rubric')) return 'rubric';
    if (el.classList && el.classList.contains('ornament-line')) return 'ornament-line';
    if (el.classList && el.classList.contains('colophon')) return 'colophon';
    if (el.tagName === 'P') return 'p';
    return 'other';
  }

  function canSplit(el) {
    if (el.tagName !== 'P') return false;
    if (el.classList.contains('theological')) return false;
    return true;
  }

  // ─────────────────────────────────────────────────────────────────
  // DOM-СПЛИТТЕР с сохранением inline-обёрток через Range API.
  //
  // Старая реализация работала со строкой innerHTML и резала её через
  // substring() по позициям пунктуации. Если граница попадала ВНУТРЬ
  // inline-элемента (например, <em class="uncial-passage">A. B.</em>),
  // вторая половина оказывалась с осиротевшим </em>, который HTML-парсер
  // молча отбрасывал, — и текст после реза терял класс uncial-passage,
  // меняя шрифт и цвет в середине прямой речи.
  //
  // Решение: ищем точки реза прямо в DOM-дереве клона <p> (TreeWalker
  // по текстовым узлам), а сам разрез делаем через Range.deleteContents().
  // Range API правильно обрабатывает полу-открытые предки: незакрытый
  // в точке реза <em> остаётся и в первой части, и во второй — каждая
  // получает свою копию открывающего тега и закрывающий на месте.
  // ─────────────────────────────────────────────────────────────────

  // Возвращает массив { node, offset } — точек реза в DOM-дереве root,
  // соответствующих границам предложений (после ./?/! и подряд идущих
  // знаков, если за ними следует whitespace или конец текстового узла).
  // Содержимое декоративных контейнеров (SVG, иллюминированные
  // инициалы) исключается — там нет смысловых концов предложений.
  function findSentenceBoundariesDOM(root) {
    const cuts = [];
    const walker = document.createTreeWalker(
      root,
      NodeFilter.SHOW_TEXT,
      {
        acceptNode: function(node) {
          let p = node.parentNode;
          while (p && p !== root) {
            const tag = p.tagName;
            if (tag === 'svg' || tag === 'SVG') return NodeFilter.FILTER_REJECT;
            if (p.classList && (
                p.classList.contains('illuminated-initial') ||
                p.classList.contains('big-initial'))) {
              return NodeFilter.FILTER_REJECT;
            }
            p = p.parentNode;
          }
          return NodeFilter.FILTER_ACCEPT;
        }
      },
      false
    );
    let node;
    while ((node = walker.nextNode())) {
      const text = node.nodeValue;
      let i = 0;
      while (i < text.length) {
        const c = text[i];
        if (c !== '.' && c !== '?' && c !== '!') { i++; continue; }
        // Проглотить подряд идущие .?!  (например, "?!" или "...")
        let j = i;
        while (j + 1 < text.length && '.?!'.indexOf(text[j + 1]) >= 0) j++;
        const nextOff = j + 1;
        // Валидная граница: либо следующий символ — whitespace, либо
        // мы достигли конца текстового узла (что эквивалентно ситуации,
        // когда в исходном HTML за пунктуацией шёл закрывающий тег).
        if (nextOff < text.length) {
          const nc = text[nextOff];
          if (nc === ' ' || nc === '\n' || nc === '\t') {
            cuts.push({ node: node, offset: nextOff });
          }
        } else {
          // Конец текстового узла. Не ставим cut, если этот узел —
          // самый последний text node в root: за ним нет содержимого,
          // которое могло бы стать второй частью.
          cuts.push({ node: node, offset: nextOff });
        }
        i = nextOff;
      }
    }
    return cuts;
  }

  // Удаляет полностью пустые inline-элементы из root. Применяется после
  // Range.deleteContents() для зачистки осиротевших обёрток (<em>, <span>),
  // которые могли остаться без содержимого, если граница реза совпала
  // с границей самого элемента. Декоративные/void-теги защищены.
  function removeEmptyInline(root) {
    const PROTECTED = { BR: 1, IMG: 1, SVG: 1, WBR: 1, INPUT: 1, HR: 1 };
    let safety = 50;
    let changed = true;
    while (changed && safety-- > 0) {
      changed = false;
      const all = Array.from(root.querySelectorAll('*'));
      for (let i = 0; i < all.length; i++) {
        const el = all[i];
        if (PROTECTED[el.tagName]) continue;
        if (el.childNodes.length === 0) {
          el.parentNode && el.parentNode.removeChild(el);
          changed = true;
        }
      }
    }
  }

  // Триммирует whitespace на левой и правой границе DFS-обхода root —
  // в том числе если этот whitespace оказался внутри inline-обёртки
  // (например, " Vis videre…" внутри <em class="uncial-passage">).
  function trimEdgeWhitespace(root) {
    function leftmost(node) {
      if (node.nodeType === 3) return node;
      for (let i = 0; i < node.childNodes.length; i++) {
        const r = leftmost(node.childNodes[i]);
        if (r) return r;
      }
      return null;
    }
    function rightmost(node) {
      if (node.nodeType === 3) return node;
      for (let i = node.childNodes.length - 1; i >= 0; i--) {
        const r = rightmost(node.childNodes[i]);
        if (r) return r;
      }
      return null;
    }
    let safety = 100;
    while (safety-- > 0) {
      const t = leftmost(root);
      if (!t) break;
      const trimmed = t.nodeValue.replace(/^\s+/, '');
      if (trimmed === '') {
        const parent = t.parentNode;
        parent && parent.removeChild(t);
        // Возможно, после удаления опустел inline-предок — повторим
        // проход removeEmptyInline в конце; здесь продолжаем.
        continue;
      }
      if (trimmed !== t.nodeValue) t.nodeValue = trimmed;
      break;
    }
    safety = 100;
    while (safety-- > 0) {
      const t = rightmost(root);
      if (!t) break;
      const trimmed = t.nodeValue.replace(/\s+$/, '');
      if (trimmed === '') {
        const parent = t.parentNode;
        parent && parent.removeChild(t);
        continue;
      }
      if (trimmed !== t.nodeValue) t.nodeValue = trimmed;
      break;
    }
  }

  // Режет originalP по cutIdx-й точке предложения. Возвращает
  // { firstP, secondP } — два самостоятельных <p>, КАЖДЫЙ из которых
  // получает все классы оригинала (вторая часть — кроме dropcap, как
  // и в старой логике), и в каждом сохранены inline-обёртки (em, span)
  // вокруг своей половины текста, даже если граница реза попала внутрь
  // обёртки. Возвращает null, если cutIdx вне диапазона или вторая
  // часть пуста после трима.
  function splitParagraphAtCut(originalP, cutIdx) {
    const firstP = originalP.cloneNode(true);
    const firstCuts = findSentenceBoundariesDOM(firstP);
    if (cutIdx >= firstCuts.length) return null;
    const fb = firstCuts[cutIdx];

    const secondP = originalP.cloneNode(true);
    if (secondP.classList.contains('dropcap')) {
      secondP.classList.remove('dropcap');
    }
    const secondCuts = findSentenceBoundariesDOM(secondP);
    if (cutIdx >= secondCuts.length) return null;
    const sb = secondCuts[cutIdx];

    // Удаляем содержимое ПОСЛЕ точки реза в firstP. Range от точки
    // реза до конца самого <p>: если граница лежит внутри <em>, то
    // <em> в первой части автоматически закроется на месте.
    try {
      const r1 = document.createRange();
      r1.setStart(fb.node, fb.offset);
      r1.setEnd(firstP, firstP.childNodes.length);
      r1.deleteContents();
    } catch (e) { return null; }

    // Удаляем содержимое ДО точки реза в secondP. Range от начала
    // <p> до точки реза: если граница лежит внутри <em>, то <em>
    // во второй части автоматически откроется заново вокруг хвоста.
    try {
      const r2 = document.createRange();
      r2.setStart(secondP, 0);
      r2.setEnd(sb.node, sb.offset);
      r2.deleteContents();
    } catch (e) { return null; }

    // Зачистка: пустые inline-обёртки, оставшийся пограничный whitespace.
    removeEmptyInline(firstP);
    removeEmptyInline(secondP);
    trimEdgeWhitespace(firstP);
    trimEdgeWhitespace(secondP);
    removeEmptyInline(firstP);
    removeEmptyInline(secondP);

    if (secondP.textContent.replace(/\s+/g, '').length === 0) return null;
    if (firstP.textContent.replace(/\s+/g, '').length === 0) return null;

    return { firstP: firstP, secondP: secondP };
  }

  function fits(measurerContent) {
    // Возврат true, если контент помещается в folio-content.
    // ВАЖНО: НЕ используем scrollHeight. При вложенных overflow:hidden
    // (у нас .folio и .folio-content оба имеют overflow:hidden) Chromium
    // обрезает scrollHeight дочернего элемента до clientHeight, и
    // переполнение становится неразличимо. Меряем геометрически —
    // по нижнему краю последнего ребёнка относительно верха контейнера.
    const kids = measurerContent.children;
    if (kids.length === 0) return true;
    const cRect = measurerContent.getBoundingClientRect();
    const last = kids[kids.length - 1];
    const lRect = last.getBoundingClientRect();
    const usedH = lRect.bottom - cRect.top;
    // Небольшой зазор на субпиксельное округление.
    return usedH <= measurerContent.clientHeight + 0.5;
  }

  // Высота контента, фактически занятая flow-потомками measurerContent.
  // ВАЖНО: scrollHeight тут НЕ работает — для div с фикс. height и
  // overflow:hidden он равен clientHeight (пока контент помещается) или
  // больше (пока overflowит), но никогда не меньше. То есть «остаток
  // места» через `clientHeight - scrollHeight` всегда <= 0 и бесполезен.
  // Честный способ — bounding rect последнего потомка.
  function computeUsedHeight(container) {
    const kids = container.children;
    if (kids.length === 0) return 0;
    const cRect = container.getBoundingClientRect();
    const last = kids[kids.length - 1];
    const lRect = last.getBoundingClientRect();
    // Включаем margin-bottom последнего элемента — берём его через
    // offsetHeight родителя минус offsetTop последнего (приближение),
    // но проще: bounding rect даёт border-box, a margin учтён тем, что
    // следующий элемент стоял бы на lRect.bottom + margin-bottom.
    // Для rubric margin 20/14, для p margin-bottom 6 — эти величины
    // вернутся при добавлении СЛЕДУЮЩЕГО элемента, так что для оценки
    // остатка используем bottom без margin-bottom — это даст «минимум
    // высоты», т.е. чуть оптимистичнее. Компенсируем в пороге.
    return lRect.bottom - cRect.top;
  }

  // Пытается разрезать параграф так, чтобы (prev + first + reserve)
  // поместилось в folio-content, где reserve — дополнительное место,
  // которое мы хотим сохранить свободным после first (например, под
  // последующую рубрику + строку текста). При reserve=0 — обычный
  // жадный split до предела страницы.
  //
  //   1. Бинарным поиском находим МАКСИМАЛЬНЫЙ префикс, при котором
  //      (prev + first + reserve) помещается.
  //   2. Сдвигаем точку реза влево, пока second не займёт ≥ 2 строк
  //      (защита от сироты).
  //   3. Если first < 2 строк — возвращаем null (защита от вдовы),
  //      параграф лучше перенести целиком.
  function trySplitParagraph(p, prevNodes, measurerContent, lineHeight, reserve) {
    reserve = reserve || 0;

    // Эталонный клон только для подсчёта количества точек реза. Каждая
    // последующая операция splitParagraphAtCut работает со СВОИМ свежим
    // клоном (поскольку Range.deleteContents изменяет дерево); индексы
    // точек реза детерминированны — TreeWalker идёт в document order.
    const refClone = p.cloneNode(true);
    const numCuts = findSentenceBoundariesDOM(refClone).length;
    if (numCuts === 0) return null;

    function fitsWithReserve() {
      const usedH = computeUsedHeight(measurerContent);
      return usedH + reserve <= measurerContent.clientHeight + 0.5;
    }

    // Бинарный поиск: максимум cutIdx, при котором prev + first + reserve
    // всё ещё влезают.
    let lo = 0, hi = numCuts - 1, best = -1;
    while (lo <= hi) {
      const mid = (lo + hi) >> 1;
      const split = splitParagraphAtCut(p, mid);
      if (!split) { hi = mid - 1; continue; }
      const probe = prevNodes.map(function(n) { return n.cloneNode(true); });
      probe.push(split.firstP);
      measurerContent.replaceChildren.apply(measurerContent, probe);
      if (fitsWithReserve()) {
        best = mid;
        lo = mid + 1;
      } else {
        hi = mid - 1;
      }
    }
    if (best < 0) return null;

    function measureHeight(node) {
      measurerContent.replaceChildren(node);
      return node.getBoundingClientRect().height;
    }
    const minTwoLines = 2 * lineHeight - 2;

    while (best >= 0) {
      const split = splitParagraphAtCut(p, best);
      if (!split) { best--; continue; }

      // Сначала проверяем secondP: должен занимать ≥ 2 строк (защита
      // от сироты). Передаём именно split.secondP — measureHeight его
      // переместит в measurer; если secondP в итоге пройдёт все проверки,
      // мы вернём НОВЫЙ результат splitParagraphAtCut — split.firstP/secondP
      // не переиспользуем.
      const secondProbe = split.secondP;
      const secondH = measureHeight(secondProbe);
      if (secondH >= minTwoLines) {
        const firstProbe = split.firstP;
        const firstH = measureHeight(firstProbe);
        if (firstH < minTwoLines) {
          return null;  // защита от вдовы — лучше перенести целиком
        }
        // Финальная проверка: prev + first + reserve действительно
        // помещается (инвариант мог сместиться).
        const finalSplit = splitParagraphAtCut(p, best);
        if (!finalSplit) { best--; continue; }
        const finalProbe = prevNodes.map(function(n) { return n.cloneNode(true); });
        finalProbe.push(finalSplit.firstP);
        measurerContent.replaceChildren.apply(measurerContent, finalProbe);
        if (!fitsWithReserve()) {
          best--;
          continue;
        }
        // Возвращаем СВЕЖИЕ копии, не те, что были перемещены в measurer.
        const out = splitParagraphAtCut(p, best);
        if (!out) return null;
        return [out.firstP, out.secondP];
      }
      best--;
    }
    return null;
  }

  function measureLineHeight(measurerContent) {
    const probe = document.createElement('p');
    probe.textContent = 'Mg';
    measurerContent.replaceChildren(probe);
    const h = probe.getBoundingClientRect().height;
    measurerContent.replaceChildren();
    return h || 22;
  }

  function paginate(blocks, measurerContent, lineHeight) {
    const pages = [];
    let current = [];

    function flush() {
      if (current.length) pages.push(current);
      current = [];
    }

    function probeFits(extra) {
      const flowNodes = current.filter(function(n) {
        return !(n.classList && n.classList.contains('marginalia'));
      });
      const probe = flowNodes.map(function(n) { return n.cloneNode(true); });
      if (extra) probe.push(extra);
      measurerContent.replaceChildren.apply(measurerContent, probe);
      return fits(measurerContent);
    }

    for (let i = 0; i < blocks.length; i++) {
      const block = blocks[i];
      const type = blockType(block);

      // Маргиналии: нулевой вертикальный вес, остаются с текущей стр.
      if (type === 'marginalia') {
        current.push(block.cloneNode(true));
        continue;
      }

      const clone = block.cloneNode(true);

      // Rubric — «не оставлять одиноко внизу страницы»: если в текущем
      // поле не хватает места для rubric + хотя бы одной строки текста
      // после неё, мы пытаемся отрезать кусок последнего параграфа в
      // current и отправить его на следующую страницу, освобождая тем
      // самым место для rubric + начала текста следующего раздела
      // здесь. Если это не получается — переносим рубрику целиком.
      if (type === 'rubric') {
        const rubricText = clone.textContent.trim();
        const D = rubricText.includes('Conclusio');  // diagnostic flag
        if (D) console.log('=== CONCLUSIO RUBRIC ARRIVED ===');

        const flowNodes = current.filter(function(n) {
          return !(n.classList && n.classList.contains('marginalia'));
        });
        const probe = flowNodes.map(function(n) { return n.cloneNode(true); });
        probe.push(clone.cloneNode(true));
        measurerContent.replaceChildren.apply(measurerContent, probe);
        const usedH = computeUsedHeight(measurerContent);
        const clientH = measurerContent.clientHeight;
        const rubricFits = usedH <= clientH;
        const roomLeft = clientH - usedH;

        if (D) console.log('  current.length:', current.length,
                           ' flow blocks:', flowNodes.length,
                           ' usedH:', Math.round(usedH),
                           ' clientH:', clientH,
                           ' rubricFits:', rubricFits,
                           ' roomLeft:', Math.round(roomLeft));

        let decorationsAfter = 0;
        for (let j = i + 1; j < blocks.length; j++) {
          const nb = blocks[j];
          const nt = blockType(nb);
          if (nt === 'marginalia') continue;
          if (nt === 'ornament-line') {
            const o = nb.cloneNode(true);
            measurerContent.replaceChildren(o);
            decorationsAfter += computeUsedHeight(measurerContent);
            continue;
          }
          break;
        }

        measurerContent.replaceChildren.apply(measurerContent, probe);

        const needed = decorationsAfter + 2 * lineHeight;
        const isStayingRubric = clone.classList && clone.classList.contains('rubric-stays');
        const enoughRoom = rubricFits && (isStayingRubric || roomLeft >= needed);

        if (enoughRoom) {
          current.push(clone);
          continue;
        }

        flush();
        current.push(clone);
        continue;
      }

      if (probeFits(clone)) {
        current.push(clone);
        continue;
      }

      // Не влезает целиком.
      if (canSplit(block)) {
        const prevFlow = current.filter(function(n) {
          return !(n.classList && n.classList.contains('marginalia'));
        });
        const prevClones = prevFlow.map(function(n) { return n.cloneNode(true); });
        const split = trySplitParagraph(block, prevClones, measurerContent, lineHeight);
        if (split) {
          current.push(split[0]);
          flush();
          current.push(split[1]);
          continue;
        }
      }

      // Не помещается ни целиком, ни сплитом. Блок уйдёт на новую
      // страницу. Но если последние flow-элементы в current — рубрика
      // (возможно + ornament-line после неё), их придётся утащить на
      // новую страницу вместе с блоком: иначе рубрика останется одна
      // внизу (с декоративной линией или без) без реального текста.
      let trailingRubricIdx = -1;
      for (let k = current.length - 1; k >= 0; k--) {
        const n = current[k];
        if (n.classList && n.classList.contains('marginalia')) continue;
        if (n.classList && n.classList.contains('ornament-line')) continue;
        if (n.classList && n.classList.contains('rubric')) {
          trailingRubricIdx = k;
        }
        break;
      }

      if (trailingRubricIdx >= 0) {
        const tailStart = trailingRubricIdx;
        const tail = current.splice(tailStart, current.length - tailStart);
        flush();
        for (let k = 0; k < tail.length; k++) current.push(tail[k]);
        current.push(clone);
        continue;
      }

      // Перенести целиком на новую страницу.
      if (current.length === 0) {
        // Страница пуста, но блок всё равно не влезает (очень редкий
        // случай). Кладём — overflow hidden CSS обрежет хвост.
        current.push(clone);
        flush();
      } else {
        flush();
        current.push(clone);
      }
    }

    flush();

    // Диагностика: повторно пропускаем каждую страницу через measurer
    // и смотрим, действительно ли flow-поток вмещается.
    pages.forEach(function(pg, idx) {
      const flowOnly = pg.filter(function(n) {
        return !(n.classList && n.classList.contains('marginalia'));
      }).map(function(n) { return n.cloneNode(true); });
      measurerContent.replaceChildren.apply(measurerContent, flowOnly);
      const usedH = computeUsedHeight(measurerContent);
      if (usedH > measurerContent.clientHeight + 1) {
        console.warn('Page', idx, 'overflows measurer:',
          Math.round(usedH), '>', measurerContent.clientHeight,
          'with', flowOnly.length, 'flow blocks');
      }
    });

    return pages;
  }

  function makeFolio(side, item) {
    const folio = document.createElement('div');
    const classes = ['folio', 'page-' + side];
    if (item.kind === 'cover-blank') classes.push('cover-blank');
    if (item.kind === 'blank-after-carpet') classes.push('blank-leaf');
    if (item.kind === 'carpet') classes.push('incipit-verso');
    if (item.kind === 'incipit') classes.push('incipit-recto');
    if (item.kind === 'final') classes.push('final-recto');
    folio.className = classes.join(' ');

    const parch = document.createElement('div');
    parch.className = 'parchment-bg';
    parch.setAttribute('aria-hidden', 'true');
    folio.appendChild(parch);

    const content = document.createElement('div');
    content.className = 'folio-content';
    if (item.nodes) {
      item.nodes.forEach(function(n) { content.appendChild(n); });
    }

    // PATCH H: dedicatoria + probationes pennae на verso, парной
    // к карпет-обложке. Эта страница исторически в инсулярных
    // pocket-gospels оставлялась чистой; если на ней что-то и было,
    // то скромная молитва за братий + случайные пробы пера разных
    // эпох. Молитва uncial'ом, пробы — шрифтами по эпохам.
    if (item.kind === 'blank-after-carpet') {
      const leaf = document.createElement('div');
      leaf.className = 'dedicatory-leaf';

      // Молитвенная формула — верхняя треть, по центру.
      const dedi = document.createElement('div');
      dedi.className = 'dedicatory';
      dedi.innerHTML =
        '<span class="dedi-cross">✠</span>' +
        '<span class="dedi-line">ORATE PRO FRATRIBVS</span>' +
        '<span class="dedi-line">QVI HOC OPVS</span>' +
        '<span class="dedi-line">CVSTODIERVNT</span>';
      leaf.appendChild(dedi);

      // Probationes pennae — пять штук, нерегулярно расставленных.
      // Координаты подобраны так, чтобы:
      //   а) не залезать на молитву (top > 300px);
      //   б) не выходить за padding folio (left > 0, right < ~470px);
      //   в) выглядеть рассыпанно — разные top, разные углы.
      // Каждая проба написана «рукой» соответствующей эпохи.
      const probs = [
        // Алфавитный ряд — рука Коэмана. Левая половина, чуть
        // наклонная влево.
        { cls: 'prob-coemanus', top: 360, left: 50,
          rot: -2.5, text: 'a b c d e f g · · · l m n o p' },
        // Молитвенная formula — рука Коэмана, чуть правее и ниже,
        // с обратным наклоном.
        { cls: 'prob-coemanus', top: 445, left: 230,
          rot: 2.8, text: 'Christe adiuva' },
        // Анонимная рука — повторяющиеся буквы, упражнение.
        // Самая «небрежная» из проб, сильный наклон.
        { cls: 'prob-anon',     top: 545, left: 95,
          rot: -4.5, text: 'qqq ppp dd ll' },
        // Рука Бернарда-фолиатора (XII в.) — короткая отметка,
        // имя/инициалы. Маленькая, у нижнего края.
        { cls: 'prob-bernardus', top: 650, left: 75,
          rot: -1.8, text: 'Bernardus' },
        // Ещё одна Бернардова — дата, бессистемно
        { cls: 'prob-bernardus', top: 690, left: 290,
          rot: 4.2, text: 'mcxlv' }
      ];
      probs.forEach(function(p) {
        const el = document.createElement('span');
        el.className = 'prob ' + p.cls;
        el.style.top = p.top + 'px';
        el.style.left = p.left + 'px';
        el.style.transform = 'rotate(' + p.rot + 'deg)';
        el.textContent = p.text;
        leaf.appendChild(el);
      });
      
      // Поздняя читательская пометка
      // Вертикально у переплёта, читается снизу вверх. Стилистический жест
      // читателя, который увидел в книге восхождение от серебра к золоту.
      const late = document.createElement('span');
      late.className = 'prob prob-late';
      late.innerHTML =
        // Луна (полый полумесяц, рогами к тексту) — окажется внизу после rotate
        '<svg width="20" height="22" viewBox="0 0 20 22" ' +
        'style="display:inline-block;vertical-align:middle">' +
          '<path d="M 14 3 C 8 4 5.5 8.5 5.5 11 C 5.5 13.5 8 18 14 19 ' +
                'C 9 17.5 7.5 14 7.5 11 C 7.5 8 9 4.5 14 3 Z" ' +
                'fill="none" stroke="#3a1808" stroke-width="1.3" ' +
                'stroke-linejoin="round"/>' +
        '</svg>' +
        '<span class="gap"></span>' +
        'Quod fuit, ipsum est quod futurum est.' +
        '<span class="gap"></span>' +
        // Солнце (круг с точкой — Sol classical) — окажется наверху после rotate
        '<svg width="20" height="20" viewBox="0 0 20 20" ' +
        'style="display:inline-block;vertical-align:middle">' +
          '<circle cx="10" cy="10" r="6" fill="none" ' +
                  'stroke="#3a1808" stroke-width="1.3"/>' +
          '<circle cx="10" cy="10" r="1.5" fill="#3a1808"/>' +
        '</svg>';
      leaf.appendChild(late);

      // SVG-росчерки: завитушки и кривая узловая попытка.
      // Bezier-кривые с лёгким stroke-fx (фильтр для тонких линий,
      // добавлен в defs на шаге 0). НЕ использовать blob-fx — он
      // для пузатых клякс, на тонких stroke даёт грязный облачный
      // эффект из-за gaussianBlur 1.5px > stroke-width 0.7-0.9px.
      const flourishes = [
        // Завиток с двойной волной — справа в центре
        { top: 410, left: 350, w: 90, h: 35,
          d: 'M 4 18 Q 18 4, 32 18 T 60 18 Q 70 22, 82 14',
          sw: 0.9 },
        // Узловая попытка — недоведённая петля, нижняя правая часть
        { top: 590, left: 340, w: 70, h: 70,
          d: 'M 35 8 C 58 14, 60 50, 35 58 C 12 52, 14 18, 30 14 L 38 22',
          sw: 0.75 },
        // Простой росчерк — длинный мазок наискось
        { top: 510, left: 50, w: 140, h: 22,
          d: 'M 4 18 C 30 4, 70 22, 100 8 Q 120 4, 134 14',
          sw: 0.7 }
      ];
      flourishes.forEach(function(f) {
        const svgNS = 'http://www.w3.org/2000/svg';
        const svg = document.createElementNS(svgNS, 'svg');
        svg.setAttribute('class', 'prob-flourish');
        svg.setAttribute('viewBox', '0 0 ' + f.w + ' ' + f.h);
        svg.setAttribute('width', f.w);
        svg.setAttribute('height', f.h);
        svg.style.top = f.top + 'px';
        svg.style.left = f.left + 'px';
        const path = document.createElementNS(svgNS, 'path');
        path.setAttribute('d', f.d);
        path.setAttribute('stroke-width', f.sw);
        //path.setAttribute('filter', 'url(#stroke-fx)');
        svg.appendChild(path);
        leaf.appendChild(svg);
      });

      // Капля чернил — случайный «несчастный случай» с пером
      const blot = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      blot.setAttribute('class', 'prob-flourish');
      blot.setAttribute('viewBox', '0 0 30 30');
      blot.setAttribute('width', 30);
      blot.setAttribute('height', 30);
      blot.style.top = '480px';
      blot.style.left = '420px';
      blot.style.opacity = '0.55';
      blot.innerHTML =
        '<ellipse cx="15" cy="15" rx="6" ry="5" fill="#3a2818" ' +
        'filter="url(#blob-fx)"/>' +
        '<ellipse cx="15" cy="15" rx="9" ry="7.5" fill="#3a2818" ' +
        'opacity="0.25" filter="url(#blob-fx)"/>';
      leaf.appendChild(blot);

      content.appendChild(leaf);
    }

    folio.appendChild(content);

    if (item.num) {
      const num = document.createElement('span');
      num.className = 'folio-number';
      num.textContent = item.num;
      folio.appendChild(num);
    }

    // Приписка фолиатора — только на первом recto с фолиацией (i).
    // Это четвёртая рука кодекса: библиотекарь XII в., атрибутирующий
    // фолиацию. Семантика: «этот же человек проставил все номера».
    if (item.kind === 'incipit') {
      const note = document.createElement('div');
      note.className = 'foliator-note';
      note.setAttribute('aria-hidden', 'true');
      note.innerHTML =
        'Foliatum<br>' + 
        'fratre Bernardo<br>' +
        'Anno <abbr class="med nomsac contr" title="Domini" ' +
        'data-expand="Domini" translate="no">' +
        '<span class="tit">dn̄i</span></abbr> ' +
        'mcxlvij';
      folio.appendChild(note);
      try { decorateTituli(note); } catch (e) {}
    }
    return folio;
  }

  function renderBook(pages) {
    const book = document.getElementById('codex-book');
    book.innerHTML = '';

    const carpetTpl = document.getElementById('codex-carpet');
    const finalTpl = document.getElementById('codex-final');

    const carpetFrag = carpetTpl.content.cloneNode(true);
    const finalFrag = finalTpl.content.cloneNode(true);

    // Последовательность физических страниц
    const sequence = [];
    // PATCH F: carpet и final рендерятся standalone (см. ниже).
    // Sequence стартует с verso листа 1 — пустой страницы, парной
    // standalone-carpet'у, открывающейся первой при перелистывании.
    sequence.push({ kind: 'blank-after-carpet', nodes: [] });
    pages.forEach(function(pg, i) {
      sequence.push({
        kind: i === 0 ? 'incipit' : 'regular',
        nodes: pg,
      });
    });
    // PATCH F: final выведен из sequence — рендерится standalone после spread'ов.

    // PATCH C2: foliation вместо pagination — нумеруются только recto
    // страницы (нечётные индексы в sequence: incipit, recto-regular).
    // Verso соответствующего folio номера не получает — это
    // средневековая норма (Book of Mulling, Book of Dimma).
    let counter = 0;
    sequence.forEach(function(item, idx) {
      if ((item.kind === 'incipit' || item.kind === 'regular') && (idx % 2 === 1)) {
        counter++;
        item.num = toRoman(counter);
      } else {
        item.num = null;
      }
    });

    // Построить разворотки
    const fragment = document.createDocumentFragment();

    // PATCH F: standalone carpet — recto листа 1 (передняя обложка).
    // Не входит в spread-flow: симметричный padding, нет gutter'а рядом.
    var carpetItem = { kind: 'carpet', nodes: Array.from(carpetFrag.childNodes), num: null };
    var carpetWrap = document.createElement('div');
    carpetWrap.className = 'folio-cover folio-cover-front';
    var carpetFolio = makeFolio('cover', carpetItem);
    carpetFolio.classList.add('parch-f3');
    carpetWrap.appendChild(carpetFolio);
    fragment.appendChild(carpetWrap);

    for (let i = 0; i < sequence.length; i += 2) {
      const verso = sequence[i];
      const recto = sequence[i + 1] || { kind: 'blank', nodes: [], num: null };

      const spread = document.createElement('div');
      spread.className = 'spread';
      spread.appendChild(makeFolio('verso', verso));
      const gutter = document.createElement('div');
      gutter.className = 'gutter';
      gutter.setAttribute('aria-hidden', 'true');
      spread.appendChild(gutter);
      spread.appendChild(makeFolio('recto', recto));
      fragment.appendChild(spread);
    }

    // PATCH F: standalone final — verso последнего листа (задняя обложка).
    var finalItem = { kind: 'final', nodes: Array.from(finalFrag.childNodes), num: null };
    var finalWrap = document.createElement('div');
    finalWrap.className = 'folio-cover folio-cover-back';
    var finalFolio = makeFolio('cover', finalItem);
    finalFolio.classList.add('parch-f3');
    finalWrap.appendChild(finalFolio);
    fragment.appendChild(finalWrap);

    book.appendChild(fragment);
  }

  // ═══════════════════════════════════════════════════════════════
  // Позиционирование маргиналий
  // ═══════════════════════════════════════════════════════════════
  function anchorOf(mg) {
    let prev = mg.previousElementSibling;
    while (prev && prev.classList.contains('marginalia')) {
      prev = prev.previousElementSibling;
    }
    return prev;
  }
  function positionMarginalia() {
    document.querySelectorAll('.folio').forEach(function(folio) {
      const folioRect = folio.getBoundingClientRect();
      const folioH = folio.clientHeight;
      const margs = Array.from(folio.querySelectorAll('.marginalia'));
      const SPACING = 8;
      const BOTTOM_RESERVE = 12;  // запас от нижнего края фолио, чтобы
                                  // последняя строка глоссы не упиралась
                                  // в самый край пергамента

      // ─ Фаза READ ─
      const placed = [];
      margs.forEach(function(mg) {
        const anchor = anchorOf(mg);
        if (!anchor) return;
        const aTop = anchor.getBoundingClientRect().top - folioRect.top;
        placed.push({ el: mg, top: aTop, h: mg.offsetHeight });
      });

      // ─ Чистая логика: ни одного DOM-доступа ─
      placed.sort(function(a, b) { return a.top - b.top; });

      // Forward pass: разрешение overlap'ов сверху вниз. Каждая
      // следующая глосса не может стоять выше нижнего края предыдущей
      // плюс SPACING.
      for (let i = 1; i < placed.length; i++) {
        const prevBottom = placed[i - 1].top + placed[i - 1].h + SPACING;
        if (placed[i].top < prevBottom) placed[i].top = prevBottom;
      }

      // Backward pass: подъём из-за переполнения снизу.
      // Идём с конца. Для каждой глоссы есть верхний предел top:
      //   — для последней:  folioH - BOTTOM_RESERVE - h
      //   — для остальных:  top следующей минус SPACING минус h
      // Если текущий top больше предела — опускаем до него (фактически
      // поднимаем глоссу). Каскад работает естественно: если поднятая
      // глосса теперь «прижала» предыдущую, итерация i-1 это увидит
      // и поднимет её тоже. В пределе глосса упирается в top = 0.
      const maxBottom = folioH - BOTTOM_RESERVE;
      for (let i = placed.length - 1; i >= 0; i--) {
        const item = placed[i];
        const upperLimit = (i === placed.length - 1)
          ? maxBottom - item.h
          : placed[i + 1].top - SPACING - item.h;
        if (item.top > upperLimit) {
          item.top = Math.max(0, upperLimit);
        }
      }

      // ─ Фаза WRITE ─
      placed.forEach(function(p) { p.el.style.top = p.top + 'px'; });
    });
  }

  // ═══════════════════════════════════════════════════════════════
  // CATCHWORDS — добавление кустод в нижний правый угол каждого recto.
  // Запускается ПОСЛЕ renderBook() и ПОСЛЕ positionMarginalia():
  // не двигает flow, не измеряет геометрию, не вмешивается в layout.
  // ═══════════════════════════════════════════════════════════════
  function attachCatchwords() {
    // Все recto, кроме обложек (incipit-recto тоже включаем — на нём
    // тоже бывают кустоды, и фолио i имеет переход к ii).
    const allRecto = Array.from(document.querySelectorAll(
      '.folio.page-recto:not(.final-recto)'
    ));

    function firstFlowWord(folio) {
      const content = folio.querySelector('.folio-content');
      if (!content) return null;
      const candidates = content.querySelectorAll(
        'p:not(.marginalia):not(.rubric):not([data-block])'
      );
      for (let i = 0; i < candidates.length; i++) {
        // Клонируем абзац и вычищаем visually-hidden источники
        // перевода. Без этого textContent склеивает оригинал
        // и его раскрытие: «DNI» + «Domini» → «DNIDomini».
        const clone = candidates[i].cloneNode(true);
        clone.querySelectorAll(
          '.abbr-translate-source, .mg-translate-source, .word-source'
        ).forEach(function(el) { el.remove(); });

        const txt = clone.textContent.replace(/\s+/g, ' ').trim();
        if (!txt) continue;

        const words = txt.split(' ');
        let first = words[0];
        if (first.length < 2 && words[1] && words[1].length >= 2) {
          first = words[1];
        }
        if (first.length < 2) continue;
        return first.toLowerCase();;
      }
      return null;
    }

    for (let i = 0; i < allRecto.length - 1; i++) {
      const current = allRecto[i];
      const next = allRecto[i + 1];

      const word = firstFlowWord(next);
      if (!word) continue;

      // Защита от дубликатов (повторный вызов после resize)
      const existing = current.querySelector(':scope > .catchword');
      if (existing) existing.remove();

      const cw = document.createElement('span');
      cw.className = 'catchword';
      cw.setAttribute('aria-hidden', 'true');
      cw.textContent = word;
      current.appendChild(cw);
    }
  }

      'elvish',           // эльфийский язык — никогда не сокращаем
      'nomen-illustre',   // собственные имена смертных и мест
      'uncial-passage',   // прямая речь Финрода (приподнятый регистр)
      'folio-number',
      'foliator-note',
      'catchword',
      'ornament-line',
      'ws'
    ];
    // ВНИМАНИЕ: 'colophon' и 'later-hand-colophon' НЕ исключены.
    // В реальных средневековых колофонах nomina sacra и сокращения
    // были массовыми. Если визуально не нравится — добавьте сюда.

    function shouldSkipAbbr(node) {
      let el = node.parentElement;
      while (el) {
        if (SKIP_TAGS_ABBR.has(el.tagName)) return true;
        for (const cls of SKIP_CLASSES_ABBR) {
          if (el.classList && el.classList.contains(cls)) return true;
        }
        el = el.parentElement;
      }
      return false;
    }

    function applyAbbreviations(root) {
      const walker = document.createTreeWalker(
        root,
        NodeFilter.SHOW_TEXT,
        {
          acceptNode(n) {
            if (!n.nodeValue || !n.nodeValue.trim()) return NodeFilter.FILTER_REJECT;
            if (shouldSkipAbbr(n)) return NodeFilter.FILTER_REJECT;
            return NodeFilter.FILTER_ACCEPT;
          }
        }
      );
      const targets = [];
      let n;
      while ((n = walker.nextNode())) targets.push(n);

      for (const textNode of targets) {
        let html = textNode.nodeValue;
        // Защита: уже преобразованный фрагмент не трогаем.
        if (html.indexOf('<abbr') !== -1) continue;
        if (html.indexOf('<span class="liga-protect"') !== -1) continue;

        const font = detectFont(textNode);
        const native = FONT_NATIVE[font] || new Set();

        let changed = false;
        for (const entry of ABBREVIATIONS) {
          const pattern = entry[0];
          const replacement = entry[1];
          const expansion = entry[2];

          if (native.has(expansion)) {
            // Шрифт умеет сам — оборачиваем в liga-protect, чтобы
            // walkWbrOnly не вставил <wbr> внутрь слова и не сломал
            // лигатуру. Регэксп тот же, замена другая.
            const protectReplacement =
              '<span class="liga-protect">' + expansion + '</span>';
            if (pattern.test(html)) {
              html = html.replace(pattern, protectReplacement);
              changed = true;
            }
          } else {
            // Шрифт не умеет — заменяем на abbr с titulus.
            if (pattern.test(html)) {
              html = html.replace(pattern, replacement);
              changed = true;
            }
          }
          pattern.lastIndex = 0;
        }

        if (changed) {
          const tmp = document.createElement('span');
          tmp.innerHTML = html;
          const frag = document.createDocumentFragment();
          while (tmp.firstChild) frag.appendChild(tmp.firstChild);
          textNode.parentNode.replaceChild(frag, textNode);
        }
      }
    }
    
    // ── Отрисовка SVG-titulus ─────────────────────────────────────
    // Вызывается ПОСЛЕ applyAbbreviations: проходит по всем <abbr.med>
    // и вставляет в каждый <svg.titulus-svg> с горизонтальной линией.
    // Линия имеет лёгкие вариации траектории (через quadratic Bézier),
    // имитируя движение пера — палеографически точнее идеальной
    // прямой CSS-overline.
    //
    // Не зависит от font-метрик: позиционируется CSS'ом per-context
    // через .titulus-svg { top: ... }. JS отвечает только за
    // геометрию самой линии внутри viewBox.

    // Псевдослучайный генератор для вариаций — детерминированный,
    // чтобы повторные рендеры (например, после reflow) давали ту же
    // картинку, и titulus не "прыгал" между обновлениями.
    function seededRandTitulus(seed) {
      let s = seed >>> 0;
      return function () {
        s = (s * 1664525 + 1013904223) >>> 0;
        return s / 4294967296;
      };
    }
    const tituRand = seededRandTitulus(0xC0EAA1);

    // Один titulus = SVG с одним path. ViewBox 100×10 (виртуальные
    // единицы). Линия идёт горизонтально на y≈5, с двумя контрольными
    // точками для лёгкого "дрожания" пера: y варьируется в пределах
    // ±1.2 единицы. Stroke-width в виртуальных единицах ~1.2 при
    // высоте viewBox=10 — это эквивалентно толщине ~12% от высоты
    // SVG-контейнера, что в em-mapping даёт пропорционально
    // адекватную линию (для height: 0.18em → линия ~0.022em).
    function buildTitulusPath() {
      // Y-координаты стартовой, средней и конечной точек.
      // База ~5, отклонения малые, чтобы линия читалась как ровная,
      // но не машинная.
      const y0 = 5 + (tituRand() - 0.5) * 7.0;
      const y1 = 5 + (tituRand() - 0.5) * 1.0;  // средняя контрольная
      const y2 = 5 + (tituRand() - 0.5) * 5.0;
      // Quadratic Bezier с управляющей точкой в середине.
      // M2,y0 — начало с отступом 2 единицы от левого края (чтобы
      // линия не упиралась в первую букву);
      // Q50,y1 98,y2 — кривая через контрольную точку (50, y1) к
      // конечной (98, y2), отступ 2 от правого края.
      return 'M2,' + y0.toFixed(2) +
             ' Q50,' + y1.toFixed(2) +
             ' 98,' + y2.toFixed(2);
    }

    function decorateTituli(root) {
      // Селектор теперь — <span class="tit"> внутри abbr.med, а не
      // сам abbr. SVG живёт внутри tit, и для suspension (где tit
      // охватывает только последнюю букву) линия становится
      // короткой и встаёт над этой буквой, как требует
      // палеографическая норма.
      const tits = root.querySelectorAll('abbr.med .tit');
      const svgNS = 'http://www.w3.org/2000/svg';
      for (let i = 0; i < tits.length; i++) {
        const tit = tits[i];
        // Пропускаем уже декорированные.
        if (tit.querySelector(':scope > .titulus-svg')) continue;
        // Тиро (⁊) — отдельный знак без titulus. Его abbr.tiro
        // не имеет дочернего .tit, так что в выборку и не попадёт,
        // но на всякий случай:
        const ab = tit.closest('abbr.med');
        if (ab && ab.classList.contains('tiro')) continue;

        const svg = document.createElementNS(svgNS, 'svg');
        svg.setAttribute('class', 'titulus-svg');
        svg.setAttribute('viewBox', '0 0 100 10');
        svg.setAttribute('preserveAspectRatio', 'none');
        svg.setAttribute('aria-hidden', 'true');

        const path = document.createElementNS(svgNS, 'path');
        path.setAttribute('d', buildTitulusPath());
        path.setAttribute('stroke-width', '5.0');

        svg.appendChild(path);
        tit.appendChild(svg);
      }
    }

    window.decorateTituli = decorateTituli;

    window.applyAbbreviations = applyAbbreviations;
    
    // ── Расшифровка сокращений при копировании ────────────────────
    // При копировании выделения с <abbr class="med"> в буфер обмена
    // кладётся ПОЛНАЯ форма из data-expand, а не видимая сокращённая.
    // То есть на экране остаётся "DNI", в буфер обмена попадает
    // "Domini". Это позволяет копировать текст для цитирования,
    // поиска, перевода — без необходимости вручную раскрывать
    // каждое сокращение.
    //
    // Работает с любым выделением: целый параграф, отдельное слово,
    // часть сокращения. Реальный DOM не модифицируется — мы клонируем
    // фрагмент выделения, заменяем abbr в клоне, и записываем
    // результат в clipboardData.
    //
    // Дополнительно: рядом с plain-text формой кладётся HTML-вариант,
    // в котором abbr тоже раскрыт. Это нужно, чтобы при вставке
    // в редакторы, поддерживающие HTML (Word, Google Docs), текст
    // приходил тоже в полной форме, а не как голый <abbr> без
    // titulus.

    // PATCH TR3+TR4: режим-aware обработка abbr.med в клоне.
    //
    // Обычный режим: abbr — primary visible content, в clipboard
    //   попадает её раскрытая форма из data-expand. (До TR3 это
    //   было главное действие copy-handler'а; смысл сохранён.)
    //
    // Режим перевода: abbr.med имеет display:none, primary —
    //   source-span рядом. processTranslateSourcesInClone уже снял
    //   с source-span'а обёртку, оставив "Domini" как text-узел.
    //   Сама abbr теперь — лишний "DNI", который visually-hidden
    //   на странице, но в textContent клона попал. Удаляем целиком.
    function processAbbrInClone(fragment) {
      const isTranslated = document.body.classList.contains('mg-translated');
      const walker = document.createTreeWalker(
        fragment,
        NodeFilter.SHOW_ELEMENT,
        {
          acceptNode(el) {
            if (el.tagName === 'ABBR' && el.classList.contains('med')) {
              return NodeFilter.FILTER_ACCEPT;
            }
            return NodeFilter.FILTER_SKIP;
          }
        }
      );

      const targets = [];
      let n;
      while ((n = walker.nextNode())) targets.push(n);

      for (const ab of targets) {
        if (!ab.parentNode) continue;
        if (isTranslated) {
          // abbr — ghost в этом режиме, удаляем целиком.
          ab.parentNode.removeChild(ab);
        } else {
          // abbr — primary, заменяем на полную форму.
          const expansion =
            ab.getAttribute('data-expand') ||
            ab.getAttribute('title') ||
            ab.textContent;
          const textNode = document.createTextNode(expansion);
          ab.parentNode.replaceChild(textNode, ab);
        }
      }
    }

    function expandLigaProtectInClone(fragment) {
      // Слова, обёрнутые в <span class="liga-protect"> (для защиты
      // шрифтовых лигатур от <wbr>), при копировании просто
      // разворачиваются: span убирается, остаётся текст внутри.
      // Это не "раскрытие" сокращения как у abbr, а очистка
      // структурной разметки.
      const protects = fragment.querySelectorAll('.liga-protect');
      for (let i = 0; i < protects.length; i++) {
        const sp = protects[i];
        const parent = sp.parentNode;
        if (!parent) continue;
        while (sp.firstChild) {
          parent.insertBefore(sp.firstChild, sp);
        }
        parent.removeChild(sp);
      }
    }

    function handleCopyEvent(e) {
      const sel = window.getSelection();
      if (!sel || sel.rangeCount === 0) return;
      // Если выделение пустое (просто клик без drag) — ничего
      // не делаем, отдаём управление браузеру.
      if (sel.isCollapsed) return;

      // Клонируем содержимое выделения. Это DocumentFragment, в
      // котором живёт копия DOM — реальный документ остаётся
      // неприкосновенным.
      //
      // PATCH X-BROWSER-5: вместо cloneContents() для каждого range
      // отдельно, строим ОДИН range от первой точки selection до
      // последней. Это критично для Firefox.
      //
      // Firefox при drag через основной текст с palaeographическими
      // abbr создаёт MULTI-RANGE selection (rangeCount=7+):
      // абсолютно-позиционированные .abbr-translate-source span'ы
      // образуют отдельные "зоны" в selection model, и selection
      // разрезается на сегменты "до source", "сам source", "после
      // source". Каждый сегмент — отдельный range.
      //
      // Если делать cloneContents на каждом range и appendChild в
      // общий fragment, исходный <p> разделится на N отдельных <p>
      // фрагментов (по одному на каждый segment). fragmentToPlainText
      // считает каждый <p> блочным и ставит \n\n вокруг — пользователь
      // видит пустую строку посреди абзаца после каждого сокращения.
      //
      // Решение: brzine один range через ВСЁ выделение, охватывая
      // в т.ч. промежуточные source-spans (которые processTranslate-
      // SourcesInClone удалит дальше). Получаем единый <p> в клоне,
      // непрерывный текст в plain-text.
      //
      // Старое Ctrl+A в Firefox с user-select:none маргиналиями
      // тоже многоренжевое (для другой причины — маргиналии режут
      // continuous selection своим user-select:none). Объединение
      // в единый range охватит и маргиналии, но они тут же
      // удалятся в filterMarginaliaInClone. Поведение не меняется.
      //
      // Chrome rangeCount=1 — единый range совпадает с исходным
      // первым range'ом, обратная совместимость сохранена.
      const fragment = document.createDocumentFragment();
      try {
        const firstR = sel.getRangeAt(0);
        const lastR = sel.getRangeAt(sel.rangeCount - 1);
        const merged = document.createRange();
        merged.setStart(firstR.startContainer, firstR.startOffset);
        merged.setEnd(lastR.endContainer, lastR.endOffset);
        fragment.appendChild(merged.cloneContents());
      } catch (_) {
        // Fallback: если merged.setStart/setEnd упадёт (например,
        // ranges в разных Document'ах что невозможно, но), вернёмся
        // к старому поведению — клонируем каждый range отдельно.
        for (let i = 0; i < sel.rangeCount; i++) {
          try {
            fragment.appendChild(sel.getRangeAt(i).cloneContents());
          } catch (__) { /* skip broken ranges */ }
        }
      }

      // Early-return: если в клоне нет ни одной из "наших" структур,
      // отдаём дефолтное поведение браузера (быстрее, ничего не
      // ломает — простые copy без сокращений и без маргиналий
      // сериализуются как plain text).
      const hasAbbr = fragment.querySelector('abbr.med');
      const hasLigaProtect = fragment.querySelector('.liga-protect');
      const hasTranslateSource = fragment.querySelector(
        '.abbr-translate-source, .mg-translate-source'
      );
      const hasMarginalia = fragment.querySelector('.marginalia');
      // PATCH X-BROWSER-6: word-wbr обёртки тоже наша структура; без
      // обработки в copy-handler default copy выдаст дублированный
      // текст (источник + рендер) для каждого длинного слова.
      const hasWordWrap = fragment.querySelector('.word-wbr');
      if (!hasAbbr && !hasLigaProtect && !hasTranslateSource &&
          !hasMarginalia && !hasWordWrap) {
        return;
      }

      // Порядок ВАЖЕН:
      //   0. removeNonVisibleNodes — script/style/template и пр.
      //      убираются первыми, чтобы не мешать остальным фазам и
      //      не утечь в clipboard через innerText/textContent.
      //   1. filterMarginalia режет render/marginalia сразу — нет
      //      смысла дальше трогать abbr внутри уже отрезанных узлов.
      //   2. processTranslateSources в translated режиме делает unwrap
      //      source-span'ов, поднимая текст на уровень выше; в обычном
      //      режиме просто удаляет ghost-source'ы.
      //   3. processAbbr — в translated режиме удаляет abbr (она ghost),
      //      в обычном раскрывает её в data-expand.
      //   4. expandLigaProtect — структурная очистка обёрток.
      removeNonVisibleNodesInClone(fragment);
      filterMarginaliaInClone(fragment);
      processTranslateSourcesInClone(fragment);
      processAbbrInClone(fragment);
      expandLigaProtectInClone(fragment);

      // Plain-text — через ручной обход с явным списком блочных
      // узлов (см. fragmentToPlainText). innerText через off-screen
      // attach в обоих движках имеет quirks с display:block на
      // span.rubric и shrink-to-fit width на абсолютно-позиционированном
      // wrapper. Ручной обход надёжен и не требует ни attach, ни
      // computed style.
      const wrapper = document.createElement('div');
      wrapper.appendChild(fragment.cloneNode(true));
      const plainText = fragmentToPlainText(wrapper);
      const htmlText = wrapper.innerHTML;

      // Записываем оба формата в буфер обмена. Если редактор-получатель
      // умеет HTML, возьмёт html; если нет — plain-text.
      e.clipboardData.setData('text/plain', plainText);
      e.clipboardData.setData('text/html', htmlText);
      e.preventDefault();
    }

    // Регистрируем глобально на document. Гард пересечения с codex-book
    // через range.intersectsNode на КАЖДОМ range — Firefox при Ctrl+A
    // через документ с user-select:none зонами (маргиналии) даёт
    // multi-range selection: rangeCount может быть в сотнях, и
    // getRangeAt(0) указывает в начало документа вне codex. Перебираем
    // все range'ы — если хоть один пересекается с codex, handler
    // срабатывает.
    //
    // В Chrome rangeCount всегда 1, цикл выполнится одну итерацию;
    // обратная совместимость сохраняется.
    document.addEventListener('copy', function (e) {
      const sel = window.getSelection();
      if (!sel || sel.rangeCount === 0) return;
      const codexRoot = document.getElementById('codex-book');
      if (!codexRoot) return;
      let touches = false;
      for (let i = 0; i < sel.rangeCount; i++) {
        try {
          if (sel.getRangeAt(i).intersectsNode(codexRoot)) {
            touches = true;
            break;
          }
        } catch (_) { /* ignore individual range failures */ }
      }
      if (!touches) return;
      handleCopyEvent(e);
    });
    
  })();

  // ═══════════════════════════════════════════════════════════════
  // «Живая рука» — jitter букв маргиналий Аидана (не Коемана).
  //
  // В узких маргиналиях (68 px) переносы критичны. Но побуквенное
  // оборачивание в <span class="ink-l"> превращает слово в цепочку
  // inline-block элементов, после чего `hyphens: auto` перестаёт
  // работать (алгоритм слогоделения требует текстовых узлов со
  // словами). Поэтому мы сами расставляем точки возможного переноса
  // через <wbr> между слогами — работает независимо от inline-block
  // соседей. В инсулярной традиции перенос был без дефиса (писец
  // просто обрывал слово на полях), так что <wbr> даже аутентичнее,
  // чем soft-hyphen.
  // ═══════════════════════════════════════════════════════════════

  // Латинский слогоделитель.
  // Правила (упрощённые, покрывают классическую латынь + Quenya-имена):
  //   1. Дифтонги ae oe au eu ei — неразрывные гласные единицы.
  //   2. «qu» перед гласной — неразрывная согласная единица (как в
  //      a-qua, re-qui-es). Так же «gu» + гласная после n (lin-gua) —
  //      но это редкий случай, оставляем qu.
  //   3. V-CV (одна согласная) → разрыв перед C.
  //   4. V-CCV, где CC = muta+liquida (pl pr bl br cl cr dl dr gl gr
  //      tl tr fl fr) → CC уходит в следующий слог.
  //   5. VC-CV (обычный двухсогласный кластер) → разрыв между C1 и C2.
  //   6. VCC-CV (три и более согласных): ПОСЛЕДНЯЯ согласная
  //      начинает следующий слог, остальные закрывают предыдущий
  //      (классическая латынь предпочитает «максимальный онсет», но
  //      в инсулярной традиции преобладала слуховая слогораздельность;
  //      обе интерпретации дают валидный перенос). Если последние две
  //      образуют muta+liquida — они уходят в следующий слог вместе.
  //   7. V-V (hiatus) → разрыв между.
  //   8. Минимум 2 буквы в начале и в конце слова.
  //
  //   Расширенные гласные (áéíóúý и пр.) учитываются ради Quenya-имён
  //   (Ilúvatar, Númenor) и редких длинных маркеров.
  const VOWELS_LC = 'aeiouyáéíóúýàèìòùâêîôûäëïöü';
  const DIPHTHONGS = ['ae', 'oe', 'au', 'eu', 'ei'];

  function isVowelChar(ch) {
    return VOWELS_LC.indexOf(ch.toLowerCase()) !== -1;
  }

  function isMutaLiquida(two) {
    if (two.length !== 2) return false;
    const m = 'pbcdgtf';
    const l = 'lr';
    return m.indexOf(two[0]) !== -1 && l.indexOf(two[1]) !== -1;
  }

  // Проверка: «qu» + гласная (например, в «aqua», «quapropter»).
  function isQuCluster(word, i) {
    if (i + 2 >= word.length) return false;
    const a = word[i].toLowerCase();
    const b = word[i + 1].toLowerCase();
    const c = word[i + 2].toLowerCase();
    return a === 'q' && b === 'u' && VOWELS_LC.indexOf(c) !== -1;
  }

  // Токенизация: [{type:'v'|'c', start, end}]
  function tokenizeLatin(word) {
    const tokens = [];
    let i = 0;
    while (i < word.length) {
      const ch = word[i].toLowerCase();
      const pair = (i + 1 < word.length)
        ? (ch + word[i + 1].toLowerCase())
        : null;
      if (isVowelChar(ch)) {
        let len = 1;
        if (pair && DIPHTHONGS.indexOf(pair) !== -1) {
          len = 2;
        }
        tokens.push({type: 'v', start: i, end: i + len});
        i += len;
      } else {
        // Собираем согласный кластер. Внутри него любые «qu» перед
        // гласной (например, в «sequens») тоже должны поглощаться как
        // единое qu; но проще — продвигаемся посимвольно с специальной
        // проверкой на qu в начале нового кластера.
        let j = i;
        while (j < word.length && !isVowelChar(word[j])) {
          // Если мы на q перед u+vowel — включаем q и u в кластер как
          // одну согласную единицу и останавливаемся (следующий
          // символ — гласная, на которой мы должны остановиться).
          if (isQuCluster(word, j)) {
            j += 2;  // «qu» целиком уходит в кластер, далее гласная.
            break;
          }
          j++;
        }
        tokens.push({type: 'c', start: i, end: j});
        i = j;
      }
    }
    return tokens;
  }

  function syllabifyLatin(word) {
    if (word.length < 4) return [];
    const tokens = tokenizeLatin(word);
    const wordLc = word.toLowerCase();
    const breaks = [];

    for (let k = 0; k < tokens.length; k++) {
      const t = tokens[k];
      if (t.type !== 'v') continue;

      const next = tokens[k + 1];
      const nextNext = tokens[k + 2];

      if (next && next.type === 'v') {
        breaks.push(next.start);
        continue;
      }

      if (!next || next.type !== 'c') continue;
      if (!nextNext || nextNext.type !== 'v') continue;

      const cStart = next.start;
      const cEnd = next.end;
      const clen = cEnd - cStart;
      const cluster = wordLc.substring(cStart, cEnd);

      if (clen === 1) {
        breaks.push(cStart);
      } else if (clen === 2) {
        // Двухсимвольный кластер: либо muta+liquida (в следующий слог),
        // либо «qu» (неразрывная единица, уходит в следующий слог
        // целиком), либо обычный — разрыв в середине.
        if (isMutaLiquida(cluster) || cluster === 'qu') {
          breaks.push(cStart);
        } else {
          breaks.push(cStart + 1);
        }
      } else {
        // 3+ согласных: последняя (или последние две, если ML) —
        // начинают следующий слог; остальные закрывают предыдущий.
        const lastTwo = cluster.substring(clen - 2);
        if (isMutaLiquida(lastTwo) || lastTwo === 'qu') {
          breaks.push(cEnd - 2);
        } else {
          breaks.push(cEnd - 1);
        }
      }
    }

    // Минимум 2 буквы в начале, минимум 4 в конце: это убирает
    // одиночные 3-буквенные хвосты после <wbr>, которые в узкой
    // колонке маргиналии выглядят как «оборванные» строки
    // (tem, ra, dem, cus). Слова короче 6 букв не делятся вовсе.
    return breaks.filter(function(b) {
      return b >= 2 && b <= word.length - 4;
    });
  }

  // PATCH X-BROWSER-4: однозначный (single-point) syllabifier.
  // Возвращает только один разрыв — самый центральный из найденных
  // syllabifyLatin. Это устраняет неоднозначность line-breaking
  // между движками: когда в слове несколько <wbr>, Firefox и Chrome
  // могут выбрать РАЗНЫЕ при переполнении (вид. на "peccatum" с
  // wbr [3,4]: FF берёт после 'pec', Chrome после 'pecc'). При
  // одном wbr на слово выбора нет — оба переносят в одной точке.
  //
  // Центр выбран как точка с минимальной |breakPos − wordLen/2|:
  // даёт сбалансированное разделение и оптимальное использование
  // ширины строки. Для длинных слов с многими разрывами это всё
  // равно даёт хорошую визуальную типографию.
  function syllabifyLatinSingle(word) {
    const all = syllabifyLatin(word);
    if (all.length === 0) return [];
    if (all.length === 1) return all;
    const center = word.length / 2;
    let best = all[0];
    let bestDist = Math.abs(best - center);
    for (let i = 1; i < all.length; i++) {
      const d = Math.abs(all[i] - center);
      if (d < bestDist) {
        best = all[i];
        bestDist = d;
      }
    }
    return [best];
  }

  function seeded(seed) {
    let s = seed >>> 0;
    return function() {
      s = (s * 1664525 + 1013904223) >>> 0;
      return s / 4294967296;
    };
  }
  const rand = seeded(0xAB3F17);
  const sym = function() { return rand() * 2 - 1; };

  // ═══════════════════════════════════════════════════════════════
  // SPACE JITTER — изолированный генератор для пробельной вариации.
  // Отдельный от основного rand/sym, чтобы изменения SPACE_JITTER
  // или включение/выключение пробельной вариации не сдвигали
  // последовательность буквенного jitter (углы наклона, смещения
  // ink-l). Seed выбран произвольно — лишь бы отличался от
  // 0xAB3F17 (буквы) и 0xC0EAA1 (титлы).
  const SPACE_JITTER = 0.20;             // полная амплитуда в em
  const spaceRand = seeded(0xC4F2A9);    // независимый seed
  const CFG = { rot: 0.35, tx: 0.2, ty: 0.3 };
  function fmt(v) {
    const s = v.toFixed(2);
    if (s.indexOf('0.') === 0) return s.slice(1);
    if (s.indexOf('-0.') === 0) return '-' + s.slice(2);
    return s;
  }
  function wrapLetter(ch) {
    const sp = document.createElement('span');
    sp.className = 'ink-l';
    sp.style.cssText =
      '--r:' + fmt(sym() * CFG.rot) + 'deg;' +
      '--x:' + fmt(sym() * CFG.tx) + 'px;' +
      '--y:' + fmt(sym() * CFG.ty) + 'px';
    sp.textContent = ch;
    return sp;
  }

  // Пробельный span. Используется и в processTextNode (jitter
  // маргиналий Аидана), и в processTextNodeWbrOnly (основной
  // текст и маргиналии Коемана). Возвращает <span class="ws"
  // style="--w:0.42"> </span>, где --w ∈ [0..1] — нормализованная
  // случайная величина, независимая от буквенного jitter.
  //
  // aria-hidden="true" не ставим: внутри есть text-node с
  // пробелом, который скринридер должен учитывать как разделитель
  // слов. Скринридеры штатно интерпретируют пробел внутри inline-
  // span как word-break.
  function wrapSpace() {
    const sp = document.createElement('span');
    sp.className = 'ws';
    // --w записываем как float [0..1]; CSS делает остальное.
    // Используем ровно одно значение из spaceRand, чтобы не
    // расходовать seed-цепочку быстрее необходимого.
    const w = (spaceRand() + spaceRand()) * 0.5;
    sp.style.cssText = '--w:' + w.toFixed(3);
    sp.appendChild(document.createTextNode(' '));
    return sp;
  }

  // Regex разбиения строки на «латинское слово» vs «прочее».
  // Латинское слово = серия букв (включая расширенные юникодные
  // для Quenya и пр.), без пробелов и пунктуации.
  const WORD_RE = /([A-Za-zÀ-ÿĀ-ſ]+)|([^A-Za-zÀ-ÿĀ-ſ]+)/g;

  // Soft hyphen (U+00AD) — единственный надёжный способ разрешить
  // перенос внутри слова при inline буквах. Браузер уважает его при
  // `hyphens: manual` (которое включено на .marginalia). При
  // фактическом переносе появляется видимый дефис — это не
  // характерно для insular IX в., но аутентичнее, чем цельный
  // кромкорез или рваные строки с одиночными знаками препинания.
  function processTextNode(node) {
    const frag = document.createDocumentFragment();
    const v = node.nodeValue;
    WORD_RE.lastIndex = 0;
    let m;
    while ((m = WORD_RE.exec(v)) !== null) {
      const word = m[1];
      const other = m[2];
      if (word) {
        const breaks = syllabifyLatin(word);
        const breakSet = {};
        for (let i = 0; i < breaks.length; i++) {
          breakSet[breaks[i]] = true;
        }
        for (let i = 0; i < word.length; i++) {
          if (breakSet[i]) {
            frag.appendChild(document.createElement('wbr'));
          }
          frag.appendChild(wrapLetter(word[i]));
        }
      } else if (other) {
        // Коллапсируем любые последовательности whitespace
        // (переводы строк и множественные пробелы из source-разметки)
        // в единственный пробел. Без этого браузер получает в DOM
        // много отдельных whitespace-текстовых узлов, и каждый даёт
        // break opportunity — в узкой маргиналии это выливается в
        // чередование очень коротких и длинных строк.
        // Кроме того, перед тире ставим неразрывный пробел —
        // в инсулярной традиции тире «прилипает» к предыдущему
        // слову, а не висит одно в начале строки.
        const collapsed = other
          .replace(/\s+/g, ' ')
          .replace(/ ([—–])/g, '\u00A0$1');
        for (let i = 0; i < collapsed.length; i++) {
          const ch = collapsed[i];
          if (ch === ' ') {
            frag.appendChild(wrapSpace());
          } else {
            frag.appendChild(wrapLetter(ch));
          }
        }
      }
    }
    return frag;
  }

  const SKIP_TAGS = {SCRIPT: 1, STYLE: 1, SVG: 1, ABBR: 1};
  function walkJitter(el) {
    if (SKIP_TAGS[el.tagName]) return;
    if (el.classList && (
        el.classList.contains('liga-protect') ||
        el.classList.contains('ws')
    )) return;
    const kids = Array.from(el.childNodes);
    for (let i = 0; i < kids.length; i++) {
      const kid = kids[i];
      if (kid.nodeType === 3) {
        // PATCH X-BROWSER-5: whitespace-only text-узлы между inline
        // элементами (например, "\n          " между <abbr>DS</abbr>
        // и следующим словом) тоже надо схлопывать в одиночный
        // пробел. Иначе при копировании в clipboard через textContent
        // эти whitespace попадают как есть, давая многострочные
        // разрывы и многократные пробелы.
        //
        // Раньше continue здесь оставлял такие узлы нетронутыми, и
        // визуально это было нормально (HTML-collapse в рендере), но
        // textContent возвращал сырой whitespace. С фазой 0 source
        // больше не схлопывает их сам. Безопасно заменить — браузер
        // визуально обработает одиночный пробел так же, как раньше
        // обрабатывал любую whitespace-последовательность.
        if (!/\S/.test(kid.nodeValue)) {
          if (kid.nodeValue !== ' ') {
            kid.nodeValue = ' ';
          }
          continue;
        }
        el.replaceChild(processTextNode(kid), kid);
      } else if (kid.nodeType === 1) {
        walkJitter(kid);
      }
    }
  }

  // ═══════════════════════════════════════════════════════════════
  // PATCH TR: раздвоение маргиналий Аидана на source + jitter-render.
  //
  // walkJitter режет каждое слово маргиналии Аидана на цепочку
  // <span class="ink-l">"X"</span>; каждый text-узел становится длиной
  // ровно в один символ. Google Translate и подобные сервисы (а также
  // Ctrl+F и скринридеры в части реализаций) работают на text-узлах
  // и не реконструируют слово из такой фрагментации — маргиналии
  // остаются непереведёнными и недоступными для поиска.
  //
  // Решение: каждая маргиналия Аидана разделяется на два слоя.
  //   .mg-translate-source — клон оригинального содержимого, целыми
  //                          text-узлами, visually-hidden (1×1 + clip).
  //                          Виден Translate'у, поиску, AT, копированию
  //                          в режиме перевода. Не выделяется мышью
  //                          (user-select:none) — copy-handler работает
  //                          по jitter-слою как раньше.
  //   .mg-jitter-render    — оригинальные узлы, перенесённые в обёртку
  //                          с translate="no" + aria-hidden="true".
  //                          Дальше на ней работает walkJitter.
  //
  // Вызывается ПОСЛЕ applyAbbreviations, decorateTituli и
  // normalizeMarginaliaBreaks: к моменту split'а маргиналия уже содержит
  // финальные <abbr.med>/<span class="liga-protect">/<svg.titulus-svg>
  // и не имеет ручных <br>. cloneNode(true) копирует это полностью.
  //
  // Идемпотентна: при повторном вызове на сплитнутой маргиналии
  // ничего не делает (страховка на случай повторного runJitter).
  // ═══════════════════════════════════════════════════════════════
  function splitMarginaliaForTranslate(mg) {
    // :scope > выбирает только прямых детей — вложенные .mg-translate-
    // source (если когда-то появятся в декоративном поддереве) не
    // дадут ложного срабатывания.
    if (mg.querySelector(':scope > .mg-translate-source')) return;

    // Source: глубокий клон. Для CSS-скрытия достаточно класса —
    // никаких атрибутов на корне source не ставим, чтобы Translate
    // спокойно его прочитал и перевёл.
    const source = document.createElement('span');
    source.className = 'mg-translate-source';
    const childrenSnapshot = Array.from(mg.childNodes);
    for (let i = 0; i < childrenSnapshot.length; i++) {
      source.appendChild(childrenSnapshot[i].cloneNode(true));
    }

    // PATCH TR2: разворачиваем сокращения в source-клоне до полных форм.
    //
    // applyAbbreviations превращает "Dominus" в DOM-фрагмент
    //   <abbr class="med nomsac contr" data-expand="Dominus">
    //     <span class="tit">DNS</span>
    //   </abbr>
    // — в textContent остаётся "DNS". Google Translate такие
    // палеографические аббревиатуры распознаёт нестабильно: иногда
    // достраивает "DNS" → "Dominus" → "Господь", а иногда оставляет
    // как непонятный токен → выходит "ДС" в переведённой странице.
    //
    // Для source-клона (который и читает Translate) разворачиваем
    // каждую abbr в text-узел с полной формой из data-expand.
    // Translate теперь видит обычное латинское слово — расшифровка
    // идёт стабильно. Render-слой нетронут: там abbr с titulus
    // остаются как есть, визуально ничего не меняется.
    //
    // liga-protect не трогаем: внутри уже полная форма слова, лишний
    // <span> для Translate безвреден (как обычная inline-разметка).
    const sourceAbbrs = source.querySelectorAll('abbr.med[data-expand]');
    sourceAbbrs.forEach(function(abbr) {
      const expansion = abbr.getAttribute('data-expand');
      if (!expansion) return;
      const textNode = document.createTextNode(expansion);
      abbr.parentNode.replaceChild(textNode, abbr);
    });

    // PATCH X-BROWSER-5: нормализация whitespace в source-клоне.
    //
    // Исходный HTML маргиналий содержит <br> между визуальными строками
    // и whitespace-отступы между ними:
    //   <div class="marginalia">
    //     Orate pro Eldar<br>
    //              qui ultra mare<br>
    //              manent...
    //   </div>
    // Шаг 1 фазы 0 (в preprocessSourceTemplate) заменил <br> на пробел,
    // но \n и пробелы отступа остались в text-узлах: "\n          qui
    // ultra mare". Render-слой проходит через walkJitter, который
    // схлопывает whitespace в processTextNode. Source-слой — это
    // глубокий cloneNode результат, и whitespace в его text-узлах
    // никем не схлопнут.
    //
    // Раньше это не проявлялось потому, что source создавался уже после
    // walkJitter (в фазе 2), и брал клон ИЗ render-слоя — где whitespace
    // уже был схлопнут. С перенесением в фазу 0 (PATCH X-BROWSER-3)
    // порядок поменялся: source клонируется ДО walkJitter, на сыром
    // template'е. Поэтому теперь нужно явно нормализовать whitespace
    // в source — ровно так же, как processTextNode делает для render.
    //
    // На что это влияет: 1) Translate получает текст без переносов
    // строк и многократных пробелов (важно для качества перевода);
    // 2) при копировании в mg-selectable режиме source-копия
    // не дублирует render с лишними переносами строк.
    //
    // Двухэтапная нормализация: сначала схлопываем whitespace внутри
    // каждого text-узла, потом ещё раз пробегаемся по соседним
    // text-узлам и схлопываем повторные пробелы, возникающие от
    // склейки "...Eldar" + " " (замена <br>) + " qui...". Без этого
    // получили бы "Eldar  qui" с двойным пробелом.
    const sourceWalker = document.createTreeWalker(source, NodeFilter.SHOW_TEXT, null);
    const sourceTextNodes = [];
    let stn;
    while ((stn = sourceWalker.nextNode())) sourceTextNodes.push(stn);
    for (let i = 0; i < sourceTextNodes.length; i++) {
      const tn = sourceTextNodes[i];
      tn.nodeValue = tn.nodeValue.replace(/\s+/g, ' ');
    }
    // Второй проход: схлопнуть пробел-в-конце + пробел-в-начале
    // соседних text-узлов. Делаем простой алгоритм: если text-узел
    // начинается с пробела, а предыдущий text-узел оканчивается
    // пробелом — убираем ведущий пробел из текущего.
    for (let i = 1; i < sourceTextNodes.length; i++) {
      const prev = sourceTextNodes[i - 1];
      const curr = sourceTextNodes[i];
      if (prev.nodeValue.endsWith(' ') && curr.nodeValue.startsWith(' ')) {
        curr.nodeValue = curr.nodeValue.replace(/^ +/, '');
      }
    }

    // Render: оригинальные узлы переезжают в обёртку с явными
    // атрибутами-сигналами для Translate и AT.
    //   translate="no"      — стандартный HTML5 атрибут, главный сигнал;
    //   class="notranslate" — старый Google-специфичный маркер для
    //                         совместимости с translate.google.com;
    //   aria-hidden="true"  — скринридер пропускает поддерево.
    const render = document.createElement('span');
    render.className = 'mg-jitter-render notranslate';
    render.setAttribute('translate', 'no');
    render.setAttribute('aria-hidden', 'true');
    while (mg.firstChild) {
      render.appendChild(mg.firstChild);
    }

    // Source первым в DOM, render вторым. Source out-of-flow (CSS),
    // визуально не виден; render — в нормальном inline-потоке.
    // Reading order для AT: source → render(skipped via aria-hidden);
    // т.е. голос читает только source. Visual order: только render.
    mg.appendChild(source);
    mg.appendChild(render);
  }

  // ═══════════════════════════════════════════════════════════════
  // PATCH TR3: visually-hidden source-span'ы рядом с abbr в основном
  // тексте кодекса.
  //
  // applyAbbreviations превращает "Domini" в DOM-фрагмент
  //   <abbr class="med ..." data-expand="Domini">
  //     <span class="tit">DNI</span>
  //   </abbr>
  // — в textContent остаётся "DNI". Translate либо реконструирует
  // "DNI"→"Dominus"→"Господь" (удача), либо оставляет "DNI"/"ДНС"/
  // "ДС" в переводе. В маргиналиях это решено через split на source/
  // render-слои; в основном тексте слой один, и развернуть abbr
  // напрямую нельзя — пропадут titulus-SVG и палеографическая форма.
  //
  // Решение: рядом с каждой abbr ставим visually-hidden sibling-span
  // с полной формой. Translate видит abbr+span как два слова в потоке
  // ("DNI Domini"), но в обычном режиме span невидим (1×1+clip), а в
  // режиме перевода CSS-правилом abbr схлопывается, span встаёт в
  // поток — пользователь видит чистое "Господь".
  //
  // ВАЖНО: пропускаем abbr внутри маргиналий — для них работает
  // split-механизм TR1+TR2. Если бы мы добавили sibling-span'ы и
  // там, при split'е они попали бы в source-клон параллельно с
  // развёрнутыми abbr, дав удвоение "Domini Domini".
  //
  // Идемпотентна: повторный вызов на уже обработанной abbr
  // ничего не делает.
  // ═══════════════════════════════════════════════════════════════
  function addAbbrTranslateSources(root) {
    const abbrs = root.querySelectorAll('abbr.med[data-expand]');
    abbrs.forEach(function(abbr) {
      // Айдан-маргиналии обслуживаются split-механизмом — пропускаем.
      // Коеман-маргиналии (.mg-coemanus) НЕ split'ятся, для них надо
      // добавить sibling-source точно так же, как для основного текста.
      // Без этого Translate видит палеографическую форму "fr"/"frb"/"DNI"
      // в Коеман-маргиналиях без раскрытия — перевод страдает.
      const inMarg = abbr.closest('.marginalia');
      if (inMarg && !inMarg.classList.contains('mg-coemanus')) return;

      // Идемпотентность: если следующий sibling уже наш source —
      // значит, для этой abbr всё уже сделано.
      const next = abbr.nextSibling;
      if (next && next.nodeType === 1 &&
          next.classList && next.classList.contains('abbr-translate-source')) {
        return;
      }

      const expansion = abbr.getAttribute('data-expand');
      if (!expansion) return;

      const source = document.createElement('span');
      source.className = 'abbr-translate-source';
      source.textContent = expansion;

      // aria-hidden на abbr: скринридер пропустит её и прочитает
      // source-span с полным словом. abbr с aria-hidden — не редкая
      // практика, когда настоящий "доступный" текст рендерится
      // отдельным узлом (визуально это точно так же, как сейчас
      // люди делают для иконок: <span aria-hidden>★</span><span
      // class="visually-hidden">избранное</span>).
      abbr.setAttribute('aria-hidden', 'true');

      // PATCH X-BROWSER-6: помечаем abbr как непереводимую. Без этого
      // Translate видит палеографическую форму (например "DNI") РЯДОМ
      // с раскрытой формой ("Domini") в одном потоке и склеивает их
      // в один токен "DNIDomini", который сегментирует/переводит
      // непредсказуемо. С translate="no" и class="notranslate"
      // Translate игнорирует abbr и читает только source-span с
      // чистым словом.
      //
      // На CSS не влияет — display и pos управляются классом abbr.med
      // и body.mg-translated. В режиме перевода abbr скрывается через
      // display:none, source встаёт в поток. Notranslate тут чисто
      // hint для парсеров перевода.
      abbr.setAttribute('translate', 'no');
      abbr.classList.add('notranslate');

      // Вставляем сразу после abbr — sibling, не child.
