          </svg></span><span class="dim-1">go</span> <span class="dim-2">Aidanus,</span> <span class="dim-3">peccator</span> et servus inutilis Domini nostri Iesu Christi, monachus indignus in monasterio quod fundavit beatus Columba in insula quam Scotice <span class="nomen-illustre">Ì</span> vocamus et Latine <span class="nomen-illustre">Insula Columbae</span> appellamus, haec scribo ad honorem Dei omnipotentis in Trinitate adorandi, rogante fratre Finano abbate nostro carissimo, ne haec quae vidi oblivioni perpetuae traderentur. Sciunt fratres nostri me non esse hominem visionum: nunquam antea mihi apparuit angelus, nunquam in extasi elevatus sum. Sed quod narraturus sum verum est, quantum homo fallibilis et peccatis oneratus verum narrare potest coram Deo cuius oculus omnia penetrat.</p>

        <div class="marginalia mg-left">
          <span class="mg-red">☩</span> De auctore:<br>
          Aidanus monachus<br>
          de Ì, discipulus<br>
          Columbae patris.<br>
          Testis ipse solus;<br>
          sed Deus vidit.
        </div>
<p>Rogabant me multi : et hoc fateor : cur non siluerim de his rebus. Respondeo: quia tacendo forsitan peccaretur contra Deum qui haec mihi ostendere dignatus est. Quid sint illa mirabilia in schemate divinae providentiae, non ego definire audeo: id doctoribus Ecclesiae relinquo. Ego solum narro quod vidi, quod audivi, quod manu propria tetigi.</p>
      
<span class="rubric">☩ De Navigatione Prima ☩</span>

        <p>Erat annus ab incarnatione Domini <span class="smcaps">DCCCXCII</span> cum primum cor meum quasi flamma aliqua incendi coepit, et in oratione nocturna post Matutinas videbam quasi in imagine mentis mare occidentale, et ex illo mari lumen surgebat non solis, non lunae, sed tertii generis omnino. Dixi hoc Finano abbati. Ipse vir prudens et in scripturis exercitatus respondit: <em class="uncial-passage">Si Deus vocat, noli tardare. Si diabolus tentat, oratio et ieiunium discernent.</em> Et ieiunavi septem diebus, et oravi, et visio non recessit sed confirmata est. Tunc intellexi me vocandum esse.</p>

        <div class="marginalia mg-right">
          Cf. Navigatio<br>
          Brendani abbatis,<br>
          et ille ad Occidentem<br>
          navigavit &amp; mira<br>
          vidit. Forte eadem<br>
          terra est?
        </div>
<p>In mense Augusto, post festum sancti Columbae, curucum parvum, costis vimineis et coriis bovinis confectum, conscendi. Frater Cellach portum videns signum crucis super me fecit et lacrimas non celavit. Navigavi in Occidentem, Polari stella post tergum relinquens. Per tres dies ventus mirabilis : nec nimis validus nec nimis languidus, quasi manu alicuius Potestatis directus : vela mea implebat. Delphini me comitabantur primo die, secundo die aves quas non noveram, tertio die silentium absolutum, mare factum est quasi speculum immensum, et caelum et pontus unum videbantur.</p>
      
<span class="rubric">☩ De Tempestate ac Lumine Insolito ☩</span>

        <p>Die quarta surrexit tempestas magna, et fluctus in montes assurgebant, et cymba mea : misera tabula inter pelagi vastitudinem : iactabatur ut folium autumnale in vento. Erat nox et tenebrae absque stella. Orabam voce magna et voce cordis, Deum et Columbam sanctum et omnes sanctos Hiberniae et Britanniae invocans. Et vota feci, ut si salvus exirem ex his aquis, reliquam vitam in silentio et ieiunio et oratione agerem, nullum humanae gloriae buccellam amplius quaerens.</p>

        <div class="marginalia mg-left">
          Nota de tempori:<br>
          Quattuor dies et<br>
          noctes, quasi<br>
          Ionae in ventre<br>
          piscis triduum.<br>
          Numerus mysticus.
        </div>
<p>Tunc, subito, non gradatim, tempestas cessavit. Non ut tempestates cessant naturaliter, quasi vires suas paulatim consumens, sed quasi aliquis manum imposuisset super mare et dixisset ei: <em class="uncial-passage">Tace, obmutesce.</em> Mare factum est tam quietum quam stagnum silvae in aurora. Et vox audivi: non ex aere exteriori, sed in profundo cordis mei, quasi lux in spelaeo accensa, quae dixit: <em class="uncial-passage">Noli timere, serve Dei. Vis videre quod ante saecula praeparatum est. Vade quo ventus te ducit.</em> Et ventus novus surrexit de septentrione, levis et certus, et cymba mea sponte se vertit ad Occidentem.</p>

        <p>In tertia vigilia noctis illius lux apparuit in horizonte occidentali. Non erat lux solis : sol enim ad Orientem erat oriens : nec lunae, quae post tergum meum fulgebat senescens. Erat duplex lumen: unum argenteum, frigidum et purum quasi prima stella vespertina multiplicata in mille; alterum aureum, calidum et laetum quasi sol aestivus in hora sexta. Et haec duo lumina non confundebantur sed separatim fulgebant, et inter ea quasi chorus quidam erat, alternatio solemnis ac mirabilis, ita ut terra ante me nunquam in tenebris esset, sed semper in aliquo lumine maneret.</p>
      <div class="marginalia mg-right">
          Hoc loco manus<br>
          scriptoris tremuit:<br>
          vide litteras<br>
          perturbatas in<br>
          exemplari veteri.
        </div>


      <div class="ornament-line">· · ·</div>
<span class="rubric">☩ De Terra Eldarorum ☩</span>

        <p><span class="uncial-passage">In aurora cymba mea in portum quendam pulcherrimum perducta est, nullo me remigio, quasi manus invisibilis puppim teneret.</span> Egredi pede trepidante ex cymba et humum tetigit pes meus, et herba erat sub pedibus meis viridior quam ulla herba Hiberniae vel Britanniae vel cuiusquam terrae quam oculis meis vidi. Flores erant quorum nomina nescio, quarum odor erat quasi omnes flores mundi in unum collecti. Arbores altissimae, quarum folia quasi gemmae translucentes lucebant etiam sine sole. Et aer ipse : Deus bone! :, aer ipse erat quasi aqua limpidissima biberes et non esses satur, sed semper plus sitires.</p>

        <div class="marginalia mg-left">
          Terra sine sole<br>
          proprio, cf.<br>
          Apocalypsin cap.<br>
          XXI: civitas non<br>
          eget sole neque<br>
          luna. Sed illa<br>
          civitas caelestis<br>
          est: haec autem<br>
          terrestris videtur.
        </div>
<p>Non erat sol in caelo. Hoc primum notavi et primo territus sum: caelum erat pallidum et altum et purissimum, quasi caelum post pluviam magnae aestatis, sed sol aberat. Lux tamen erat, nec lunae nec solis: sed alia quaedam, quasi ex loco procul veniens quem nondum videre poteram. Unde manaret, eo die non intellexi. Postea didici, sed de hoc, si Deus dederit, loco suo dicam.</p>

        <p>Et montes erant in horizonte, alti et nivosi, nobilissimi quos unquam videram, et in his montibus quasi turres albae lucebant ex longiquo, tot et tam altae ut primo putarem nubes esse conformatas in imaginem civitatis. Sed non erant nubes. Erant aedificia vera, ex lapide albo qui ipse propriam lucem habere videbatur, aedificata arte tanta quam nulla manus hominis aequare posset.</p>
      <div class="marginalia mg-right">
          Aer quo bibitur<br>
          et sitis crescit:<br>
          quis non meminit<br>
          aquae vivae de qua<br>
          Dominus loquitur<br>
          (Io. IV)? Sed hic<br>
          non aqua sed aer,<br>
          et sitis non minuitur<br>
          sed augetur. Mirum<br>
          donum Amanis:<br>
          quasi sitis ipsa<br>
          beatitudo est, iuxta<br>
          Matth. V, 6.
        </div>
<p>Et dum sic stabam quasi extra me ipsum positus, nec sciens utrum vigilarem an in visione essem, ecce vir quidam ex incolis terrae illius, quos nondum noveram nec nomine nec genere, silenter ad latus meum stetit. Non audivi pedes eius super herbam venire; tantum vidi umbram eius iuxta meam in luce illa quae sine sole erat. Non quaesivit nomen meum, non interrogavit unde venirem; tantum signo capitis benigno me sequi iussit. Et secutus sum sine timore: nam in vultu eius nihil erat quod timorem moveret, sed potius quies illa quam in oratione longa fratres senes habere solent.</p>

<span class="rubric">☩ De Duplice Lumine in Monte ☩</span>

        <p>Cum paulatim oculi mei se lumini illius terrae accommodavissent, in monte procul post civitatem duo fontes luminis notavi, ex quibus : ut mihi tunc videbatur : omnis lux regionis manabat. Longe erant, fortasse itinere diei vel amplius, et non videbam eos ut res cum forma propria, sed ut duas scintillantes sedes in alto monte positas: unam argento puro quasi luna in nocte pruinosa, alteram auro calido quasi sol Augusti mensis. Et vicibus lucebant: cum unum languesceret, alterum crescebat; et cum aliquando ambo simul fulgebant, tanta pulchritudo erat ut lacrimae sine causa nota mihi venirent.</p>

        <div class="marginalia mg-left">
          Duae arbores lumen<br>
          dantes sine sole,<br>
          forte memoriam<br>
          Paradisi ante<br>
          lapsum servant?<br>
          In principio creavit<br>
          Deus caelum et<br>
          terram, et prius<br>
          quam sol factus est,<br>
          lux erat. Gen. I.
        </div>
<p>Et quia monachus sum et assuetus omnia per verba Scripturae et creaturae nominare, vocavi eas apud me duo luminaria magna vel duas Arbores Luminis, quamvis de tanta distantia nescirem utrum arbores essent vere an columnae lucis an turres an aliquid aliud quod nondum noveram. Sicut enim qui navigium procul in mari videt dicit navigium, etiamsi forsitan insula sit vel nubes vel res alia.</p>

<p>Comes autem meus, qui mecum a litore in silentio ascenderat, et cuius nomen ac genus tunc adhuc ignorabam, videns quo oculi mei converterentur, voce leni atque gravi dixit:</p>

<p class="no-indent" style="text-indent:0;margin-left:2em;margin-right:2em;"><em class="uncial-passage">Lumen vulneratum vides, hospes peregrine. Inimicus primus hoc olim percussit; de quo hodie non loquar. Sed lumen verum tenebras semper pellit, quamvis aliter quam prius. Aspice, et noli te fallere.</em></p>

        <div class="marginalia mg-left mg-coemanus">
          De hoc non dubitet lector: qui ex Cantu factus est, cantum intellegit.
        </div>
        <p>Audivi verba eius velut in somnio. Horum tamen sensum tunc non ex toto intellexi: quis esset <span class="terminus t-rubricatus">Inimicus</span> ille primus, de quo tacere voluit, omnino nescivi, neque audebam interrogare ex arbitrio meo. Sed vox eius auctoritatem habebat tantam ut non dubitaverim verum esse quod dixit, et servavi haec verba in corde meo quasi semen occultum, quod suo tempore germinaret. Homo enim qui in loco alieno primum venit, prius tacere debet et audire.</p>

<p>Reliquum diei illius spectabam de longe montem illum et alternationem luminum inter argentum et aurum, et erat hoc mihi quasi longa oratio silens, etiamsi verba mea in ea non erant. Et cum lux : si fas est dicere de eis quae non sunt sol nostrum : languere cepisset et hora vespertina appropinquaret, dixit mihi ille comes: <em class="uncial-passage">Satis est hodie. Intremus civitatem.</em> Et intravimus.</p>

        <p>Quod vidi illo die de longe, non oblitus sum, neque potui oblivisci; sed quid esset revera, hoc postea didici, et suis locis in hoc libello scribam: et quod ad oculos meos pertinet, et quod ad cor.</p>
      <div class="marginalia mg-right">
          Quid sunt hae<br>
          arbores in ordine<br>
          creationis? Numquid<br>
          lignum vitae de<br>
          quo in Genesi?<br>
          Sed illa in Eden<br>
          erat, non ultra<br>
          oceanum...
        </div>

<span class="rubric">☩ De Incolis ac Facie Eorum ☩</span>

        <p>Incolae terrae illius, quos postea intellexi esse eos qui se <span class="elvish">Eldar</span> nominant, id est Latine quasi <em class="uncial-passage">Qui stellas primum viderunt</em>, quia nati sunt ante solem et lunam, sub lumine stellarum primordialium, erant in forma humani similes, sed quantum homo cogitari potest praestantiores.</p>

        <div class="marginalia mg-left">
          Quaere: angeli<br>
          corporei? Non<br>
          videntur. Praeter-<br>
          adamitae? Sed<br>
          ubi in Scriptura?<br>
          Alia species a Deo<br>
          creata, extra<br>
          intelligentiam<br>
          nostram. Timendum<br>
          et adorandum Deum<br>
          qui talia fecit.
        </div>
<p>Statura eorum erat procera, ut viri bene formati, sed omnes quodammodo maiestuosi et sereni, quasi nemo eorum umquam timuit vel laboravit nimium vel aegrotavit. Facies eorum lucebant: non modo sicut facies hominis sani et laeti lucere solet, sed luce quadam interiore, quasi crystallum ante candelam, in qua candela ipsa quodammodo videatur. Capilli eorum erant auri vel argenti vivi, non coloris eorum, sed quasi ipsa materia illa esset in capillis viva. Et oculi : Domine Deus! :, oculi eorum erant quasi putei sine fundo, in quibus videre poteras quasi memoriam omnium quae ab initio mundi facta sunt, et stellas, et cantus quos nulla auris humana audit.</p>

        <p>Nihil in eis erat deforme, nihil turpe, nihil mortale visu. Vestimenta eorum erant alba et grisea et argentea, nusquam lacerata vel sordida. Et quod maxime mirum videbatur: non poterant horum in facie videri timor vel tristitia: non quia eas non agnoscerent, sed quia quasi ultra eas erant, quasi qui dolorem bene scit et tamen ex eo emergens iam altius stat. Postea ipse : de quo mox dicam et nomen eius : mihi explicavit: <em class="uncial-passage">Nos non vivimus in tempore sicut vos. Nos memores sumus omnium quae fuere. Hoc et donum est et onus grave.</em></p>

        <p>Lingua eorum : o quam mirabilis lingua! : erat quasi musica facta verbis, aut verba facta musica: singulae voces quasi chorda citharae pulsatae resonabant, et quando multi simul loquebantur erat quasi chorus cantorum in nocte Nativitatis Domini. Ego Hibernice locutus sum, et Latine, et paululum Saxonice quod a fratribus nostris Anglis in monasterio didiceram. Et tunc, non sine stupore, agnovi in eorum medio illum ipsum qui me silenter ad civitatem duxerat: et erat unus eorum maior, non in statura sed in quodam splendore quasi nimbus circa eum, quem in via non videram, quasi tunc primum se aperuisset. Signum fecit quietis ceteris et ad me loqui coepit nova lingua.</p>

        <p>Et mirum mirorum et gratia Dei: intellexi eum. Non sicut peregrinus qui post multos menses linguam barbaram paulatim discit, sed quasi somnium: sensus perveniebat in mentem meam sine labore, sine strepitu verborum, quasi vox eius directe in cor meum loqueretur, verbis tanquam lumine transfixo.</p>

        <p class="no-indent" style="text-indent:0;margin-left:2em;margin-right:2em;color:#2a1a08;line-height:2.0;">
          <em class="uncial-passage">Veni,</em> dixit ille, <em class="uncial-passage">hospes es in <span class="elvish">Aman</span>. Non multis filiis Mortis datum est huc pervenire. Quis te misit?</em>
        </p>

        <p>Respondi ego, genibus paene flexis: <em class="uncial-passage">Deus meus, Creator caeli et terrae, qui in tribus personis adoratur, et sanctus Columba patronus meus, quem ille ad hanc viam misit.</em></p>

        <p>Et vultus illius factus est quasi sol post nubes longas emergens: gaudium et maestitia simul, mirabiliter permixta, et oculi eius : iam dixi quod oculi eorum profundi erant : quasi aque profundas movebantur in his verbis. Et dixit voce submissa, quasi nomen sacrum proferens in sancto sanctorum: <em class="uncial-passage"><span class="elvish">Ilúvatar</span>.</em></p>
      <div class="marginalia mg-right">
          Formosi nimis;<br>
          Sic et angeli<br>
          quando apparent.<br>
          Sed angeli non<br>
          vescuntur, hi<br>
          autem edunt et<br>
          rident. Quod<br>
          mirabile est.
        </div>

<span class="rubric">☩ De Colloquio cum Finrotho ☩</span>

        <p>Nomen illius, quantum ex ipsorum lingua in Latinum reducere potui, erat <span class="nomen-illustre">Findaratus</span> vel <span class="nomen-illustre">Finrothus</span>: <em class="uncial-passage">Finis aureus</em> significare videbatur, aut <em class="uncial-passage">Coronatus sapientia et auro</em>. Inter suos erat quasi rex vel sacerdos, non per violentiam aut timorem, sed quia omnes eum amabant et cum eo loqui cupiebant. Ipse dixit se de gente esse quae se <span class="elvish">Noldor</span> nominat: id est ut interpretabatur, <em class="uncial-passage">Qui multa sciunt</em> vel <em class="uncial-passage">Sapientiae filii</em>.</p>

        <div class="marginalia mg-left">
          Finrothus, nomen<br>
          Latinum ex ipsorum<br>
          lingua redditum.<br>
          Significat quasi<br>
          Sapientia aurea<br>
          vel Corona auri<br>
          et sapientiae.<br>
          Vir magnificus.
        </div>
<p>Duxit me in civitatem quam de navicula mea videram, et maior erat quam longe credideram. Erat in monte aedificata ex lapide albo proprio lumine micante, cum turribus tot et tam altis ut paene nubes tangerent. Viae strata erant lapide nitido et levi. Per mediam viam rivus cantans currebat, et arbores in via ipsa crescebant quasi in horto amplissimo. Populus totus nos inspiciebat, non hostiliter sed curiositate misericordi: ego enim eram : intellexi postea : quasi avis peregrini generis inter illos, curiosa res, tenera, fragilis, mortalis.</p>

        <p>In aula magna, tota ex crystallo et marmore constructa, in cuius culmine lux quaedam mollis per fenestras vastas intrabat, cuius originem tunc ignorabam, sedimus, ego et Finrothus, et longa colloquia habuimus per horas quas numerare non valui, quia horae ibi aliter fluunt.</p>

        <div class="marginalia mg-right">
          Civitas alba in<br>
          monte, cf. civitatem<br>
          in Apocalypsi:<br>
          descendentem de<br>
          caelo a Deo, habent-<br>
          em claritatem Dei<br>
          (Apoc. XXI, 10).<br>
          Sed haec nondum<br>
          descendit: iam<br>
          ibi est.
        </div>
<p>Narravit mihi Finrothus de origine mundi. Narravit de <span class="terminus t-rubricatus">Cantu Magno</span> : quem ego Creationem intellexi : quando <span class="elvish">Ilúvatar</span> ipse in principio cantavit et Potestatibus suis: <span class="elvish">Ainur</span> eos vocabat, quos ego Angelos Maiores esse intellexi, mandavit ut secum canerent melodias ineffabiles. Et cantaverunt, et ex cantu eorum et voluntate <span class="elvish">Ilúvatar</span> mundus formatus est: non sicut figulus vas fingit, sed sicut cantor harmoniam creat: ex ipso sono, ex ipsa pulchritudine.</p>

        <p>Sed unus ex Angelis Maioribus, quem <span class="elvish">Melkor</span> nominabant et quem ego sine dubio <span class="terminus">Adversarium</span> esse intellexi, quem nos Satanam vocamus, contra harmoniam cantare voluit et discordiam seminavit in cantum. Et cum hoc nomen <span class="elvish">Melkor</span> audivi, subito mihi in memoriam rediit quod ante dies aliquot iuxta montem luminum a comite meo audiveram: de <em class="uncial-passage">Inimico primo</em> de quo tunc tacere voluerat. Intellexi igitur eundem esse: vocem quae harmoniam primam corrupit, et manum : ut mox patefiet : quae lumina mundi postea occidit. <em class="uncial-passage">Una est manus, unum peccatum, quamvis opera eius multa et diversa per saecula.</em></p>

        <div class="marginalia mg-left">
          Lux ante solem,<br>
          sicut in Genesi<br>
          dicitur: Dixit<br>
          Deus: fiat lux.<br>
          Et facta est lux.<br>
          Hoc fuit primo<br>
          die. Sol autem<br>
          quarto. Quid<br>
          mediavit? Silet<br>
          Scriptura.
        </div>
<p class="theological theological-cont">Et <span class="elvish">Ilúvatar</span> illam discordiam non annihilavit sed in se recepit et ex ea quoque pulchritudinem extraxit mirabiliorem: ut quasi tenebrae quaedam in pictura lucem circumstantem magis lucere faciant. Haec cogitans obstupui: etiam in theologia horum <span class="terminus">Immortalium</span> idem mysterium quod nos in Providentia Dei veneramur!</p>

        <div class="marginalia mg-right">
          Creatio per cantum:<br>
          mirum! In Psalmis<br>
          David cantu Deum<br>
          laudat, angeli<br>
          cantant Gloria in<br>
          excelsis; sed hic<br>
          cantu ipso mundus<br>
          factus est? Mira<br>
          theologia, sed<br>
          non impia.
        </div>
<p>Tunc Finrothus, vidensque me intentum, vocem quasi cantantis sumpsit; aliquid enim mutat in voce <span class="elvish">Eldar</span> cum de rebus antiquioribus loquuntur, et narrare coepit de luminibus primis mundi, antequam sol et luna facta essent. Quae narratio me adeo movit ut postea nocte illa somnum non potuerim capere, et hodie quoque, cum ea recordor, sentio quasi fenestram aliquam in corde meo apertam esse quam claudere non possum.</p>

        <p><em class="uncial-passage">Olim,</em> dixit, <em class="uncial-passage">cum mundus iuvenis esset et sol nondum in caelo esset positus, <span class="elvish">Valar</span> : quos vos Potestates vocare possetis : in terra nostra duas Arbores plantaverunt ad lumen praebendum Amanorum. Non erant arbores sicut istae quas vides in horto isto: illae enim erant quasi ipsa lux in formam arboris contracta, quasi Sapientia <span class="elvish">Ilúvatar</span> se manifestans per radicem et frondem et florem.</em></p>
        <div class="marginalia mg-right mg-coemanus">
          Arbores has duas<br>
          ipsedepinxi, sicut<br>
          Pater Cellach mihi<br>
          descripserat se eas<br>
          in codice<br>
          antiquo Aidani manu<br>
          factas vidisse,<br>
          antequam tempus deleret.<br>
          — <span class="signum">frater Coemanus</span>
        </div>

        <p>Et descripsit eas voce tam clara ut ego paene eas oculis meis viderem: <span class="nomen-illustre">Arborem Primam</span>, quam <span class="elvish">Telperion</span> vocabant, magnam et vetustissimam, folia habentem viridia et flores argenteos, ex quorum floribus lumen manabat purum et frigidulum quasi luna plena sed sine umbra et sine intermissione. <em class="uncial-passage">Nomen eius,</em> inquit, <em class="uncial-passage">in sermonem tuum forsitan reddere possim quasi Argentea Frondositas vel Splendor Argenti. Radices eius, aiunt, terram Amani totam sub se tenebant, et cum venti leves ramos eius moverent, lux ipsa quasi cantabat, scintillans inter folia. Hoc primum lumen erat mundi.</em></p>

        <p><em class="uncial-passage"><span class="nomen-illustre">Secunda Arbor</span>,</em> dixit, <em class="uncial-passage">paululum minor sed ardentior, flores aureos habebat ex quibus lux calida et gaudosa fluebat, similis soli aestivo sed sine ardore nocivo: lux pura et benigna, sub qua omnia visa sunt pulchriora quam sunt. Eam</em> <span class="elvish">Laurelin</span> <em class="uncial-passage">nominavimus, id est quasi Canens aurum vel Aurea Melodia. Nam lux illius arboris quasi musica erat: non quam aure audis, sed quam oculus et corpus totum sentit. Alternatim lucebant, ita ut lux argentea paulatim decresceret dum aurea crescebat, et rursum aurea minueretur et argentea floreret, et in brevi spatio temporis ambo simul fulgebant, in mixtura luminis tam pretiosa ut nunc, cum de hoc loquor, lacrimae mihi subveniunt, etiamsi multi anni transierunt.</em></p>

        <p>Et tacuit paululum, et vidi oculos eius humectari: quod apud <span class="elvish">Eldar</span> res rarissima est. Deinde, voce mutata, continuavit: <em class="uncial-passage">Sed <span class="elvish">Melkor</span> ille, de quo tibi modo locutus sum, cuius discordia in Cantu audita est, postea : cum iam eiectus fuisset et rursus in mundum venisset : Arbores illas odio persecutus est. Nam lux earum omnem opus eius tenebrosum accusabat. Et consilium iniit cum creatura quadam monstrosa, cuius nomen non libenter profero in lucem diurnam, ne forte attendat: quae tenebras bibebat sicut alii aquam, et tam antiqua erat ut neque <span class="elvish">Valar</span> ipsi sciunt unde venerit. Haec duo simul, <span class="elvish">Melkor</span> et tenebrarum illa bestia, venerunt in aurora quadam festa ad Arbores, et vulneraverunt eas, et exsugsit illa tenebrarum potestas omnem lucem earum et vitam.</em></p>

        <div class="marginalia mg-left">
          Melkor = Satanas?<br>
          Nomen aliud,<br>
          substantia eadem:<br>
          angelus primus qui<br>
          contra harmoniam<br>
          Dei voluit, cecidit<br>
          per superbiam<br>
          (Is. XIV). Ipsa res<br>
          una, nomine tantum<br>
          alia.
        </div>
<p><em class="uncial-passage">Nox vera tunc primum cecidit super <span class="elvish">Aman</span>. Quod antea non cognoveramus: quod lux posset occidi. <span class="elvish">Valar</span> planxerunt ut nulla creatura umquam plangere poterit in hoc mundo, quia ipsi fecerant Arbores manu propria et quasi cor suum in eis posuerant. Et nos,</em> <span class="elvish">Eldar</span><em class="uncial-passage">, qui sub luce illa nati fueramus et sub ea vixeramus tot saecula, stabamus muti, nescientes quid esset tenebrae verae. Multa ex hoc tempore manarunt quorum tibi hodie non expediat audire: exilium, gladius, fratres contra fratres, et labor longus et amarus. Hoc tantum scias: lumen primum mundi occisum est.</em></p>

        <p>Et haec cum dixisset, ego cogitans in corde meo de morte Christi : de luce mundi quae in Golgotham extincta est :, silui, et non potui ei respondere. Quomodo ei diceretur? Neque enim tunc sciebam dicere. Sed scripsi in memoria mea, ut Maria verba pastorum scripsit in corde suo, ut res quam Deus aliquando explicabit.</p>

        <p><em class="uncial-passage">Quaedam tamen,</em> dixit Finrothus postea, quasi sensum animi mei percipiens, <em class="uncial-passage">ex Arboribus superstes est, et ante reditum tuum videbis, si placuerit tibi. Non autem illa ipsa quae fuerunt: nam illa perierunt, ut dixi. Sed quae superest, memoria est, quam <span class="elvish">Ilúvatar</span> non sinit penitus perire. Nam quod vere pulchrum fuit, apud eum servatur quodammodo, quamvis non eodem modo quo prius erat. Sed de hoc agemus cum tempus erit.</em></p>

        <p>Et ego intellexi me aliquid magnum adhuc visurum esse, et hoc verbum, <em class="uncial-passage">quod vere pulchrum fuit, apud eum servatur</em>, in corde meo sicut semen positum est, quod postea flores suos daret.</p>
      <div class="marginalia mg-right">
          Lacrimae Eldar,<br>
          mira res. Non<br>
          tales sunt sicut<br>
          nostrae, ex dolore<br>
          carnis; sed ex<br>
          memoria rerum<br>
          quas tenent ac<br>
          tenere cogunt.<br>
          Grave onus.
        </div>

<span class="rubric">☩ De Immortalitate Eorum ac Sorte ☩</span>

        <p>Interrogavi Finrothum de statu post mortem eorum. Et hic iterum vidi in facie illius aliquid quasi nubis transeuntis: non tristitia illa quam iam pridie cum de Arboribus loqueretur notaveram, sed quaedam alia: profunda interrogatio, quasi homo qui speculum inspicit et videt se et non se, et utrumque miratur.</p>

        <div class="marginalia mg-right">
          Hic locus maxime<br>
          theologice difficilis.<br>
          Si non moriuntur<br>
          in peccato, non<br>
          indigent redempt-<br>
          ione? Sed Augustinus<br>
          docet omnem crea-<br>
          turam post lapsum<br>
          Adae affectam esse.<br>
          Quomodo hi?
        </div>
<p><em class="uncial-passage">Nos non morimur sicut vos morimini,</em> dixit lente, quasi verba ponderans. <em class="uncial-passage">Corpus nostrum perire potest in bello vel in vulnere gravi. Sed spiritus noster : quod vos animam vocatis : in saecula permanet in mundo isto, ad carnem novam evocandus ubi tempus venerit. Nos sumus ligati huic Creationis cantui, huic mundo, usque ad finem ultimum eius.</em> Pausa. <em class="uncial-passage">Vos autem, filii Mortis, filii Donationis Ignotae, sicut flamma brevis ardetis et post mortem ad ignotum iter pergitis. Quo eatis, <span class="elvish">Ilúvatar</span> sibi reservavit. Nobis non revelavit. Et hoc est,</em> et hic mirabili modo voce usus est quasi de re pretiosa et paene invidiosa, <em class="uncial-passage">donum vobis datum quod nobis negatum est.</em></p>

        <p>Diu haesi super his verbis. <span class="terminus t-rubricatus">Donum</span>: mors, donum? Nos qui tota vita morti resistimus, qui parentum et amicorum et fratrum mortes cum lacrimis planximus, qui in timore ultimo viaticum petimus, nos mortem ut donum habemus? Et isti <span class="terminus">Immortales</span>, quibus nos quasi miseri et breves et periturum esse videmur, nos propter illam ipsam brevitatem et mortalitatem mirantur?</p>

        <p>Finrothus vidit cogitationem meam in facie et subrisit, et subrisus eius erat quasi aurora: <em class="uncial-passage">Noli hoc male interpretari. Non invidemus vobis, non contemnimus. Sed post tot saecula vidimus multos ex genere vestro : paucos, valde paucos, qui huc pervenerunt :, et in omnibus vobis quoddam lumen est quod in nobis non est: lumen rerum brevis sed ardentem. Vos amatis intensius quia cito amittitis. Cantatis fortius quia cantus vester finiri scit. In hoc similes estis flammae: et flamma splendidior est stella, quamvis stella longior vivat.</em></p>
      <div class="marginalia mg-left">
          Mors ut donum!<br>
          Paradoxum mirabile.<br>
          Numquid isti<br>
          Immortales mortem<br>
          nostram invident?<br>
          Quid est libertas<br>
          a mundo, nisi<br>
          mors ipsa?
        </div>

<span class="rubric">☩ De Praedicatione et Responsione Mirifica ☩</span>

        <p>Tunc, et hoc, fratres, ex caritate et officio meo feci, non ex arrogantia, narravi Finrotho ea quae scimus et credimus et praedicamus: de Deo Patre qui tantum mundum dilexit; de Filio aeterno qui carnem nostram humanam assumpsit : mirabile et stupendum! : et in illa carne passus est et mortuus est et in tertia die resurrexit; de Spiritu Sancto qui Ecclesiam vivificat. Narravi quomodo per hanc passionem et resurrectionem porta aeterna aperta sit hominibus ad vitam.</p>

        <div class="marginalia mg-right">
          Hic nodus gordius<br>
          totius narrationis.<br>
          Si Eldar Ilúvatar<br>
          noverunt ante<br>
          Christum: quid<br>
          de eis post Chr-<br>
          istum? Habent-ne<br>
          salutem? Patres<br>
          Ecclesiae hoc non<br>
          tractaverunt.
        </div>
<p>Et Finrothus me audiebat : et hoc etiam mirabile erat : non modo aures praebendo sed toto corpore, tota mente, quasi homo qui longam historiam a multis narratam tandem ex fonte primo audit. Et quando nominavi Filium Dei in carnem descendentem et in cruce mortuum, vultus eius factus est quasi caelum quando nubes graves super solem transeunt: umbra, sed non obscuritas.</p>

        <p>Cum finivi loqui, siluit diu. Ita diu ut putarem me offendisse. Sed non erat ira in silentio eius: erat consideratio profunda, quasi qui calculum longum in animo ponit. Tandem dixit:</p>

        <p class="no-indent uncial-passage" style="text-indent:0;margin-left:2em;margin-right:2em;">De hoc Uno qui descendit in mortem ut mortem vinceret, et qui natus est ex muliere mortali et portavit in carne omnem tristitiam carnis, habuimus inter nos prophetias antiquas, voces quasi in visione auditas, de quibus non omnes concordabant nec clara erant. Iam intelligo melius. Sed haec via : ut tu dicis : via est filiorum Mortis, via est quod Donum Ignotum recipit. Nos non sumus filii Mortis. Via nostra alia est, et an habemus viam, vel an egimus via, vel an nos quoque indigemus manus quae nos ducat: hoc quaerimus et non invenimus, et in hac quaestione sumus saecula et saecula.</p>

        <p>Et surrexit Finrothus et ivit ad fenestram ubi lux argentea intrabat et voltum eius argenteum faciebat, et dixit ultima verba quae de eo in hoc libro scribo:</p>

        <p class="no-indent uncial-passage" style="text-indent:0;margin-left:2em;margin-right:2em;">Tu habes peccatum unius hominis in historia carnis tuae. Nos habemus peccatum unius Angeli in historia memoriae nostrae. Forsitan utrique misericordia egent: sed misericordia alia et alia, sicut vulnera alia et alia. Illam discretionem <span class="elvish">Ilúvatar</span> solus novit. Nos servimus. Amamus. Creamus. Custodimus. Cantamus. An sufficiat, in ipsius manu est, non in mea.</p>
        <div class="marginalia mg-left">
          Prophetia inter<br>
          Eldar: quomodo<br>
          et a quo data?<br>
          Si noverunt de<br>
          Incarnatione, eis<br>
          quoque Spiritus<br>
          Dei locutus est?<br>
          Magna quaestio.
        </div>

        <p>Et non potui ei respondere. Et hodie adhuc non possum.</p>
      

      <!--div class="ornament-line">· · ·</div-->
<span class="rubric">☩ De Memoria Luminis ☩</span>

        <p>Cum tandem dies venisset quo redire debebam, non quia Finrothus me expellere vellet, sed quia ipse mihi dixerat tempus meum in illa terra finem habere, ne radices iam alterius generis in me crescerent, surrexit ille in aurora illius diei, et me de loco ubi dormiebam evocavit. Et dixit voce leni quasi qui amicum ad secretum aliquod ducere vult: <em class="uncial-passage">Veni mecum. Unum restat tibi antequam dimittam te. Sequere et tace.</em></p>

        <div class="marginalia mg-left mg-coemanus">
          Pater Cellach<br>
          mihi olim dixit<br>
          de monacho<br>
          qui lumen Dei<br>
          in silentio vidit<br>
          et tacuit omnem<br>
          vitam. Nunc<br>
          credo hoc fieri<br>
          posse.<br>
          — <span class="signum">frater Coemanus</span>
        </div>
<p>Et sequebar eum per vias civitatis quas nondum calcaveram, per hortos iam clausos ante lucem plenam, per portam occidentalem quam custos sine verbis aperuit nobis ut qui expectaverat nos. Exivimus de civitate et ascendimus collem non altum sed procul a moenibus positum, in quo arbores solitae paucae stabant et silentium tale erat ut sanguinem meum in auribus meis audirem. Et cum ascenderemus, subito mihi in animum venit: hunc ipsum collem de longe videram in primo die meo, cum adhuc nescirem quid esset. Tunc vocaveram montem luminum, et scintillas argenti et auri in summitate eius aspexeram. Nunc veniebam ad illud quod tunc oculus meus procul apprehenderat sed mens non intellexerat.</p>

<p>In summitate collis non erat aedificium nec arbor magna nec monumentum factum manu: sed ipsum spatium sacrum erat, quasi ecclesia sine parietibus, et terra ibi altior ac verior reliqua terra videbatur. Finrothus nihil dixit, sed stetit iuxta me capite submisso, quasi qui in loco sanctissimo oravit.</p>

<div class="marginalia mg-left">
          Collis secretus,<br>
          cf. Cant. Canti-<br>
          corum IV, 12:<br>
          hortus conclusus,<br>
          fons signatus.<br>
          Locus a Deo<br>
          servatus videtur.
        </div>

        <p>Et paulatim, sine signo aliquo quod ego viderem, e terra ipsa circa pedes nostros cepit lumen emergere, non validum sicut sol neque lunare plane, sed tenuissimum, argenteum principio, postea aureum, postea utraque miscentia se. Non erat flos luminosus, non erat arbor visibilis, non erat fons ullus: lux ipsa sine fonte visibili ex ipsa terra emanabat, imprimens formas in aere ut musicam silentem oculis cantabat.</p>

        <p>Et steti et aspexi, et lacrimae meae fluxerunt sine voluntate mea. Non ipsas Arbores videbam: illae enim non erant. Sed videbam quod de eis superfuerat, testimonium eius quod vulneratum est et non penitus periit. Similis quaedam dulcedo erat in illis luminibus qualem aliquando in facie hominis vidi qui de gravi morbo resurrexerat et primum solem iterum viderat: non est illa facies qualis fuit ante morbum, sed aliquid altius in ea apparet: est facies quae mortem vidit et tamen vivit. Sic hoc lumen mihi fuit.</p>

        <div class="marginalia mg-right">
          Lux sine fonte<br>
          visibili: quasi<br>
          Spiritus qui ubi<br>
          vult spirat, cuius<br>
          vocem audis, non<br>
          autem scis unde<br>
          veniat (Io. III, 8).<br>
          Eadem ratio.
        </div>
<p>Quam diu stetimus ibi, nescio. Finrothus tacebat, et ego tacebam, et horae ibi quidquid erant. Cum tandem lux paulatim decrescere cepisset, quasi dies ipse collem relinqueret, dixit Finrothus voce plus mota quam ullo alio die audiveram: <em class="uncial-passage">Sic est. Quod vere pulchrum fuit, <span class="elvish">Ilúvatar</span> non sinit penitus perire. Plura hodie non dicam.</em></p>

        <p>Cum verba illa adhuc haererent et lux paulatim decresceret, oculos in terram demisi, et iuxta pedem meum lapidem parvulum vidi quem antea non animadverteram, album quasi nix recens, magnitudine vix avellanae, in quo lux quaedam tenuis sed certa manebat. Inclinavi me et eum sustuli, paene non cogitans quid facerem. Finrothus tacitus me spectabat, neque ipse ad terram se inclinavit neque lapidem ullum quaesivit.</p>

        <p>Cum iam in palma mea lapis esset, dixit voce humili: <em class="uncial-passage">Tales lapides hic in colle aliquando inveniuntur, raro, et nemo ex nostris eos colligit. Forsitan memoria sunt maiorum quam ipsi sunt, quos hodie nominare non audeo. Quod ad te venit non casu venit: tolle eum, et fer tecum trans mare. Sed cave hoc unum: ne occultaveris illud tibi soli, neque in vase argenteo posueris quasi pretium proprium. Qui lumen suum celat in tenebris ipse errat: quod etiam maximis nostrum aliquando evenit.</em></p>

        <p>Et posuit manum in humero meo : leve pondus sicut aves : et descendimus per eandem viam, silentio pleni, et sciebam mutatum esse in corde meo quod videram. Quid precise mutatum esset, tunc nondum noveram. Sed de illo die ad hunc non cessat haec visio in somnis meis redire :</p>
      <div class="marginalia mg-left mg-coemanus">
          Lux occisa quae<br>
          rediit. Eldar per<br>
          imaginem Arborum<br>
          audierunt, nos per<br>
          Evangelium. Una<br>
          veritas, duae viae?<br>
          — <span class="signum">frater Coemanus</span>
        </div>
        <p class="theological theological" style="margin-top: -1em;"><em class="uncial-passage">Quod perit et quod non perit.</em></p>

      <!--div class="ornament-line">· · ·</div-->
<span class="rubric">☩ De Reditu et Viatico ☩</span>

        <p>Post visionem illius collis, quasi septem dies in illa terra fuissem, vel quantum septem dies esse videbatur mihi, quia tempus ibi aliter fluit, leniter et abundanter quasi mel e cupa versus quam aqua per torrentem, ivit Finrothus mecum ad portum ubi cymba mea expectabat. Vidi in ea aliqua provisorum quae non posui: panem non putridum et aquam in vasculo. Manus aliqua invisibilis providerat.</p>

        <div class="marginalia mg-left">
          Septem dies ibi,<br>
          ultimus dies<br>
          Memoriae Luminis,<br>
          numerus perfectus.<br>
          Tres anni foris?<br>
          Similis est fabulis<br>
          Hibernicis de terra<br>
          Faerica: qui intrat,<br>
          exiens tempus<br>
          amisit. Cavendum.
        </div>

        <p>Tunc, antequam in cymbam ascenderem, lapidem illum de pera mea sustuli et iterum aspexi, et videbatur mihi alius quam in colle: translucidus erat, quasi crystallus alpinus, et lux intus eius non iam tenuis et sola sicut prius, sed composita: non calida ut aurum, non frigida ut luna, sed quasi utriusque mixtura in puncto minimae quiescentis. Finrothus iuxta me stabat tacitus, et in oculis eius transvolavit tunc desiderium quoddam diebus omnibus antiquius: quasi memoria rerum quas nemo mortalium attigit. Et voce mota dixit: <em class="uncial-passage">Noli oblivioni tradere quae hic vidisti. Non multos ex genere tuo videbimus amplius : tempus veniet :, sed memoriam tui in nobis manebimus.</em></p>

        <p>Lapidem illum, qui mihi nunc inter omnia quae possideo res pretiosissima est, in pera mea secretissima, sub habitu servo. Noctu aliquando eam inspicio: lux intus est. Nescio quid sit. Nescio si miraculum sit an natura incognita. Deo committens teneo eam et taceo.</p>
        <div class="marginalia mg-left mg-coemanus">
          Gemma ab Aidano<br>
          relicta in theca<br>
          monasterii. Vidi<br>
          eam anno Dom.<br>
          CMXV. Lux intus<br>
          est. Testimonium.<br>
          <span class="signum">frater Coemanus</span>
        </div>

        <p>Navigavi. Et post tres dies : vel tres annos, quia fratres mihi postea dixerunt triennium me abfuisse, quod ego non credidi donec calendarium vidi : in aquas notas perveni, et phocas Hibernicas agnovi, et aves Hibernicas, et tandem clivum Hiberniae in Oriente aspexi. Et in portum qui prope monasterium nostrum est applicui, et Cellach frater qui me planantem vidit annos tres nunc ridebat et flebat simul in porta.</p>
        <div class="marginalia mg-right mg-cellach">
          Postquam reversus<br>
          est, per dies pauci<br>
          eum vidi. Aliter<br>
          loquebatur. Aliter<br>
          tacebat. Aliter<br>
          spectabat. Ubi nunc<br>
          es, frater Aidane?<br>
          — <span class="signum">frater Cellach</span>
        </div>

        <p>Abii per tres annos. Mihi velut tres dies videbantur. Tempus in terra <span class="elvish">Aman</span> aliter fluit. Hoc inter cetera iudicio Dei relinquo.</p>

<!--span class="rubric">☩ Conclusio et Confessio ☩</span-->
<span class="rubric rubric-stays">☩ Conclusio et Confessio ☩</span>
<div class="ornament-line">☩ ☩ ☩</div>
      

      
        <p>Haec vera sunt, quantum homo fallibilis et peccatis multis pressus verum narrare potest. Deo et sanctis eius, et Ecclesiae matri nostrae, iudicandum relinquo quid <span class="elvish">Eldar</span> illi sint in schemate divinae providentiae et quid de eis sperandum vel timendum sit. Non sum Augustinus. Non sum Hieronymus. Piscator sum et monachus pauperculus qui in curucum suum ascendit et rediit mutatus.</p>

        <div class="marginalia mg-right mg-finanus">
          Haec cum legerem<br>
          primo putavi aut<br>
          fictionem aut<br>
          deliramentum.<br>
          Sed gemma testis<br>
          est.<br><span class="signum s-abbas">Abbas Finanus</span>
        </div>
<p>Hoc solum dico, fratres, et in corde vestro ponite: In facie Finrothi vidi plus verae bonitatis quam in multis faciis hominum qui se Christianos vocant et ad Eucharistiam accedunt sed proximum suum oderunt. In verbis eius de <span class="elvish">Ilúvatare</span> : quem nos Deum Patrem agnoscimus : magis veram reverentiam audivi quam in sermonibus multis qui e cathedris per totam Ecclesiam praedicantur et ad aures cito labuntur. In quaestione eorum de via salutis suae : in illa profunda et nobili ignorantia : plus humilitatis et honestatis vidi quam in multis qui omnia scire se putant et nullam viam amplius quaerunt quia se iam pervenisse credunt.</p>

        <p class="theological">An <span class="elvish">Eldar</span> salventur: hoc quaero et non respondeo. An baptismum desiderent: nescio, quia nescivi eis de eo recte loqui. An Christus pro eis passus est: forsitan, quia Deus pro omni creatura suae benignitatis aliquid habet. Sed haec theologi tractent, ego tantum testor.</p>

        <p>Unum addo: non ut respondeam quod respondere non possum, sed quia tacere neque hoc possum. Cum in colle ultimo die steti, vidi: quod Inimicus occiderat, Deus non permiserat penitus perire. Lumen in terra adhuc manebat. Nescio quid hoc significet de sorte eorum qui lumen illud custodierunt. Sed si Deus lucem <span class="terminus t-rubricatus">vulneratam</span> non obliviscitur, forsitan neque eos obliviscatur qui eam amaverunt. <em class="uncial-passage">Hoc non doceo; hoc spero.</em></p>

        <p>Orate pro me, fratre Aidano peccatore, et orate : si fas est : pro illis <em class="uncial-passage">Immortalibus</em> ultra oceanum, quos Deus ipse novit quomodo et quantum, et qui : hoc certo scio : Deum suum <span class="elvish">Ilúvatar</span> amant et ei serviunt fideliter in terra sua, et cantant cantus de quibus mundus iste nescit, et memoriam rerum ab initio mundi custodiunt ne pereat.</p>

        <p class="uncial-passage theological" style="text-align:center;text-indent:0;margin-top:20px;">
          Miserere nobis omnibus, Domine,<br>
          et iudica nos misericorditer:<br>
          scientes et nescientes,<br>
          mortales et immortales,<br>
          filios Donationis et filios Cantus.
        </p>

        <div class="marginalia mg-left">
          Orate pro Eldar<br>
          qui ultra mare<br>
          manent, si eos<br>
