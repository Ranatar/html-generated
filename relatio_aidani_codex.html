    return d.textContent.replace(/\s+/g, ' ').trim().length;
  }

  // Создаёт <p>, копируя класс и style оригинала. Если removeDropcap — убирает.
  function makeSplitP(original, innerHtml, removeDropcap) {
    const p = document.createElement('p');
    const classes = Array.from(original.classList);
    if (removeDropcap) {
      const idx = classes.indexOf('dropcap');
      if (idx >= 0) classes.splice(idx, 1);
    }
    if (classes.length) p.className = classes.join(' ');
    const style = original.getAttribute('style');
    if (style) p.setAttribute('style', style);
    p.innerHTML = innerHtml;
    return p;
  }

  function fits(measurerContent) {
    // Возврат true, если контент помещается в folio-content.
    // ВАЖНО: НЕ используем scrollHeight. При вложенных overflow:hidden
    // (у нас .folio и .folio-content оба имеют overflow:hidden) Chromium
    // обрезает scrollHeight дочернего элемента до clientHeight, и
    // переполнение становится неразличимо. Меряем геометрически —
    // по нижнему краю последнего ребёнка относительно верха контейнера.
    const kids = measurerContent.children;
    if (kids.length === 0) return true;
    const cRect = measurerContent.getBoundingClientRect();
    const last = kids[kids.length - 1];
    const lRect = last.getBoundingClientRect();
    const usedH = lRect.bottom - cRect.top;
    // Небольшой зазор на субпиксельное округление.
    return usedH <= measurerContent.clientHeight + 0.5;
  }

  // Высота контента, фактически занятая flow-потомками measurerContent.
  // ВАЖНО: scrollHeight тут НЕ работает — для div с фикс. height и
  // overflow:hidden он равен clientHeight (пока контент помещается) или
  // больше (пока overflowит), но никогда не меньше. То есть «остаток
  // места» через `clientHeight - scrollHeight` всегда <= 0 и бесполезен.
  // Честный способ — bounding rect последнего потомка.
  function computeUsedHeight(container) {
    const kids = container.children;
    if (kids.length === 0) return 0;
    const cRect = container.getBoundingClientRect();
    const last = kids[kids.length - 1];
    const lRect = last.getBoundingClientRect();
    // Включаем margin-bottom последнего элемента — берём его через
    // offsetHeight родителя минус offsetTop последнего (приближение),
    // но проще: bounding rect даёт border-box, a margin учтён тем, что
    // следующий элемент стоял бы на lRect.bottom + margin-bottom.
    // Для rubric margin 20/14, для p margin-bottom 6 — эти величины
    // вернутся при добавлении СЛЕДУЮЩЕГО элемента, так что для оценки
    // остатка используем bottom без margin-bottom — это даст «минимум
    // высоты», т.е. чуть оптимистичнее. Компенсируем в пороге.
    return lRect.bottom - cRect.top;
  }

  // Пытается разрезать параграф так, чтобы (prev + first + reserve)
  // поместилось в folio-content, где reserve — дополнительное место,
  // которое мы хотим сохранить свободным после first (например, под
  // последующую рубрику + строку текста). При reserve=0 — обычный
  // жадный split до предела страницы.
  //
  //   1. Бинарным поиском находим МАКСИМАЛЬНЫЙ префикс, при котором
  //      (prev + first + reserve) помещается.
  //   2. Сдвигаем точку реза влево, пока second не займёт ≥ 2 строк
  //      (защита от сироты).
  //   3. Если first < 2 строк — возвращаем null (защита от вдовы),
  //      параграф лучше перенести целиком.
  function trySplitParagraph(p, prevNodes, measurerContent, lineHeight, reserve) {
    reserve = reserve || 0;
    const html = p.innerHTML;
    const cuts = findSentenceBoundaries(html);
    if (cuts.length === 0) return null;

    function fitsWithReserve() {
      // См. комментарий в fits(): scrollHeight в двойном overflow:hidden
      // обрезается до clientHeight, надо геометрически.
      const usedH = computeUsedHeight(measurerContent);
      return usedH + reserve <= measurerContent.clientHeight + 0.5;
    }

    // Бинарный поиск: максимум, при котором prev + first + reserve
    // всё ещё влезают.
    let lo = 0, hi = cuts.length - 1, best = -1;
    while (lo <= hi) {
      const mid = (lo + hi) >> 1;
      const firstHtml = html.substring(0, cuts[mid]).replace(/\s+$/, '');
      const probeP = makeSplitP(p, firstHtml, false);
      const probe = prevNodes.map(function(n) { return n.cloneNode(true); });
      probe.push(probeP);
      measurerContent.replaceChildren.apply(measurerContent, probe);
      if (fitsWithReserve()) {
        best = mid;
        lo = mid + 1;
      } else {
        hi = mid - 1;
      }
    }
    if (best < 0) return null;

    function measureHeight(node) {
      measurerContent.replaceChildren(node);
      return node.getBoundingClientRect().height;
    }
    const minTwoLines = 2 * lineHeight - 2;

    while (best >= 0) {
      const firstHtml = html.substring(0, cuts[best]).replace(/\s+$/, '');
      const secondHtml = html.substring(cuts[best]).replace(/^\s+/, '');
      if (textLengthOfHtml(secondHtml) === 0) { best--; continue; }

      const probeSecond = makeSplitP(p, secondHtml, true);
      const secondH = measureHeight(probeSecond);
      if (secondH >= minTwoLines) {
        const probeFirst = makeSplitP(p, firstHtml, false);
        const firstH = measureHeight(probeFirst);
        if (firstH < minTwoLines) {
          return null;
        }
        // Финальная проверка: prev + first + reserve действительно
        // помещается (инвариант мог сместиться).
        const finalProbe = prevNodes.map(function(n) { return n.cloneNode(true); });
        finalProbe.push(makeSplitP(p, firstHtml, false));
        measurerContent.replaceChildren.apply(measurerContent, finalProbe);
        if (!fitsWithReserve()) {
          best--;
          continue;
        }
        return [
          makeSplitP(p, firstHtml, false),
          makeSplitP(p, secondHtml, true),
        ];
      }
      best--;
    }
    return null;
  }

  function measureLineHeight(measurerContent) {
    const probe = document.createElement('p');
    probe.textContent = 'Mg';
    measurerContent.replaceChildren(probe);
    const h = probe.getBoundingClientRect().height;
    measurerContent.replaceChildren();
    return h || 22;
  }

  function paginate(blocks, measurerContent, lineHeight) {
    const pages = [];
    let current = [];

    function flush() {
      if (current.length) pages.push(current);
      current = [];
    }

    function probeFits(extra) {
      const flowNodes = current.filter(function(n) {
        return !(n.classList && n.classList.contains('marginalia'));
      });
      const probe = flowNodes.map(function(n) { return n.cloneNode(true); });
      if (extra) probe.push(extra);
      measurerContent.replaceChildren.apply(measurerContent, probe);
      return fits(measurerContent);
    }

    for (let i = 0; i < blocks.length; i++) {
      const block = blocks[i];
      const type = blockType(block);

      // Маргиналии: нулевой вертикальный вес, остаются с текущей стр.
      if (type === 'marginalia') {
        current.push(block.cloneNode(true));
        continue;
      }

      const clone = block.cloneNode(true);

      // Rubric — «не оставлять одиноко внизу страницы»: если в текущем
      // поле не хватает места для rubric + хотя бы одной строки текста
      // после неё, мы пытаемся отрезать кусок последнего параграфа в
      // current и отправить его на следующую страницу, освобождая тем
      // самым место для rubric + начала текста следующего раздела
      // здесь. Если это не получается — переносим рубрику целиком.
      if (type === 'rubric') {
        const flowNodes = current.filter(function(n) {
          return !(n.classList && n.classList.contains('marginalia'));
        });
        const probe = flowNodes.map(function(n) { return n.cloneNode(true); });
        probe.push(clone.cloneNode(true));
        measurerContent.replaceChildren.apply(measurerContent, probe);
        const usedH = computeUsedHeight(measurerContent);
        const clientH = measurerContent.clientHeight;
        const rubricFits = usedH <= clientH;
        const roomLeft = clientH - usedH;

        // Между рубрикой и первым параграфом секции часто стоит
        // ornament-line («☩ ☩ ☩» или «· · ·») — примерно одна строка
        // в высоту. Считаем суммарную высоту ТАКИХ не-параграфных
        // блоков, идущих сразу за рубрикой. Их надо вычесть из места
        // ДО того, как считать, хватает ли 2 строк на реальный текст.
        let decorationsAfter = 0;
        for (let j = i + 1; j < blocks.length; j++) {
          const nb = blocks[j];
          const nt = blockType(nb);
          if (nt === 'marginalia') continue;  // absolute, не в flow
          if (nt === 'ornament-line') {
            const o = nb.cloneNode(true);
            measurerContent.replaceChildren(o);
            decorationsAfter += computeUsedHeight(measurerContent);
            continue;
          }
          break;  // дошли до первого текстового блока
        }

        // Восстанавливаем measurer с оригинальной пробой (rubric
        // addded к prev), чтобы усred не был испорчен.
        measurerContent.replaceChildren.apply(measurerContent, probe);

        // Требуемое место ПОСЛЕ рубрики:
        //   decorationsAfter (ornament и пр.) + 2 строки (widow-protect).
        // Если это не помещается, параграф всё равно уедет целиком,
        // и рубрика останется на текущей странице одна (или с ornament —
        // что визуально то же «заголовок без текста внизу страницы»).
        const needed = decorationsAfter + 2 * lineHeight;
        const enoughRoom = rubricFits && (roomLeft >= needed);

        if (enoughRoom) {
          current.push(clone);
          continue;
        }

        // Места не хватает: переносим рубрику целиком на новую страницу.
        flush();
        current.push(clone);
        continue;
      }

      if (probeFits(clone)) {
        current.push(clone);
        continue;
      }

      // Не влезает целиком.
      if (canSplit(block)) {
        const prevFlow = current.filter(function(n) {
          return !(n.classList && n.classList.contains('marginalia'));
        });
        const prevClones = prevFlow.map(function(n) { return n.cloneNode(true); });
        const split = trySplitParagraph(block, prevClones, measurerContent, lineHeight);
        if (split) {
          current.push(split[0]);
          flush();
          current.push(split[1]);
          continue;
        }
      }

      // Не помещается ни целиком, ни сплитом. Блок уйдёт на новую
      // страницу. Но если последние flow-элементы в current — рубрика
      // (возможно + ornament-line после неё), их придётся утащить на
      // новую страницу вместе с блоком: иначе рубрика останется одна
      // внизу (с декоративной линией или без) без реального текста.
      let trailingRubricIdx = -1;
      for (let k = current.length - 1; k >= 0; k--) {
        const n = current[k];
        if (n.classList && n.classList.contains('marginalia')) continue;
        if (n.classList && n.classList.contains('ornament-line')) continue;
        if (n.classList && n.classList.contains('rubric')) {
          trailingRubricIdx = k;
        }
        break;
      }

      if (trailingRubricIdx >= 0) {
        const tailStart = trailingRubricIdx;
        const tail = current.splice(tailStart, current.length - tailStart);
        flush();
        for (let k = 0; k < tail.length; k++) current.push(tail[k]);
        current.push(clone);
        continue;
      }

      // Перенести целиком на новую страницу.
      if (current.length === 0) {
        // Страница пуста, но блок всё равно не влезает (очень редкий
        // случай). Кладём — overflow hidden CSS обрежет хвост.
        current.push(clone);
        flush();
      } else {
        flush();
        current.push(clone);
      }
    }

    flush();

    // Диагностика: повторно пропускаем каждую страницу через measurer
    // и смотрим, действительно ли flow-поток вмещается.
    pages.forEach(function(pg, idx) {
      const flowOnly = pg.filter(function(n) {
        return !(n.classList && n.classList.contains('marginalia'));
      }).map(function(n) { return n.cloneNode(true); });
      measurerContent.replaceChildren.apply(measurerContent, flowOnly);
      const usedH = computeUsedHeight(measurerContent);
      if (usedH > measurerContent.clientHeight + 1) {
        console.warn('Page', idx, 'overflows measurer:',
          Math.round(usedH), '>', measurerContent.clientHeight,
          'with', flowOnly.length, 'flow blocks');
      }
    });

    return pages;
  }

  function makeFolio(side, item) {
    const folio = document.createElement('div');
    const classes = ['folio', 'page-' + side];
    if (item.kind === 'cover-blank') classes.push('cover-blank');
    if (item.kind === 'blank-after-carpet') classes.push('blank-leaf');
    if (item.kind === 'carpet') classes.push('incipit-verso');
    if (item.kind === 'incipit') classes.push('incipit-recto');
    if (item.kind === 'final') classes.push('final-recto');
    folio.className = classes.join(' ');

    const parch = document.createElement('div');
    parch.className = 'parchment-bg';
    parch.setAttribute('aria-hidden', 'true');
    folio.appendChild(parch);

    const content = document.createElement('div');
    content.className = 'folio-content';
    if (item.nodes) {
      item.nodes.forEach(function(n) { content.appendChild(n); });
    }
    folio.appendChild(content);

    if (item.num) {
      const num = document.createElement('span');
      num.className = 'folio-number';
      num.textContent = item.num;
      folio.appendChild(num);
    }
    return folio;
  }

  function renderBook(pages) {
    const book = document.getElementById('codex-book');
    book.innerHTML = '';

    const carpetTpl = document.getElementById('codex-carpet');
    const finalTpl = document.getElementById('codex-final');

    const carpetFrag = carpetTpl.content.cloneNode(true);
    const finalFrag = finalTpl.content.cloneNode(true);

    // Последовательность физических страниц
    const sequence = [];
    // PATCH F: carpet и final рендерятся standalone (см. ниже).
    // Sequence стартует с verso листа 1 — пустой страницы, парной
    // standalone-carpet'у, открывающейся первой при перелистывании.
    sequence.push({ kind: 'blank-after-carpet', nodes: [] });
    pages.forEach(function(pg, i) {
      sequence.push({
        kind: i === 0 ? 'incipit' : 'regular',
        nodes: pg,
      });
    });
    // PATCH F: final выведен из sequence — рендерится standalone после spread'ов.

    // PATCH C2: foliation вместо pagination — нумеруются только recto
    // страницы (нечётные индексы в sequence: incipit, recto-regular).
    // Verso соответствующего folio номера не получает — это
    // средневековая норма (Book of Mulling, Book of Dimma).
    let counter = 0;
    sequence.forEach(function(item, idx) {
      if ((item.kind === 'incipit' || item.kind === 'regular') && (idx % 2 === 1)) {
        counter++;
        item.num = toRoman(counter);
      } else {
        item.num = null;
      }
    });

    // Построить разворотки
    const fragment = document.createDocumentFragment();

    // PATCH F: standalone carpet — recto листа 1 (передняя обложка).
    // Не входит в spread-flow: симметричный padding, нет gutter'а рядом.
    var carpetItem = { kind: 'carpet', nodes: Array.from(carpetFrag.childNodes), num: null };
    var carpetWrap = document.createElement('div');
    carpetWrap.className = 'folio-cover folio-cover-front';
    var carpetFolio = makeFolio('cover', carpetItem);
    carpetFolio.classList.add('parch-f3');
    carpetWrap.appendChild(carpetFolio);
    fragment.appendChild(carpetWrap);

    for (let i = 0; i < sequence.length; i += 2) {
      const verso = sequence[i];
      const recto = sequence[i + 1] || { kind: 'blank', nodes: [], num: null };

      const spread = document.createElement('div');
      spread.className = 'spread';
      spread.appendChild(makeFolio('verso', verso));
      const gutter = document.createElement('div');
      gutter.className = 'gutter';
      gutter.setAttribute('aria-hidden', 'true');
      spread.appendChild(gutter);
      spread.appendChild(makeFolio('recto', recto));
      fragment.appendChild(spread);
    }

    // PATCH F: standalone final — verso последнего листа (задняя обложка).
    var finalItem = { kind: 'final', nodes: Array.from(finalFrag.childNodes), num: null };
    var finalWrap = document.createElement('div');
    finalWrap.className = 'folio-cover folio-cover-back';
    var finalFolio = makeFolio('cover', finalItem);
    finalFolio.classList.add('parch-f3');
    finalWrap.appendChild(finalFolio);
    fragment.appendChild(finalWrap);

    book.appendChild(fragment);
  }

  // ═══════════════════════════════════════════════════════════════
  // Позиционирование маргиналий
  // ═══════════════════════════════════════════════════════════════
  function anchorOf(mg) {
    let prev = mg.previousElementSibling;
    while (prev && prev.classList.contains('marginalia')) {
      prev = prev.previousElementSibling;
    }
    return prev;
  }
  function positionMarginalia() {
  document.querySelectorAll('.folio').forEach(function(folio) {
    const folioRect = folio.getBoundingClientRect();
    const margs = Array.from(folio.querySelectorAll('.marginalia'));

    // ─ Фаза READ: всё чтение layout до любых write ─
    const placed = [];
    margs.forEach(function(mg) {
      const anchor = anchorOf(mg);
      if (!anchor) return;
      const aTop = anchor.getBoundingClientRect().top - folioRect.top;
      placed.push({ el: mg, top: aTop, h: mg.offsetHeight });
    });

    // ─ Чистая логика: ни одного DOM-доступа ─
    placed.sort(function(a, b) { return a.top - b.top; });
    for (let i = 1; i < placed.length; i++) {
      const prevBottom = placed[i - 1].top + placed[i - 1].h + 8;
      if (placed[i].top < prevBottom) placed[i].top = prevBottom;
    }

    // ─ Фаза WRITE: все style.top одним проходом ─
    placed.forEach(function(p) { p.el.style.top = p.top + 'px'; });
  });
}

  // ═══════════════════════════════════════════════════════════════
  // «Живая рука» — jitter букв маргиналий Аидана (не Коемана).
  //
  // В узких маргиналиях (68 px) переносы критичны. Но побуквенное
  // оборачивание в <span class="ink-l"> превращает слово в цепочку
  // inline-block элементов, после чего `hyphens: auto` перестаёт
  // работать (алгоритм слогоделения требует текстовых узлов со
  // словами). Поэтому мы сами расставляем точки возможного переноса
  // через <wbr> между слогами — работает независимо от inline-block
  // соседей. В инсулярной традиции перенос был без дефиса (писец
  // просто обрывал слово на полях), так что <wbr> даже аутентичнее,
  // чем soft-hyphen.
  // ═══════════════════════════════════════════════════════════════

  // Латинский слогоделитель.
  // Правила (упрощённые, покрывают классическую латынь + Quenya-имена):
  //   1. Дифтонги ae oe au eu ei — неразрывные гласные единицы.
  //   2. «qu» перед гласной — неразрывная согласная единица (как в
  //      a-qua, re-qui-es). Так же «gu» + гласная после n (lin-gua) —
  //      но это редкий случай, оставляем qu.
  //   3. V-CV (одна согласная) → разрыв перед C.
  //   4. V-CCV, где CC = muta+liquida (pl pr bl br cl cr dl dr gl gr
  //      tl tr fl fr) → CC уходит в следующий слог.
  //   5. VC-CV (обычный двухсогласный кластер) → разрыв между C1 и C2.
  //   6. VCC-CV (три и более согласных): ПОСЛЕДНЯЯ согласная
  //      начинает следующий слог, остальные закрывают предыдущий
  //      (классическая латынь предпочитает «максимальный онсет», но
  //      в инсулярной традиции преобладала слуховая слогораздельность;
  //      обе интерпретации дают валидный перенос). Если последние две
  //      образуют muta+liquida — они уходят в следующий слог вместе.
  //   7. V-V (hiatus) → разрыв между.
  //   8. Минимум 2 буквы в начале и в конце слова.
  //
  //   Расширенные гласные (áéíóúý и пр.) учитываются ради Quenya-имён
  //   (Ilúvatar, Númenor) и редких длинных маркеров.
  const VOWELS_LC = 'aeiouyáéíóúýàèìòùâêîôûäëïöü';
  const DIPHTHONGS = ['ae', 'oe', 'au', 'eu', 'ei'];

  function isVowelChar(ch) {
    return VOWELS_LC.indexOf(ch.toLowerCase()) !== -1;
  }

  function isMutaLiquida(two) {
    if (two.length !== 2) return false;
    const m = 'pbcdgtf';
    const l = 'lr';
    return m.indexOf(two[0]) !== -1 && l.indexOf(two[1]) !== -1;
  }

  // Проверка: «qu» + гласная (например, в «aqua», «quapropter»).
  function isQuCluster(word, i) {
    if (i + 2 >= word.length) return false;
    const a = word[i].toLowerCase();
    const b = word[i + 1].toLowerCase();
    const c = word[i + 2].toLowerCase();
    return a === 'q' && b === 'u' && VOWELS_LC.indexOf(c) !== -1;
  }

  // Токенизация: [{type:'v'|'c', start, end}]
  function tokenizeLatin(word) {
    const tokens = [];
    let i = 0;
    while (i < word.length) {
      const ch = word[i].toLowerCase();
      const pair = (i + 1 < word.length)
        ? (ch + word[i + 1].toLowerCase())
        : null;
      if (isVowelChar(ch)) {
        let len = 1;
        if (pair && DIPHTHONGS.indexOf(pair) !== -1) {
          len = 2;
        }
        tokens.push({type: 'v', start: i, end: i + len});
        i += len;
      } else {
        // Собираем согласный кластер. Внутри него любые «qu» перед
        // гласной (например, в «sequens») тоже должны поглощаться как
        // единое qu; но проще — продвигаемся посимвольно с специальной
        // проверкой на qu в начале нового кластера.
        let j = i;
        while (j < word.length && !isVowelChar(word[j])) {
          // Если мы на q перед u+vowel — включаем q и u в кластер как
          // одну согласную единицу и останавливаемся (следующий
          // символ — гласная, на которой мы должны остановиться).
          if (isQuCluster(word, j)) {
            j += 2;  // «qu» целиком уходит в кластер, далее гласная.
            break;
          }
          j++;
        }
        tokens.push({type: 'c', start: i, end: j});
        i = j;
      }
    }
    return tokens;
  }

  function syllabifyLatin(word) {
    if (word.length < 4) return [];
    const tokens = tokenizeLatin(word);
    const wordLc = word.toLowerCase();
    const breaks = [];

    for (let k = 0; k < tokens.length; k++) {
      const t = tokens[k];
      if (t.type !== 'v') continue;

      const next = tokens[k + 1];
      const nextNext = tokens[k + 2];

      if (next && next.type === 'v') {
        breaks.push(next.start);
        continue;
      }

      if (!next || next.type !== 'c') continue;
      if (!nextNext || nextNext.type !== 'v') continue;

      const cStart = next.start;
      const cEnd = next.end;
      const clen = cEnd - cStart;
      const cluster = wordLc.substring(cStart, cEnd);

      if (clen === 1) {
        breaks.push(cStart);
      } else if (clen === 2) {
        // Двухсимвольный кластер: либо muta+liquida (в следующий слог),
        // либо «qu» (неразрывная единица, уходит в следующий слог
        // целиком), либо обычный — разрыв в середине.
        if (isMutaLiquida(cluster) || cluster === 'qu') {
          breaks.push(cStart);
        } else {
          breaks.push(cStart + 1);
        }
      } else {
        // 3+ согласных: последняя (или последние две, если ML) —
        // начинают следующий слог; остальные закрывают предыдущий.
        const lastTwo = cluster.substring(clen - 2);
        if (isMutaLiquida(lastTwo) || lastTwo === 'qu') {
          breaks.push(cEnd - 2);
        } else {
          breaks.push(cEnd - 1);
        }
      }
    }

    // Минимум 2 буквы в начале, минимум 4 в конце: это убирает
    // одиночные 3-буквенные хвосты после <wbr>, которые в узкой
    // колонке маргиналии выглядят как «оборванные» строки
    // (tem, ra, dem, cus). Слова короче 6 букв не делятся вовсе.
    return breaks.filter(function(b) {
      return b >= 2 && b <= word.length - 4;
    });
  }

  function seeded(seed) {
    let s = seed >>> 0;
    return function() {
      s = (s * 1664525 + 1013904223) >>> 0;
      return s / 4294967296;
    };
  }
  const rand = seeded(0xAB3F17);
  const sym = function() { return rand() * 2 - 1; };
  const CFG = { rot: 0.35, tx: 0.2, ty: 0.3 };
  function fmt(v) {
    const s = v.toFixed(2);
    if (s.indexOf('0.') === 0) return s.slice(1);
    if (s.indexOf('-0.') === 0) return '-' + s.slice(2);
    return s;
  }
  function wrapLetter(ch) {
    const sp = document.createElement('span');
    sp.className = 'ink-l';
    sp.style.cssText =
      '--r:' + fmt(sym() * CFG.rot) + 'deg;' +
      '--x:' + fmt(sym() * CFG.tx) + 'px;' +
      '--y:' + fmt(sym() * CFG.ty) + 'px';
    sp.textContent = ch;
    return sp;
  }

  // Regex разбиения строки на «латинское слово» vs «прочее».
  // Латинское слово = серия букв (включая расширенные юникодные
  // для Quenya и пр.), без пробелов и пунктуации.
  const WORD_RE = /([A-Za-zÀ-ÿĀ-ſ]+)|([^A-Za-zÀ-ÿĀ-ſ]+)/g;

  // Soft hyphen (U+00AD) — единственный надёжный способ разрешить
  // перенос внутри слова при inline буквах. Браузер уважает его при
  // `hyphens: manual` (которое включено на .marginalia). При
  // фактическом переносе появляется видимый дефис — это не
  // характерно для insular IX в., но аутентичнее, чем цельный
  // кромкорез или рваные строки с одиночными знаками препинания.
  function processTextNode(node) {
    const frag = document.createDocumentFragment();
    const v = node.nodeValue;
    WORD_RE.lastIndex = 0;
    let m;
    while ((m = WORD_RE.exec(v)) !== null) {
      const word = m[1];
      const other = m[2];
      if (word) {
        const breaks = syllabifyLatin(word);
        const breakSet = {};
        for (let i = 0; i < breaks.length; i++) {
          breakSet[breaks[i]] = true;
        }
        for (let i = 0; i < word.length; i++) {
          if (breakSet[i]) {
            frag.appendChild(document.createElement('wbr'));
          }
          frag.appendChild(wrapLetter(word[i]));
        }
      } else if (other) {
        // Коллапсируем любые последовательности whitespace
        // (переводы строк и множественные пробелы из source-разметки)
        // в единственный пробел. Без этого браузер получает в DOM
        // много отдельных whitespace-текстовых узлов, и каждый даёт
        // break opportunity — в узкой маргиналии это выливается в
        // чередование очень коротких и длинных строк.
        // Кроме того, перед тире ставим неразрывный пробел —
        // в инсулярной традиции тире «прилипает» к предыдущему
        // слову, а не висит одно в начале строки.
        const collapsed = other
          .replace(/\s+/g, ' ')
          .replace(/ ([—–])/g, '\u00A0$1');
        for (let i = 0; i < collapsed.length; i++) {
          const ch = collapsed[i];
          if (ch === ' ') {
            frag.appendChild(document.createTextNode(' '));
          } else {
            frag.appendChild(wrapLetter(ch));
          }
        }
      }
    }
    return frag;
  }

  const SKIP_TAGS = {SCRIPT: 1, STYLE: 1, SVG: 1};
  function walkJitter(el) {
    if (SKIP_TAGS[el.tagName]) return;
    const kids = Array.from(el.childNodes);
    for (let i = 0; i < kids.length; i++) {
      const kid = kids[i];
      if (kid.nodeType === 3) {
        if (!/\S/.test(kid.nodeValue)) continue;
        el.replaceChild(processTextNode(kid), kid);
      } else if (kid.nodeType === 1) {
        walkJitter(kid);
      }
    }
  }
  // Схлопывание ручных <br> в пробелы. Маргиналии размечены в source
  // с визуальными переводами строк (в расчёте на определённые слова
  // на строку), но фактическая ширина 68px + унциальный шрифт не
  // совпадают с задумкой: каждая «авторская» строка ЕЩЁ РАЗ
  // переносится автоматически по <wbr>, давая каскад из логического
  // + физического переноса. Удаляем ручные разрывы, оставляя только
  // автоматический слоговой перенос — это и есть самый аутентичный
  // инсулярный порядок (писец писал непрерывно, переходя на новую
  // строку только упираясь в край поля).
  //
  // Применяется ко ВСЕМ маргиналиям — как Аидана, так и Коемана:
  // узкое поле одинаковое, проблема двойного переноса одинаковая.
  // Разница только в обработке букв ниже (Аидан → ink-l + wbr;
  // Коеман → только wbr, без обёрток, чтобы сохранить лигатуры).
  function normalizeMarginaliaBreaks() {
    const nodes = document.querySelectorAll('.marginalia br');
    for (let i = 0; i < nodes.length; i++) {
      const br = nodes[i];
      br.parentNode.replaceChild(document.createTextNode(' '), br);
    }
  }

  // Версия обработчика для маргиналий Коемана: вставляем <wbr> между
  // слогами (точно та же логика слогоделения, что у Аидана), но НЕ
  // оборачиваем каждую букву в ink-l span. Коеман — другая рука, без
  // jitter; поэтому буквы остаются текстовыми узлами, а `font-feature-
  // settings: "liga", "dlig"` продолжает работать (лигатуры требуют,
  // чтобы соседние символы были в одном текстовом потоке, не
  // разделённые inline-block элементами).
  function processTextNodeWbrOnly(node) {
    const frag = document.createDocumentFragment();
    const v = node.nodeValue;
    WORD_RE.lastIndex = 0;
    let m;
    while ((m = WORD_RE.exec(v)) !== null) {
      const word = m[1];
      const other = m[2];
      if (word) {
        const breaks = syllabifyLatin(word);
        if (breaks.length === 0) {
          frag.appendChild(document.createTextNode(word));
        } else {
          let last = 0;
          for (let i = 0; i < breaks.length; i++) {
            frag.appendChild(
              document.createTextNode(word.slice(last, breaks[i]))
            );
            frag.appendChild(document.createElement('wbr'));
            last = breaks[i];
          }
          frag.appendChild(document.createTextNode(word.slice(last)));
        }
      } else if (other) {
        // Та же нормализация пробелов и «прилипание» тире, что
        // в processTextNode — причины те же (избежать лишних
        // break-opportunity и одиночных «—» в начале строки).
        const collapsed = other
          .replace(/\s+/g, ' ')
          .replace(/ ([—–])/g, '\u00A0$1');
        frag.appendChild(document.createTextNode(collapsed));
      }
    }
    return frag;
  }

  function walkWbrOnly(el) {
    if (SKIP_TAGS[el.tagName]) return;
    const kids = Array.from(el.childNodes);
    for (let i = 0; i < kids.length; i++) {
      const kid = kids[i];
      if (kid.nodeType === 3) {
        if (!/\S/.test(kid.nodeValue)) continue;
        el.replaceChild(processTextNodeWbrOnly(kid), kid);
      } else if (kid.nodeType === 1) {
        walkWbrOnly(kid);
      }
    }
  }

  function runJitter() {
    normalizeMarginaliaBreaks();
    document.querySelectorAll('.marginalia:not(.mg-coemanus)').forEach(walkJitter);
    document.querySelectorAll('.marginalia.mg-coemanus').forEach(walkWbrOnly);
    positionMarginalia();
  }

  // ═════════════════════════════════════════════════════════════════
  // PATCH D1: запекание ghost-слоя.
  // Идея: реальный пергамент тонкий, текст с обратной стороны слабо
  // просвечивает. Делаем это через canvas: проходим по text node'ам
  // verso, для каждого слова берём bounding rect (Range API), рисуем
  // canvas.fillText в той же позиции тем же шрифтом. Затем зеркалим,
  // блюрим, переводим в PNG и кладём как background на recto.
  // Пергамент, иллюминации, маргиналии-якоря — исключаются из ghost.
  // ═════════════════════════════════════════════════════════════════

  const GHOST_W = 620, GHOST_H = 820;

  // Элементы, которые НЕ просвечивают сквозь пергамент
  const GHOST_EXCLUDE = {
    classes: [
      'parchment-bg', 'illuminated-initial', 'arbor-vitae', 'arbor-argentea',
      'folio-number', 'blob', 'ink-drip', 'ghost-layer', 'big-initial',
    ],
    tags: { STYLE: 1, SCRIPT: 1, SVG: 1 },
  };

  function isGhostExcluded(el) {
    while (el && el.nodeType === 1) {
      if (GHOST_EXCLUDE.tags[el.tagName]) return true;
      if (el.classList) {
        for (let i = 0; i < GHOST_EXCLUDE.classes.length; i++) {
          if (el.classList.contains(GHOST_EXCLUDE.classes[i])) return true;
        }
      }
      el = el.parentNode;
    }
    return false;
  }

  function bakeOneGhost(versoFolio) {
    if (!versoFolio) return { url: null, words: 0 };

    const folioRect = versoFolio.getBoundingClientRect();
    if (folioRect.width < 50 || folioRect.height < 50) {
      return { url: null, words: 0 };
    }

    const canvas = document.createElement('canvas');
    canvas.width = GHOST_W;
    canvas.height = GHOST_H;
    const ctx = canvas.getContext('2d');
    if (!ctx) return { url: null, words: 0 };

    // Цвет берётся из getComputedStyle каждого фрагмента — так
    // киноварные рубрики (rgb из ~#7a1808) рисуются красным, основной
    // текст iron gall — тёплым коричневым. Финальное затухание идёт
    // через globalAlpha при перерисовке во второй canvas + CSS opacity.
    ctx.textBaseline = 'alphabetic';

    const sx = GHOST_W / folioRect.width;
    const sy = GHOST_H / folioRect.height;

    const walker = document.createTreeWalker(
      versoFolio, NodeFilter.SHOW_TEXT, null, false
    );
    let node;
    let wordsDrawn = 0;
    while ((node = walker.nextNode())) {
      const text = node.nodeValue;
      if (!/\S/.test(text)) continue;
      if (isGhostExcluded(node.parentNode)) continue;

      const parent = node.parentNode;
      const cs = window.getComputedStyle(parent);
      const fSize = parseFloat(cs.fontSize);
      if (!isFinite(fSize) || fSize < 5) continue;

      const fFamily = cs.fontFamily;
      const fWeight = cs.fontWeight || 'normal';
      const fStyle = cs.fontStyle || 'normal';
      ctx.font = fStyle + ' ' + fWeight + ' ' + fSize + 'px ' + fFamily;
      ctx.fillStyle = cs.color || 'rgb(30, 18, 6)';

      const re = /(\S+)/g;
      let m;
      while ((m = re.exec(text)) !== null) {
        const word = m[1];
        const start = m.index;
        const end = start + word.length;
        const r = document.createRange();
        try {
          r.setStart(node, start);
          r.setEnd(node, end);
        } catch (e) { continue; }
        const rect = r.getBoundingClientRect();
        if (rect.width < 0.5) continue;
        if (rect.bottom < folioRect.top || rect.top > folioRect.bottom) continue;
        const x = (rect.left - folioRect.left) * sx;
        const y = (rect.bottom - folioRect.top - fSize * 0.18) * sy;
        ctx.fillText(word, x, y);
        wordsDrawn++;
      }
    }

    if (wordsDrawn === 0) return { url: null, words: 0 };

    // Финальный canvas: blur + mirror + alpha
    const final = document.createElement('canvas');
    final.width = GHOST_W;
    final.height = GHOST_H;
    const fctx = final.getContext('2d');
    fctx.filter = 'blur(1.4px)';
    fctx.translate(GHOST_W, 0);
    fctx.scale(-1, 1);
    fctx.globalAlpha = 0.42;
    fctx.drawImage(canvas, 0, 0);

    try {
      return { url: final.toDataURL('image/png'), words: wordsDrawn };
    } catch (e) {
      return { url: null, words: 0 };
    }
  }

  async function bakeVersoGhosts() {
    // Дождаться всех custom-шрифтов, иначе canvas.fillText
    // нарисует в Times-fallback.
    if (document.fonts && document.fonts.ready) {
      try { await document.fonts.ready; } catch (e) { /* ignore */ }
    }

    const allFolios = Array.from(document.querySelectorAll('.spread .folio'));
    let baked = 0, totalWords = 0, skipped = 0;

    // PATCH E структура: лист 1: recto = carpet (allFolios[1]),
    // verso = blank-after-carpet (allFolios[2]). Лист 2: recto = incipit
    // (allFolios[3]), verso = page 2 (allFolios[4]). И так далее.
    // Пары одного физического листа — (allFolios[1], allFolios[2]),
    // (allFolios[3], allFolios[4]), ..., начиная с i=1.
    // allFolios[0] = cover-blank — orphan (нет партнёра, до карпета).
    // Последний folio (final или fallback-blank) тоже orphan.

    function injectGhost(folio, dataUrl) {
      const div = document.createElement('div');
      div.className = 'ghost-layer';
      div.style.backgroundImage = 'url(' + dataUrl + ')';
      const content = folio.querySelector('.folio-content');
      if (content) folio.insertBefore(div, content);
      else folio.appendChild(div);
    }

    for (let i = 1; i + 1 < allFolios.length; i += 2) {
      const folioR = allFolios[i];      // recto листа
      const folioV = allFolios[i + 1];  // verso того же листа

      // Bake R → ghost на V (V просвечивает recto того же листа)
      const r1 = bakeOneGhost(folioR);
      if (r1.url) { injectGhost(folioV, r1.url); baked++; totalWords += r1.words; }
      else { skipped++; }

      // Bake V → ghost на R (R просвечивает verso того же листа)
      const r2 = bakeOneGhost(folioV);
      if (r2.url) { injectGhost(folioR, r2.url); baked++; totalWords += r2.words; }
      else { skipped++; }
    }

    // PATCH G: текстовый ghost от standalone-обложек на их физических
    // партнёров. carpet и final выведены из spread-flow патчем F и не
    // попадают в основной цикл; запекаем их явно.
    if (allFolios.length > 0) {
      var standaloneCarpet = document.querySelector('.folio-cover-front .folio');
      if (standaloneCarpet) {
        var rC = bakeOneGhost(standaloneCarpet);
        if (rC.url) { injectGhost(allFolios[0], rC.url); baked++; totalWords += rC.words; }
        else { skipped++; }
      }
      var standaloneFinal = document.querySelector('.folio-cover-back .folio');
      if (standaloneFinal) {
        var rF = bakeOneGhost(standaloneFinal);
        if (rF.url) { injectGhost(allFolios[allFolios.length - 1], rF.url); baked++; totalWords += rF.words; }
        else { skipped++; }
      }
    }
    console.log('[D1 ghost] baked: ' + baked + ' folios, ' +
                totalWords + ' words total, skipped: ' + skipped);
  }

  // ═════════════════════════════════════════════════════════════════
  // PATCH B3: активация .blob и .ink-drip — кляксы тяготеют к полям
  // (там, где писец обмакивал перо). Около 30% страниц без артефактов
  // (писец работал аккуратно), остальные — 1–2 кляксы. Иногда — потёк
  // вниз. Seeded RNG: один и тот же кодекс всегда даёт ту же раскладку.
  // ═════════════════════════════════════════════════════════════════
  function addInkArtifacts() {
    const rng = seeded(0xB10B17);
    const folios = document.querySelectorAll(
      '.folio:not(.incipit-verso):not(.final-recto)'
    );
    folios.forEach(function(folio) {
      // 30% страниц чистые
      if (rng() < 0.30) return;
      const count = (rng() < 0.70) ? 1 : 2;
      for (let i = 0; i < count; i++) {
        const blob = document.createElement('div');
        blob.className = 'blob';
        const size = 3 + Math.floor(rng() * 7);
        // Тяготение к полям: 50/50 левое/правое поле
        const x = (rng() < 0.5)
          ? 0.04 + rng() * 0.12
          : 0.84 + rng() * 0.12;
        const y = 0.10 + rng() * 0.78;
        const opacity = 0.35 + rng() * 0.30;
        const rot = (rng() * 360).toFixed(0);
        blob.style.cssText =
          'left:' + (x * 100).toFixed(1) + '%;' +
          'top:' + (y * 100).toFixed(1) + '%;' +
          'width:' + size + 'px;' +
          'height:' + size + 'px;' +
          'background:rgba(20,12,3,' + opacity.toFixed(2) + ');' +
          'border-radius:' + (40 + Math.floor(rng() * 60)) + '% ' +
                             (40 + Math.floor(rng() * 60)) + '% ' +
                             (40 + Math.floor(rng() * 60)) + '% ' +
                             (40 + Math.floor(rng() * 60)) + '%;' +
          'transform:rotate(' + rot + 'deg);';
        folio.appendChild(blob);
        // 18% шанс потёка вниз
        if (rng() < 0.18) {
          const drip = document.createElement('div');
          drip.className = 'ink-drip';
          const dripH = 4 + Math.floor(rng() * 14);
          drip.style.cssText =
            'left:calc(' + (x * 100).toFixed(1) + '% + ' + (size / 2).toFixed(1) + 'px);' +
            'top:calc(' + (y * 100).toFixed(1) + '% + ' + (size / 2).toFixed(0) + 'px);' +
            'height:' + dripH + 'px;' +
            'width:1.5px;';
          folio.appendChild(drip);
        }
      }
    });
  }

  // ═════════════════════════════════════════════════════════════════
  // PATCH A: назначение вариантов пергамента.
  // Каждый разворот в нашей UI показывает обе стороны одного листа
  // (recto LEFT, verso RIGHT). На реальном листе одна сторона hair,
  // другая flesh — поэтому ВНУТРИ разворота: pair (H,F) или (F,H).
  // Между листами recto-сторона чередуется H/F/H/F (правило Грегори
  // для соседних листов в quire). Выбор 1-из-6 внутри группы —
  // детерминированный (seeded RNG), один и тот же кодекс всегда
  // выглядит одинаково при перерендере.
  // ═════════════════════════════════════════════════════════════════
  function assignParchmentVariants() {
    const parchRng = seeded(0xC0DE42);
    const spreads = document.querySelectorAll('.spread');
    spreads.forEach(function(spread, i) {
      const folios = spread.querySelectorAll('.folio');
      if (folios.length < 2) return;
      // Структура с PATCH F (carpet/final standalone, вне spread-flow):
      //   Spread 0 = (blank-after-carpet, incipit) = HH (правило Грегори)
      //   Spread 1 = (page 2, page 3)              = FF
      //   Spread 2 = (page 4, page 5)              = HH
      //   Spread 3 = (page 6, page 7)              = FF
      //   ...
      // i чётное → HH, i нечётное → FF.
      const isHair = (i % 2 === 0);
      const prefix = isHair ? 'parch-h' : 'parch-f';
      folios[0].classList.add(prefix + (Math.floor(parchRng() * 6) + 1));
      folios[1].classList.add(prefix + (Math.floor(parchRng() * 6) + 1));
    });
  }

  // ═══════════════════════════════════════════════════════════════
  // Запуск: шрифты → пагинация → рендер → маргиналии → jitter → fade-in.
  // ═══════════════════════════════════════════════════════════════
  async function run() {
    // Шрифты. document.fonts.ready резолвится ТОЛЬКО для тех шрифтов,
    // которые уже запрошены на рендер к моменту вызова. Шрифты,
    // объявленные через @font-face, но пока не использованные ни одним
    // видимым элементом, в эту гарантию НЕ входят. Пагинатор работает
    // в невидимом measurer — и если мы положимся на fonts.ready,
    // измерения идут в fallback-шрифте (Georgia/serif), который имеет
    // другие метрики. В результате каждый P в реальности на ~27px
    // выше расчётного (шрифт Kells шире, строки длиннее/больше),
    // и страницы переполняются, особенно ближе к концу.
    //
    // Решение: явно форсируем загрузку ключевых шрифтов через
    // document.fonts.load() — это и обещает браузеру, что шрифт нужен,
    // и возвращает promise, разрешающийся после его загрузки.
    if (document.fonts) {
      const families = [
        '"0800 Kells"',
        '"0746 Beda"',
        '"0550 Uncialis"',
        '"0800 Remedius"',
        '"Uncial Antiqua"',
      ];
      const probes = [];
      for (const f of families) {
        try { probes.push(document.fonts.load('1em ' + f)); } catch (e) {}
        try { probes.push(document.fonts.load('italic 1em ' + f)); } catch (e) {}
        try { probes.push(document.fonts.load('bold 1em ' + f)); } catch (e) {}
      }
      try { await Promise.all(probes); } catch (e) { /* ignore */ }
      try { await document.fonts.ready; } catch (e) { /* ignore */ }
    }

    const sourceTpl = document.getElementById('codex-source');
    const blocks = [];
    sourceTpl.content.childNodes.forEach(function(n) {
      if (n.nodeType === 1) blocks.push(n);
    });

    const measurer = createMeasurer();
    document.body.appendChild(measurer);
    const measurerContent = measurer.querySelector('.folio-content');
    const lineHeight = measureLineHeight(measurerContent);

    const t0 = performance.now();
    const pages = paginate(blocks, measurerContent, lineHeight);
    const t1 = performance.now();

    measurer.remove();

    // ── Фаза 1: построение DOM книги ──
    // Все вставки и присвоения классов до первого layout read.
    renderBook(pages);
    try { assignParchmentVariants(); } catch (e) { console.error('Patch A failed:', e); }

    // ── Фаза 2: DOM-мутации внутри маргиналий и фолио ──
    // Никаких layout reads здесь — браузер копит инвалидации,
    // первый последующий read форсирует ровно один reflow.
    //   normalizeMarginaliaBreaks: <br> → пробелы во всех маргиналиях
    //   walkJitter:    маргиналии Аидана (jitter букв через ink-l span)
    //   walkWbrOnly:   маргиналии Коемана (только <wbr>, без обёрток —
    //                  чтобы не сломать лигатуры)
    //   addInkArtifacts: чернильные blob/drip на полях фолио
    // Эти четыре операции — чистый DOM append/replace, в порядке
    // не критичны, но сгруппированы здесь, чтобы фаза 3 шла на
    // полностью устаканенной DOM-структуре.
    normalizeMarginaliaBreaks();
    document.querySelectorAll('.marginalia:not(.mg-coemanus)').forEach(walkJitter);
    document.querySelectorAll('.marginalia.mg-coemanus').forEach(walkWbrOnly);
    try { addInkArtifacts(); } catch (e) { console.error('Patch B3 failed:', e); }

    // ── Фаза 3: единственный read/write проход по геометрии ──
    // Здесь происходит forced layout flush — но всего один, на всю
    // подготовку. Сама positionMarginalia реструктурирована в
    // read-all → compute → write-all, без thrashing внутри overlap-loop.
    positionMarginalia();

    // ── Фаза 4: async-задачи, которым нужна стабильная геометрия ──
    // bakeVersoGhosts читает getBoundingClientRect() каждого слова
    // через Range API; запускается fire-and-forget, рисует в офскрин
    // canvas и навешивает background на recto, не двигая основной DOM.
    bakeVersoGhosts().catch(function(e) { console.error('Patch D1 failed:', e); });

    document.body.classList.add('ready');

    if (window.console) {
      console.log('Codex paginated in ' + (t1 - t0).toFixed(0) +
                  ' ms → ' + pages.length + ' content pages');
    }

    // Репозиционирование при resize. Дебаунс 150 мс — типичное
    // дрожание при ротации экрана / DevTools resize не должно
    // вызывать каскад reflow'ов.
    //
    // На mobile-ветке (max-width: 940px) маргиналии становятся
    // position: static, и top, выставленный positionMarginalia,
    // полностью игнорируется. Чтобы не платить за бесполезный
    // forced layout — ранний выход.
    let resizeT = null;
    window.addEventListener('resize', function() {
      clearTimeout(resizeT);
      resizeT = setTimeout(function() {
        if (window.matchMedia('(max-width: 940px)').matches) return;
        positionMarginalia();
      }, 150);
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', run);
  } else {
    run();
  }
})();
</script>
</body>
</html>
