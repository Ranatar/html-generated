      // childAfter может быть null (abbr — последний ребёнок),
      // тогда insertBefore(node, null) === appendChild.
      abbr.parentNode.insertBefore(source, abbr.nextSibling);
    });
  }

  // ═══════════════════════════════════════════════════════════════
  // PATCH TR3+TR4: обработка source-span'ов в клоне выделения.
  // Используется в handleCopyEvent.
  //
  // Поведение зависит от режима страницы:
  //
  // Обычный режим (body.mg-translated отсутствует):
  //   abbr.med — primary visible content, в clipboard должна попасть
  //   её раскрытая форма (через processAbbrInClone). source-span —
  //   ghost-слой, нужный только Translate'у; в clipboard ему делать
  //   нечего (иначе при последующем processAbbrInClone выйдет
  //   "DominiDomini"). Удаляем source-span'ы целиком.
  //
  // Режим перевода (body.mg-translated):
  //   abbr.med имеет display:none — она ghost; processAbbrInClone
  //   удалит её. source-span — primary visible content, его текст
  //   (переведённый Translate'ом или нет) должен попасть в clipboard.
  //   Снимаем обёртку (unwrap), оставляя детей в потоке.
  //
  // Захватываем оба класса — .abbr-translate-source (для основного
  // текста) и .mg-translate-source (для маргиналий Аидана).
  // ═══════════════════════════════════════════════════════════════
  function processTranslateSourcesInClone(fragment) {
    const isTranslated = document.body.classList.contains('mg-translated');
    const sources = fragment.querySelectorAll(
      '.abbr-translate-source, .mg-translate-source'
    );
    for (let i = 0; i < sources.length; i++) {
      const s = sources[i];
      const parent = s.parentNode;
      if (!parent) continue;
      if (isTranslated) {
        // Unwrap: дети остаются на месте span'а.
        while (s.firstChild) parent.insertBefore(s.firstChild, s);
        parent.removeChild(s);
      } else {
        // Удалить целиком вместе с детьми.
        parent.removeChild(s);
      }
    }

    // PATCH X-BROWSER-6: обработка word-wbr обёрток для длинных слов.
    // В отличие от abbr-translate-source, здесь нам нужен ОДИН из
    // двух слоёв: source в translated-режиме (это primary visible),
    // render в обычном (примарный visible). Внешняя обёртка .word-wbr
    // снимается всегда — её роль чисто структурная.
    //
    // Обычный режим (без mg-translated):
    //   Удаляем .word-source целиком (visually-hidden дубль), оставляем
    //   .word-render с его текстом (внутри есть <wbr>; для plain-text
    //   и HTML вывода wbr безвреден — текст склеен).
    //   Затем разворачиваем .word-render — его дети поднимаются на
    //   уровень выше (вместо <span class="word-render">incar<wbr>natione
    //   </span> остаётся "incar"<wbr>"natione" непосредственно в
    //   родителе word-wbr).
    //   И наконец разворачиваем сам word-wbr — поднимаем "incar"+wbr+
    //   "natione" на уровень выше. В DOM фрагмента остаётся именно тот
    //   текст, который пользователь видел.
    //
    // Translated режим (body.mg-translated):
    //   Symmetrically: удаляем .word-render, разворачиваем .word-source,
    //   разворачиваем word-wbr. В выводе остаётся цельное "incarnatione"
    //   как читатель Translate видел.
    //
    // Идём в порядке: word-source/render (внутренние) → word-wbr (внешний).
    // querySelectorAll возвращает в document-order, поэтому unwrap'ы
    // работают корректно даже при nested wraps (нет такой ситуации сейчас,
    // но будем готовы).
    const innerToRemove = isTranslated ? '.word-render' : '.word-source';
    const innerToUnwrap = isTranslated ? '.word-source' : '.word-render';

    const removes = fragment.querySelectorAll(innerToRemove);
    for (let i = 0; i < removes.length; i++) {
      const r = removes[i];
      if (r.parentNode) r.parentNode.removeChild(r);
    }
    const unwraps = fragment.querySelectorAll(innerToUnwrap);
    for (let i = 0; i < unwraps.length; i++) {
      const u = unwraps[i];
      const parent = u.parentNode;
      if (!parent) continue;
      while (u.firstChild) parent.insertBefore(u.firstChild, u);
      parent.removeChild(u);
    }
    const wraps = fragment.querySelectorAll('.word-wbr');
    for (let i = 0; i < wraps.length; i++) {
      const w = wraps[i];
      const parent = w.parentNode;
      if (!parent) continue;
      while (w.firstChild) parent.insertBefore(w.firstChild, w);
      parent.removeChild(w);
    }
  }

  // ═══════════════════════════════════════════════════════════════
  // PATCH TR4: фильтрация маргиналий в клоне выделения.
  //
  // Раньше копированием маргиналий заведовал CSS: .marginalia имеет
  // user-select:none, и Selection.toString() в дефолтном copy их
  // молча исключал. С PATCH TR4 copy всегда идёт через handleCopyEvent
  // (intersectsNode-гард ловит и Ctrl+A, anchor которого — body),
  // и принципы исключения нужно воспроизвести в клоне явно — иначе
  // получим маргиналии как "хвост" к каждому абзацу.
  //
  // Поведение по режимам:
  //
  // body.mg-selectable активен (пользователь только что pointerdown'ал
  //   в маргиналию — pointerdown-listener в самом конце скрипта это
  //   toggle'ит): пользователь явно работает с маргиналиями, оставляем
  //   всё как есть. processTranslateSourcesInClone и processAbbrInClone
  //   дальше нормализуют структуру под режим.
  //
  // body.mg-translated активен (Translate iframe / Chrome built-in
  //   Translate): в маргиналиях Аидана primary visible — source-слой,
  //   render-слой (.mg-jitter-render) display:none. cloneContents
  //   копирует его несмотря на display:none, и его textContent
  //   (с ink-l/titulus-svg) дублируется к чистому source. Удаляем
  //   render-слои. .mg-coemanus не split'ится (нет ни source, ни
  //   jitter-render) — оставляем как есть, у них собственный
  //   user-select:text-override в этом режиме.
  //
  // Обычный режим: воспроизводим старое CSS-исключение — удаляем
  //   маргиналии целиком.
  // ═══════════════════════════════════════════════════════════════
  function filterMarginaliaInClone(fragment) {
    const body = document.body;
    if (body.classList.contains('mg-selectable')) return;
    if (body.classList.contains('mg-translated')) {
      // В translated режиме оставляем source маргиналий и Коеман.
      // Удаляем только render-слои Аидана.
      const renders = fragment.querySelectorAll('.mg-jitter-render');
      for (let i = 0; i < renders.length; i++) {
        const r = renders[i];
        if (r.parentNode) r.parentNode.removeChild(r);
      }
      return;
    }
    // Обычный режим: маргиналии в clipboard не идут (паритет с
    // прежним поведением через user-select:none).
    const margs = fragment.querySelectorAll('.marginalia');
    for (let i = 0; i < margs.length; i++) {
      const m = margs[i];
      if (m.parentNode) m.parentNode.removeChild(m);
    }
  }

  // ═══════════════════════════════════════════════════════════════
  // PATCH TR4: удаление невизуальных служебных тегов из клона.
  //
  // range.cloneContents() клонирует DOM-узлы по их позиции в дереве,
  // не учитывая CSS display. Поэтому при Ctrl+A клон может содержать
  // <script> (его textContent — весь JS-код), <style> (CSS-правила
  // как текст), <template> (хотя его children лежат в template.content
  // и не должны быть в основном tree, но сам тег попадает) и пр.
  //
  // В Chrome это маскируется тем, что Selection нормализует границы
  // Ctrl+A до последнего "отображаемого" содержимого, и script-узлы
  // часто остаются за границей. В Firefox при multi-range selection
  // один из ranges зачастую заходит на script — и его код утекает
  // в clipboard.
  //
  // Решение: явно вырезаем из клона теги, которые по определению
  // не имеют visible-текста для пользователя.
  // ═══════════════════════════════════════════════════════════════
  function removeNonVisibleNodesInClone(fragment) {
    const nodes = fragment.querySelectorAll(
      'script, style, template, link, meta, noscript, head'
    );
    for (let i = 0; i < nodes.length; i++) {
      const n = nodes[i];
      if (n.parentNode) n.parentNode.removeChild(n);
    }
  }

  // ═══════════════════════════════════════════════════════════════
  // PATCH TR4: plain-text сериализация фрагмента с переносами строк
  // между блочными узлами.
  //
  // textContent склеивает соседние <p> вплотную (display не учитывает).
  // innerText теоретически учитывает rendered display, но требует
  // элемент в документе и в обоих движках имеет quirks с off-screen
  // attach + shrink-to-fit width — span.rubric с display:block не
  // признаётся блочным, что-то наследуется не вовремя.
  //
  // Надёжнее знать структуру самим. У нас в кодексе фиксированный
  // набор блочных HTML-тегов плюс несколько inline-тегов с CSS
  // display:block (rubric, doc-title, doc-subtitle, divider, и т.д.).
  // Список ниже покрывает их полностью; добавление нового блочного
  // класса в CSS = добавление сюда.
  //
  // Алгоритм: рекурсивный обход. Перед и после block-узла
  // добавляется '\n'. <br> — одиночный '\n'. Inline-узлы и текстовые
  // узлы выводятся как есть. В конце сжимаем 3+ подряд \n до двух
  // (\n\n даёт пустую строку между абзацами — стандартный plain-text)
  // и тримим внешние whitespace.
  // ═══════════════════════════════════════════════════════════════
  const BLOCK_TAGS_FOR_TEXT = {
    P: 1, DIV: 1, H1: 1, H2: 1, H3: 1, H4: 1, H5: 1, H6: 1,
    LI: 1, UL: 1, OL: 1, BLOCKQUOTE: 1, PRE: 1, HR: 1,
    SECTION: 1, ARTICLE: 1, ASIDE: 1, NAV: 1, HEADER: 1, FOOTER: 1, MAIN: 1,
    TABLE: 1, TR: 1, FIGURE: 1, FIGCAPTION: 1
  };
  // Inline-теги (span, em, abbr и пр.) с CSS display:block в нашем
  // файле. Список синхронизирован со стилями codex-styles.
  const BLOCK_CLASSES_FOR_TEXT = {
    'rubric': 1, 'section-break-soft': 1,
    'doc-title': 1, 'doc-subtitle': 1,
    'ornament-line': 1, 'divider': 1,
    'colophon': 1, 'later-hand': 1, 'later-hand-colophon': 1,
    'marginalia': 1, 'signum': 1, 'theological-cont': 1,
    'illuminated-initial': 1, 'big-initial': 1,
    'folio': 1, 'folio-content': 1, 'spread': 1, 'folio-cover': 1,
    'mg-jitter-render': 1, 'mg-translate-source': 1
  };

  function isBlockForText(el) {
    if (BLOCK_TAGS_FOR_TEXT[el.tagName]) return true;
    if (!el.classList || el.classList.length === 0) return false;
    for (let i = 0; i < el.classList.length; i++) {
      if (BLOCK_CLASSES_FOR_TEXT[el.classList[i]]) return true;
    }
    return false;
  }

  function fragmentToPlainText(fragment) {
    const parts = [];
    function walk(node) {
      const t = node.nodeType;
      if (t === 3) {
        // text: подавляем чисто-whitespace узлы между блоками
        // (форматирующие пробелы из исходного HTML), но содержащие
        // непустой текст оставляем как есть.
        parts.push(node.nodeValue);
        return;
      }
      if (t !== 1) return;
      if (node.tagName === 'BR') {
        parts.push('\n');
        return;
      }
      const block = isBlockForText(node);
      if (block) parts.push('\n');
      const kids = node.childNodes;
      for (let i = 0; i < kids.length; i++) walk(kids[i]);
      if (block) parts.push('\n');
    }
    const kids = fragment.childNodes;
    for (let i = 0; i < kids.length; i++) walk(kids[i]);
    // Нормализация: 3+ \n → \n\n (абзац-разделитель), тримим
    // ведущие/хвостовые whitespace, схлопываем горизонтальные
    // пробелы у границ строк (после переноса строки часто остаётся
    // ведущий whitespace из исходного форматирования HTML).
    let out = parts.join('');
    // PATCH X-BROWSER-5: заменяем NBSP (U+00A0) на обычный пробел.
    // processTextNode/processTextNodeWbrOnly ставят NBSP перед em-dash
    // ("\u00A0—") чтобы тире не висело одно в начале строки при
    // визуальном wrap. Это полезно для рендера, но в plain-text
    // copy NBSP не нужен — он не несёт семантики, лишь помогает
    // browser layout. Заменяем на обычный пробел чтобы регексы
    // ниже (схлопывание двойных пробелов и пр.) могли эффективно
    // его обработать.
    out = out.replace(/\u00A0/g, ' ');
    out = out.replace(/[ \t]*\n[ \t]*/g, '\n');
    out = out.replace(/\n{3,}/g, '\n\n');
    // PATCH X-BROWSER-5: схлопываем двойные пробелы. Они возникают
    // когда между двумя соседними inline-элементами стоят несколько
    // соседних whitespace-only text-узлов: например, `Orate pro Eldar`
    // + ` ` (заменённый <br>) + ` ` (схлопнутый \n          из исходного
    // HTML) → `Eldar  qui` с двойным пробелом. textContent склеивает
    // их вплотную, и до этой точки нормализации они доживают. В
    // plain-text двойные пробелы редко имеют семантический смысл.
    out = out.replace(/ {2,}/g, ' ');
    out = out.replace(/^\s+|\s+$/g, '');
    // Конвертация LF → CRLF для совместимости со старыми редакторами
    // (Windows Notepad <= Win10 1809 не распознаёт LF-only). Современные
    // редакторы (Sublime, VSCode, Word, Google Docs, браузеры на любой
    // платформе) одинаково корректно читают CRLF. Делаем последним
    // шагом, после всех нормализаций по \n.
    out = out.replace(/\n/g, '\r\n');
    return out;
  }

  // ═══════════════════════════════════════════════════════════════
  // PATCH TR: детектор активного машинного перевода.
  //
  // Chrome built-in Translate ставит на <html> класс 'translated-ltr'
  // или 'translated-rtl' и оборачивает каждый переведённый text-узел
  // в <font _msttexthash="…">. Мониторим класс на <html> через
  // MutationObserver — самый чистый сигнал.
  //
  // Сторонние переводчики (translate.google.com в iframe-режиме,
  // расширения вроде Mate/ImTranslator, Yandex.Translate) часто не
  // выставляют класс на <html> — они подменяют textContent или
  // вставляют свои <font>-обёртки прямо внутрь узлов. Fallback:
  // наблюдаем за мутациями content внутри .mg-translate-source.
  // Наш JS source после split'а не трогает; любое изменение там —
  // признак работы стороннего переводчика.
  //
  // Класс mg-translated один раз поставленный не снимаем. Если
  // пользователь выключит перевод, render-слой по-прежнему лежит в
  // DOM нетронутым, но визуально мы покажем source. Стоимость
  // false-positive (потеря дрожания на маргиналиях после toggle off)
  // — приемлема ради надёжности детекции.
  // ═══════════════════════════════════════════════════════════════
  function setupTranslationObserver() {
    const html = document.documentElement;
    const body = document.body;

    function activate() {
      if (body.classList.contains('mg-translated')) return;
      body.classList.add('mg-translated');
      // Маргиналии меняют высоту: source встаёт в поток, render
      // схлопывается через display:none. Вертикальные позиции
      // выставляются positionMarginalia — пересчитать на следующем
      // кадре, когда reflow завершится.
      requestAnimationFrame(function() {
        try { positionMarginalia(); } catch (e) {}
      });
    }

    function checkHtmlClass() {
      const cls = html.classList;
      if (cls.contains('translated-ltr') || cls.contains('translated-rtl')) {
        activate();
      }
    }

    // Путь 1: класс на <html> (Chrome built-in Translate).
    const htmlObs = new MutationObserver(checkHtmlClass);
    htmlObs.observe(html, {attributes: true, attributeFilter: ['class']});
    checkHtmlClass();

    // Путь 2: мутации содержимого source (translate.google.com и
    // расширения). Один раз сработав, отключаемся — дальнейшие
    // подмены идут уже в активном mg-translated, и реагировать не
    // на что: режим уже включён.
    const sourceObs = new MutationObserver(function() {
      activate();
      sourceObs.disconnect();
    });
    document.querySelectorAll('.mg-translate-source').forEach(function(src) {
      sourceObs.observe(src, {
        childList: true,
        characterData: true,
        subtree: true,
      });
    });
  }

  // Схлопывание ручных <br> в пробелы. Маргиналии размечены в source
  // с визуальными переводами строк (в расчёте на определённые слова
  // на строку), но фактическая ширина 68px + унциальный шрифт не
  // совпадают с задумкой: каждая «авторская» строка ЕЩЁ РАЗ
  // переносится автоматически по <wbr>, давая каскад из логического
  // + физического переноса. Удаляем ручные разрывы, оставляя только
  // автоматический слоговой перенос — это и есть самый аутентичный
  // инсулярный порядок (писец писал непрерывно, переходя на новую
  // строку только упираясь в край поля).
  //
  // Применяется ко ВСЕМ маргиналиям — как Аидана, так и Коемана:
  // узкое поле одинаковое, проблема двойного переноса одинаковая.
  // Разница только в обработке букв ниже (Аидан → ink-l + wbr;
  // Коеман → только wbr, без обёрток, чтобы сохранить лигатуры).
  function normalizeMarginaliaBreaks() {
    const nodes = document.querySelectorAll('.marginalia br');
    for (let i = 0; i < nodes.length; i++) {
      const br = nodes[i];
      br.parentNode.replaceChild(document.createTextNode(' '), br);
    }
  }

  // Версия обработчика для маргиналий Коемана: вставляем <wbr> между
  // слогами (точно та же логика слогоделения, что у Аидана), но НЕ
  // оборачиваем каждую букву в ink-l span. Коеман — другая рука, без
  // jitter; поэтому буквы остаются текстовыми узлами, а `font-feature-
  // settings: "liga", "dlig"` продолжает работать (лигатуры требуют,
  // чтобы соседние символы были в одном текстовом потоке, не
  // разделённые inline-block элементами).
  //
  // PATCH X-BROWSER-5b: реализация перешла с поточного "по токену в
  // text-node" к минимальным резам. Раньше внутри функции для
  // КАЖДОГО слова и КАЖДОГО не-слова создавался отдельный text-node:
  // "Erat" / " " / "annus" / " " / ... / "coepit" / ", " / "et" /...
  // Браузер визуально склеивал их, но Google Translate (и любой
  // другой DOM-walker, который трактует каждый text-node как
  // отдельный leaf-токен) видел их раздельно и при сериализации
  // обратно вставлял пробел между КАЖДОЙ парой text-node'ов. В
  // переводе это давало "coepit , et" с пробелом перед запятой —
  // отчётливо неправильно.
  //
  // Новая логика: text-node режется ТОЛЬКО там, где нужен <wbr>.
  // Между точками реза (включая всю пунктуацию, пробелы и слова без
  // переноса) текст остаётся ОДНИМ непрерывным text-node'ом. Тем
  // самым:
  //   - <wbr> по-прежнему расставлены как раньше (та же логика
  //     syllabifyLatinSingle), pagination идентична;
  //   - количество text-node'ов уменьшено в десятки раз;
  //   - Translate видит цельный текст между точками реза и переводит
  //     их связно, не вставляя лишних пробелов перед пунктуацией.
  //
  // Алгоритм:
  //   1. Пробегаем WORD_RE по входному тексту, собираем массив
  //      "wbr-точек" — абсолютных индексов в исходном v, перед
  //      которыми надо вставить <wbr>.
  //   2. Если точек нет — возвращаем text-node с НОРМАЛИЗОВАННЫМ
  //      содержимым (\s+→' ' и пробел перед em-dash → NBSP), один
  //      непрерывный text-node.
  //   3. Если точки есть — режем v на сегменты по этим индексам;
  //      каждый сегмент НОРМАЛИЗУЕМ целиком (через тот же regex),
  //      между сегментами вставляем <wbr>. Получаем DocumentFragment
  //      из (segments+1) text-node'ов и (segments) <wbr>'ов.
  function processTextNodeWbrOnly(node) {
    const v = node.nodeValue;

    // Шаг 1: собрать все wbr-точки (абсолютные индексы в v).
    const breakPoints = [];
    WORD_RE.lastIndex = 0;
    let m;
    while ((m = WORD_RE.exec(v)) !== null) {
      const word = m[1];
      if (!word) continue;
      // syllabifyLatinSingle возвращает массив [k] или []. k —
      // позиция реза ВНУТРИ слова. Абсолютная позиция в v —
      // m.index + k.
      const wb = syllabifyLatinSingle(word);
      if (wb.length === 1) {
        breakPoints.push(m.index + wb[0]);
      }
    }

    // Локальная нормализация фрагмента: schloplyaem whitespace
    // в одиночные пробелы и ставим NBSP перед em-dash. Та же
    // логика, что в processTextNode, только применённая ко всему
    // фрагменту целиком — не по токену.
    function normalize(s) {
      return s
        .replace(/\s+/g, ' ')
        .replace(/ ([—–])/g, '\u00A0$1');
    }

    // Append a normalized chunk into target, replacing each plain ' '
    // with a wrapSpace() span. NBSP (\u00A0) перед em-dash и любые
    // другие неразрывные пробелы остаются обычным text-node — их
    // вариация не нужна, это семантически фиксированные пробелы.
    function appendChunkWithJitter(target, str) {
      let i = 0;
      while (i < str.length) {
        const sp = str.indexOf(' ', i);
        if (sp === -1) {
          if (i < str.length) {
            target.appendChild(document.createTextNode(str.slice(i)));
          }
          return;
        }
        if (sp > i) {
          target.appendChild(document.createTextNode(str.slice(i, sp)));
        }
        target.appendChild(wrapSpace());
        i = sp + 1;
      }
    }

    // Шаг 2: точек нет — вернуть один нормализованный text-node.
    if (breakPoints.length === 0) {
      const frag = document.createDocumentFragment();
      appendChunkWithJitter(frag, normalize(v));
      return frag;
    }

    // Шаг 3: режем v на сегменты, между ними <wbr>.
    const frag = document.createDocumentFragment();
    let cursor = 0;
    for (let i = 0; i < breakPoints.length; i++) {
      const bp = breakPoints[i];
      // Сегмент до точки реза. Нормализуем целиком — внутри сегмента
      // могут быть и слова, и пробелы, и пунктуация, всё едино.
      appendChunkWithJitter(frag, normalize(v.slice(cursor, bp)));
      frag.appendChild(document.createElement('wbr'));
      cursor = bp;
    }
    // Хвост после последней точки реза.
    appendChunkWithJitter(frag, normalize(v.slice(cursor)));
    return frag;
  }

  function walkWbrOnly(el) {
    if (SKIP_TAGS[el.tagName]) return;
    // PATCH X-BROWSER-3: skip translate-source-spans. Они содержат
    // ПОЛНУЮ форму слова для Google Translate (например, "Domini" рядом
    // с visible abbr "DNI"). Если walkWbrOnly разорвёт их на "Do<wbr>mi
    // <wbr>ni", Translate не распознает слово как единое целое и оставит
    // в переводе сырой латинский фрагмент. Источники переводов должны
    // оставаться неразорванными.
    //
    // PATCH X-BROWSER-6: skip также для word-source/word-render. Это
    // оборачивающие span'ы для длинных слов основного текста; они
    // создаются wrapLongWordsForTranslate и не должны обрабатываться
    // повторно. (Маргиналии не пересекаются с word-wrap — там
    // walkWbrOnly работает на render-слое маргиналий, а word-wrap
    // только в основном тексте.)
    if (el.classList && (
        el.classList.contains('liga-protect') ||
        el.classList.contains('abbr-translate-source') ||
        el.classList.contains('mg-translate-source') ||
        el.classList.contains('word-source') ||
        el.classList.contains('word-render') ||
        el.classList.contains('ws')
    )) return;
    const kids = Array.from(el.childNodes);
    for (let i = 0; i < kids.length; i++) {
      const kid = kids[i];
      if (kid.nodeType === 3) {
        // PATCH X-BROWSER-5: см. walkJitter — то же поведение для
        // whitespace-only text-узлов между inline-элементами.
        if (!/\S/.test(kid.nodeValue)) {
          if (kid.nodeValue !== ' ') {
            kid.nodeValue = ' ';
          }
          continue;
        }
        el.replaceChild(processTextNodeWbrOnly(kid), kid);
      } else if (kid.nodeType === 1) {
        walkWbrOnly(kid);
      }
    }
  }

  // ═══════════════════════════════════════════════════════════════
  // PATCH X-BROWSER-6: упаковка длинных слов в word-wbr обёртку.
  //
  // Альтернатива processTextNodeWbrOnly для основного текста кодекса.
  // Цель — поставить <wbr> внутрь длинного латинского слова для
  // одинаковой pagination Firefox=Chrome, при этом сохранив видимость
  // ЦЕЛЬНОГО слова для Google Translate.
  //
  // processTextNodeWbrOnly режет text-node прямо в основном потоке:
  //   "Erat annus ab incar"<wbr>"natione"
  // Translate видит два отдельных текстовых узла "incar" и "natione"
  // и трактует их как два слова → перевод деградирует.
  //
  // wrapLongWordsInTextNode для слов с syllabifyLatinSingle создаёт
  // обёртку:
  //   "Erat annus ab "<span class="word-wbr">
  //                    <span class="word-source">incarnatione</span>
  //                    <span class="word-render notranslate"
  //                          translate="no" aria-hidden="true">incar<wbr>natione</span>
  //                  </span>
  // Translate приоритетно читает .word-source (notranslate на
  // .word-render блокирует render-слой). Браузер рендерит .word-render
  // в потоке (.word-source — out of flow через position:absolute).
  // Pagination использует render-слой с <wbr> → одинакова между
  // движками. Translate видит цельное слово → корректный перевод.
  //
  // Слова без переноса (короткие, syllabifyLatinSingle вернёт [])
  // остаются как есть в исходном text-node — никаких изменений.
  // Не-слова (пробелы, пунктуация) тоже не трогаем; only minor
  // нормализация whitespace и NBSP перед em-dash.
  // ═══════════════════════════════════════════════════════════════
  function wrapLongWordsInTextNode(node) {
    const v = node.nodeValue;
    const frag = document.createDocumentFragment();

    // Отдельная нормализация для не-словных фрагментов (то же что в
    // processTextNodeWbrOnly): \s+ → ' ', пробел перед em-dash → NBSP.
    function normalizeNonWord(s) {
      return s
        .replace(/\s+/g, ' ')
        .replace(/ ([—–])/g, '\u00A0$1');
    }

    // Создание word-wbr обёртки для одного слова с одной точкой реза.
    function makeWordWrap(word, breakPos) {
      const wrap = document.createElement('span');
      wrap.className = 'word-wbr';

      const source = document.createElement('span');
      source.className = 'word-source';
      source.textContent = word;
      wrap.appendChild(source);

      const render = document.createElement('span');
      render.className = 'word-render notranslate';
      render.setAttribute('translate', 'no');
      render.setAttribute('aria-hidden', 'true');
      render.appendChild(document.createTextNode(word.slice(0, breakPos)));
      render.appendChild(document.createElement('wbr'));
      render.appendChild(document.createTextNode(word.slice(breakPos)));
      wrap.appendChild(render);

      return wrap;
    }

    // Накапливаем не-словные фрагменты в буфер. При flush разбиваем
    // буфер на сегменты вокруг пробелов: каждый пробел становится
    // <span class="ws"> с CSS-переменной --w (см. wrapSpace),
    // остальные части идут как text-node-ы. Translate видит
    // последовательность text-node'ов и span'ов с пробельным
    // символом внутри — это эквивалентно непрерывному тексту,
    // токенизация работает корректно. NBSP (\u00A0) — например
    // перед em-dash после normalizeNonWord — остаётся в text-node
    // и НЕ оборачивается, это семантически фиксированный пробел.
    let buf = '';
    function flushBuf() {
      if (buf.length === 0) return;
      const normalized = normalizeNonWord(buf);
      buf = '';

      // Быстрый путь: пробелов нет, кладём как text-node.
      if (normalized.indexOf(' ') === -1) {
        frag.appendChild(document.createTextNode(normalized));
        return;
      }

      // Разбиваем на сегменты вокруг обычных пробелов.
      // NBSP (\u00A0) пробелом для split не считается — остаётся
      // в составе text-node-сегмента.
      let cursor = 0;
      while (cursor < normalized.length) {
        const sp = normalized.indexOf(' ', cursor);
        if (sp === -1) {
          // Хвост без пробелов
          frag.appendChild(document.createTextNode(normalized.slice(cursor)));
          break;
        }
        // Сегмент до пробела
        if (sp > cursor) {
          frag.appendChild(document.createTextNode(normalized.slice(cursor, sp)));
        }
        // Сам пробел — оборачиваем
        frag.appendChild(wrapSpace());
        cursor = sp + 1;
      }
    }

    WORD_RE.lastIndex = 0;
    let m;
    while ((m = WORD_RE.exec(v)) !== null) {
      const word = m[1];
      const other = m[2];
      if (word) {
        const wb = syllabifyLatinSingle(word);
        if (wb.length === 1) {
          // Длинное слово с переносом → отдельная обёртка.
          flushBuf();
          frag.appendChild(makeWordWrap(word, wb[0]));
        } else {
          // Короткое слово или без переноса → накапливаем в buf
          // вместе с соседними не-словами. Получится один text-node
          // на цепочку из коротких слов и пунктуации.
          buf += word;
        }
      } else if (other) {
        buf += other;
      }
    }
    flushBuf();

    return frag;
  }

  function walkWrapLongWords(el) {
    if (SKIP_TAGS[el.tagName]) return;
    // Skip уже обработанных и других "защищённых" областей.
    if (el.classList && (
        el.classList.contains('liga-protect') ||
        el.classList.contains('abbr-translate-source') ||
        el.classList.contains('mg-translate-source') ||
        el.classList.contains('word-source') ||
        el.classList.contains('word-render') ||
        el.classList.contains('word-wbr')    ||
        el.classList.contains('ws')
    )) return;
    const kids = Array.from(el.childNodes);
    for (let i = 0; i < kids.length; i++) {
      const kid = kids[i];
      if (kid.nodeType === 3) {
        if (!/\S/.test(kid.nodeValue)) {
          // Whitespace-only text-node. Решаем по соседям, что это:
          //   - inline-context (пробел между inline-элементами в потоке
          //     текста, например между двумя <span class="word-wbr"> или
          //     между <abbr> и следующим словом) → оборачиваем в ws-span;
          //   - block-context (formatting whitespace в template-разметке,
          //     например \n+indent между двумя <div>) → оставляем как
          //     text-node, иначе inline-span создаст паразитный line-box
          //     между блочными элементами и сдвинет вертикальный layout.
          // Критерий: смотрим левого и правого соседа. Если хотя бы один
          // из них inline-element или непустой text-node — это inline-
          // context.
          const INLINE_TAGS = {
            SPAN: 1, EM: 1, STRONG: 1, ABBR: 1, WBR: 1,
            A: 1, I: 1, B: 1, BR: 1, SUP: 1, SUB: 1,
            CITE: 1, CODE: 1, MARK: 1, SMALL: 1, U: 1, S: 1,
            TIME: 1, VAR: 1, KBD: 1, SAMP: 1, Q: 1
          };
          const isInlineSibling = function(node) {
            if (!node) return false;
            if (node.nodeType === 3) return /\S/.test(node.nodeValue);
            if (node.nodeType === 1) return INLINE_TAGS[node.tagName] === 1;
            return false;
          };
          const inlineCtx = isInlineSibling(kid.previousSibling)
                         || isInlineSibling(kid.nextSibling);
          if (inlineCtx) {
            const ws = wrapSpace();
            el.replaceChild(ws, kid);
          } else {
            // Блочный контекст или whitespace на краю без значащих
            // соседей — нормализуем как раньше, не оборачиваем.
            if (kid.nodeValue !== ' ') {
              kid.nodeValue = ' ';
            }
          }
          continue;
        }
        el.replaceChild(wrapLongWordsInTextNode(kid), kid);
      } else if (kid.nodeType === 1) {
        walkWrapLongWords(kid);
      }
    }
  }

  // ═══════════════════════════════════════════════════════════════
  // PATCH X-BROWSER-3: фаза 0 — обработка template ДО пагинации.
  //
  // Проблема: hyphens: auto в Firefox разрывает длинные латинские
  // слова на слогах через встроенный словарь, а Chrome (Blink) для
  // lang="la" словаря не имеет — и не разрывает. Из-за этого один
  // и тот же текст в Firefox занимает на 1 строку меньше, чем в
  // Chrome. Накопительно это даёт расхождение в 1-2 страницы по
  // всему кодексу.
  //
  // Решение: применяем walkWbrOnly (syllabifier + <wbr>) к ВСЕМУ
  // содержимому ДО пагинации — тогда оба движка переносят на одних
  // и тех же <wbr>-точках, идентично. Заодно переносим сюда же
  // все остальные обработки текста, которые раньше шли в фазе 1.5
  // (после рендера) — applyAbbreviations, decorateTituli и пр.
  // Иначе walkWbrOnly разорвал бы цельные слова "Domini" в текст-
  // узлах, и applyAbbreviations потом не нашёл бы их по regex.
  //
  // Все вызываемые здесь функции layout-независимы (используют только
  // tagName/classList/textContent), поэтому корректно работают на
  // DocumentFragment template'а — даже когда тот не в DOM.
  //
  // ВАЖНО: после фазы 0 фаза 1.5 (старая) больше не нужна —
  // applyAbbreviations и пр. удалены из run(). Фаза 2 сокращена до
  // layout-зависимых вызовов: addInkArtifacts, setupTranslationObserver.
  // ═══════════════════════════════════════════════════════════════
  function preprocessSourceTemplate() {
    const tpl = document.getElementById('codex-source');
    const root = tpl.content;

    // Шаг 1. <br> в маргиналиях → пробелы. Раньше делалось через
    // normalizeMarginaliaBreaks() в фазе 2 на document. Здесь работаем
    // на template DocumentFragment напрямую.
    const margBrs = root.querySelectorAll('.marginalia br');
    for (let i = 0; i < margBrs.length; i++) {
      const br = margBrs[i];
      br.parentNode.replaceChild(document.createTextNode(' '), br);
    }

    // Шаг 2. Палеографические сокращения. detectFont использует только
    // classList родителей, не зависит от computed style — работает на
    // template корректно.
    applyAbbreviations(root);
    decorateTituli(root);

    // Шаг 3. Translate-source-spans для основного текста (рядом с abbr).
    // Маргиналии addAbbrTranslateSources пропускает (closest('.marginalia')).
    addAbbrTranslateSources(root);

    // Шаг 4. Маргиналии Айдана: split на source+render, затем wbr и
    // jitter на render-слое.
    //
    // splitMarginaliaForTranslate берёт текущее содержимое маргиналии
    // (уже с abbr+titulus после шагов 2-3), клонирует в source-слой
    // с разворачиванием abbr в полные формы, и переносит оригиналы
    // в render-слой.
    //
    // walkWbrOnly после split вставляет <wbr> в render — render-слой
    // получает break-opportunities в длинных словах. Source-слой не
    // трогаем (skip через классы в walkWbrOnly).
    //
    // walkJitter в самом конце: оборачивает буквы render-слоя в ink-l
    // span'ы. К этому моменту wbr расставлены, abbr пропускается через
    // SKIP_TAGS, span'ы перевода — через class skip.
    const aidanMargs = root.querySelectorAll('.marginalia:not(.mg-coemanus):not(.mg-finanus)');
    for (let i = 0; i < aidanMargs.length; i++) {
      splitMarginaliaForTranslate(aidanMargs[i]);
    }
    const aidanRenders = root.querySelectorAll('.marginalia:not(.mg-coemanus):not(.mg-finanus) .mg-jitter-render');
    for (let i = 0; i < aidanRenders.length; i++) walkWbrOnly(aidanRenders[i]);
    for (let i = 0; i < aidanRenders.length; i++) walkJitter(aidanRenders[i]);

    // Шаг 5. Маргиналии Коемана — wrapLongWords (без jitter).
    // Раньше использовался walkWbrOnly, который ставил <wbr> прямо
    // в текстовый поток — Translate сегментировал слова по wbr и
    // вставлял лишние пробелы перед пунктуацией. PATCH X-BROWSER-6:
    // wrapLongWordsForTranslate создаёт word-wbr обёртку с цельным
    // источником для Translate и render-слоем с wbr для рендера.
    const coemanMargs = root.querySelectorAll('.marginalia.mg-coemanus');
    for (let i = 0; i < coemanMargs.length; i++) walkWrapLongWords(coemanMargs[i]);

    // Маргиналия Финана: тот же путь, что у Коемана — wrapLongWords
    // без jitter. Финан исключён из Аидановского jitter-селектора
    // в шаге 5671. Здесь подключаем его к non-jitter-обработке.
    const finanMargs = root.querySelectorAll('.marginalia.mg-finanus');
    for (let i = 0; i < finanMargs.length; i++) walkWrapLongWords(finanMargs[i]);

    // Шаг 6. ОСНОВНОЙ ТЕКСТ — walkWrapLongWords на каждом блоке
    // верхнего уровня кроме маргиналий.
    //
    // Длинные латинские слова в <p>, <p.dropcap>, <p.uncial-passage>,
    // <p.theological>, <span.rubric>, <div.colophon> получают
    // дублирующую обёртку:
    //   <span class="word-wbr">
    //     <span class="word-source">incarnatione</span>     ← Translate
    //     <span class="word-render notranslate"            ← Render
    //           translate="no" aria-hidden="true">incar<wbr>natione</span>
    //   </span>
    // Translate приоритетно читает source с цельным словом, render с
    // <wbr> используется только для визуального переноса. Pagination
    // одинакова между Firefox и Chrome (через wbr в render), Translate
    // видит чистые слова (через source без wbr).
    //
    // Раньше (X-BROWSER-3) использовался walkWbrOnly, который ставил
    // <wbr> прямо в основном потоке. Это ломало Translate: он сегмен-
    // тировал слова по wbr и переводил куски как отдельные слова,
    // вставляя пробелы перед пунктуацией ("coepit , et"). Дублирующая
    // обёртка (X-BROWSER-6) решает обе задачи одновременно.
    const topNodes = Array.from(root.childNodes);
    for (let i = 0; i < topNodes.length; i++) {
      const n = topNodes[i];
      if (n.nodeType !== 1) continue;
      if (n.classList && n.classList.contains('marginalia')) continue;
      walkWrapLongWords(n);
    }
  }

  function runJitter() {
    // PATCH X-BROWSER-3: фаза 0 теперь делает всю обработку текста
    // (включая walkJitter) ДО пагинации. К моменту resize маргиналии
    // уже jittered и wbr'ed, повторный walkJitter удвоил бы ink-l
    // span'ы (walkJitter не идемпотентен). Поэтому здесь оставляем
    // только пере-позиционирование, которое нужно при изменении
    // ширины окна.
    positionMarginalia();
  }

  // ═════════════════════════════════════════════════════════════════
  // PATCH D1: запекание ghost-слоя.
  // Идея: реальный пергамент тонкий, текст с обратной стороны слабо
  // просвечивает. Делаем это через canvas: проходим по text node'ам
  // verso, для каждого слова берём bounding rect (Range API), рисуем
  // canvas.fillText в той же позиции тем же шрифтом. Затем зеркалим,
  // блюрим, переводим в PNG и кладём как background на recto.
  // Пергамент, иллюминации, маргиналии-якоря — исключаются из ghost.
  // ═════════════════════════════════════════════════════════════════

  const GHOST_W = 620, GHOST_H = 820;

  // Элементы, которые НЕ просвечивают сквозь пергамент
  const GHOST_EXCLUDE = {
    classes: [
      'parchment-bg', 'illuminated-initial', 'arbor-vitae', 'arbor-argentea',
      'folio-number', 'foliator-note', 'catchword', 'ws', 'blob', 'ink-drip', 'ghost-layer', 'big-initial',
      // PATCH TR: source-слой — visually-hidden 1×1, его геометрия не
      // соответствует видимому положению текста; рисовать его в ghost
      // нельзя (получились бы артефактные кляксы у края страницы).
      'mg-translate-source',
      // PATCH TR3: то же для visually-hidden source-span'ов рядом с
      // abbr в основном тексте — 1×1 не должны попадать в ghost.
      'abbr-translate-source',
    ],
    tags: { STYLE: 1, SCRIPT: 1, SVG: 1 },
  };

  function isGhostExcluded(el) {
    while (el && el.nodeType === 1) {
      if (GHOST_EXCLUDE.tags[el.tagName]) return true;
      if (el.classList) {
        for (let i = 0; i < GHOST_EXCLUDE.classes.length; i++) {
          if (el.classList.contains(GHOST_EXCLUDE.classes[i])) return true;
        }
      }
      el = el.parentNode;
    }
    return false;
  }

  function bakeOneGhost(versoFolio, targetFolio) {
    if (!versoFolio) return { url: null, words: 0 };

    const folioRect = versoFolio.getBoundingClientRect();
    if (folioRect.width < 50 || folioRect.height < 50) {
      return { url: null, words: 0 };
    }

    const canvas = document.createElement('canvas');
    canvas.width = GHOST_W;
    canvas.height = GHOST_H;
    const ctx = canvas.getContext('2d');
    if (!ctx) return { url: null, words: 0 };

    // Цвет берётся из getComputedStyle каждого фрагмента — так
    // киноварные рубрики (rgb из ~#7a1808) рисуются красным, основной
    // текст iron gall — тёплым коричневым. Финальное затухание идёт
    // через globalAlpha при перерисовке во второй canvas + CSS opacity.
    ctx.textBaseline = 'alphabetic';

    const sx = GHOST_W / folioRect.width;
    const sy = GHOST_H / folioRect.height;

    const walker = document.createTreeWalker(
      versoFolio, NodeFilter.SHOW_TEXT, null, false
    );
    let node;
    let wordsDrawn = 0;
    while ((node = walker.nextNode())) {
      const text = node.nodeValue;
      if (!/\S/.test(text)) continue;
      if (isGhostExcluded(node.parentNode)) continue;

      const parent = node.parentNode;
      const cs = window.getComputedStyle(parent);
      const fSize = parseFloat(cs.fontSize);
      if (!isFinite(fSize) || fSize < 5) continue;

      const fFamily = cs.fontFamily;
      const fWeight = cs.fontWeight || 'normal';
      const fStyle = cs.fontStyle || 'normal';
      ctx.font = fStyle + ' ' + fWeight + ' ' + fSize + 'px ' + fFamily;
      ctx.fillStyle = cs.color || 'rgb(30, 18, 6)';

      const re = /(\S+)/g;
      let m;
      while ((m = re.exec(text)) !== null) {
        const word = m[1];
        const start = m.index;
        const end = start + word.length;
        const r = document.createRange();
        try {
          r.setStart(node, start);
          r.setEnd(node, end);
        } catch (e) { continue; }
        const rect = r.getBoundingClientRect();
        if (rect.width < 0.5) continue;
        if (rect.bottom < folioRect.top || rect.top > folioRect.bottom) continue;
        const x = (rect.left - folioRect.left) * sx;
        const y = (rect.bottom - folioRect.top - fSize * 0.18) * sy;
        ctx.fillText(word, x, y);
        wordsDrawn++;
      }
    }

    if (wordsDrawn === 0) return { url: null, words: 0 };

    // Финальный canvas: blur + mirror + alpha
    const final = document.createElement('canvas');
    final.width = GHOST_W;
    final.height = GHOST_H;
    const fctx = final.getContext('2d');
    fctx.filter = 'blur(1.4px)';
    fctx.translate(GHOST_W, 0);
    fctx.scale(-1, 1);
    fctx.globalAlpha = 0.42;
    fctx.drawImage(canvas, 0, 0);

    // PATCH D2: физическое маскирование иллюминаций.
    // В реальном пергаменте плотный слой гессо/левкаса под пигментом и
    // золотой фольгой делает страницу локально непрозрачной — show-through
    // в этих местах прерывается. Вырезаем регионы иллюминаций target-folio
    // из ghost через destination-out. Запас 4px компенсирует чуть-чуть
    // выступающие за bbox узлы триквет и подвески капителей.
    if (targetFolio) {
      const targetRect = targetFolio.getBoundingClientRect();
      if (targetRect.width >= 50 && targetRect.height >= 50) {
        const txs = GHOST_W / targetRect.width;
        const tys = GHOST_H / targetRect.height;
        const exclSel = '.illuminated-initial, .big-initial, ' +
                        '.arbor-vitae, .arbor-argentea';
        const excls = targetFolio.querySelectorAll(exclSel);
        // Сбрасываем mirror+blur+alpha перед маскированием — иначе
        // destination-out отработает в зеркальной системе координат.
        fctx.setTransform(1, 0, 0, 1, 0, 0);
        fctx.filter = 'none';
        fctx.globalAlpha = 1;
        fctx.globalCompositeOperation = 'destination-out';
        for (let i = 0; i < excls.length; i++) {
          const r = excls[i].getBoundingClientRect();
          const x = (r.left - targetRect.left) * txs;
          const y = (r.top  - targetRect.top ) * tys;
          const w = r.width  * txs;
          const h = r.height * tys;
          fctx.fillRect(x - 4, y - 4, w + 8, h + 8);
        }
        fctx.globalCompositeOperation = 'source-over';
      }
    }

    try {
      return { url: final.toDataURL('image/png'), words: wordsDrawn };
    } catch (e) {
      return { url: null, words: 0 };
    }
  }

  async function bakeVersoGhosts() {
    // Дождаться всех custom-шрифтов, иначе canvas.fillText
    // нарисует в Times-fallback.
    if (document.fonts && document.fonts.ready) {
      try { await document.fonts.ready; } catch (e) { /* ignore */ }
    }

    const allFolios = Array.from(document.querySelectorAll('.spread .folio'));
    let baked = 0, totalWords = 0, skipped = 0;

    // PATCH E структура: лист 1: recto = carpet (allFolios[1]),
    // verso = blank-after-carpet (allFolios[2]). Лист 2: recto = incipit
    // (allFolios[3]), verso = page 2 (allFolios[4]). И так далее.
    // Пары одного физического листа — (allFolios[1], allFolios[2]),
    // (allFolios[3], allFolios[4]), ..., начиная с i=1.
    // allFolios[0] = cover-blank — orphan (нет партнёра, до карпета).
    // Последний folio (final или fallback-blank) тоже orphan.

    function injectGhost(folio, dataUrl) {
      const div = document.createElement('div');
      div.className = 'ghost-layer';
      div.style.backgroundImage = 'url(' + dataUrl + ')';
      const content = folio.querySelector('.folio-content');
      if (content) folio.insertBefore(div, content);
      else folio.appendChild(div);
    }

    for (let i = 1; i + 1 < allFolios.length; i += 2) {
      const folioR = allFolios[i];      // recto листа
      const folioV = allFolios[i + 1];  // verso того же листа

      // Bake R → ghost на V (V просвечивает recto того же листа)
      const r1 = bakeOneGhost(folioR, folioV);
      if (r1.url) { injectGhost(folioV, r1.url); baked++; totalWords += r1.words; }
      else { skipped++; }

      // Bake V → ghost на R (R просвечивает verso того же листа)
      const r2 = bakeOneGhost(folioV, folioR);
      if (r2.url) { injectGhost(folioR, r2.url); baked++; totalWords += r2.words; }
      else { skipped++; }
    }

    // PATCH G: текстовый ghost от standalone-обложек на их физических
    // партнёров. carpet и final выведены из spread-flow патчем F и не
    // попадают в основной цикл; запекаем их явно.
    if (allFolios.length > 0) {
      var standaloneCarpet = document.querySelector('.folio-cover-front .folio');
      if (standaloneCarpet) {
        var rC = bakeOneGhost(standaloneCarpet, allFolios[0]);
        if (rC.url) { injectGhost(allFolios[0], rC.url); baked++; totalWords += rC.words; }
        else { skipped++; }
      }
      var standaloneFinal = document.querySelector('.folio-cover-back .folio');
      if (standaloneFinal) {
        var rF = bakeOneGhost(standaloneFinal, allFolios[allFolios.length - 1]);
        if (rF.url) { injectGhost(allFolios[allFolios.length - 1], rF.url); baked++; totalWords += rF.words; }
        else { skipped++; }
      }
    }
    console.log('[D1 ghost] baked: ' + baked + ' folios, ' +
                totalWords + ' words total, skipped: ' + skipped);
  }

  // ═════════════════════════════════════════════════════════════════
  // PATCH B3: активация .blob и .ink-drip — кляксы тяготеют к полям
  // (там, где писец обмакивал перо). Около 30% страниц без артефактов
  // (писец работал аккуратно), остальные — 1–2 кляксы. Иногда — потёк
  // вниз. Seeded RNG: один и тот же кодекс всегда даёт ту же раскладку.
  // ═════════════════════════════════════════════════════════════════
  function addInkArtifacts() {
    const rng = seeded(0xB10B17);
    const folios = document.querySelectorAll(
      '.folio:not(.incipit-verso):not(.final-recto)'
    );
    folios.forEach(function(folio) {
      // 30% страниц чистые
      if (rng() < 0.30) return;
      const count = (rng() < 0.70) ? 1 : 2;
      for (let i = 0; i < count; i++) {
        const blob = document.createElement('div');
        blob.className = 'blob';
        const size = 3 + Math.floor(rng() * 7);
        // Тяготение к полям: 50/50 левое/правое поле
        const x = (rng() < 0.5)
          ? 0.04 + rng() * 0.12
          : 0.84 + rng() * 0.12;
        const y = 0.10 + rng() * 0.78;
        const opacity = 0.35 + rng() * 0.30;
        const rot = (rng() * 360).toFixed(0);
        blob.style.cssText =
          'left:' + (x * 100).toFixed(1) + '%;' +
          'top:' + (y * 100).toFixed(1) + '%;' +
          'width:' + size + 'px;' +
          'height:' + size + 'px;' +
          'background:rgba(20,12,3,' + opacity.toFixed(2) + ');' +
          'border-radius:' + (40 + Math.floor(rng() * 60)) + '% ' +
                             (40 + Math.floor(rng() * 60)) + '% ' +
                             (40 + Math.floor(rng() * 60)) + '% ' +
                             (40 + Math.floor(rng() * 60)) + '%;' +
          'transform:rotate(' + rot + 'deg);';
        folio.appendChild(blob);
        // 18% шанс потёка вниз
        if (rng() < 0.18) {
          const drip = document.createElement('div');
          drip.className = 'ink-drip';
          const dripH = 4 + Math.floor(rng() * 14);
          drip.style.cssText =
            'left:calc(' + (x * 100).toFixed(1) + '% + ' + (size / 2).toFixed(1) + 'px);' +
            'top:calc(' + (y * 100).toFixed(1) + '% + ' + (size / 2).toFixed(0) + 'px);' +
            'height:' + dripH + 'px;' +
            'width:1.5px;';
          folio.appendChild(drip);
        }
      }
    });
  }

  // ═════════════════════════════════════════════════════════════════
  // PATCH A: назначение вариантов пергамента.
  // Каждый разворот в нашей UI показывает обе стороны одного листа
  // (recto LEFT, verso RIGHT). На реальном листе одна сторона hair,
  // другая flesh — поэтому ВНУТРИ разворота: pair (H,F) или (F,H).
  // Между листами recto-сторона чередуется H/F/H/F (правило Грегори
  // для соседних листов в quire). Выбор 1-из-6 внутри группы —
  // детерминированный (seeded RNG), один и тот же кодекс всегда
  // выглядит одинаково при перерендере.
  // ═════════════════════════════════════════════════════════════════
  function assignParchmentVariants() {
    const parchRng = seeded(0xC0DE42);
    const spreads = document.querySelectorAll('.spread');
    spreads.forEach(function(spread, i) {
      const folios = spread.querySelectorAll('.folio');
      if (folios.length < 2) return;
      // Структура с PATCH F (carpet/final standalone, вне spread-flow):
      //   Spread 0 = (blank-after-carpet, incipit) = HH (правило Грегори)
      //   Spread 1 = (page 2, page 3)              = FF
      //   Spread 2 = (page 4, page 5)              = HH
      //   Spread 3 = (page 6, page 7)              = FF
      //   ...
      // i чётное → HH, i нечётное → FF.
      const isHair = (i % 2 === 0);
      const prefix = isHair ? 'parch-h' : 'parch-f';
      folios[0].classList.add(prefix + (Math.floor(parchRng() * 6) + 1));
      folios[1].classList.add(prefix + (Math.floor(parchRng() * 6) + 1));
    });
  }

  // ═════════════════════════════════════════════════════════════════
  // PATCH H: gesso ground под иллюминированный инициал.
  // Проблема: первый <rect> в SVG инициала — золотистая подложка
  // с fill-opacity="0.35", прозрачная на 65%. Через неё парчмент-фон
  // (включая фолликулы на hair-варианте) просвечивает в область,
  // где должна была бы быть сплошная живопись. В реальной книжной
  // живописи под красочным слоем была меловая или гипсовая грунтовка
  // (gesso preparation), непрозрачная, и она блокировала любые
  // свойства пергамента. Эмулируем это: добавляем непрозрачный rect
  // как первый ребёнок SVG (рендерится ПОД всеми существующими
  // элементами). Цвет совпадает с дефолтным parchment background-
  // color #ccb98c, поэтому видимый цвет инициала на дефолтном
  // пергаменте сохраняется буквально один-в-один; на h/f-вариантах
  // отличие 3–8% (что исторически тоже точно — gesso не подгонялся
  // в тон пергаменту). Геометрия 1,1–98,98,rx=2 совпадает с
  // существующим золотым rect → не меняет видимую границу.
  // ═════════════════════════════════════════════════════════════════
  function addInitialGround() {
    const SVGNS = 'http://www.w3.org/2000/svg';
    const svgs = document.querySelectorAll('.illuminated-initial svg');
    svgs.forEach(function(svg) {
      const ground = document.createElementNS(SVGNS, 'rect');
      ground.setAttribute('x', '1');
      ground.setAttribute('y', '1');
      ground.setAttribute('width', '98');
      ground.setAttribute('height', '98');
      ground.setAttribute('rx', '2');
      ground.setAttribute('fill', '#ccb98c');
      ground.setAttribute('pointer-events', 'none');
      if (svg.firstChild) svg.insertBefore(ground, svg.firstChild);
      else svg.appendChild(ground);
    });
  }

  // ═══════════════════════════════════════════════════════════════
  // Запуск: шрифты → пагинация → рендер → маргиналии → jitter → fade-in.
  // ═══════════════════════════════════════════════════════════════
  async function run() {
    // Шрифты. document.fonts.ready резолвится ТОЛЬКО для тех шрифтов,
    // которые уже запрошены на рендер к моменту вызова. Шрифты,
    // объявленные через @font-face, но пока не использованные ни одним
    // видимым элементом, в эту гарантию НЕ входят. Пагинатор работает
    // в невидимом measurer — и если мы положимся на fonts.ready,
    // измерения идут в fallback-шрифте (Georgia/serif), который имеет
    // другие метрики. В результате каждый P в реальности на ~27px
    // выше расчётного (шрифт Kells шире, строки длиннее/больше),
    // и страницы переполняются, особенно ближе к концу.
    //
    // Решение: явно форсируем загрузку ключевых шрифтов через
    // document.fonts.load() — это и обещает браузеру, что шрифт нужен,
    // и возвращает promise, разрешающийся после его загрузки.
    if (document.fonts) {
      const families = [
        '"0800 Kells"',
        '"0746 Beda"',
        '"0550 Uncialis"',
        '"0800 Remedius"',
        '"Uncial Antiqua"',
      ];
      const probes = [];
      for (const f of families) {
        try { probes.push(document.fonts.load('1em ' + f)); } catch (e) {}
        try { probes.push(document.fonts.load('italic 1em ' + f)); } catch (e) {}
        try { probes.push(document.fonts.load('bold 1em ' + f)); } catch (e) {}
      }
      try { await Promise.all(probes); } catch (e) { /* ignore */ }
      try { await document.fonts.ready; } catch (e) { /* ignore */ }
    }

    const sourceTpl = document.getElementById('codex-source');

    // ── Фаза 0 (PATCH X-BROWSER-3): обработка template ДО пагинации ──
    // Раньше applyAbbreviations / decorateTituli / addAbbrTranslateSources /
    // splitMarginaliaForTranslate / walkJitter / walkWbrOnly шли ПОСЛЕ
    // pagination — на уже отрендеренной книге. Это работало, но
    // pagination измеряла ИСХОДНЫЙ template без abbr и без wbr —
    // и hyphens: auto в Firefox разрывал длинные слова, а в Chrome
    // (нет словаря для lang="la") нет, что давало рассинхрон в одну
    // строку на каждом длинном абзаце и накопительно — расхождение
    // в 1-2 страницы между средами.
    //
    // Теперь обработка идёт на template до измерения. Pagination
    // получает ровно тот текст, который окажется в DOM, со всеми
    // <wbr> внутри. Оба движка переносят на одних и тех же явных
    // break-opportunities — измерения совпадают, страницы совпадают.
    preprocessSourceTemplate();

    const blocks = [];
    sourceTpl.content.childNodes.forEach(function(n) {
      if (n.nodeType === 1) blocks.push(n);
    });

    const measurer = createMeasurer();
    document.body.appendChild(measurer);
    const measurerContent = measurer.querySelector('.folio-content');
    const lineHeight = measureLineHeight(measurerContent);

    const t0 = performance.now();
    const pages = paginate(blocks, measurerContent, lineHeight);
    const t1 = performance.now();

    measurer.remove();

// ── Фаза 1: построение DOM книги ──
    // Все вставки и присвоения классов до первого layout read.
    renderBook(pages);
    try { assignParchmentVariants(); } catch (e) { console.error('Patch A failed:', e); }
    try { addInitialGround(); } catch (e) { console.error('Patch H failed:', e); }

    // ── Фаза 1.5 убрана: applyAbbreviations / decorateTituli /
    //     addAbbrTranslateSources перенесены в фазу 0 (см. preprocessSourceTemplate).

    // ── Фаза 2 (сокращена): только layout-зависимые DOM-мутации ──
    //   normalizeMarginaliaBreaks / splitMarginalia / walkJitter / walkWbrOnly
    //   перенесены в фазу 0. Здесь остаются:
    //     addInkArtifacts: чернильные blob/drip на полях фолио (нужен layout)
    //     setupTranslationObserver: observer для активации перевода
    try { addInkArtifacts(); } catch (e) { console.error('Patch B3 failed:', e); }
    try { setupTranslationObserver(); } catch (e) { console.error('Patch TR observer failed:', e); }

    // ── Фаза 3: единственный read/write проход по геометрии ──
    // Здесь происходит forced layout flush — но всего один, на всю
    // подготовку. Сама positionMarginalia реструктурирована в
    // read-all → compute → write-all, без thrashing внутри overlap-loop.
    positionMarginalia();
    try { attachCatchwords(); } catch (e) { console.error('Catchwords failed:', e); }

    // ── Фаза 4: async-задачи, которым нужна стабильная геометрия ──
    // bakeVersoGhosts читает getBoundingClientRect() каждого слова
    // через Range API; запускается fire-and-forget, рисует в офскрин
    // canvas и навешивает background на recto, не двигая основной DOM.
    bakeVersoGhosts().catch(function(e) { console.error('Patch D1 failed:', e); });

    document.body.classList.add('ready');

    if (window.console) {
      console.log('Codex paginated in ' + (t1 - t0).toFixed(0) +
                  ' ms → ' + pages.length + ' content pages');
    }

    // Репозиционирование при resize. Дебаунс 150 мс — типичное
    // дрожание при ротации экрана / DevTools resize не должно
    // вызывать каскад reflow'ов.
    //
    // На mobile-ветке (max-width: 940px) маргиналии становятся
    // position: static, и top, выставленный positionMarginalia,
    // полностью игнорируется. Чтобы не платить за бесполезный
    // forced layout — ранний выход.
    let resizeT = null;
    window.addEventListener('resize', function() {
      clearTimeout(resizeT);
      resizeT = setTimeout(function() {
        if (window.matchMedia('(max-width: 940px)').matches) return;
        positionMarginalia();
        try { attachCatchwords(); } catch (e) {}
      }, 150);
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', run);
  } else {
    run();
  }

  document.addEventListener('pointerdown', function(e) {
    const inMg = e.target && e.target.closest && e.target.closest('.marginalia');
    document.body.classList.toggle('mg-selectable', !!inMg);
  });

})();
</script>
</body>
</html>
