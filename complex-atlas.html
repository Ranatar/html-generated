        function findZeros(f, xmin, xmax, ymin, ymax) {
          const fp = (z) => derivative(f, z),
            found = [];
          const nx = 14,
            ny = 14;
          for (let i = 0; i < nx; i++)
            for (let j = 0; j < ny; j++) {
              let z = C(
                xmin + ((xmax - xmin) * (i + 0.5)) / nx,
                ymin + ((ymax - ymin) * (j + 0.5)) / ny,
              );
              let ok = false;
              for (let k = 0; k < 60; k++) {
                const fz = f(z);
                if (!isFiniteC(fz)) break;
                if (abs(fz) < 1e-12) {
                  ok = true;
                  break;
                }
                const d = fp(z);
                if (abs(d) < 1e-14) break;
                const step = div(fz, d);
                z = sub(z, step);
                if (abs(step) < 1e-13) {
                  ok = abs(f(z)) < 1e-7;

                ok &&
                z.re >= xmin - 0.1 &&
                z.re <= xmax + 0.1 &&
                z.im >= ymin - 0.1 &&
                z.im <= ymax + 0.1

                if (!found.some((w) => abs(sub(w, z)) < 1e-5)) found.push(z);
            }

        function findCritical(f, xmin, xmax, ymin, ymax) {
          const fp = (z) => derivative(f, z);
          return findZeros(fp, xmin, xmax, ymin, ymax).filter((z) => {
            const w = f(z);
            return w && isFiniteC(w) && abs(w) > 1e-6 && abs(w) < 1e6;

        }

        if (!state.interpLog) return C((1 - t) * ar + t * br, (1 - t) * ai + t * bi);

          rb = Math.hypot(br, bi);
        if (!(ra > 0) || !(rb > 0) || !isFinite(ra) || !isFinite(rb))

          d = Math.atan2(bi, br) - ta;

      async function exportAnimWebM(cv, fname, drawFrame, loop, speed, btnEl) {

          alert("Запись WebM не поддерживается этим браузером.");
          return;
        }

        if (MediaRecorder.isTypeSupported) {
          if (MediaRecorder.isTypeSupported("video/webm;codecs=vp9"))
            mime = "video/webm;codecs=vp9";

            mime = "video/webm;codecs=vp8";
        }

          if (e.data && e.data.size) chunks.push(e.data);

          rec.onstop = r;
        });

        if (btnEl) {

          for (let k = 0; k <= pass; k++) {
            drawFrame(a + ((bb - a) * k) / pass);
            await wait(1000 / fps);

        await wait(250);
        rec.stop();
        await done;

          url = URL.createObjectURL(blob);

        a.href = url;
        a.download = fname;

        a.click();
        a.remove();
        setTimeout(() => URL.revokeObjectURL(url), 2000);

      // A6: тепловая карта по log|f − Σₙ| (тёмно-синее — точно, красное — расходится).

          [240, 220, 60],

          H = cv.height;
        ctx.save();
        const col = kind === "deriv" ? "rgba(255,196,120,.76)" : "rgba(125,209,255,.72)";
        ctx.strokeStyle = col;
        ctx.fillStyle = col;
        ctx.lineWidth = 1;
        const step = Math.max(28, Math.min(W, H) / 18),
          L = step * 0.46;
        for (let py = step / 2; py < H; py += step)
          for (let px = step / 2; px < W; px += step) {
            const z = C(v.cx + (px - W / 2) * v.scale, v.cy - (py - H / 2) * v.scale);
            let ux, uy;
            if (kind === "polya") {
              const w = safe(f, z);
              if (!w || !isFiniteC(w)) continue;
              ux = w.re;
              uy = -w.im; // conj(f), плоскость y вверх
            } else {
              const d = tryc(() => derivative(f, z));
              if (!d || !isFiniteC(d)) continue;
              ux = d.re;
              uy = d.im; // направление f′
            }
            const m = Math.hypot(ux, uy);
            if (m < 1e-12) continue;
            ux /= m;
            uy /= m;
            const sx = ux * L,
              sy = -uy * L; // в экранные пиксели (y вниз)
            arrowHead(ctx, px - sx / 2, py - sy / 2, px + sx / 2, py + sy / 2, 3.5);
          }
        ctx.restore();
      }
      // A7: оверлей линий разреза. Численно ищем точки, где ГЛАВНАЯ ветвь f(z) разрывна:
      // на разрезе односторонний скачок асимметричен (с одной стороны — резкий прыжок, с другой — гладко),
      // что отличает разрез от полюса (симметричный рост) и от крутого, но непрерывного градиента.
      function branchCutOverlay(ctx, cv, v) {
        if (!state.branchCuts) return;
        const f = curF(),
          W = cv.width,
          H = cv.height,
          step = 2,
          h = v.scale;
        ctx.save();
        for (let py = 0; py < H; py += step)
          for (let px = 0; px < W; px += step) {
            const x = v.cx + (px - W / 2) * v.scale,
              y = v.cy - (py - H / 2) * v.scale;
            const f0 = safe(f, C(x, y));
            if (!f0 || !isFiniteC(f0)) continue;
            let hit = false;
            for (let a = 0; a < 2 && !hit; a++) {
              const fp = safe(f, a ? C(x, y + h) : C(x + h, y)),
                fm = safe(f, a ? C(x, y - h) : C(x - h, y));
              if (!fp || !fm || !isFiniteC(fp) || !isFiniteC(fm)) continue;
              const d1 = Math.hypot(fp.re - f0.re, fp.im - f0.im),
                d2 = Math.hypot(f0.re - fm.re, f0.im - fm.im),
                big = Math.max(d1, d2),
                small = Math.min(d1, d2),
                mag = Math.max(abs(f0), abs(fp), abs(fm));
              if (big > 0.5 && small < 0.34 * big && mag < 1e4) hit = true;
            }
            if (hit) {
              ctx.fillStyle = "rgba(10,12,18,.85)";
              ctx.fillRect(px - 1, py - 1, 3, 3);
              ctx.fillStyle = "rgba(255,238,130,.95)";
              ctx.fillRect(px - 1, py - 1, 2, 2);
            }
          }
        ctx.restore();
      }

      /* ═══════════ Аналитическое продолжение (перецентровка Вейерштрасса) ═══════════ */
      // Коэффициенты Тейлора по интегралу Коши, сдвиг центра синтетическим делением,
      // радиус сходимости по хвосту; продолжение вдоль пути с сохранением ветви (монодромия).
      const _wcSample = (f, c, r, N) => {
        const v = new Array(N);
        for (let k = 0; k < N; k++) {
          const th = (2 * Math.PI * k) / N;
          const w = safe(f, C(c.re + r * Math.cos(th), c.im + r * Math.sin(th)));
          v[k] = w && isFiniteC(w) ? w : C(NaN, NaN);
        }
        return v;
      };
      const _wcCoeffs = (v, r, M) => {
        const N = v.length, a = new Array(M + 1);
        for (let n = 0; n <= M; n++) {
          let s = ZERO;
          for (let k = 0; k < N; k++) {
            const ph = (-2 * Math.PI * k * n) / N;
            s = add(s, mul(v[k], C(Math.cos(ph), Math.sin(ph))));
          }
          a[n] = scale(s, 1 / (N * Math.pow(r, n)));
        }
        return a;
      };
      const _wcCut = (v) => {
        const N = v.length, j = new Array(N);
        for (let k = 0; k < N; k++) j[k] = abs(sub(v[k], v[(k - 1 + N) % N]));
        const s = [...j].sort((a, b) => a - b);
        return s[N - 1] > 10 * s[N >> 1] + 1e-9;
      };
      const _wcShift = (a, delta) => {
        let c = a.slice(); const b = new Array(a.length); let bi = 0;
        while (c.length > 0) {
          const m = c.length - 1;
          if (m === 0) { b[bi++] = c[0]; break; }
          const q = new Array(m);
          q[m - 1] = c[m];
          for (let i = m - 1; i >= 1; i--) q[i - 1] = add(c[i], mul(delta, q[i]));
          b[bi++] = add(c[0], mul(delta, q[0]));
          c = q;
        }
        return b;
      };
      const _wcRadius = (a) => {
        const mag = a.map(abs), mx = Math.max(...mag);
        if (!(mx > 0) || !isFinite(mx)) return Infinity;
        const floor = mx * 1e-12, idx = [];
        for (let n = 0; n < mag.length; n++) if (mag[n] > floor) idx.push(n);
        if (idx.length < 4) return Infinity;
        const lo = idx[Math.floor(idx.length / 2)];
        let sum = 0, cnt = 0;
        for (let n = lo; n + 1 < mag.length; n++)
          if (mag[n] > floor && mag[n + 1] > floor) { sum += Math.log(mag[n] / mag[n + 1]); cnt++; }
        return cnt ? Math.exp(sum / cnt) : Infinity;
      };
      const _wcSnapRoot = (l, tol = 0.2) => {
        if (Math.abs(abs(l) - 1) > tol) return l;
        let best = l, bd = tol;
        for (let n = 1; n <= 12; n++) for (let k = 0; k < n; k++) {
          const w = C(Math.cos((2 * Math.PI * k) / n), Math.sin((2 * Math.PI * k) / n));
          const d = abs(sub(l, w)); if (d < bd) { bd = d; best = w; }
        }
        return best;
      };
      const _wcSnapOff = (o, tol = 0.3) => {
        const k = Math.round(o.im / (2 * Math.PI)), t = C(0, 2 * Math.PI * k);
        return abs(sub(o, t)) < tol ? t : abs(o) < tol ? ZERO : o;
      };
      // продолжение f вдоль ломаной path; шаг по длине дуги ~msf·R; сохраняет ветвь
      function weierstrassPath(f, path, opts) {
        opts = opts || {};
        const N = opts.N || 160, M = opts.M || 24, msf = opts.msf || 0.3, snap = opts.snap !== false;
        let seedR = opts.seedR || 0.5, g = null;
        for (let att = 0; att < 5; att++) {
          const sv = _wcSample(f, path[0], seedR, N);
          if (sv.every(isFiniteC) && !_wcCut(sv)) { const gg = _wcCoeffs(sv, seedR, M); if (gg.every(isFiniteC)) { g = gg; break; } }
          seedR *= 0.5;
        }
        if (!g) return null;
        const cum = [0];
        for (let i = 1; i < path.length; i++) cum.push(cum[i - 1] + abs(sub(path[i], path[i - 1])));
        const L = cum[cum.length - 1];
        if (!(L > 0)) return null;
        const at = (s) => {
          if (s <= 0) return path[0];
          if (s >= L) return path[path.length - 1];
          let i = 1; while (i < cum.length - 1 && cum[i] < s) i++;
          const den = cum[i] - cum[i - 1] || 1, t = (s - cum[i - 1]) / den;
          return add(scale(path[i - 1], 1 - t), scale(path[i], t));
        };
        const seed0 = g.slice();
        let cur = path[0], curR = _wcRadius(g), s = 0, guard = 0, sheet = 0;
        let prevLam = ONE, prevOff = ZERO;
        const steps = [{ center: cur, value: g[0], radius: curR, cut: false }];
        while (s < L - 1e-9 && guard++ < 20000) {
          const Rf = isFinite(curR) && curR > 0 ? Math.min(curR, 8) : 4;
          const ds = Math.min(msf * Rf, L - s), cnew = at(s + ds), delta = sub(cnew, cur);
          const r = Math.max(1e-6, 0.45 * (Rf - abs(delta)));
          const v = _wcSample(f, cnew, r, N);
          let cut = false;
          if (v.every(isFiniteC) && !_wcCut(v)) {
            const gT = _wcCoeffs(v, r, M), gS = _wcShift(g, delta);
            const tol = 1e-9 * (abs(gT[0]) + abs(gT[1]) + 1);
            let k = 1; while (k < gT.length && abs(gT[k]) < tol) k++;
            let lam = k < gT.length && abs(gT[k]) > tol ? div(gS[k], gT[k]) : ONE;
            if (snap) lam = _wcSnapRoot(lam);
            const cand = gT.map((c) => mul(lam, c));
            let off = sub(gS[0], mul(lam, gT[0])); if (snap) off = _wcSnapOff(off);
            cand[0] = add(mul(lam, gT[0]), off);
            // смена листа — когда ветвь-фактор λ (или лог-сдвиг) МЕНЯЕТСЯ относительно предыдущего шага
            if (abs(sub(lam, prevLam)) > 1e-6 || abs(sub(off, prevOff)) > 1e-6) { sheet++; cut = true; }
            prevLam = lam; prevOff = off;
            g = cand; curR = _wcRadius(gT);
          } else { g = _wcShift(g, delta); }
          cur = cnew; s += ds;
          steps.push({ center: cur, value: g[0], radius: curR, cut });
        }
        let monodromy = null;
        if (abs(sub(cur, path[0])) < 1e-6)
          monodromy = { startValue: seed0[0], endValue: g[0], ratio: div(g[0], seed0[0]), diff: sub(g[0], seed0[0]) };
        return { steps, coeffs: g, monodromy, sheet };
      }

      /* — продолжение Вейерштрасса: путь и запуск — */
      function contRun() {
        const P = state.cont.path;
        state.cont.result = null;
        if (P.length >= 2) {
          const f = curF();
          let span = 0;
          for (const q of P) span = Math.max(span, abs(sub(q, P[0])));
          if (!(span > 0)) span = abs(sub(P[1], P[0])) || 0.5;
          const seedR = Math.max(1e-4, state.cont.seedFrac * span);
          try { state.cont.result = weierstrassPath(f, P, { seedR, M: 24, N: 160, msf: state.cont.msf, snap: state.cont.snap }); }
          catch (e) { state.cont.result = null; }
        }
        contShowWeier(); analysisRedraw();
      }
      function contAddPoint(z) {
        const P = state.cont.path, last = P[P.length - 1];
        if (last && abs(sub(last, z)) < 1e-9) return;
        P.push(C(z.re, z.im)); contRun();
      }
      function contCloseLoop() { const P = state.cont.path; if (P.length >= 2) { P.push(C(P[0].re, P[0].im)); contRun(); } }
      function contUndo() { state.cont.path.pop(); contRun(); }
      function contReset() {
        state.cont.path = []; state.cont.result = null; state.cont.pade = null; state.cont.padeCenter = null; state.cont.boundary = null;
        analysisRedraw();
      }
      function _fmtC(z, d = 4) {
        if (!z || !isFiniteC(z)) return "—";
        return `${z.re.toFixed(d)} ${z.im < 0 ? "−" : "+"} ${Math.abs(z.im).toFixed(d)}i`;
      }
      function contShowWeier() {
        const res = state.cont.result, P = state.cont.path;
        if (!res || res.steps.length < 2) {
          showResults("продолжение Вейерштрасса", [[P.length < 2 ? "кликами задайте путь" : "не удалось (старт у особенности?)", "", "muted"]]);
          return;
        }
        const last = res.steps[res.steps.length - 1];
        const rows = [
          ["значение в конце", _fmtC(last.value), "teal"],
          ["радиус сходимости", isFinite(last.radius) ? last.radius.toPrecision(3) : "∞", ""],
          ["смен листа", String(res.sheet), res.sheet ? "warm" : ""],
        ];
        if (res.monodromy) {
          const m = res.monodromy;
          if (abs(m.startValue) > 1e-6) rows.push(["монодромия ×", _fmtC(m.ratio), "warm"]);
          rows.push(["монодромия +", _fmtC(m.diff), "warm"]);
        }
        showResults("продолжение Вейерштрасса", rows);
      }

      /* — Паде [m/n]: рациональное продолжение; полюса Q выявляют особенности — */
      const _cSolve = (A, b) => {
        const n = b.length, M = A.map((r, i) => r.slice().concat([b[i]]));
        for (let col = 0; col < n; col++) {
          let piv = col, best = abs(M[col][col]);
          for (let r = col + 1; r < n; r++) { const mm = abs(M[r][col]); if (mm > best) { best = mm; piv = r; } }
          if (best < 1e-30) return null;
          const t = M[col]; M[col] = M[piv]; M[piv] = t;
          const d = M[col][col];
          for (let j = col; j <= n; j++) M[col][j] = div(M[col][j], d);
          for (let r = 0; r < n; r++) { if (r === col) continue; const fac = M[r][col]; for (let j = col; j <= n; j++) M[r][j] = sub(M[r][j], mul(fac, M[col][j])); }
        }
        return M.map((r) => r[n]);
      };
      const _polyEvalA = (co, z) => { let s = co[co.length - 1] || ZERO; for (let i = co.length - 2; i >= 0; i--) s = add(mul(s, z), co[i]); return s; };
      // корни комплексного полинома методом Дюрана–Кернера (он же метод Вейерштрасса — тематично)
      const _polyRoots = (co) => {
        let d = co.length - 1; while (d > 0 && abs(co[d]) < 1e-14) d--;
        if (d < 1) return [];
        const a = co.slice(0, d + 1).map((c) => div(c, co[d]));
        let roots = []; for (let k = 0; k < d; k++) { const th = 2 * Math.PI * k / d + 0.4; roots.push(C(0.55 * Math.cos(th), 0.55 * Math.sin(th))); }
        for (let it = 0; it < 300; it++) {
          let mx = 0;
          roots = roots.map((r, i) => {
            let den = ONE; for (let j = 0; j < d; j++) if (j !== i) den = mul(den, sub(r, roots[j]));
            if (abs(den) < 1e-30) return r;
            const dz = div(_polyEvalA(a, r), den); mx = Math.max(mx, abs(dz)); return sub(r, dz);
          });
          if (mx < 1e-13) break;
        }
        return roots;
      };
      const padeApprox = (c, m, n) => {
        let q = [ONE];
        if (n > 0) {
          const A = [], b = [];
          for (let i = 0; i < n; i++) { const row = []; for (let j = 0; j < n; j++) { const idx = m + 1 + i - (j + 1); row.push(idx >= 0 ? c[idx] : ZERO); } A.push(row); b.push(neg(c[m + 1 + i])); }
          const sol = _cSolve(A, b); if (!sol) return null;
          q = [ONE].concat(sol);
        }
        const p = []; for (let k = 0; k <= m; k++) { let s = ZERO; for (let j = 0; j <= Math.min(k, n); j++) s = add(s, mul(q[j], c[k - j])); p.push(s); }
        return { p, q };
      };
      function padeAt(z0) {
        z0 = C(z0.re, z0.im);
        const f = curF(), m = state.cont.padeM, n = state.cont.padeN, L = m + n;
        const v = views.analysis, half = ($("#cv-analysis").width / 2) * v.scale;
        let r0 = Math.max(1e-3, 0.15 * half), coeffs = null;
        for (let att = 0; att < 9; att++) {
          const sv = _wcSample(f, z0, r0, Math.max(160, 3 * (L + 1)));
          if (sv.every(isFiniteC) && !_wcCut(sv)) {
            const cc = _wcCoeffs(sv, r0, L);
            // радиус сходимости должен превышать окружность выборки, иначе она охватила особенность
            if (cc.every(isFiniteC) && _wcRadius(cc) > 0.9 * r0) { coeffs = cc; break; }
          }
          r0 *= 0.6;
        }
        if (!coeffs) { state.cont.pade = null; showResults("Паде", [["не удалось (особенность у центра?)", "", "muted"]]); analysisRedraw(); return; }
        const pade = padeApprox(coeffs, m, n);
        if (!pade) { state.cont.pade = null; showResults("Паде", [["вырожденная система", "", "muted"]]); analysisRedraw(); return; }
        // корни Q → полюса; фильтр дублетов Фруассара по величине вычета P/Q′
        const qd = pade.q.map((c, k) => scale(c, k)).slice(1);
        let cand = _polyRoots(pade.q).map((w) => {
          const resid = abs(div(_polyEvalA(pade.p, w), _polyEvalA(qd.length ? qd : [ONE], w)));
          return { z: add(z0, w), resid };
        }).filter((o) => isFiniteC(o.z) && abs(sub(o.z, z0)) < 50 * r0 + 50);
        const maxres = Math.max(1e-300, ...cand.map((o) => o.resid));
        let poles = cand.filter((o) => o.resid > 1e-4 * maxres).map((o) => o.z);
        poles.sort((a, b) => abs(sub(a, z0)) - abs(sub(b, z0)));
        state.cont.pade = { z0, p: pade.p, q: pade.q, poles, r0, m, n };
        state.cont.padeCenter = z0;
        const rows = [["центр z₀", _fmtC(z0, 3), ""], ["аппроксимант", `[${m}/${n}]`, ""], ["радиус Тейлора", (poles.length ? abs(sub(poles[0], z0)) : Infinity).toPrecision(3), "teal"]];
        poles.slice(0, 6).forEach((p, i) => rows.push([`полюс ${i + 1}`, _fmtC(p, 3), "warm"]));
        showResults(`Паде [${m}/${n}]`, rows);
        analysisRedraw();
      }

      /* — детектор естественной границы: зондирование всех направлений к границе диска — */
      // корневой тест радиуса (устойчив для лакунарных рядов): R = exp(−⟨ln|aₙ|/n⟩) по
      // надёжному спадающему участку (до начала шумового хвоста), пропуская нули.
      const _rootRadius = (a) => {
        const mag = a.map(abs), mx = Math.max(...mag);
        if (!(mx > 0) || !isFinite(mx)) return Infinity;
        const floor = mx * 1e-9;
        let mn = Infinity, mnIdx = 1;
        for (let n = 1; n < mag.length; n++) if (mag[n] > floor && mag[n] < mn) { mn = mag[n]; mnIdx = n; }
        const rel = [];
        for (let n = 1; n <= mnIdx; n++) if (mag[n] > floor) rel.push(n);
        if (rel.length < 2) return Infinity;
        const lo = rel[Math.floor(rel.length * 0.4)];
        let sum = 0, cnt = 0;
        for (const n of rel) if (n >= lo) { sum += Math.log(mag[n]) / n; cnt++; }
        return cnt ? Math.exp(-sum / cnt) : Infinity;
      };
      function boundaryAt(z0) {
        z0 = C(z0.re, z0.im);
        const f = curF();
        const cv = $("#cv-analysis"), v = views.analysis, scaleRef = (cv.width / 2) * v.scale;
        const probeRR = Math.max(1e-4, 0.05 * scaleRef);
        // локальный радиус сходимости в точке p (расстояние до ближайшей особенности);
        // 0, если малая окружность уже задевает особенность/разрыв (f невычислима).
        const localR = (p) => {
          const sv = _wcSample(f, p, probeRR, 48);
          if (!sv.every(isFiniteC) || _wcCut(sv)) return 0;
          const cc = _wcCoeffs(sv, probeRR, 12);
          if (!cc.every(isFiniteC)) return 0;
          const R = _wcRadius(cc);
          return isFinite(R) ? R : 1e9;
        };
        // радиус у центра (сдвиг, чтобы обойти лакунарную симметрию коэффициентов)
        const nud = add(z0, C(0.31 * probeRR, 0.29 * probeRR));
        const R0 = localR(nud);
        if (R0 <= 1.4 * probeRR) { state.cont.boundary = null; showResults("естественная граница?", [["старт у особенности — сместите центр", "", "muted"]]); analysisRedraw(); return; }
        if (R0 >= 1e8 || R0 > 6 * scaleRef) { state.cont.boundary = { z0, R: Infinity, angles: [], entire: true }; showResults("естественная граница?", [["радиус сходимости", "велик / ∞", "teal"], ["вывод", "границы в поле зрения нет (целая функция?)", ""]]); analysisRedraw(); return; }
        // радиальный марш в каждом направлении: докуда продолжимо наружу
        const cap = 3.5 * R0, K = 120, angles = [];
        let blocked = 0;
        for (let i = 0; i < K; i++) {
          const th = (2 * Math.PI * i) / K, dir = C(Math.cos(th), Math.sin(th));
          let p = z0, reach = 0, isBlk = false;
          for (let step = 0; step < 80; step++) {
            const R = localR(p);
            if (R < 1.5 * probeRR) { isBlk = true; break; }
            const adv = Math.min(0.5 * R, cap - reach, 0.4 * scaleRef);
            if (adv <= 1e-9) break;
            p = add(p, scale(dir, adv)); reach += adv;
            if (reach >= cap - 1e-9) break;
          }
          if (isBlk) blocked++;
          angles.push({ th, reach, blocked: isBlk });
        }
        const frac = blocked / K;
        let Rb = Infinity; for (const a of angles) if (a.blocked) Rb = Math.min(Rb, a.reach);
        const R = isFinite(Rb) ? Rb : R0;
        state.cont.boundary = { z0, R, angles, frac, cap, entire: false };
        let verdict, cls;
        if (blocked === 0) { verdict = "особенностей в пределах досягаемости нет (целая функция?)"; cls = "teal"; }
        else if (frac > 0.85) { verdict = "естественная граница — особенности плотны на кривой"; cls = "warm"; }
        else if (frac < 0.35) { verdict = "изолированные особенности — продолжимо через промежутки"; cls = "teal"; }
        else { verdict = "смешанно / неоднозначно"; cls = ""; }
        showResults("естественная граница?", [
          ["центр z₀", _fmtC(z0, 3), ""],
          ["радиус до границы", R.toPrecision(3), ""],
          ["заблокировано направлений", `${Math.round(frac * 100)}%`, cls],
          ["вывод", verdict, cls],
        ]);
        analysisRedraw();
      }

      /* — оверлей (анализ): продолжение Вейерштрасса, Паде или граница — */
      function contOverlay(ctx, cv, v) {
        const tool = state.ana.tool;
        const W = cv.width, H = cv.height, toPx = (z) => [W / 2 + (z.re - v.cx) / v.scale, H / 2 - (z.im - v.cy) / v.scale];
        ctx.save();
        if (tool === "continue") {
          const S = state.cont, res = S.result;
          if (res && S.showCircles) {
            ctx.lineWidth = 1; ctx.strokeStyle = "rgba(140,200,255,.12)";
            const stride = Math.max(1, Math.round(res.steps.length / 60));
            for (let i = 0; i < res.steps.length; i += stride) {
              const st = res.steps[i]; if (!isFinite(st.radius) || st.radius <= 0) continue;
              const [x, y] = toPx(st.center), rp = st.radius / v.scale;
              if (rp < 1 || rp > 4 * Math.max(W, H)) continue;
              ctx.beginPath(); ctx.arc(x, y, rp, 0, 7); ctx.stroke();
            }
          }
          if (res) for (let i = 0; i < res.steps.length; i++) {
            const st = res.steps[i], w = st.value; if (!w || !isFiniteC(w)) continue;
            const [x, y] = toPx(st.center);
            const hue = ((Math.atan2(w.im, w.re) / (2 * Math.PI)) * 360 + 360) % 360;
            ctx.fillStyle = `hsl(${hue},85%,62%)`;
            ctx.beginPath(); ctx.arc(x, y, st.cut ? 3.2 : 1.7, 0, 7); ctx.fill();
            if (st.cut) { ctx.strokeStyle = "rgba(255,255,255,.9)"; ctx.lineWidth = 1.4; ctx.beginPath(); ctx.arc(x, y, 5.2, 0, 7); ctx.stroke(); }
          }
          const P = S.path;
          if (P.length) {
            ctx.strokeStyle = "rgba(255,255,255,.55)"; ctx.lineWidth = 1.3;
            ctx.beginPath(); P.forEach((z, i) => { const [x, y] = toPx(z); i ? ctx.lineTo(x, y) : ctx.moveTo(x, y); }); ctx.stroke();
            P.forEach((z, i) => { const [x, y] = toPx(z); ctx.fillStyle = i === 0 ? "rgba(120,255,160,.95)" : "rgba(255,255,255,.85)"; ctx.beginPath(); ctx.arc(x, y, i === 0 ? 4.5 : 3, 0, 7); ctx.fill(); });
          }
        } else if (tool === "pade") {
          const pd = state.cont.pade;
          if (pd) {
            const [cx, cy] = toPx(pd.z0);
            if (pd.poles.length) {
              const R = abs(sub(pd.poles[0], pd.z0));
              ctx.strokeStyle = "#7fd1ff"; ctx.lineWidth = 1.3; ctx.setLineDash([6, 4]);
              ctx.beginPath(); ctx.arc(cx, cy, R / v.scale, 0, 7); ctx.stroke(); ctx.setLineDash([]);
            }
            for (const p of pd.poles) {
              const [x, y] = toPx(p);
              ctx.strokeStyle = "#0c0f15"; ctx.lineWidth = 4; ctx.beginPath(); cross(ctx, x, y, 7); ctx.stroke();
              ctx.strokeStyle = getCss("--warm"); ctx.lineWidth = 2; ctx.beginPath(); cross(ctx, x, y, 7); ctx.stroke();
            }
            ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(cx, cy, 4, 0, 7); ctx.fill();
          }
        } else if (tool === "boundary") {
          const bd = state.cont.boundary;
          if (bd && !bd.entire && bd.angles.length) {
            const [cx, cy] = toPx(bd.z0);
            const pts = bd.angles.map((a) => [cx + Math.cos(a.th) * (a.reach / v.scale), cy - Math.sin(a.th) * (a.reach / v.scale)]);
            const natural = bd.frac > 0.85;
            // заливка достижимой области: замкнутый «пузырь» ⇒ естественная граница,
            // звезда с длинными шипами в промежутки ⇒ изолированные особенности
            ctx.beginPath();
            pts.forEach(([x, y], i) => (i ? ctx.lineTo(x, y) : ctx.moveTo(x, y)));
            ctx.closePath();
            ctx.fillStyle = natural ? "rgba(255,80,80,.16)" : "rgba(120,255,150,.13)";
            ctx.fill();
            ctx.strokeStyle = "#0c0f15"; ctx.lineWidth = 3; ctx.stroke();
            ctx.strokeStyle = natural ? "rgba(255,95,95,.95)" : "rgba(120,255,150,.9)"; ctx.lineWidth = 1.6; ctx.stroke();
            // точки-упоры (направление заблокировано особенностью)
            for (let i = 0; i < bd.angles.length; i++) {
              if (!bd.angles[i].blocked) continue;
              const [x, y] = pts[i];
              ctx.fillStyle = "#0c0f15"; ctx.beginPath(); ctx.arc(x, y, 3.4, 0, 7); ctx.fill();
              ctx.fillStyle = "#ff5a5a"; ctx.beginPath(); ctx.arc(x, y, 2, 0, 7); ctx.fill();
            }
            // центр
            ctx.fillStyle = "#0c0f15"; ctx.beginPath(); ctx.arc(cx, cy, 5, 0, 7); ctx.fill();
            ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(cx, cy, 3.2, 0, 7); ctx.fill();
          }
        }
        ctx.restore();
      }

      /* аналитические ядра (чистые) — зеркало модуля complex.js */
      const atlasCore = AC;
      /* ==== АНАЛИТИЧЕСКИЕ ЯДРА (чистые: сырые данные, без форматирования и DOM) ====
       * Презентация (fmt/showResults/renderAnalysis/state.ana/#fixed-out) остаётся в приложении.
       * Оконные функции принимают win = {xmin,xmax,ymin,ymax}. */

      function analyzePointCore(f, z0) {
        const fz0 = safe(f, z0);
        const fp = tryc(() => derivative(f, z0));
        const sing = tryc(() => classifySingularity(f, z0, { radius: 0.05, terms: 10 }));
        const r = { z0, fz0, fp, singularity: sing || null, residue: null, taylor: null, sqrt2: null, log: null };
        if (sing && sing.type === "pole") r.residue = tryc(() => residue(f, z0, { radius: 0.05 }));
        if (!sing || sing.type === "regular") r.taylor = tryc(() => taylor(f, z0, { terms: 4, radius: 0.3 })) || null;
        if (isFiniteC(fz0)) { r.sqrt2 = nthRoots(fz0, 2); r.log = logBranches(fz0, 1); }
        return r;
      }

      function analyzeInfinityCore(f) {
        const g = (w) => f(recip(w));
        const sing = tryc(() => classifySingularity(g, ZERO, { radius: 0.04, terms: 10 }));
        const r = { type: sing ? sing.type : null, order: sing ? sing.order : null, limit: null, residue: null };
        if (sing && sing.type === "regular") { const lim = safe(g, C(1e-6, 0)); if (isFiniteC(lim)) r.limit = lim; }
        const h = (w) => neg(div(g(w), mul(w, w)));
        const rinf = tryc(() => residue(h, ZERO, { radius: 0.04 }));
        if (rinf && isFiniteC(rinf)) r.residue = rinf;
        return r;
      }

      function analyzeContourCore(f, c, rad) {
        const ct = circle(c, rad);
        const I = tryc(() => integrateAdaptive(f, ct, { tol: 1e-9 })) || null;
        const zp = tryc(() => argumentPrinciple(f, ct));
        return { I, zp: zp == null ? null : zp };
      }

      function analyzePolyContourCore(f, pts, closed) {
        const path = polyline(pts, closed);
        const I = tryc(() => integrateAdaptive(f, path, { tol: 1e-9 })) || null;
        let zp = null;
        if (closed) { const z = tryc(() => argumentPrinciple(f, path)); zp = z == null ? null : z; }
        return { I, zp };
      }

      function analyzeSeriesCore(f, z0) {
        let nearest = Infinity;
        try {
          const win = 3, ps = atlasCore.findZerosPoles(f, z0.re - win, z0.re + win, z0.im - win, z0.im + win).poles;
          for (const p of ps) { const d = abs(sub(p, z0)); if (d > 1e-6 && d < nearest) nearest = d; }
        } catch (e) {}
        const r0 = isFinite(nearest) ? Math.max(0.02, Math.min(0.3, nearest * 0.5)) : 0.3;
        const a = tryc(() => taylor(f, z0, { terms: 12, radius: r0, N: 256 })) || [];
        const Rc = _convRadius(a);
        let R = Rc;
        if (isFinite(nearest)) R = Math.min(nearest, Rc);
        const convR = isFinite(R) && R < 1e6 ? R : null;
        return { a, convR, nearest: isFinite(nearest) ? nearest : null };
      }

      function findZPCore(f, coeffs, win) {
        let zeros, poles, note;
        if (coeffs) {
          zeros = roots(coeffs).filter((z) => z.re >= win.xmin && z.re <= win.xmax && z.im >= win.ymin && z.im <= win.ymax);
          poles = []; note = "точно (многочлен)";
        } else {
          const zp = atlasCore.findZerosPoles(f, win.xmin, win.xmax, win.ymin, win.ymax);
          zeros = zp.zeros; poles = zp.poles; note = "численно (Ньютон)";
        }
        let critical = [];
        try { critical = atlasCore.findCritical(f, win.xmin, win.xmax, win.ymin, win.ymax); } catch (e) {}
        return { zeros, poles, critical, note };
      }

      function analyzeZetaZerosCore(win) {
        const pts = [];
        if (0.5 >= win.xmin && 0.5 <= win.xmax)
          for (const t of _ZETA_IM) for (const s of [t, -t]) if (s >= win.ymin && s <= win.ymax) pts.push(C(0.5, s));
        return { pts };
      }

      function fixedPointsCore(f, order, win) {
        const g = (z) => { const w = iterN(f, z, order); return C(w.re - z.re, w.im - z.im); };
        let zeros = [];
        try { zeros = atlasCore.findZerosPoles(g, win.xmin, win.xmax, win.ymin, win.ymax).zeros; } catch (e) { zeros = []; }
        const list = zeros.map((z) => {
          const mult = tryc(() => derivative((z2) => iterN(f, z2, order), z));
          const kind = mult ? (abs(mult) < 1 ? "attract" : abs(mult) > 1 ? "repel" : "neutral") : null;
          return { z, multiplier: mult || null, kind };
        });
        return { order, zeros, list };
      }

      function findFixedPoints() {
        const v = views.analysis, cv = $("#cv-analysis"), W = cv.width || 800, H = cv.height || 600;
        const win = { xmin: v.cx - (v.scale * W) / 2, xmax: v.cx + (v.scale * W) / 2, ymin: v.cy - (v.scale * H) / 2, ymax: v.cy + (v.scale * H) / 2 };
        const n = state.fixOrder;
        const fp = fixedPointsCore(curF(), n, win);
        const zeros = fp.zeros;
        state.fixed = zeros;
        const el = $("#fixed-out");
        if (el) {
          el.innerHTML = "";
          const h = document.createElement("div"); h.className = "hd";
          h.textContent = (n > 1 ? "точки периода | " + n : "неподвижные точки") + " — " + zeros.length + " в окне";
          el.appendChild(h);
          fp.list.forEach((it, i) => {
            const z = it.z, mult = it.multiplier;
            const r = document.createElement("div"); r.className = "row";
            const cls = it.kind === "attract" ? " · притяг." : it.kind === "repel" ? " · оттал." : it.kind === "neutral" ? " · нейтр." : "";
            const lab = mult ? " | f′=" + fmtShort(mult) + cls : "";
            r.innerHTML = `<span class="k">${n > 1 ? "период" : "непод."} ${i + 1}</span><span class="v teal">${fmt(z)}${lab}</span>`;
            el.appendChild(r);
          });
          if (!zeros.length) { const r = document.createElement("div"); r.className = "row"; r.innerHTML = '<span class="k">—</span><span class="v">в окне не найдено</span>'; el.appendChild(r); }
        }
        renderAnalysis();
      }

      function analyzePoint(z0) {
        const f = curF();
        const r = analyzePointCore(f, z0);
        const out = [["z₀", fmt(z0), ""], ["f(z₀)", fmt(r.fz0), "teal"]];
        out.push(["f′(z₀)", fmt(r.fp), ""]);
        const cls = r.singularity;
        if (cls) {
          if (cls.type === "regular") out.push(["особенность", "нет", ""]);
          else if (cls.type === "pole") {
            out.push(["особенность", "полюс порядка " + cls.order, "warm"]);
            out.push(["вычет", fmt(r.residue), "teal"]);
          } else out.push(["особенность", "существенная", "warm"]);
        }
        if (!cls || cls.type === "regular") { if (r.taylor) out.push(["Тейлор", r.taylor.map(fmtShort).join("; "), ""]); }
        if (isFiniteC(r.fz0)) {
          out.push(["√f(z₀)", r.sqrt2.map(fmtShort).join(" , "), ""]);
          out.push(["ln f, k=−1..1", r.log.map(fmtShort).join(" ; "), ""]);
        }
        state.ana.point = z0; state.ana.out = out;
        showResults("точка", out); renderAnalysis();
      }
      function analyzeContour(c, r) {
        const d = analyzeContourCore(curF(), c, r);
        const out = [["центр", fmt(c), ""], ["радиус", r.toFixed(3), ""]];
        if (d.I) { out.push(["∮ f dz", fmt(d.I.value), "teal"]); out.push(["Σ вычетов", fmt(div(d.I.value, C(0, 2 * Math.PI))), "teal"]); }
        if (d.zp != null) out.push(["нулей−полюсов", String(d.zp), "warm"]);
        state.ana.contour = c; state.ana.radius = r; state.ana.drawn = null;
        showResults("контур |z−c|=r", out); renderAnalysis();
      }
      // A4: интеграл по произвольному контуру (прямоугольник / ломаная).
      function analyzePolyContour(pts, closed, label) {
        if (!pts || pts.length < (closed ? 3 : 2)) return;
        const d = analyzePolyContourCore(curF(), pts, closed);
        const out = [["контур", label + " · " + pts.length + " верш." + (closed ? " (замкн.)" : ""), ""]];
        if (d.I) { out.push(["∮ f dz", fmt(d.I.value), "teal"]); if (closed) out.push(["Σ вычетов", fmt(div(d.I.value, C(0, 2 * Math.PI))), "teal"]); }
        if (closed && d.zp != null) out.push(["нулей−полюсов", String(d.zp), "warm"]);
        state.ana.contour = null; state.ana.drawn = { kind: "poly", pts: pts.map((p) => C(p.re, p.im)), closed };
        showResults(closed ? "замкнутый контур" : "путь", out); renderAnalysis();
      }
      // A5: оценка радиуса сходимости ряда Тейлора по отношению коэффициентов (медиана) и по ближайшей особенности.
      function _convRadius(a) {
        const ratios = [];
        for (let k = a.length - 1; k >= 2; k--) {
          const ak = a[k],
            ak1 = a[k - 1];
          if (!ak || !ak1) continue;
          const den = abs(ak),
            num = abs(ak1);
          if (den > 1e-280 && num > 1e-280) ratios.push(num / den);
          if (ratios.length >= 5) break;
        }
        if (!ratios.length) return Infinity;
        ratios.sort((x, y) => x - y);
        return ratios[ratios.length >> 1];
      }
      function analyzeSeries(z0) {
        const d = analyzeSeriesCore(curF(), z0);
        const a = d.a;
        state.ana.point = z0; state.ana.seriesData = { z0: C(z0.re, z0.im), a };
        state.ana.convR = d.convR; state.ana.drawn = null; state.ana.contour = null;
        const sd = "₀₁₂₃₄₅₆₇₈₉", subk = (k) => String(k).split("").map((d2) => sd[+d2]).join("");
        const out = [["z₀", fmt(z0), ""]];
        out.push(["радиус сходимости", d.convR != null ? d.convR.toFixed(4) : "∞ (целая?)", "teal"]);
        if (d.nearest != null) out.push(["ближайшая особ.", "d = " + d.nearest.toFixed(4), "warm"]);
        a.forEach((ak, k) => { if (ak && isFiniteC(ak)) out.push(["a" + subk(k), fmtShort(ak), ""]); });
        showResults("ряд Тейлора в z₀", out); renderAnalysis();
      }
      function findZP() {
        const v = views.analysis, cv = $("#cv-analysis"), W = cv.width || 800, H = cv.height || 600;
        const win = { xmin: v.cx - (v.scale * W) / 2, xmax: v.cx + (v.scale * W) / 2, ymin: v.cy - (v.scale * H) / 2, ymax: v.cy + (v.scale * H) / 2 };
        const d = findZPCore(curF(), state.compiled.coeffs, win);
        state.ana.markers = { zeros: d.zeros, poles: d.poles, critical: d.critical };
        const out = [["метод", d.note, ""]];
        d.zeros.forEach((z, i) => out.push(["нуль " + (i + 1), fmt(z), "teal"]));
        d.poles.forEach((z, i) => out.push(["полюс " + (i + 1), fmt(z), "warm"]));
        d.critical.forEach((z, i) => out.push(["крит. f′=0 · " + (i + 1), fmt(z), ""]));
        showResults("нули (○), полюсы (×), крит. точки (◇)", out); renderAnalysis();
      }
      // A2: поведение и вычет в бесконечности через g(w)=f(1/w) при w→0.
      function analyzeInfinity() {
        const b = analyzeInfinityCore(curF());
        const out = [["точка", "z → ∞", ""]];
        if (b.type) {
          if (b.type === "regular") { out.push(["в ∞", "регулярна (конечный предел)", "teal"]); if (b.limit) out.push(["lim_{z→∞} f", fmt(b.limit), ""]); }
          else if (b.type === "pole") out.push(["в ∞", "полюс порядка " + b.order + " (рост)", "warm"]);
          else out.push(["в ∞", "существенная особенность", "warm"]);
        }
        if (b.residue) out.push(["вычет в ∞", fmt(b.residue), "teal"]);
        state.ana.point = null; state.ana.out = out;
        showResults("поведение в ∞ (через 1/f(1/w))", out); renderAnalysis();
      }
      // A3: нетривиальные нули ζ на критической прямой Re=1/2 (мнимые части первых нулей).
      const _ZETA_IM = [
        14.134725, 21.022040, 25.010858, 30.424876, 32.935062, 37.586178, 40.918719, 43.327073,
        48.005151, 49.773832, 52.970321, 56.446248, 59.347044, 60.831779, 65.112544, 67.079811,
        69.546402, 72.067158, 75.704691, 77.144840, 79.337375, 82.910381, 84.735493, 87.425275,
        88.809111, 92.491899, 94.651344, 95.870634, 98.831194, 101.317851,
      ];
      function analyzeZetaZeros() {
        const v = views.analysis, cv = $("#cv-analysis"), W = cv.width || 800, H = cv.height || 600;
        const win = { xmin: v.cx - (v.scale * W) / 2, xmax: v.cx + (v.scale * W) / 2, ymin: v.cy - (v.scale * H) / 2, ymax: v.cy + (v.scale * H) / 2 };
        const pts = analyzeZetaZerosCore(win).pts;
        const m = state.ana.markers || { zeros: [], poles: [], critical: [] };
        m.zeta = pts; state.ana.markers = m;
        const out = [["функция", state.expr, ""], ["крит. прямая", "Re = 1/2", "teal"], ["нетрив. нулей в окне", String(pts.length), "warm"]];
        pts.slice(0, 14).forEach((z, i) => out.push(["ζ-нуль " + (i + 1), fmt(z), ""]));
        showResults("нетривиальные нули ζ (◆ на Re=½)", out); renderAnalysis();
      }
      const safe = (f, z) => {
        try {
          return f(z);
        } catch {
          return NAN_;
        }
      };
      const tryc = (fn) => {
        try {
          return fn();
        } catch {
          return null;
        }
      };
      const fmtShort = (z) =>
        z
          ? isInf(z)
            ? "∞"
            : `${z.re.toFixed(2)}${z.im < 0 ? "−" : "+"}${Math.abs(z.im).toFixed(2)}i`
          : "—";

      /* ---------- конформные карты (с параметрами) ---------- */
      // Замкнутые отображения, выразимые формулой: выбор заполняет общий f(z), а рендер идёт через скомпилированный curF().
      function CONF_PRESETS() {
        return [
          { l: "z²", expr: "z^2" },
          { l: "1/z (инверсия)", expr: "1/z" },
          { l: "eᶻ (полоса→плоскость)", expr: "exp(z)" },
          { l: "z + 1/z (Жуковский)", expr: "(z + 1/z)/2" },
          { l: "Кэли ½пл→диск", expr: "(z - i)/(z + i)" },
        ];
      }
      // Численные отображения (не выражаются элементарной формулой) — со своей областью и параметрами.
      function CONF_SPECIAL() {
        return [
          { id: "cayleyinv", l: "обратная Кэли диск→½пл", dom: "disk", f: () => cayleyInv },
          {
            id: "power",
            l: "степенная zᵃ",
            dom: "cart",
            param: "alpha",
            f: () => powerMap(C(state.p.alpha, 0)),
          },
          {
            id: "aut",
            l: "автоморфизм диска",
            dom: "disk",
            param: "aut",
            f: () =>
              (
                (m) => (z) =>
                  m.apply(z)
              )(diskAutomorphism(C(state.p.ax, state.p.ay), state.p.theta)),
          },
          {
            id: "mobius",
            l: "Мёбиус −1,0,1 ↦ 1,i,−1",
            dom: "cart",
            f: () =>
              (
                (m) => (z) =>
                  m.apply(z)
              )(mobiusFromPoints(C(-1, 0), ZERO, ONE, ONE, I, C(-1, 0))),
          },
          {
            id: "ngon",
            l: "диск → правильный n-угольник",
            dom: "disk",
            param: "n",

        if (animRecording) return;
        capPx = capPx || state.gif.size;

        const ot = btnEl ? btnEl.textContent : "";
        if (btnEl) btnEl.disabled = true;
        const setBtn = (s) => {
          if (btnEl) btnEl.textContent = s;
        };
        setBtn("● захват…");
        await new Promise((r) => setTimeout(r, 0));
        const stepsPer = Math.max(12, Math.min(48, Math.round(28 / Math.max(0.25, speed))));

              drawFrame(t);

          btnEl.textContent = ot;
        }
      }

            const f = displayF(),
              ff = (x, y) => {
                const w = safe(f, C(x, y));
                return isFiniteC(w) ? [w.re, w.im] : null;
              };
            mesh = buildLandscape(
              ff,
              { xmin: -h, xmax: h, ymin: -h, ymax: h },
              { nx: dens, ny: dens, heightScale: s.heightScale },
            );
          } else {
            mesh = buildBranchSheets(
              r.f,
              { xmin: -h, xmax: h, ymin: -h, ymax: h },
              { nx: md, ny: md, heightScale: s.heightScale, sheets: s.sheets || 3 },
            );
          }
        } else if (s.kind === "sqrt") {
          mesh = buildRiemannSqrt({
            R: 1.5,
            nr: Math.round(dens * 0.4),
            nth: Math.round(dens * 2.2),
            heightScale: s.heightScale,
          });
        } else {
          mesh = buildRiemannLog({
            R: 1.5,
            turns: 2,
            nr: Math.round(dens * 0.35),
            nth: Math.round(dens * 2.2),
            heightScale: s.heightScale * 0.42,
          });
        }
        _surfMesh = { key, mesh };
        return mesh;
      }
      // Маршевый треугольник: отрезки уровня L нескалярного поля vals на гранях.
      function _isoSeg(pts, vals, L) {
        const E = [[0, 1], [1, 2], [2, 0]],
          cr = [];
        for (let e = 0; e < 3; e++) {
          const i = E[e][0],
            j = E[e][1],
            di = vals[i] - L,
            dj = vals[j] - L;
          if ((di <= 0 && dj > 0) || (di > 0 && dj <= 0)) {
            const tt = di / (di - dj);
            cr.push([
              pts[i].x + (pts[j].x - pts[i].x) * tt,
              pts[i].y + (pts[j].y - pts[i].y) * tt,
            ]);
          }
        }
        return cr.length === 2 ? cr : null;
      }
      // Контурный рендер: на тусклом фазовом рельефе — изолинии |f| (шаг по log2,
      // светлые) и arg f (через равные углы, окрашены по своему углу). Скрытые
      // линии убираются заливкой граней в порядке от дальних к ближним.
      function renderSurfaceContour(ctx, W, H, mesh, view, opts) {
        const bg = opts.background || "#090c11";
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, W, H);
        const P = mesh.verts.map((v) => surfProject(v, view, W, H));
        const att = mesh.att,
          N = att.length;
        const lm = new Float64Array(N),
          ph = new Float64Array(N),
          fin = new Uint8Array(N);
        for (let i = 0; i < N; i++) {
          const re = att[i][0],
            im = att[i][1],
            m = Math.hypot(re, im);
          if (m > 1e-12 && isFinite(m)) {
            lm[i] = Math.log2(m);
            ph[i] = Math.atan2(im, re);
            fin[i] = 1;
          }
        }
        const T = mesh.tris,
          order = [];
        for (let t = 0; t < T.length; t++) {
          const a = P[T[t][0]],
            b = P[T[t][1]],
            c = P[T[t][2]];
          if (!a || !b || !c) continue;
          if (!isFinite(a.x) || !isFinite(b.x) || !isFinite(c.x)) continue;
          order.push([t, (a.z + b.z + c.z) / 3]);
        }
        order.sort((u, v2) => u[1] - v2[1]);
        const co = colorOpts();
        const modStep = opts.modStep || 1,
          phStep = Math.PI / (opts.phDiv || 6);
        ctx.lineJoin = "round";
        ctx.lineCap = "round";
        for (let n = 0; n < order.length; n++) {
          const tr = T[order[n][0]],
            i0 = tr[0],
            i1 = tr[1],
            i2 = tr[2],
            a = P[i0],
            b = P[i1],
            c = P[i2];
          const okAll = fin[i0] && fin[i1] && fin[i2];
          let fillC = bg;
          if (okAll) {
            const re = (att[i0][0] + att[i1][0] + att[i2][0]) / 3,
              im = (att[i0][1] + att[i1][1] + att[i2][1]) / 3,
              col = phaseColor(C(re, im), co);
            fillC =
              "rgb(" +
              ((col.r * 0.32) | 0) + "," +
              ((col.g * 0.32) | 0) + "," +
              ((col.b * 0.32) | 0) + ")";
          }
          ctx.beginPath();
          ctx.moveTo(a.x, a.y);
          ctx.lineTo(b.x, b.y);
          ctx.lineTo(c.x, c.y);
          ctx.closePath();
          ctx.fillStyle = fillC;
          ctx.fill();
          if (!okAll) continue;
          const pts = [a, b, c];
          // изолинии модуля |f| = 2^k
          let mv0 = lm[i0],
            mv1 = lm[i1],
            mv2 = lm[i2];
          let lo = Math.min(mv0, mv1, mv2),
            hi = Math.max(mv0, mv1, mv2),
            k0 = Math.ceil(lo / modStep - 1e-9),
            k1 = Math.floor(hi / modStep + 1e-9);
          if (k1 - k0 > 60) k1 = k0 + 60;
          ctx.strokeStyle = opts.modLine || "rgba(186,228,255,0.82)";
          ctx.lineWidth = opts.modLw || 1;
          for (let k = k0; k <= k1; k++) {
            const seg = _isoSeg(pts, [mv0, mv1, mv2], k * modStep);
            if (seg) {
              ctx.beginPath();
              ctx.moveTo(seg[0][0], seg[0][1]);
              ctx.lineTo(seg[1][0], seg[1][1]);
              ctx.stroke();
            }
          }
          // изолинии фазы arg f = k·phStep (фаза циклична — разворачиваем относительно i0)
          let p0 = ph[i0],
            p1 = ph[i1],
            p2 = ph[i2];
          const unwrap = (x) => {
            while (x - p0 > Math.PI) x -= 2 * Math.PI;
            while (x - p0 < -Math.PI) x += 2 * Math.PI;
            return x;
          };
          p1 = unwrap(p1);
          p2 = unwrap(p2);
          lo = Math.min(p0, p1, p2);
          hi = Math.max(p0, p1, p2);
          k0 = Math.ceil(lo / phStep - 1e-9);
          k1 = Math.floor(hi / phStep + 1e-9);
          if (k1 - k0 > 24) k1 = k0 + 24;
          ctx.lineWidth = opts.phLw || 1;
          for (let k = k0; k <= k1; k++) {
            const seg = _isoSeg(pts, [p0, p1, p2], k * phStep);
            if (seg) {
              const ang = k * phStep,
                col = phaseColor(C(Math.cos(ang), Math.sin(ang)), co);
              ctx.strokeStyle = "rgb(" + col.r + "," + col.g + "," + col.b + ")";
              ctx.beginPath();
              ctx.moveTo(seg[0][0], seg[0][1]);
              ctx.lineTo(seg[1][0], seg[1][1]);
              ctx.stroke();
            }
          }
        }
      }
      function renderSurface3D(q) {
        const cv = sizeCanvas($("#cv-surface")),
          W = cv.width,
          H = cv.height,
          v = views.surface,
          ctx = cv.getContext("2d");
        if (state.surface.contour) {
          const mesh = ensureSurfaceMesh(q < 1 ? 0.4 : 0.7),
            bb = mesh.bbox;
          const fit = (Math.min(W, H) * 0.34) / Math.max(bb.rx, bb.ry, bb.rz || 1),
            scale = fit * (state.surface.zoom || 1);
          ctx.clearRect(0, 0, W, H);
          renderSurfaceContour(
            ctx, W, H, mesh,
            { yaw: v.yaw, pitch: v.pitch, scale },
            { background: "#090c11", phDiv: 6, modStep: 1 },
          );
          hideProgress();
          return;
        }
        // q<1 (интерактив) — пониженное разрешение для скорости; q=1 — суперсэмплинг
        // по ползунку «разрешение» (рендер крупнее и даунскейл = сглаживание граней/краёв).
        const ss = q < 1 ? 0.55 : state.surface.ss || 1;
        const cap = 2200; // предел стороны буфера, чтобы не упереться в память
        let rw = Math.max(60, Math.round(W * ss)),
          rh = Math.max(60, Math.round(H * ss));
        if (Math.max(rw, rh) > cap) {
          const f = cap / Math.max(rw, rh);
          rw = Math.round(rw * f);
          rh = Math.round(rh * f);
        }
        const mesh = ensureSurfaceMesh(q < 1 ? 0.5 : 1),
          bb = mesh.bbox;
        const fit = (Math.min(rw, rh) * 0.34) / Math.max(bb.rx, bb.ry, bb.rz || 1);
        const scale = fit * (state.surface.zoom || 1);
        // попиксельная раскраска по текущей схеме; вход переиспользуем, чтобы не аллоцировать
        const co = colorOpts(),
          zin = { re: 0, im: 0 };
        const colorAt = (re, im) => {
          zin.re = re;
          zin.im = im;
          return phaseColor(zin, co);
        };
        const img = renderSurface(
          { width: rw, height: rh },
          mesh,
          { yaw: v.yaw, pitch: v.pitch, scale },
          { background: [9, 12, 17], ambient: 0.32, colorAt },
        );
        off.width = rw;
        off.height = rh;
        offc.putImageData(new ImageData(img.data, rw, rh), 0, 0);
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = "high";
        ctx.clearRect(0, 0, W, H);
        ctx.drawImage(off, 0, 0, rw, rh, 0, 0, W, H);
        hideProgress();
      }
      // GIF-оборот поверхности: yaw 0→2π вокруг вертикали, бесшовная петля.
      async function exportSurfaceGIF(btnEl) {
        if (animRecording) return;
        const cv = $("#cv-surface"),
          v = views.surface,
          y0 = v.yaw,
          ss0 = state.surface.ss,
          steps = 48;
        animRecording = true;
        const ot = btnEl ? btnEl.textContent : "";
        if (btnEl) btnEl.disabled = true;
        const setBtn = (s) => {
          if (btnEl) btnEl.textContent = s;
        };
        setBtn("● захват…");
        state.surface.ss = 1; // даунскейл кадра при захвате сам сглаживает — суперсэмплинг не нужен
        await new Promise((r) => setTimeout(r, 0));
        const frames = [];
        let gw = 0,
          gh = 0;
        try {
          for (let k = 0; k < steps; k++) {
            v.yaw = y0 + (2 * Math.PI * k) / steps;
            renderSurface3D(1);
            const fr = grabFrameScaled(cv, state.gif.size);
            gw = fr.w;
            gh = fr.h;
            frames.push(fr.data);
            showProgress(0.5 * (k / steps));
            await new Promise((r) => setTimeout(r, 0));
          }
          setBtn("● сборка…");
          const bytes = await encodeGIFOffThread(
            frames,
            { width: gw, height: gh, delay: 5, loop: 0, dither: state.gif.dither },
            (p) => showProgress(0.5 + 0.5 * p),
          );
          hideProgress();
          downloadBytes(bytes, "поверхность-оборот.gif", "image/gif");
        } catch (e) {
          hideProgress();
          alert("Не удалось собрать GIF: " + (e && e.message ? e.message : e));
        }
        v.yaw = y0;
        state.surface.ss = ss0;
        renderSurface3D(1);
        animRecording = false;
        if (btnEl) {
          btnEl.disabled = false;
          btnEl.textContent = ot;
        }
      }

      let _rcN = 0;
      function rangeCtl(label, min, max, val, on, step, extra) {
        const w = document.createElement("div");
        w.className = "ctl";
        const fmtv = extra && extra.fmt ? extra.fmt : (v) => v;
        w.innerHTML = `<div class="rangerow"><label class="fld">${label}</label><span class="val">${fmtv(val)}</span></div>`;
        const r = document.createElement("input");
        r.type = "range";
        r.min = min;
        r.max = max;
        r.step = step || 1;
        r.value = val;
        if (extra && extra.ticks && extra.ticks.length) {
          const id = "dl" + ++_rcN;
          const dl = document.createElement("datalist");
          dl.id = id;
          extra.ticks.forEach((t) => {
            const o = document.createElement("option");
            o.value = t;
            dl.appendChild(o);
          });
          w.appendChild(dl);
          r.setAttribute("list", id);
        }
        r.oninput = () => {
          let v = +r.value;
          if (extra && extra.ticks) {
            const sn = extra.snap || 0;
            for (const t of extra.ticks)
              if (Math.abs(v - t) <= sn) {
                v = t;
                break;
              }
            r.value = v;
          }
          w.querySelector(".val").textContent = fmtv(v);
          on(v);
        };
        w.appendChild(r);
        return w;
      }

            "-4": "−π",

            "-1": "−π/4",
            0: "0",
            1: "π/4",
            2: "π/2",

        const applyFixed = (ww, hh, cust) => {
          ww = Math.max(100, Math.min(4000, ww | 0));
          hh = Math.max(100, Math.min(4000, hh | 0));
          // Сохраняем область определения при смене размера холста.
          // Мировое окно по ширине = scale·W (W — ширина рендера в пикселях), поэтому
          // при изменении W домножаем scale обратно пропорционально: окно (xmin..xmax)
          // не меняется, растёт лишь детализация. Иначе больший холст = более широкая область.
          const _cvf = document.querySelector("canvas.field");
          const oldW = _cvf && _cvf.width ? _cvf.width : state.canvasSize.w;
          if (oldW && ww && oldW !== ww) {
            const k = oldW / ww;
            for (const m in views) {
              if (views[m] && typeof views[m].scale === "number") views[m].scale *= k;
            }
          }
          state.canvasSize = {
            mode: "fixed",
            w: ww,
            h: hh,
            custom: !!cust,
          };
          render(1);
        };
        sel.onchange = () => {
          if (sel.value === "auto") {
            state.canvasSize = { mode: "auto", w: state.canvasSize.w, h: state.canvasSize.h };
            custom.style.display = "none";

            const [a, b] = sel.value.split("x").map(Number);
            custom.style.display = "none";
            applyFixed(a, b, false);
          }
        };
        ap.onclick = () => applyFixed(+wi.value, +hi.value, true);
        if (curKey === "custom") custom.style.display = "grid";
        return w;
      }

      function drawWheel() {
        const c = $("#wheel");
        if (!c) return;
        const ctx = c.getContext("2d"),
          N = 52,
          img = ctx.createImageData(N, N);
        for (let j = 0; j < N; j++)
          for (let i = 0; i < N; i++) {
            const x = (i - N / 2) / (N / 2),
              y = (N / 2 - j) / (N / 2),
              r = Math.hypot(x, y),
              p = (j * N + i) * 4;
            if (r > 1) {
              img.data[p + 3] = 0;
              continue;
            }
            const col = phaseColor(fromPolar(0.3 + r, Math.atan2(y, x)), colorOpts());
            img.data[p] = col.r;
            img.data[p + 1] = col.g;
            img.data[p + 2] = col.b;
            img.data[p + 3] = 255;
          }
        ctx.putImageData(img, 0, 0);
      }

      function attachField(cv, getV, opts) {
        let drag = false,
          lx = 0,
          ly = 0,
          moved = 0;
        cv.addEventListener(
          "wheel",
          (e) => {
            e.preventDefault();
            if (opts.noZoom) return;
            const v = getV(),
              W = cv.width,
              H = cv.height,
              r = cv.getBoundingClientRect();
            const mx = ((e.clientX - r.left) * W) / r.width,
              my = ((e.clientY - r.top) * H) / r.height,
              z = pxToZ(v, W, H, mx, my),
              f = Math.exp(-e.deltaY * 0.0014);
            v.scale /= f;
            v.cx = z.re - (mx - W / 2) * v.scale;
            v.cy = z.im + (my - H / 2) * v.scale;
            interactRender();
          },
          { passive: false },
        );
        cv.addEventListener("pointerdown", (e) => {
          drag = true;
          moved = 0;
          lx = e.clientX;
          ly = e.clientY;
          cv.setPointerCapture(e.pointerId);
        });
        cv.addEventListener("pointermove", (e) => {
          const v = getV(),
            W = cv.width,
            H = cv.height,
            r = cv.getBoundingClientRect();
          const mx = ((e.clientX - r.left) * W) / r.width,
            my = ((e.clientY - r.top) * H) / r.height;
          if (drag) {
            const dx = ((e.clientX - lx) * W) / r.width,
              dy = ((e.clientY - ly) * H) / r.height;
            lx = e.clientX;
            ly = e.clientY;
            moved += Math.abs(dx) + Math.abs(dy);
            if (opts.rotate) {
              v.yaw -= dx * 0.006;
              v.pitch = Math.max(-1.5, Math.min(1.5, v.pitch + dy * 0.006));
            } else {
              v.cx -= dx * v.scale;
              v.cy += dy * v.scale;
            }
            interactRender();
          }
          if (opts.probe) probe(opts.rotate ? null : pxToZ(v, W, H, mx, my), opts, v, W, H, mx, my);
          if (opts.hover && !drag) opts.hover(pxToZ(v, W, H, mx, my), e);
        });
        const end = () => {
          drag = false;
        };
        cv.addEventListener("pointerup", (e) => {
          if (opts.click && moved < 4) {
            const v = getV(),
              W = cv.width,
              H = cv.height,
              r = cv.getBoundingClientRect();
            const mx = ((e.clientX - r.left) * W) / r.width,
              my = ((e.clientY - r.top) * H) / r.height;
            opts.click(pxToZ(v, W, H, mx, my));
          }
          drag = false;
        });
        cv.addEventListener("pointercancel", end);
        cv.addEventListener("pointerleave", () => {
          drag = false;
          if (opts.hover) opts.hover(null);
        });
      }
      function probe(z, opts) {
        const params = paramsFromState();
        if (!z) {
          $("#ro-z").textContent = "—";
          $("#ro-fz").textContent = "—";
          return;
        }
        $("#ro-z").textContent = fmt(z);
        if (opts.fractal) {
          const t = state.fractal,
            jc = state.juliaC,
            mi = state.maxIter;
          if (t === "buddhabrot") {
            $("#ro-fz").textContent = "—";
            $("#ro-extra-k").textContent = "плотность";
            $("#ro-extra").textContent = "накопление орбит";
            return;
          }
          let it;
          if (t === "multibrot") it = multibrot(z.re, z.im, state.mbPower, mi);
          else if (t === "julia") it = juliaPow(z.re, z.im, jc.re, jc.im, state.juliaPower, mi);
          else if (t === "julia-exp") it = juliaTrans(z.re, z.im, jc.re, jc.im, 0, mi);
          else if (t === "julia-sin") it = juliaTrans(z.re, z.im, jc.re, jc.im, 1, mi);
          else if (t === "julia-cos") it = juliaTrans(z.re, z.im, jc.re, jc.im, 2, mi);
          else if (t === "tricorn") it = tricorn(z.re, z.im, mi);
          else if (t === "burningship") it = burningShip(z.re, z.im, mi);
          else if (t === "newton") {
            const r = makeNewtonIterator(params)(z.re, z.im);
            it = r.conv ? r.k : mi;
          } else it = mandelbrot(z.re, z.im, mi);
          $("#ro-fz").textContent = "—";
          $("#ro-extra-k").textContent = "итераций";
          if (it >= mi) {
            let extra = mi + " (внутри)";
            if (t === "mandelbrot" || t === "multibrot" || t === "julia") {
              const per = interiorPeriod(z.re, z.im, params);
              if (per > 0) extra = "внутри · период " + per;
            }
            $("#ro-extra").textContent = extra;
          } else $("#ro-extra").textContent = it.toFixed(1);
          return;
        }
        if (dispActive()) {
          const base = dispBase(),
            n = state.dispOrder,
            w = iterN(base, z, n),
            d = C(w.re - z.re, w.im - z.im);
          $("#ro-fz").textContent = fmt(d);
          $("#ro-extra-k").textContent = "|f−z| , arg";
          $("#ro-extra").textContent = isFiniteC(d)
            ? abs(d).toFixed(3) + " , " + arg(d).toFixed(3)
            : "∞";
          return;
        }
        $("#ro-fz").textContent = fmt(safe(opts.altF ? opts.altF() : curF(), z));
      }

      /* ---------- режимы ---------- */
      function updateTabs() {
        document.querySelectorAll(".mode-tab").forEach((t) => {
          const sel = t.dataset.mode === state.mode;
          t.setAttribute("aria-selected", !!sel);
        });
        const mn = $("#mode-name"),
          act = document.querySelector('.mode-tab[data-mode="' + state.mode + '"]');
        if (mn && act) mn.textContent = act.getAttribute("aria-label") || "";
      }
      function setMode(m) {
        state.mode = m;
        if (m !== "conformal" && typeof confPause === "function") confPause();
        if (m !== "phase" && typeof phasePause === "function") phasePause();
        if (m !== "fractal") {
          if (typeof hideJuliaPreview === "function") hideJuliaPreview();
          state.orbitPt = null;
        }
        document
          .querySelectorAll(".pane")
          .forEach((p) => p.classList.toggle("on", p.dataset.pane === m));
        const hints = {
          phase: "перетаскивание — сдвиг, прокрутка — масштаб",
          analysis: "клик — анализ точки/контура",
          conformal: "наведите курсор — точка и её образ",
          fractal: "прокрутка — масштаб, клик — c для Жюлиа",
          sphere: "перетаскивание — вращение",
          surface: "перетаскивание — вращение, ползунок — масштаб",
          compare: "общий вид: перетаскивание — сдвиг, прокрутка — масштаб",
        };
        $("#hint").textContent = hints[m] || "";
        $("#ro-extra-k").textContent = "";
        $("#ro-extra").textContent = "";
        updateTabs();
        buildPanel();
        buildFormulaBar();
        buildToolbar();
        requestAnimationFrame(() => render(1));
        syncHash();
      }
      function buildSettingsInto(d) {
        d.innerHTML = "";
        buildSettings(d);
      }
      function openSettingsDrawer() {
        const d = $("#settings-drawer");
        state.settingsOpen = true;
        buildSettingsInto(d);
        d.hidden = false;
        void d.offsetWidth;
        d.classList.add("open");
        const b = $("#btn-settings");
        if (b) b.setAttribute("aria-expanded", "true");
      }
      function closeSettingsDrawer() {
        const d = $("#settings-drawer");
        if (!state.settingsOpen) return;
        state.settingsOpen = false;
        d.classList.remove("open");
        const b = $("#btn-settings");
        if (b) b.setAttribute("aria-expanded", "false");
        const onEnd = () => {
          d.hidden = true;
          d.removeEventListener("transitionend", onEnd);
        };
        d.addEventListener("transitionend", onEnd);
      }
      function toggleSettingsDrawer() {
        if (state.settingsOpen) closeSettingsDrawer();
        else openSettingsDrawer();
      }

      /* ---------- инициализация ---------- */
      document.querySelectorAll(".mode-tab").forEach(
        (t) => (t.onclick = () => setMode(t.dataset.mode)),
      );
      /* ---------- SVG-иконки вкладок (viewBox 0 0 24 24, currentColor) ---------- */
      const MODE_ICONS = {
        phase() {
          let s = "";
          const cx = 12, cy = 12, R = 10.5;
          for (let k = 0; k < 12; k++) {
            const a0 = (k * 30 * Math.PI) / 180, a1 = ((k + 1) * 30 * Math.PI) / 180;
            const x0 = (cx + R * Math.cos(a0)).toFixed(2), y0 = (cy + R * Math.sin(a0)).toFixed(2),
              x1 = (cx + R * Math.cos(a1)).toFixed(2), y1 = (cy + R * Math.sin(a1)).toFixed(2);
            s += '<path d="M' + cx + " " + cy + " L" + x0 + " " + y0 + " A" + R + " " + R + " 0 0 1 " + x1 + " " + y1 + ' Z" fill="hsl(' + k * 30 + ',72%,55%)"/>';
          }
          s += '<circle cx="12" cy="12" r="10.5" fill="none" stroke="currentColor" stroke-width="0.8" opacity="0.45"/>';
          return s;
        },
        conformal() {
          return '<g fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"><path d="M7 3 Q3.5 12 7 21"/><path d="M12 3 L12 21"/><path d="M17 3 Q20.5 12 17 21"/><path d="M3 7 Q12 3.5 21 7"/><path d="M3 12 L21 12"/><path d="M3 17 Q12 20.5 21 17"/></g>';
        },
        analysis() {
          let s = "";
          const pos = [6, 12, 18];
          pos.forEach((yy) => pos.forEach((xx) => {
            let ang;
            if (xx === 12 && yy === 12) ang = -Math.PI / 2;
            else ang = Math.atan2(yy - 12, xx - 12) + Math.PI / 2;
            const L = 3.4, hx = Math.cos(ang) * L, hy = Math.sin(ang) * L;
            const x0 = xx - hx / 2, y0 = yy - hy / 2, x1 = xx + hx / 2, y1 = yy + hy / 2, ah = 1.8;
            const lx = x1 - Math.cos(ang - 0.5) * ah, ly = y1 - Math.sin(ang - 0.5) * ah,
              rx = x1 - Math.cos(ang + 0.5) * ah, ry = y1 - Math.sin(ang + 0.5) * ah;
            s += '<line x1="' + x0.toFixed(1) + '" y1="' + y0.toFixed(1) + '" x2="' + x1.toFixed(1) + '" y2="' + y1.toFixed(1) + '" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/>';
            s += '<path d="M' + lx.toFixed(1) + " " + ly.toFixed(1) + " L" + x1.toFixed(1) + " " + y1.toFixed(1) + " L" + rx.toFixed(1) + " " + ry.toFixed(1) + '" fill="none" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"/>';
          }));
          return s;
        },
        fractal() {
          const s = 14.5, mx = (re) => 1.5 + (re + 1.25) * s, my = (im) => 12 - im * s;
          let d = "";
          const N = 80;
          for (let i = 0; i <= N; i++) {
            const th = (i / N) * 2 * Math.PI,
              re = Math.cos(th) / 2 - Math.cos(2 * th) / 4,
              im = Math.sin(th) / 2 - Math.sin(2 * th) / 4;
            d += (i ? "L" : "M") + mx(re).toFixed(2) + " " + my(im).toFixed(2) + " ";
          }
          d += "Z";
          return '<path d="' + d + '" fill="currentColor"/><circle cx="' + mx(-1).toFixed(2) + '" cy="' + my(0).toFixed(2) + '" r="' + (0.25 * s).toFixed(2) + '" fill="currentColor"/><line x1="' + mx(-1.25).toFixed(2) + '" y1="12" x2="0.3" y2="12" stroke="currentColor" stroke-width="1.1"/>';
        },
        sphere() {
          return '<g fill="none" stroke="currentColor" stroke-linecap="round"><line x1="1.5" y1="18.5" x2="22.5" y2="18.5" stroke-width="1.2"/><circle cx="12" cy="11" r="7.5" stroke-width="1.2"/><ellipse cx="12" cy="11" rx="7.5" ry="2.4" stroke-width="0.7" opacity="0.5" stroke-dasharray="2 2"/><line x1="12" y1="3.5" x2="20.5" y2="18.5" stroke-width="1"/><circle cx="18" cy="14.6" r="1.2" stroke-width="1"/></g><circle cx="12" cy="3.5" r="1.4" fill="currentColor"/><circle cx="20.5" cy="18.5" r="1.4" fill="currentColor"/>';
        },
        surface() {
          // поверхность-пик с изолиниями: горизонтали (|f|) + меридианы (arg f)
          const cx = 12, apex = 4.2, baseY = 17, rx = 8.0, ry = 2.9;
          const ring = (t) => ({ cyy: baseY - (baseY - apex) * t, r: rx * Math.pow(1 - t, 1.3) });
          let s = '<g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">';
          s += '<g stroke-width="1">';
          for (const t of [0.04, 0.3, 0.55, 0.78]) {
            const R = ring(t),
              rry = Math.max(0.5, ry * (R.r / rx));
            s += '<ellipse cx="' + cx + '" cy="' + R.cyy.toFixed(2) + '" rx="' + R.r.toFixed(2) + '" ry="' + rry.toFixed(2) + '"/>';
          }
          s += '</g><g stroke-width="0.9">';
          const base = ring(0.04);
          for (let a = 0; a < 4; a++) {
            const ang = (a / 4) * Math.PI * 2 + Math.PI / 4,
              bx = cx + base.r * Math.cos(ang),
              by = base.cyy + ry * (base.r / rx) * Math.sin(ang),
              mx = cx + base.r * 0.5 * Math.cos(ang),
              my = (apex + base.cyy) / 2 + ry * 0.45 * (base.r / rx) * Math.sin(ang);
            s += '<path d="M' + cx + " " + apex + " Q" + mx.toFixed(1) + " " + my.toFixed(1) + " " + bx.toFixed(1) + " " + by.toFixed(1) + '"/>';
          }
          s += "</g></g>";
          return s;
        },
        compare() {
          return '<text x="12" y="15.7" text-anchor="middle" font-size="10" font-style="italic" font-family="Georgia, serif" fill="currentColor">f\u2194g</text>';
        },
      };
      function injectModeIcons() {
        document.querySelectorAll(".mode-tab").forEach((t) => {
          const g = MODE_ICONS[t.dataset.mode];
          if (g) t.innerHTML = '<svg viewBox="0 0 24 24" width="40" height="40" aria-hidden="true">' + g() + "</svg>";
        });
      }
      injectModeIcons();
      updateTabs();
      $("#btn-settings").onclick = toggleSettingsDrawer;
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape" && state.settingsOpen) closeSettingsDrawer();
      });
      document.addEventListener("pointerdown", (e) => {
        if (!state.settingsOpen) return;
        const d = $("#settings-drawer"),
          b = $("#btn-settings");
        if (d.contains(e.target) || (b && b.contains(e.target))) return;
        closeSettingsDrawer();
      });
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeTemplatesPop();
      });
      document.addEventListener("pointerdown", (e) => {
        const pop = $("#templates-pop"),
          tb = $("#btn-templates");
        if (!pop || pop.hidden) return;
        if (pop.contains(e.target) || (tb && tb.contains(e.target))) return;
        closeTemplatesPop();
      });
      window.addEventListener("resize", () => {
        const pop = $("#templates-pop");
        if (pop && !pop.hidden) positionTemplatesPop();
      });
      attachField($("#cv-phase"), () => views.phase, { probe: true });
      attachField($("#cv-analysis"), () => views.analysis, {
        probe: true,
        click: (z) => {
          const t = state.ana.tool;
          if (t === "continue") return contAddPoint(z);
          if (t === "pade") return padeAt(z);
          if (t === "boundary") return boundaryAt(z);
          if (t === "point") return analyzePoint(z);
          if (t === "series") return analyzeSeries(z);
          const sh = state.ana.shape || "circle";
          if (sh === "circle") return analyzeContour(z, state.ana.radius);
          if (sh === "rect") {
            state.ana.poly.push(z);
            if (state.ana.poly.length >= 2) {
              const A = state.ana.poly[0],
                B = state.ana.poly[1];
              const pts = [C(A.re, A.im), C(B.re, A.im), C(B.re, B.im), C(A.re, B.im)];
              state.ana.poly = [];
              analyzePolyContour(pts, true, "прямоугольник");
            } else {
              state.ana.contour = null;
              state.ana.drawn = { kind: "poly", pts: [C(z.re, z.im)], closed: false };
              renderAnalysis();
            }
            return;
          }
          // ломаная
          state.ana.poly.push(z);
          state.ana.contour = null;
          state.ana.drawn = { kind: "poly", pts: state.ana.poly.map((p) => C(p.re, p.im)), closed: false };
          renderAnalysis();
        },
      });
      attachField($("#cv-fractal"), () => views.fractal, {
        probe: true,
        fractal: true,
        click: (z) => {
        const params = paramsFromState();
          if (state.fractal === "buddhabrot") return;
          if (state.fracOrbit) {
            state.orbitPt = C(z.re, z.im);
            state.orbit = orbitPath(z, params);
            animateOrbit();
            return;
          }
          if (state.fractal === "mandelbrot" || state.fractal === "multibrot") {
            state.juliaPower = state.fractal === "multibrot" ? state.mbPower : 2;
            state.juliaC = { re: z.re, im: z.im };
            state.fractal = "julia";
            resetFractalView();
            buildPanel();
            render(1);
          }
        },
        hover: (z, e) => {
          if (!z || !e || !state.juliaPreview ||
              !(state.fractal === "mandelbrot" || state.fractal === "multibrot" || state.fractal === "tricorn" || state.fractal === "burningship")) {
            hideJuliaPreview();
            return;
          }
          juliaPreviewShow(e.clientX, e.clientY, z);
        },
      });
      attachField($("#cv-sphere"), () => views.sphere, { rotate: true, noZoom: true });
      attachField($("#cv-surface"), () => views.surface, { rotate: true, noZoom: true });
      attachField($("#cv-cmpL"), () => views.compare, { probe: true });
      attachField($("#cv-cmpR"), () => views.compare, { probe: true, altF: () => cmpG() });
      {
        const cv = $("#cv-confL");
        let cDrag = false,
          cLx = 0,
          cLy = 0,
          cMoved = 0;
        const cview = () => (state.confSync ? views.phase : views.conformal);
        cv.addEventListener(
          "wheel",
          (e) => {
            e.preventDefault();
            const v = cview(),
              W = cv.width,
              H = cv.height,
              r = cv.getBoundingClientRect();
            const mx = ((e.clientX - r.left) * W) / r.width,
              my = ((e.clientY - r.top) * H) / r.height;
            const z = C(v.cx + (mx - W / 2) * v.scale, v.cy - (my - H / 2) * v.scale);
            const f = Math.exp(-e.deltaY * 0.0014);
            v.scale /= f;
            v.cx = z.re - (mx - W / 2) * v.scale;
            v.cy = z.im + (my - H / 2) * v.scale;
            render(1);
          },
          { passive: false },
        );
        cv.addEventListener("pointerdown", (e) => {
          cDrag = true;
          cMoved = 0;
          cLx = e.clientX;
          cLy = e.clientY;
          cv.setPointerCapture(e.pointerId);
        });
        cv.addEventListener("pointerup", () => {
          cDrag = false;
        });
        cv.addEventListener("pointermove", (e) => {
          const W = cv.width,
            H = cv.height,
            r = cv.getBoundingClientRect();
          if (cDrag) {
            const v = cview();
            const dx = ((e.clientX - cLx) * W) / r.width,
              dy = ((e.clientY - cLy) * H) / r.height;
            cLx = e.clientX;
            cLy = e.clientY;
            cMoved += Math.abs(dx) + Math.abs(dy);
            v.cx -= dx * v.scale;
            v.cy += dy * v.scale;
            render(1);
            return;
          }
          if (!_conf || !state.confShowSource || state.confAnim || !_conf.snapL) return;
          const mx = ((e.clientX - r.left) * W) / r.width,
            my = ((e.clientY - r.top) * H) / r.height,
            v = _conf.domView,
            z = C(v.cx + (mx - W / 2) * v.scale, v.cy - (my - H / 2) * v.scale);
          $("#ro-z").textContent = fmt(z);
          const w = tryc(() => (_conf.mf || curF())(z)) || NAN_;
          $("#ro-fz").textContent = fmt(w);
          const lc = cv.getContext("2d");
          lc.putImageData(_conf.snapL, 0, 0);
          lc.fillStyle = "#fff";
          lc.beginPath();
          lc.arc(W / 2 + (z.re - v.cx) / v.scale, H / 2 - (z.im - v.cy) / v.scale, 4, 0, 7);
          lc.fill();
          if (_conf.snapR && isFiniteC(w)) {
            const Rc = _conf.R,
              iv = _conf.imgView,
              rc = Rc.getContext("2d");
            rc.putImageData(_conf.snapR, 0, 0);
            rc.fillStyle = "#fff";
            rc.beginPath();
            rc.arc(
              Rc.width / 2 + (w.re - iv.cx) / iv.scale,
              Rc.height / 2 - (w.im - iv.cy) / iv.scale,
              4,
              0,
              7,
            );
            rc.fill();
          }
        });
        cv.addEventListener("pointerleave", () => {
          cDrag = false;
          if (!_conf) return;
          if (_conf.snapL) _conf.L.getContext("2d").putImageData(_conf.snapL, 0, 0);
          if (_conf.snapR && _conf.R) _conf.R.getContext("2d").putImageData(_conf.snapR, 0, 0);
        });
        cv.addEventListener("click", (e) => {
          if (cMoved > 4) return; // был перетаскивающий жест — не выделять
          if (!_conf || !state.confShowSource || state.confAnim) return;
          const W = cv.width,
            H = cv.height,
            r = cv.getBoundingClientRect();
          const mx = ((e.clientX - r.left) * W) / r.width,
            my = ((e.clientY - r.top) * H) / r.height,
            v = _conf.domView;
          confSelectAt(C(v.cx + (mx - W / 2) * v.scale, v.cy - (my - H / 2) * v.scale), e);
        });
      }
      window.addEventListener("resize", () => {
        clearTimeout(idleTimer);
        idleTimer = setTimeout(() => render(1), 120);
      });
      loadFav();
      restoreFromHash();
      state.exprHistory = [state.expr];
      state.exprHistIdx = 0;
      setMode(state.mode);
    </script>
  </body>
</html>
