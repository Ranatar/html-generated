      const keyByVal = (o, v) => Object.keys(o).find((k) => o[k] === v);

      /* ---------- индикатор прогресса и порционный рендер ---------- */
      let renderGen = 0; // токен поколения: новый рендер отменяет старый
      const _rp = () => document.getElementById("render-progress");
      function showProgress(frac) {
        const e = _rp();
        if (!e) return;
        e.classList.add("on");
        e.querySelector(".rp-bar").style.width = (frac * 100).toFixed(1) + "%";
        e.querySelector(".rp-label").textContent = "отрисовка " + Math.round(frac * 100) + "%";
      }
      function hideProgress() {
        const e = _rp();
        if (e) e.classList.remove("on");
      }
      // Универсальный порционный драйвер: fillBand(j0,j1)→Uint8ClampedArray полосы; рисует сверху вниз,
      // уступая поток только если полоса заняла >28 мс; индикатор показывается лишь при долгом рендере (>180 мс).
      async function chunkedPaint(cv, rw, rh, W, H, fillBand, myGen, onDone) {
        const ctx = cv.getContext("2d");
        ctx.imageSmoothingEnabled = true;
        off.width = rw;
        off.height = rh;
        const band = Math.max(2, Math.ceil(rh / 120)),
          start = performance.now();
        let lastYield = start,
          shown = false;
        for (let j0 = 0; j0 < rh; j0 += band) {
          if (myGen !== renderGen) return; // отменён более новым рендером
          const j1 = Math.min(rh, j0 + band);
          offc.putImageData(new ImageData(fillBand(j0, j1), rw, j1 - j0), 0, j0);
          const now = performance.now();
          if (now - lastYield > 28 || j1 >= rh) {
            ctx.drawImage(off, 0, 0, rw, j1, 0, 0, W, (j1 * H) / rh); // дорисовать готовую верхнюю часть поверх старого кадра
            if (!shown && now - start > 180) shown = true;
            if (shown) showProgress(j1 / rh);
            lastYield = now;
            await new Promise((r) => setTimeout(r, 0));
            if (myGen !== renderGen) return;
          }
        }
        ctx.clearRect(0, 0, W, H);
        ctx.drawImage(off, 0, 0, rw, rh, 0, 0, W, H);
        hideProgress();
        if (onDone) onDone(ctx);
      }

      /* ---------- рендер поля (быстрый путь, если доступен) ---------- */
      function renderField(cv, v, q, onDone) {
        const myGen = renderGen,
          W = sizeCanvas(cv).width,
          H = cv.height,
          rw = Math.max(40, (W * q) | 0),
          rh = Math.max(40, (H * q) | 0);
        const hw = (v.scale * W) / 2,
          hh = (v.scale * H) / 2;
        const region = {
          xmin: v.cx - hw,
          xmax: v.cx + hw,
          ymin: v.cy - hh,
          ymax: v.cy + hh,
          width: rw,
          height: rh,
        };
        const ctx = cv.getContext("2d"),
          fast = displayFast();
        const finish = () => {
          drawAxes(ctx, W, H, v);
          if (onDone) onDone(ctx);
        };
        // быстрый путь и интерактивное низкое качество — синхронно (они дёшевы)
        if ((fast && state.scheme === "classic") || q < 1) {
          let img;
          if (fast && state.scheme === "classic")
            img = renderToImageDataFast(fast, region, phaseColorRaw);
          else img = renderToImageData(displayF(), region, { colorOpts: colorOpts() });
          off.width = rw;
          off.height = rh;
          offc.putImageData(new ImageData(img.data, rw, rh), 0, 0);
          ctx.imageSmoothingEnabled = q < 1;
          ctx.clearRect(0, 0, W, H);
          ctx.drawImage(off, 0, 0, rw, rh, 0, 0, W, H);
          hideProgress();
          finish();
          return ctx;
        }
        // полное качество тяжёлой функции — порционно, с прогрессом
        const f = displayF(),
          dy = (region.ymax - region.ymin) / rh;
        const fillBand = (j0, j1) =>
          renderToImageData(
            f,
            {
              xmin: region.xmin,
              xmax: region.xmax,
              ymin: region.ymax - j1 * dy,
              ymax: region.ymax - j0 * dy,
              width: rw,
              height: j1 - j0,
            },
            { colorOpts: colorOpts() },
          ).data;
        chunkedPaint(cv, rw, rh, W, H, fillBand, myGen, finish);
        return ctx;
      }
      function drawAxes(ctx, W, H, v) {
        ctx.save();
        ctx.strokeStyle = "rgba(255,255,255,.14)";
        ctx.lineWidth = 1;
        const x0 = W / 2 - v.cx / v.scale,
          y0 = H / 2 + v.cy / v.scale;
        ctx.beginPath();
        ctx.moveTo(0, y0);
        ctx.lineTo(W, y0);
        ctx.moveTo(x0, 0);
        ctx.lineTo(x0, H);
        ctx.stroke();
        ctx.restore();
      }

      /* ---------- анимация портрета: H_t(z)=(1−t)·z+t·f(z), перекраска по фазе ---------- */
      let phaseRAF = null,
        phaseDir = 1,
        phaseField = null,
        phaseLastTs = 0;
      function ensurePhaseField() {
        // поле w=f(z) на пиксель считается один раз и кэшируется
        const cv = $("#cv-phase"),
          W = cv.width || 1024,
          H = cv.height || 1024,
          v = views.phase;
        const aw = Math.max(80, state.phaseRes | 0),
          ah = Math.max(40, Math.round((aw * H) / W));
        const key =
          state.expr +
          "|" +
          v.cx.toFixed(6) +
          "|" +
          v.cy.toFixed(6) +
          "|" +
          v.scale.toExponential(6) +
          "|" +
          aw +
          "x" +
          ah +
          "|" +
          (xyActive() ? "xy" : "") +
          (rotActive() ? "r" + state.theta + "_" + state.phi : "") +
          (dispActive() ? "d" + state.dispOrder + "_" + (state.dispScale || 1) : "");
        if (phaseField && phaseField.key === key) return phaseField;
        const f = displayF(),
          hw = (v.scale * W) / 2,
          hh = (v.scale * H) / 2;
        const xmin = v.cx - hw,
          xmax = v.cx + hw,
          ymin = v.cy - hh,
          ymax = v.cy + hh,
          dx = (xmax - xmin) / aw,
          dy = (ymax - ymin) / ah,
          N = aw * ah;
        const zr = new Float64Array(N),
          zi = new Float64Array(N),
          wr = new Float64Array(N),
          wi = new Float64Array(N),
          fin = new Uint8Array(N);
        let p = 0;
        for (let j = 0; j < ah; j++) {
          const y = ymax - (j + 0.5) * dy;
          for (let i = 0; i < aw; i++) {
            const x = xmin + (i + 0.5) * dx;
            zr[p] = x;
            zi[p] = y;
            let w;
            try {
              w = f(C(x, y));
            } catch {
              w = null;
            }
            if (w && isFiniteC(w)) {
              wr[p] = w.re;
              wi[p] = w.im;
              fin[p] = 1;
            }
            p++;
          }
        }
        phaseField = { key, aw, ah, zr, zi, wr, wi, fin };
        return phaseField;
      }
      function drawPhaseFrame(t) {
        const F = ensurePhaseField(),
          aw = F.aw,
          ah = F.ah,
          N = aw * ah,
          it = 1 - t,
          opts = colorOpts(),
          buf = new Uint8ClampedArray(N * 4);
        for (let p = 0; p < N; p++) {
          let col;
          if (!F.fin[p] && t > 0) {
            col = { r: 255, g: 255, b: 255 };
          } // образ ушёл в ∞ → белое
          else {
            const hr = it * F.zr[p] + t * F.wr[p],
              hi = it * F.zi[p] + t * F.wi[p];
            try {
              col = phaseColor(C(hr, hi), opts);
            } catch {
              col = { r: 0, g: 0, b: 0 };
            }
          }
          const q = p * 4;
          buf[q] = col.r;
          buf[q + 1] = col.g;
          buf[q + 2] = col.b;
          buf[q + 3] = 255;
        }
        const cv = $("#cv-phase"),
          W = cv.width,
          H = cv.height,
          ctx = cv.getContext("2d");
        off.width = aw;
        off.height = ah;
        offc.putImageData(new ImageData(buf, aw, ah), 0, 0);
        ctx.imageSmoothingEnabled = true;
        ctx.clearRect(0, 0, W, H);
        ctx.drawImage(off, 0, 0, aw, ah, 0, 0, W, H);
        drawAxes(ctx, W, H, views.phase);
      }
      function syncPhaseT() {
        const t = document.getElementById("phase-t");
        if (t) t.value = state.phaseT;
        const tv = document.getElementById("phase-t-val");
        if (tv) tv.textContent = state.phaseT.toFixed(2);
      }
      function updatePhasePlayBtn() {
        const b = document.getElementById("phase-play");
        if (b) b.textContent = state.phasePlaying ? "⏸ пауза" : "▶ играть";
      }
      function phasePlay() {
        if (state.phasePlaying) return;
        state.phasePlaying = true;
        phaseLastTs = 0;
        updatePhasePlayBtn();
        const tick = (ts) => {
          if (!state.phasePlaying || state.mode !== "phase" || !state.phaseAnim) {
            phaseRAF = null;
            return;
          }
          if (phaseLastTs) {
            let nt = state.phaseT + (state.phaseSpeed * phaseDir * (ts - phaseLastTs)) / 1000;
            if (nt >= 1) {
              if (state.phaseLoop === "ping") {
                nt = 1;
                phaseDir = -1;
              } else if (state.phaseLoop === "loop") {
                nt = 0;
              } else {
                nt = 1;
                state.phasePlaying = false;
              }
            } else if (nt <= 0) {
              if (state.phaseLoop === "ping") {
                nt = 0;
                phaseDir = 1;
              } else nt = 0;
            }
            state.phaseT = nt;
          }
          phaseLastTs = ts;
          drawPhaseFrame(state.phaseT);
          syncPhaseT();
          if (state.phasePlaying) phaseRAF = requestAnimationFrame(tick);
          else {
            phaseRAF = null;
            updatePhasePlayBtn();
          }
        };
        phaseRAF = requestAnimationFrame(tick);
      }
      function phasePause() {
        state.phasePlaying = false;
        if (phaseRAF) cancelAnimationFrame(phaseRAF);
        phaseRAF = null;
        updatePhasePlayBtn();
      }
      let animRecording = false;
      async function exportAnimWebM(cv, fname, drawFrame, loop, speed, btnEl) {
        if (animRecording) return;
        if (!cv || !cv.captureStream || !window.MediaRecorder) {
          alert("Запись WebM не поддерживается этим браузером.");
          return;
        }
        const fps = 30;
        let mime = "video/webm";
        if (MediaRecorder.isTypeSupported) {
          if (MediaRecorder.isTypeSupported("video/webm;codecs=vp9"))
            mime = "video/webm;codecs=vp9";
          else if (MediaRecorder.isTypeSupported("video/webm;codecs=vp8"))
            mime = "video/webm;codecs=vp8";
        }
        let stream, rec;
        try {
          stream = cv.captureStream(fps);
          rec = new MediaRecorder(stream, { mimeType: mime, videoBitsPerSecond: 1.2e7 });
        } catch (e) {
          alert("Не удалось начать запись: " + e.message);
          return;
        }
        const chunks = [];
        rec.ondataavailable = (e) => {
          if (e.data && e.data.size) chunks.push(e.data);
        };
        const done = new Promise((r) => {
          rec.onstop = r;
        });
        animRecording = true;
        const ot = btnEl ? btnEl.textContent : "";
        if (btnEl) {
          btnEl.disabled = true;
          btnEl.textContent = "● запись…";
        }
        const wait = (ms) => new Promise((r) => setTimeout(r, ms));
        rec.start();
        const pass = Math.max(24, Math.round(fps / Math.max(0.1, speed))),
          seqs =
            loop === "ping"
              ? [
                  [0, 1],
                  [1, 0],
                ]
              : [[0, 1]];
        for (const [a, bb] of seqs)
          for (let k = 0; k <= pass; k++) {
            drawFrame(a + ((bb - a) * k) / pass);
            await wait(1000 / fps);
          }
        await wait(250);
        rec.stop();
        await done;
        animRecording = false;
        if (btnEl) {
          btnEl.disabled = false;
          btnEl.textContent = ot;
        }
        const blob = new Blob(chunks, { type: "video/webm" }),
          url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = fname;
        document.body.appendChild(a);
        a.click();
        a.remove();
        setTimeout(() => URL.revokeObjectURL(url), 2000);
      }

      /* ---------- анализ: оверлей маркеров/контура/точки ---------- */
      function renderAnalysis(q) {
        q = q || 1;
        const cv = $("#cv-analysis"),
          v = views.analysis;
        renderField(cv, v, q, (ctx) => {
          const W = cv.width,
            H = cv.height,
            toPx = (z) => [W / 2 + (z.re - v.cx) / v.scale, H / 2 - (z.im - v.cy) / v.scale];
          const a = state.ana;
          if (a.markers) {
            for (const z of a.markers.zeros) {
              const [x, y] = toPx(z);
              ctx.strokeStyle = "#0c0f15";
              ctx.lineWidth = 3;
              ctx.beginPath();
              ctx.arc(x, y, 6, 0, 7);
              ctx.stroke();
              ctx.strokeStyle = getCss("--teal");
              ctx.lineWidth = 2;
              ctx.beginPath();
              ctx.arc(x, y, 6, 0, 7);
              ctx.stroke();
            }
            for (const z of a.markers.poles) {
              const [x, y] = toPx(z);
              ctx.strokeStyle = "#0c0f15";
              ctx.lineWidth = 4;
              ctx.beginPath();
              cross(ctx, x, y, 6);
              ctx.stroke();
              ctx.strokeStyle = getCss("--warm");
              ctx.lineWidth = 2;
              ctx.beginPath();
              cross(ctx, x, y, 6);
              ctx.stroke();
            }
          }
          if (a.contour) {
            const [x, y] = toPx(a.contour);
            ctx.strokeStyle = getCss("--teal");
            ctx.lineWidth = 1.5;
            ctx.setLineDash([5, 4]);
            ctx.beginPath();
            ctx.arc(x, y, a.radius / v.scale, 0, 7);
            ctx.stroke();
            ctx.setLineDash([]);
          }
          if (a.point) {
            const [x, y] = toPx(a.point);
            ctx.fillStyle = "#fff";
            ctx.beginPath();
            ctx.arc(x, y, 4, 0, 7);
            ctx.fill();
          }
        });
      }
      const cross = (ctx, x, y, r) => {
        ctx.moveTo(x - r, y - r);
        ctx.lineTo(x + r, y + r);
        ctx.moveTo(x + r, y - r);
        ctx.lineTo(x - r, y + r);
      };
      const getCss = (v) => getComputedStyle(document.documentElement).getPropertyValue(v).trim();
      function arrowHead(ctx, x0, y0, x1, y1, head) {
        ctx.beginPath();
        ctx.moveTo(x0, y0);
        ctx.lineTo(x1, y1);
        ctx.stroke();
        const a = Math.atan2(y1 - y0, x1 - x0);
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x1 - head * Math.cos(a - 0.4), y1 - head * Math.sin(a - 0.4));
        ctx.lineTo(x1 - head * Math.cos(a + 0.4), y1 - head * Math.sin(a + 0.4));
        ctx.closePath();
        ctx.fill();
      }
      // оверлей поля смещения: стрелки z→fⁿ(z) и маркеры неподвижных точек
      function phaseOverlay(ctx, cv, v) {
        if (!dispActive()) return;
        const W = cv.width,
          H = cv.height,
          toPx = (z) => [W / 2 + (z.re - v.cx) / v.scale, H / 2 - (z.im - v.cy) / v.scale];
        const base = dispBase(),
          n = state.dispOrder;
        if (state.dispArrows) {
          ctx.save();
          ctx.strokeStyle = "rgba(255,255,255,.55)";
          ctx.fillStyle = "rgba(255,255,255,.55)";
          ctx.lineWidth = 1;
          const step = Math.max(26, Math.min(W, H) / 16);
          for (let py = step / 2; py < H; py += step)
            for (let px = step / 2; px < W; px += step) {
              const z = C(v.cx + (px - W / 2) * v.scale, v.cy - (py - H / 2) * v.scale),
                w = iterN(base, z, n);
              if (!isFiniteC(w)) continue;
              let dx = (w.re - z.re) / v.scale,
                dy = -(w.im - z.im) / v.scale;
              const len = Math.hypot(dx, dy);
              if (len < 0.6) continue;
              const cap = step * 0.82,
                sc = len > cap ? cap / len : 1;
              arrowHead(ctx, px, py, px + dx * sc, py + dy * sc, 4);
            }
          ctx.restore();
        }
        if (state.dispFixed)
          for (const z of state.dispFixed) {
            const [x, y] = toPx(z);
            ctx.strokeStyle = "#0c0f15";
            ctx.lineWidth = 3.5;
            ctx.beginPath();
            ctx.arc(x, y, 7, 0, 7);
            ctx.stroke();
            ctx.strokeStyle = getCss("--teal");
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(x, y, 7, 0, 7);
            ctx.stroke();
            ctx.fillStyle = getCss("--teal");
            ctx.beginPath();
            ctx.arc(x, y, 2.2, 0, 7);
            ctx.fill();
          }
      }
      function findFixedPoints() {
        const v = views.phase,
          cv = $("#cv-phase"),
          W = cv.width || 800,
          H = cv.height || 600;
        const xmin = v.cx - (v.scale * W) / 2,
          xmax = v.cx + (v.scale * W) / 2,
          ymin = v.cy - (v.scale * H) / 2,
          ymax = v.cy + (v.scale * H) / 2;
        const base = dispBase(),
          n = state.dispOrder,
          g = (z) => {
            const w = iterN(base, z, n);
            return C(w.re - z.re, w.im - z.im);
          };
        let zeros = [];
        try {
          zeros = AC.findZerosPoles(g, xmin, xmax, ymin, ymax).zeros;
        } catch (e) {
          zeros = [];
        }
        state.dispFixed = zeros;
        const el = $("#disp-out");
        if (el) {
          el.innerHTML = "";
          const h = document.createElement("div");
          h.className = "hd";
          h.textContent =
            (n > 1 ? "точки периода | " + n : "неподвижные точки") +
            " — " +
            zeros.length +
            " в окне";
          el.appendChild(h);
          zeros.forEach((z, i) => {
            const r = document.createElement("div");
            r.className = "row";
            const mult = tryc(() => derivative((z2) => iterN(base, z2, n), z));
            const lab = mult ? " | f′=" + fmtShort(mult) : "";
            r.innerHTML = `<span class="k">${n > 1 ? "период" : "непод."} ${i + 1}</span><span class="v teal">${fmt(z)}${lab}</span>`;
            el.appendChild(r);
          });
          if (!zeros.length) {
            const r = document.createElement("div");
            r.className = "row";
            r.innerHTML = '<span class="k">—</span><span class="v">в окне не найдено</span>';
            el.appendChild(r);
          }
        }
        render(1);
      }

      function analyzePoint(z0) {
        const f = curF(),
          out = [
            ["z₀", fmt(z0), ""],
            ["f(z₀)", fmt(safe(f, z0)), "teal"],
          ];
        out.push(["f′(z₀)", fmt(tryc(() => derivative(f, z0))), ""]);
        let cls = tryc(() => classifySingularity(f, z0, { radius: 0.05, terms: 10 }));
        if (cls) {
          if (cls.type === "regular") {
            out.push(["особенность", "нет", ""]);
          } else if (cls.type === "pole") {
            out.push(["особенность", "полюс порядка " + cls.order, "warm"]);
            out.push(["вычет", fmt(tryc(() => residue(f, z0, { radius: 0.05 }))), "teal"]);
          } else out.push(["особенность", "существенная", "warm"]);
        }
        if (!cls || cls.type === "regular") {
          const t = tryc(() => taylor(f, z0, { terms: 4, radius: 0.3 }));
          if (t) out.push(["Тейлор", t.map(fmtShort).join("; "), ""]);
        }
        // многозначность значения
        const fz = safe(f, z0);
        if (isFiniteC(fz)) {
          const r2 = nthRoots(fz, 2);
          out.push(["√f(z₀)", r2.map(fmtShort).join(" , "), ""]);
          const lb = logBranches(fz, 1);
          out.push(["ln f, k=−1..1", lb.map(fmtShort).join(" ; "), ""]);
        }
        state.ana.point = z0;
        state.ana.out = out;
        showResults("точка", out);
        renderAnalysis();
      }
      function analyzeContour(c, r) {
        const f = curF(),
          ct = circle(c, r);
        const I = tryc(() => integrateAdaptive(f, ct, { tol: 1e-9 }));
        const zp = tryc(() => argumentPrinciple(f, ct));
        const out = [
          ["центр", fmt(c), ""],
          ["радиус", r.toFixed(3), ""],
        ];
        if (I) {
          out.push(["∮ f dz", fmt(I.value), "teal"]);
          out.push(["Σ вычетов", fmt(div(I.value, C(0, 2 * Math.PI))), "teal"]);
        }
        if (zp != null) out.push(["нулей−полюсов", String(zp), "warm"]);
        state.ana.contour = c;
        state.ana.radius = r;
        showResults("контур |z−c|=r", out);
        renderAnalysis();
      }
      function findZP() {
        const v = views.analysis,
          cv = $("#cv-analysis"),
          W = cv.width || 800,
          H = cv.height || 600;
        const xmin = v.cx - (v.scale * W) / 2,
          xmax = v.cx + (v.scale * W) / 2,
          ymin = v.cy - (v.scale * H) / 2,
          ymax = v.cy + (v.scale * H) / 2;
        let zeros, poles, note;
        if (state.compiled.coeffs) {
          zeros = roots(state.compiled.coeffs).filter(
            (z) => z.re >= xmin && z.re <= xmax && z.im >= ymin && z.im <= ymax,
          );
          poles = [];
          note = "точно (многочлен)";
        } else {
          const zp = AC.findZerosPoles(curF(), xmin, xmax, ymin, ymax);
          zeros = zp.zeros;
          poles = zp.poles;
          note = "численно (Ньютон)";
        }
        state.ana.markers = { zeros, poles };
        const out = [["метод", note, ""]];
        zeros.forEach((z, i) => out.push(["нуль " + (i + 1), fmt(z), "teal"]));
        poles.forEach((z, i) => out.push(["полюс " + (i + 1), fmt(z), "warm"]));
        showResults("нули (○) и полюсы (×) в окне", out);
        renderAnalysis();
      }

          wm.forEach((w) => {
            if (Math.hypot(w.re, w.im) <= cap) pts.push(w);
          });
        } else wm.forEach((w) => pts.push(w));
        confMesh = { key, N, dom, ext, zs, ws, pts };
        return confMesh;
      }
      function paintMesh(ctx, W, H, view, corner, N, mode) {
        ctx.clearRect(0, 0, W, H);
        const proj = (p) => [
          W / 2 + (p.re - view.cx) / view.scale,
          H / 2 - (p.im - view.cy) / view.scale,
        ];
        if (mode === "checker") {
          const colA = "#5ad1c4",
            colB = "#1a2230",
            BL = 3;
          for (let i = 0; i < N; i++)
            for (let j = 0; j < N; j++) {
              const a = corner(i, j),
                b = corner(i + 1, j),
                c = corner(i + 1, j + 1),
                d = corner(i, j + 1);
              if (!a || !b || !c || !d) continue;
              ctx.fillStyle = (Math.floor(i / BL) + Math.floor(j / BL)) & 1 ? colA : colB;
              ctx.beginPath();
              [a, b, c, d].forEach((p, k) => {
                const q = proj(p);
                k ? ctx.lineTo(q[0], q[1]) : ctx.moveTo(q[0], q[1]);
              });
              ctx.closePath();
              ctx.fill();
            }
        } else {
          ctx.lineWidth = 1;
          for (let i = 0; i <= N; i++) {
            ctx.strokeStyle = "rgba(90,209,196,.55)";
            ctx.beginPath();
            let st = false; // линии Re=const
            for (let j = 0; j <= N; j++) {
              const p = corner(i, j);
              if (!p) {
                st = false;
                continue;
              }
              const q = proj(p);
              st ? ctx.lineTo(q[0], q[1]) : ctx.moveTo(q[0], q[1]);
              st = true;
            }
            ctx.stroke();
          }
          for (let j = 0; j <= N; j++) {
            ctx.strokeStyle = "rgba(232,160,90,.5)";
            ctx.beginPath();
            let st = false; // линии Im=const
            for (let i = 0; i <= N; i++) {
              const p = corner(i, j);
              if (!p) {
                st = false;
                continue;
              }
              const q = proj(p);
              st ? ctx.lineTo(q[0], q[1]) : ctx.moveTo(q[0], q[1]);
              st = true;
            }
            ctx.stroke();
          }
        }
      }
      function drawConfFrame(t) {
        const M = ensureConfMesh(),
          it = 1 - t,
          R = sizeCanvas($("#cv-confR")),
          showL = state.confShowSource;
        const viewR = fitView(M.pts, R.width, R.height);
        const cornerR = (i, j) => {
          const z = M.zs[i][j],
            w = M.ws[i][j];
          return w ? C(it * z.re + t * w.re, it * z.im + t * w.im) : null;
        };
        paintMesh(R.getContext("2d"), R.width, R.height, viewR, cornerR, M.N, state.confView);
        let L = null,
          viewL = null;
        if (showL) {
          L = sizeCanvas($("#cv-confL"));
          viewL =
            M.dom === "disk"
              ? { cx: 0, cy: 0, scale: 2.4 / Math.min(L.width, L.height) }
              : { cx: 0, cy: 0, scale: (2 * M.ext * 1.08) / Math.min(L.width, L.height) };
          paintMesh(
            L.getContext("2d"),
            L.width,
            L.height,
            viewL,
            (i, j) => M.zs[i][j],
            M.N,
            state.confView,
          );
        }
        _conf = { L, R, domView: viewL || viewR, imgView: viewR, mf: null };
      }
      function syncConfT() {
        const tin = document.getElementById("conf-t");
        if (tin) tin.value = state.confT;
        const tv = document.getElementById("conf-t-val");

      function updatePlayBtn() {
        const b = document.getElementById("conf-play");

      }
      function confPlay() {
        if (state.confPlaying) return;

        confLastTs = 0;
        updatePlayBtn();
        const tick = (ts) => {
          if (!state.confPlaying || state.mode !== "conformal" || !state.confAnim) {
            confRAF = null;
            return;
          }
          if (confLastTs) {
            let nt = state.confT + (state.confSpeed * confDir * (ts - confLastTs)) / 1000;
            if (nt >= 1) {
              if (state.confLoop === "ping") {
                nt = 1;
                confDir = -1;
              } else if (state.confLoop === "loop") {
                nt = 0;
              } else {
                nt = 1;
                state.confPlaying = false;
              }
            } else if (nt <= 0) {
              if (state.confLoop === "ping") {
                nt = 0;
                confDir = 1;
              } else nt = 0;
            }
            state.confT = nt;
          }
          confLastTs = ts;
          drawConfFrame(state.confT);
          syncConfT();
          if (state.confPlaying) confRAF = requestAnimationFrame(tick);
          else {
            confRAF = null;

          }
        };
        confRAF = requestAnimationFrame(tick);

      function confPause() {

      let confRecording = false;
      async function exportConfWebM(btnEl) {
        if (confRecording) return;
        confPause();
        const cv = $("#cv-confR");
        if (!cv || !cv.captureStream || !window.MediaRecorder) {
          alert("Запись WebM не поддерживается этим браузером.");
          return;
        }
        const fps = 30;
        let mime = "video/webm";
        if (MediaRecorder.isTypeSupported) {
          if (MediaRecorder.isTypeSupported("video/webm;codecs=vp9"))
            mime = "video/webm;codecs=vp9";
          else if (MediaRecorder.isTypeSupported("video/webm;codecs=vp8"))
            mime = "video/webm;codecs=vp8";
        }
        let stream, rec;
        try {
          stream = cv.captureStream(fps);
          rec = new MediaRecorder(stream, { mimeType: mime, videoBitsPerSecond: 1.2e7 });
        } catch (e) {
          alert("Не удалось начать запись: " + e.message);
          return;
        }
        const chunks = [];
        rec.ondataavailable = (e) => {
          if (e.data && e.data.size) chunks.push(e.data);
        };
        const done = new Promise((r) => {
          rec.onstop = r;
        });
        confRecording = true;
        const ot = btnEl ? btnEl.textContent : "";
        if (btnEl) {
          btnEl.disabled = true;
          btnEl.textContent = "● запись…";
        }
        const wait = (ms) => new Promise((r) => setTimeout(r, ms));
        rec.start();
        const pass = Math.max(24, Math.round(fps / Math.max(0.1, state.confSpeed))); // кадров на проход (по скорости)
        const seqs =
          state.confLoop === "ping"
            ? [
                [0, 1],
                [1, 0],
              ]
            : [[0, 1]]; // туда-обратно делает бесшовную петлю
        for (const [a, bb] of seqs)
          for (let k = 0; k <= pass; k++) {
            const t = a + ((bb - a) * k) / pass;
            drawConfFrame(t);
            state.confT = t;
            await wait(1000 / fps);
          }
        await wait(250);
        rec.stop();
        await done;
        confRecording = false;
        if (btnEl) {
          btnEl.disabled = false;
          btnEl.textContent = ot;
        }
        const blob = new Blob(chunks, { type: "video/webm" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "деформация.webm";
        document.body.appendChild(a);
        a.click();
        a.remove();
        setTimeout(() => URL.revokeObjectURL(url), 2000);
        syncConfT();
      }

      /* ---------- фракталы ---------- */
      const isJuliaType = (t) =>
        t === "julia" || t === "julia-exp" || t === "julia-sin" || t === "julia-cos";
      function resetFractalView() {
        const t = state.fractal;
        if (t === "mandelbrot") views.fractal = { cx: -0.5, cy: 0, scale: 3 / 600 };
        else if (t === "multibrot") views.fractal = { cx: 0, cy: 0, scale: 3.6 / 600 };
        else if (t === "tricorn") views.fractal = { cx: 0, cy: 0, scale: 3 / 600 };
        else if (t === "burningship") views.fractal = { cx: -0.4, cy: -0.5, scale: 3 / 600 };
        else if (t === "julia-exp") views.fractal = { cx: 0, cy: 0, scale: 9 / 600 };
        else if (t === "julia-sin" || t === "julia-cos")
          views.fractal = { cx: 0, cy: 0, scale: 6 / 600 };
        else views.fractal = { cx: 0, cy: 0, scale: 3.2 / 600 };
      } // julia, newton
      // Единая раскраска убегания по абсолютному (сглаженному) счётчику — лог-раскладка, не зависит от maxIter.
      function fracColor(it, data, p) {
        const t = Math.log(1 + it);
        const h = ((0.58 + t * 0.24) % 1) * 360,
          l = 0.14 + 0.58 * Math.min(1, t / 5),
          c = hsl2rgb(h, 0.76, l);
        data[p] = c.r;
        data[p + 1] = c.g;
        data[p + 2] = c.b;
        data[p + 3] = 255;
      }
      function newtonColor(idx, k, conv, data, p) {
        if (!conv) {
          data[p] = 8;
          data[p + 1] = 9;
          data[p + 2] = 16;
          data[p + 3] = 255;
          return;
        } // не сошлось → множество Жюлиа
        const h = (idx * 137.508) % 360,
          l = 0.28 + 0.5 * Math.max(0, 1 - k / 26),
          c = hsl2rgb(h, 0.62, l); // оттенок по корню, яркость по скорости
        data[p] = c.r;
        data[p + 1] = c.g;
        data[p + 2] = c.b;
        data[p + 3] = 255;
      }
      // Итератор Ньютона/Галлея для текущей f: точные f,f',f'' для многочленов (Горнер), иначе численные.
      function makeNewtonIterator() {
        const cc = state.compiled && state.compiled.coeffs,
          halley = state.newtonMethod === "halley",
          mi = state.maxIter;
        let evf;
        if (cc) {
          evf = (z) => {
            let p = ZERO,
              dp = ZERO,
              ddp = ZERO;
            for (let k = 0; k < cc.length; k++) {
              ddp = add(mul(ddp, z), mul(C(2, 0), dp));
              dp = add(mul(dp, z), p);
              p = add(mul(p, z), cc[k]);
            }
            return [p, dp, ddp];
          };
        } else {
          const f = curF();
          evf = (z) => {
            const fp = derivative(f, z),
              fpp = halley ? derivative((w) => derivative(f, w), z) : ZERO;
            return [f(z), fp, fpp];
          };
        }
        return (zx, zy) => {
          let z = C(zx, zy),
            k = 0;
          for (; k < mi; k++) {
            const [fv, fpv, fpp] = evf(z);
            if (abs(fv) < 1e-7) break;
            if (abs(fpv) < 1e-15) {
              k = mi;
              break;
            }
            let step;
            if (halley) {
              const den = sub(mul(C(2, 0), mul(fpv, fpv)), mul(fv, fpp));
              step = div(mul(C(2, 0), mul(fv, fpv)), den);
            } else step = div(fv, fpv);
            z = sub(z, step);
            if (!isFiniteC(z)) {
              k = mi;
              break;
            }
            if (abs(step) < 1e-8) break;
          }
          return { z, k, conv: k < mi };
        };
      }
      function renderFractal(q) {
        const myGen = renderGen,
          cv = sizeCanvas($("#cv-fractal")),
          W = cv.width,
          H = cv.height,
          v = views.fractal;
        const rw = Math.max(40, (W * q) | 0),
          rh = Math.max(40, (H * q) | 0);
        const sx = (v.scale * W) / rw,
          sy = (v.scale * H) / rh,
          mi = state.maxIter,
          jc = state.juliaC,
          type = state.fractal;
        const tKind =
          type === "julia-exp" ? 0 : type === "julia-sin" ? 1 : type === "julia-cos" ? 2 : -1;
        const newtonIter = type === "newton" ? makeNewtonIterator() : null;
        const nroots = [],
          rootIndex = (z) => {
            for (let i = 0; i < nroots.length; i++) if (abs(sub(z, nroots[i])) < 1e-3) return i;
            nroots.push(z);
            return nroots.length - 1;
          };
        const fillBand = (j0, j1) => {
          const data = new Uint8ClampedArray(rw * (j1 - j0) * 4);
          for (let j = j0; j < j1; j++) {
            const y = v.cy + (rh / 2 - (j + 0.5)) * sy;
            for (let i = 0; i < rw; i++) {
              const x = v.cx + (i + 0.5 - rw / 2) * sx,
                p = ((j - j0) * rw + i) * 4;
              if (type === "newton") {
                const r = newtonIter(x, y);
                newtonColor(r.conv ? rootIndex(r.z) : 0, r.k, r.conv, data, p);
                continue;
              }
              let it;
              if (type === "multibrot") it = multibrot(x, y, state.mbPower, mi);
              else if (type === "julia") it = juliaPow(x, y, jc.re, jc.im, state.juliaPower, mi);
              else if (type === "tricorn") it = tricorn(x, y, mi);
              else if (type === "burningship") it = burningShip(x, y, mi);
              else if (tKind >= 0) it = juliaTrans(x, y, jc.re, jc.im, tKind, mi);
              else it = mandelbrot(x, y, mi);
              if (it >= mi) {
                data[p] = 8;
                data[p + 1] = 9;
                data[p + 2] = 16;
                data[p + 3] = 255;
              } else fracColor(it, data, p);
            }
          }
          return data;
        };

          off.width = rw;
          off.height = rh;
          offc.putImageData(new ImageData(fillBand(0, rh), rw, rh), 0, 0);
          ctx.imageSmoothingEnabled = true;
          ctx.clearRect(0, 0, W, H);
          ctx.drawImage(off, 0, 0, rw, rh, 0, 0, W, H);
          hideProgress();
          return;
        }
        chunkedPaint(cv, rw, rh, W, H, fillBand, myGen);
      }

      /* ---------- сфера Римана (быстрый путь) ---------- */
      function sphereBand(j0, j1, rw, rh, fast, f, P) {
        const Rpx = Math.min(rw, rh) * 0.42,
          cx = rw / 2,
          cy = rh / 2,
          L = [0.4, 0.5, 0.77],
          o = new Float64Array(2);
        const data = new Uint8ClampedArray(rw * (j1 - j0) * 4);
        for (let j = j0; j < j1; j++)
          for (let i = 0; i < rw; i++) {
            const nx = (i - cx) / Rpx,
              ny = (cy - j) / Rpx,
              r2 = nx * nx + ny * ny,
              p = ((j - j0) * rw + i) * 4;
            if (r2 > 1) continue;
            const nz = Math.sqrt(1 - r2);
            const X = nx,
              Y = ny * P.cp + nz * P.sp,
              Zc = -ny * P.sp + nz * P.cp,
              X2 = X * P.cyw + Zc * P.syw,
              Z2 = -X * P.syw + Zc * P.cyw;
            const d = 1 - Z2;
            let zx, zy;
            if (d < 1e-12) {
              zx = 1e6;
              zy = 0;
            } else {
              zx = X2 / d;
              zy = Y / d;
            }
            let cr, cg, cb;
            if (fast && state.scheme === "classic") {
              fast(zx, zy, o);
              const tmp = new Uint8ClampedArray(4);
              phaseColorRaw(o[0], o[1], tmp, 0);
              cr = tmp[0];
              cg = tmp[1];
              cb = tmp[2];
            } else {
              const col = phaseColor(safe(f, C(zx, zy)), colorOpts());
              cr = col.r;
              cg = col.g;
              cb = col.b;
            }
            const sh = 0.32 + 0.68 * Math.max(0, nx * L[0] + ny * L[1] + nz * L[2]);
            data[p] = cr * sh;
            data[p + 1] = cg * sh;
            data[p + 2] = cb * sh;
            data[p + 3] = 255;
          }
        return data;
      }
      function renderSphere(q) {
        const myGen = renderGen,

      function drawWheel() {
        const c = $("#wheel");
        if (!c) return;
        const ctx = c.getContext("2d"),
          N = 52,
          img = ctx.createImageData(N, N);
        for (let j = 0; j < N; j++)
          for (let i = 0; i < N; i++) {
            const x = (i - N / 2) / (N / 2),
              y = (N / 2 - j) / (N / 2),
              r = Math.hypot(x, y),
              p = (j * N + i) * 4;
            if (r > 1) {
              img.data[p + 3] = 0;
              continue;
            }
            const col = phaseColor(fromPolar(0.3 + r, Math.atan2(y, x)), colorOpts());
            img.data[p] = col.r;
            img.data[p + 1] = col.g;
            img.data[p + 2] = col.b;
            img.data[p + 3] = 255;
          }
        ctx.putImageData(img, 0, 0);
      }

      function attachField(cv, getV, opts) {
        let drag = false,
          lx = 0,
          ly = 0,
          moved = 0;
        cv.addEventListener(
          "wheel",
          (e) => {
            e.preventDefault();
            if (opts.noZoom) return;
            const v = getV(),
              W = cv.width,
              H = cv.height,
              r = cv.getBoundingClientRect();
            const mx = ((e.clientX - r.left) * W) / r.width,
              my = ((e.clientY - r.top) * H) / r.height,
              z = pxToZ(v, W, H, mx, my),
              f = Math.exp(-e.deltaY * 0.0014);
            v.scale /= f;
            v.cx = z.re - (mx - W / 2) * v.scale;
            v.cy = z.im + (my - H / 2) * v.scale;
            interactRender();
          },
          { passive: false },
        );
        cv.addEventListener("pointerdown", (e) => {
          drag = true;
          moved = 0;
          lx = e.clientX;
          ly = e.clientY;
          cv.setPointerCapture(e.pointerId);
        });
        cv.addEventListener("pointermove", (e) => {
          const v = getV(),
            W = cv.width,
            H = cv.height,
            r = cv.getBoundingClientRect();
          const mx = ((e.clientX - r.left) * W) / r.width,
            my = ((e.clientY - r.top) * H) / r.height;
          if (drag) {
            const dx = ((e.clientX - lx) * W) / r.width,
              dy = ((e.clientY - ly) * H) / r.height;
            lx = e.clientX;
            ly = e.clientY;
            moved += Math.abs(dx) + Math.abs(dy);
            if (opts.rotate) {
              v.yaw -= dx * 0.006;
              v.pitch = Math.max(-1.5, Math.min(1.5, v.pitch + dy * 0.006));
            } else {
              v.cx -= dx * v.scale;
              v.cy += dy * v.scale;
            }
            interactRender();
          }
          if (opts.probe) probe(opts.rotate ? null : pxToZ(v, W, H, mx, my), opts, v, W, H, mx, my);
        });
        const end = () => {
          drag = false;
        };
        cv.addEventListener("pointerup", (e) => {
          if (opts.click && moved < 4) {
            const v = getV(),
              W = cv.width,
              H = cv.height,
              r = cv.getBoundingClientRect();
            const mx = ((e.clientX - r.left) * W) / r.width,
              my = ((e.clientY - r.top) * H) / r.height;
            opts.click(pxToZ(v, W, H, mx, my));
          }
          drag = false;
        });
        cv.addEventListener("pointercancel", end);
        cv.addEventListener("pointerleave", () => {
          drag = false;
        });
      }
      function probe(z, opts) {
        if (!z) {
          $("#ro-z").textContent = "—";
          $("#ro-fz").textContent = "—";
          return;
        }
        $("#ro-z").textContent = fmt(z);
        if (opts.fractal) {
          const t = state.fractal,
            jc = state.juliaC,
            mi = state.maxIter;
          let it;
          if (t === "multibrot") it = multibrot(z.re, z.im, state.mbPower, mi);
          else if (t === "julia") it = juliaPow(z.re, z.im, jc.re, jc.im, state.juliaPower, mi);
          else if (t === "julia-exp") it = juliaTrans(z.re, z.im, jc.re, jc.im, 0, mi);
          else if (t === "julia-sin") it = juliaTrans(z.re, z.im, jc.re, jc.im, 1, mi);
          else if (t === "julia-cos") it = juliaTrans(z.re, z.im, jc.re, jc.im, 2, mi);
          else if (t === "tricorn") it = tricorn(z.re, z.im, mi);
          else if (t === "burningship") it = burningShip(z.re, z.im, mi);
          else if (t === "newton") {
            const r = makeNewtonIterator()(z.re, z.im);
            it = r.conv ? r.k : mi;
          } else it = mandelbrot(z.re, z.im, mi);
          $("#ro-fz").textContent = "—";
          $("#ro-extra-k").textContent = "итераций";
          $("#ro-extra").textContent = it >= mi ? mi + " (внутри)" : it.toFixed(1);
          return;
        }
        if (dispActive()) {
          const base = dispBase(),
            n = state.dispOrder,
            w = iterN(base, z, n),
            d = C(w.re - z.re, w.im - z.im);
          $("#ro-fz").textContent = fmt(d);
          $("#ro-extra-k").textContent = "|f−z| , arg";
          $("#ro-extra").textContent = isFiniteC(d)
            ? abs(d).toFixed(3) + " , " + arg(d).toFixed(3)
            : "∞";
          return;
        }
        $("#ro-fz").textContent = fmt(safe(curF(), z));
      }

      /* ---------- режимы ---------- */
      function updateTabs() {
        document.querySelectorAll(".tab").forEach((t) => {
          const sel = t.dataset.settings
            ? state.panel === "settings"
            : state.panel === "view" && t.dataset.mode === state.mode;
          t.setAttribute("aria-selected", !!sel);
        });
      }
      function setMode(m) {
        state.mode = m;
        state.panel = "view";
        if (m !== "conformal" && typeof confPause === "function") confPause();
        if (m !== "phase" && typeof phasePause === "function") phasePause();
        document
          .querySelectorAll(".pane")
          .forEach((p) => p.classList.toggle("on", p.dataset.pane === m));
        const hints = {
          phase: "перетаскивание — сдвиг, прокрутка — масштаб",
          analysis: "клик — анализ точки/контура",
          conformal: "наведите курсор — точка и её образ",
          fractal: "прокрутка — масштаб, клик — c для Жюлиа",
          sphere: "перетаскивание — вращение",
        };
        $("#hint").textContent = hints[m] || "";
        $("#ro-extra-k").textContent = "";
        $("#ro-extra").textContent = "";
        updateTabs();
        buildPanel();
        requestAnimationFrame(() => render(1));
      }
      function openSettings() {
        state.panel = "settings";
        updateTabs();
        buildPanel();
      }

      /* ---------- инициализация ---------- */
      document.querySelectorAll(".tab").forEach(
        (t) =>
          (t.onclick = () => {
            if (t.dataset.settings) openSettings();
            else setMode(t.dataset.mode);
          }),
      );
      attachField($("#cv-phase"), () => views.phase, { probe: true });
      attachField($("#cv-analysis"), () => views.analysis, {
        probe: true,
        click: (z) => {
          if (state.ana.tool === "point") analyzePoint(z);
          else analyzeContour(z, state.ana.radius);
        },
      });
      attachField($("#cv-fractal"), () => views.fractal, {
        probe: true,
        fractal: true,
        click: (z) => {
          if (state.fractal === "mandelbrot" || state.fractal === "multibrot") {
            state.juliaPower = state.fractal === "multibrot" ? state.mbPower : 2;
            state.juliaC = { re: z.re, im: z.im };
            state.fractal = "julia";
            resetFractalView();
            buildPanel();
            render(1);
          }
        },
      });
      attachField($("#cv-sphere"), () => views.sphere, { rotate: true, noZoom: true });
      {
        const cv = $("#cv-confL");
        cv.addEventListener("pointermove", (e) => {
          if (!_conf || !state.confShowSource || state.confAnim || !_conf.snapL) return;
          const W = cv.width,
            H = cv.height,
            r = cv.getBoundingClientRect();
          const mx = ((e.clientX - r.left) * W) / r.width,
            my = ((e.clientY - r.top) * H) / r.height,
            v = _conf.domView,
            z = C(v.cx + (mx - W / 2) * v.scale, v.cy - (my - H / 2) * v.scale);
          $("#ro-z").textContent = fmt(z);
          const w = tryc(() => (_conf.mf || curF())(z)) || NAN_;
          $("#ro-fz").textContent = fmt(w);
          const lc = cv.getContext("2d");
          lc.putImageData(_conf.snapL, 0, 0);
          lc.fillStyle = "#fff";
          lc.beginPath();
          lc.arc(W / 2 + (z.re - v.cx) / v.scale, H / 2 - (z.im - v.cy) / v.scale, 4, 0, 7);
          lc.fill();
          if (_conf.snapR && isFiniteC(w)) {
            const Rc = _conf.R,
              iv = _conf.imgView,
              rc = Rc.getContext("2d");
            rc.putImageData(_conf.snapR, 0, 0);
            rc.fillStyle = "#fff";
            rc.beginPath();
            rc.arc(
              Rc.width / 2 + (w.re - iv.cx) / iv.scale,
              Rc.height / 2 - (w.im - iv.cy) / iv.scale,
              4,
              0,
              7,
            );
            rc.fill();
          }
        });
        cv.addEventListener("pointerleave", () => {
          if (!_conf) return;
          if (_conf.snapL) _conf.L.getContext("2d").putImageData(_conf.snapL, 0, 0);
          if (_conf.snapR && _conf.R) _conf.R.getContext("2d").putImageData(_conf.snapR, 0, 0);
        });
        cv.addEventListener("click", (e) => {
          if (!_conf || !state.confShowSource || state.confAnim) return;
          const W = cv.width,
            H = cv.height,
            r = cv.getBoundingClientRect();
          const mx = ((e.clientX - r.left) * W) / r.width,
            my = ((e.clientY - r.top) * H) / r.height,
            v = _conf.domView;
          confSelectAt(C(v.cx + (mx - W / 2) * v.scale, v.cy - (my - H / 2) * v.scale), e);
        });
      }
      window.addEventListener("resize", () => {
        clearTimeout(idleTimer);
        idleTimer = setTimeout(() => render(1), 120);
      });
      setMode("phase");
    </script>
  </body>
</html>
