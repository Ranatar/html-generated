<!doctype html>
<html lang="ru">
  <head>

    <title>Комплексная плоскость — визуализатор</title>
    <style>
      :root {
        --bg: #0e1118;
        --bg2: #0b0e14;

        --sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        background: radial-gradient(
          140% 120% at 70% -10%,

          var(--bg) 45%,
          var(--bg2) 100%

        font-family: var(--sans);
        font-size: 14px;
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
        -webkit-font-smoothing: antialiased;
      }
      header {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 0 18px;
        height: 52px;
        border-bottom: 1px solid var(--line);
        background: rgba(11, 14, 20, 0.6);
        backdrop-filter: blur(6px);
        flex: 0 0 auto;
        z-index: 5;
      }
      .brand {
        font-family: var(--mono);
        font-size: 13px;
        letter-spacing: 0.04em;
        white-space: nowrap;
      }
      .brand b {
        color: var(--teal);
        font-weight: 600;
      }
      .brand .z {
        color: var(--faint);
      }
      nav {
        display: flex;
        gap: 2px;
      }
      .tab {
        font-family: var(--mono);
        font-size: 12.5px;
        color: var(--dim);
        background: none;
        border: none;
        padding: 8px 12px;
        border-radius: 7px;
        cursor: pointer;
        transition: 0.15s;
      }
      .tab:hover {
        color: var(--ink);
        background: var(--panel);
      }
      .tab[aria-selected="true"] {
        color: var(--bg);
        background: var(--teal);
        font-weight: 600;
      }
      .tab:focus-visible {
        outline: 2px solid var(--teal);
        outline-offset: 2px;
      }
      .spacer {
        flex: 1;
      }
      .hint {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--faint);
        white-space: nowrap;
      }
      main {
        flex: 1;
        display: flex;
        min-height: 0;
      }
      aside {
        width: 286px;
        flex: 0 0 286px;
        border-right: 1px solid var(--line);
        background: var(--panel);
        padding: 16px 16px 24px;
        overflow-y: auto;
      }
      aside h2 {
        font-family: var(--mono);
        font-size: 10.5px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--faint);
        margin: 0 0 10px;
        font-weight: 600;
      }
      .ctl {
        margin-bottom: 18px;
      }
      .ctl:last-child {
        margin-bottom: 0;
      }
      label.fld {
        display: block;
        font-size: 12px;
        color: var(--dim);
        margin: 0 0 6px;
      }
      select,
      input[type="text"] {
        width: 100%;
        background: var(--panel2);
        color: var(--ink);
        border: 1px solid var(--line2);
        border-radius: 7px;
        padding: 8px 9px;
        font-family: var(--mono);
        font-size: 12.5px;

      select:focus,
      input:focus {
        outline: none;
        border-color: var(--teal);
      }
      input[type="text"].bad {
        border-color: var(--err);
      }
      .err {
        color: var(--err);
        font-size: 11px;
        font-family: var(--mono);
        margin-top: 5px;
        min-height: 13px;
      }
      .seg {
        display: flex;
        border: 1px solid var(--line2);
        border-radius: 7px;
        overflow: hidden;
      }
      .seg button {
        flex: 1;
        background: var(--panel2);
        color: var(--dim);
        border: none;
        padding: 7px 4px;
        font-family: var(--mono);

        cursor: pointer;

      .seg button + button {
        border-left: 1px solid var(--line2);

      .seg button[aria-pressed="true"] {
        background: var(--teal-dim);
        color: #eafffb;
      }
      .seg button:hover:not([aria-pressed="true"]) {
        color: var(--ink);
      }
      input[type="range"] {
        width: 100%;
        accent-color: var(--teal);
        margin-top: 2px;
      }
      .rangerow {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
      }
      .rangerow .val {
        font-family: var(--mono);
        font-size: 12px;
        color: var(--teal);
      }
      .btn {
        width: 100%;
        background: var(--panel2);
        color: var(--ink);
        border: 1px solid var(--line2);
        border-radius: 7px;

      .legend {

      .legend canvas {
        border-radius: 50%;

      .legend .lt {

      .legend .lt b {

      }
      .results {
        font-family: var(--mono);
        font-size: 11.5px;

        border: 1px solid var(--line2);

      .stage {

        box-shadow: 0 0 8px var(--teal);

      #render-progress .rp-label {
        position: absolute;

        font-size: 11px;

      .pane {

      }
      .pane.on {
        display: flex;
      }
      canvas.field {
        width: 100%;
        height: 100%;
        display: block;
        cursor: crosshair;
        touch-action: none;
      }
      .duo {
        display: flex;
        width: 100%;
        height: 100%;
      }
      .duo .half {
        flex: 1;
        position: relative;
        min-width: 0;
      }
      .duo .half + .half {

        height: 100%;
        display: block;
        cursor: crosshair;
        touch-action: none;
      }
      .readout {
        flex: 0 0 auto;
        height: 34px;
        border-top: 1px solid var(--line);
        background: rgba(11, 14, 20, 0.7);
        display: flex;

        font-family: var(--mono);
        font-size: 12px;
      }
      .readout .k {

      }

      .readout .v.teal {

      }
      @media (max-width: 780px) {
        main {
          flex-direction: column;
        }
        aside {
          width: 100%;
          flex: 0 0 auto;
          border-right: none;

        }

      @media (prefers-reduced-motion: reduce) {

          transition: none !important;
        }
      }

  <body>
    <header>
      <span class="brand"><b>ℂ</b> <span class="z">function&nbsp;atlas</span></span>
      <nav id="tabs" role="tablist">
        <button class="tab" role="tab" data-mode="phase" aria-selected="true">портрет</button>
        <button class="tab" role="tab" data-mode="analysis" aria-selected="false">анализ</button>
        <button class="tab" role="tab" data-mode="conformal" aria-selected="false">

        </button>
        <button class="tab" role="tab" data-mode="fractal" aria-selected="false">фракталы</button>
        <button class="tab" role="tab" data-mode="sphere" aria-selected="false">

        </button>
        <button
          class="tab"

        >
          настройки
        </button>
      </nav>

    </header>
    <main>
      <aside id="panel"></aside>
      <div class="stage">
        <div id="render-progress" aria-hidden="true">
          <div class="rp-bar"></div>
          <span class="rp-label"></span>
        </div>
        <div class="pane on" data-pane="phase"><canvas class="field" id="cv-phase"></canvas></div>
        <div class="pane" data-pane="analysis">
          <canvas class="field" id="cv-analysis"></canvas>
        </div>
        <div class="pane" data-pane="conformal">
          <div class="duo">
            <div class="half">
              <div class="cap">прообраз — плоскость z</div>
              <canvas id="cv-confL"></canvas>
            </div>
            <div class="half">
              <div class="cap">образ — w = f(z)</div>
              <canvas id="cv-confR"></canvas>
            </div>
          </div>
        </div>
        <div class="pane" data-pane="fractal"><canvas class="field" id="cv-fractal"></canvas></div>
        <div class="pane" data-pane="sphere"><canvas class="field" id="cv-sphere"></canvas></div>
      </div>
    </main>
    <div class="readout">
      <span><span class="k">z</span> <span class="v" id="ro-z">—</span></span>
      <span><span class="k">f(z)</span> <span class="v teal" id="ro-fz">—</span></span>
      <span class="spacer" style="flex: 1"></span>
      <span><span class="k" id="ro-extra-k"></span> <span class="v" id="ro-extra"></span></span>
    </div>

    <script type="module">
      /* ===== модуль complex.js ===== */
      /* =====================================================================
       *  complex.mjs — аналитический инструментарий комплексного переменного
       *  Без внешних зависимостей. ESM.
       *
       *  Слои:
       *    1. Ядро          — тип Complex (иммутабельный), арифметика
       *    2. Элементарные  — exp/log/pow, тригонометрия, ветви, корни
       *    3. Анализ         — производная, контурное интегрирование,
       *                        вычеты, принцип аргумента, корни многочленов
       *    4. Конформные     — дробно-линейные (Мёбиус) и стандартные карты
       *    5. Визуализация   — доменная раскраска, рендер в ImageData,
       *                        образы сеток под отображениями
       *
       *  Соглашения о ветвях:
       *    arg ∈ (-π, π]     (главное значение, через atan2 — уважает знак нуля)
       *    log               — главная ветвь: log|z| + i·arg z
       *    sqrt              — главная ветвь, Re ≥ 0; разрез по (-∞, 0]
       *    z^w = exp(w log z) кроме целых вещественных w (тогда точное возведение)
       * ===================================================================== */

      /* ---------------------------------------------------------------- ЯДРО */

      // Иммутабельное значение. Хранение декартово; полярка — производная.
      const C = (re = 0, im = 0) => Object.freeze({ re, im });

      // Приведение «числа или {re,im}» к Complex — для удобного ввода.
      const toC = (x) =>
        typeof x === "number"
          ? C(x, 0)
          : x && typeof x.re === "number"
            ? Object.isFrozen(x)
              ? x
              : C(x.re, x.im || 0)
            : C(0, 0);

      // Знаковая единица, сохраняющая -0 (нужно для правильной стороны разреза)
      const copysign = (mag, sgn) =>
        sgn < 0 || Object.is(sgn, -0) ? -Math.abs(mag) : Math.abs(mag);

      // Константы
      const ZERO = C(0, 0);
      const ONE = C(1, 0);
      const I = C(0, 1);
      const TWO = C(2, 0);
      const HALF = C(0.5, 0);
      const E_ = C(Math.E, 0);
      const PI_ = C(Math.PI, 0);

      // Точка на бесконечности сферы Римана — единственная (без знака, в отличие от ℝ),
      // и комплексный NaN. Это полноценные значения, распознаваемые арифметикой.
      const INFINITY = Object.freeze({ re: Infinity, im: Infinity, inf: true });
      const NAN_ = Object.freeze({ re: NaN, im: NaN, nan: true });
      const isInf = (z) => z === INFINITY || z.inf === true;
      const isNaNC = (z) =>
        z === NAN_ || z.nan === true || Number.isNaN(z.re) || Number.isNaN(z.im);
      const isFiniteC = (z) => !isInf(z) && !isNaNC(z);

      // Арифметика. Быстрый конечный путь идёт первым; ∞/NaN ловятся guard'ом —
      // одно сравнение по ссылке, конечные входы его пропускают без потерь.
      const add = (a, b) => {
        if (a.inf || b.inf) return a.inf && b.inf ? INFINITY : INFINITY;
        return C(a.re + b.re, a.im + b.im);
      };
      const sub = (a, b) => {
        if (a.inf || b.inf) return a.inf && b.inf ? NAN_ : INFINITY;
        return C(a.re - b.re, a.im - b.im);
      };
      const neg = (a) => (a.inf ? INFINITY : C(-a.re, -a.im));
      const mul = (a, b) => {
        if (a.inf || b.inf) {
          if ((a.inf && b.re === 0 && b.im === 0) || (b.inf && a.re === 0 && a.im === 0))
            return NAN_;
          return INFINITY;
        }
        return C(a.re * b.re - a.im * b.im, a.re * b.im + a.im * b.re);
      };

      const conj = (a) => C(a.re, -a.im);
      const abs = (a) => Math.hypot(a.re, a.im); // не sqrt(re²+im²): переполнение
      const abs2 = (a) => a.re * a.re + a.im * a.im; // |z|² без корня
      const arg = (a) => Math.atan2(a.im, a.re); // главная ветвь, уважает -0

      // Деление по алгоритму Смита: масштабирование защищает от пере/недополнения.
      // На сфере Римана: z/0=∞, z/∞=0, ∞/∞=NaN.
      const div = (a, b) => {
        if (a.inf || b.inf) {
          if (a.inf && b.inf) return NAN_;
          return a.inf ? INFINITY : ZERO;
        }
        if (b.re === 0 && b.im === 0) return a.re === 0 && a.im === 0 ? NAN_ : INFINITY;
        if (Math.abs(b.re) >= Math.abs(b.im)) {
          const r = b.im / b.re,
            d = b.re + b.im * r;
          return C((a.re + a.im * r) / d, (a.im - a.re * r) / d);
        }
        const r = b.re / b.im,
          d = b.re * r + b.im;
        return C((a.re * r + a.im) / d, (a.im * r - a.re) / d);
      };
      const recip = (a) => (a.inf ? ZERO : a.re === 0 && a.im === 0 ? INFINITY : div(ONE, a));
      const scale = (a, k) => C(a.re * k, a.im * k); // умножение на вещественное

      // Полярная форма
      const fromPolar = (r, theta) => C(r * Math.cos(theta), r * Math.sin(theta));
      const toPolar = (a) => ({ r: abs(a), theta: arg(a) });

      // Сравнение с допуском
      const eq = (a, b, eps = 1e-12) => abs(sub(a, b)) <= eps;
      const isZero = (a, eps = 1e-12) => abs(a) <= eps;

      /* ----------------------------------------------- ЭЛЕМЕНТАРНЫЕ ФУНКЦИИ */

      // Примитивы: exp и log — из них выводится степенное
      const exp = (a) => {
        const e = Math.exp(a.re);
        return C(e * Math.cos(a.im), e * Math.sin(a.im));
      };
      const log = (a) => C(Math.log(abs(a)), arg(a)); // главная ветвь
      const logBranch = (a, k = 0) => C(Math.log(abs(a)), arg(a) + 2 * Math.PI * k);

      // sqrt — прямая формула (точнее, чем pow(z,½)); главная ветвь Re ≥ 0,
      // copysign уважает знак мнимой части на разрезе (-∞, 0].
      const sqrt = (a) => {
        if (a.re === 0 && a.im === 0) return C(0, 0);
        const m = abs(a);
        const w = Math.sqrt((Math.abs(a.re) + m) / 2);
        if (a.re >= 0) return C(w, a.im / (2 * w));
        return C(Math.abs(a.im) / (2 * w), copysign(w, a.im));
      };

      // Возведение в степень: целая вещественная — точное (бинарное), иначе общее
      const pow = (a, w) => {
        w = toC(w);
        if (w.im === 0 && Number.isInteger(w.re)) {
          let n = w.re,
            base = a,
            res = ONE;
          if (n < 0) {
            base = recip(a);
            n = -n;
          }
          while (n > 0) {
            if (n & 1) res = mul(res, base);
            base = mul(base, base);
            n >>= 1;
          }
          return res;
        }
        if (a.re === 0 && a.im === 0) return C(0, 0);
        return exp(mul(w, log(a)));
      };

      // Все n корней (упорядочены по возрастанию угла от главного)
      const nthRoots = (a, n) => {
        const { r, theta } = toPolar(a);
        const rr = Math.pow(r, 1 / n);
        const out = [];
        for (let k = 0; k < n; k++) out.push(fromPolar(rr, (theta + 2 * Math.PI * k) / n));
        return out;
      };

      // Тригонометрия — прямые формулы (численно точнее сведения к exp)
      const sin = (a) => C(Math.sin(a.re) * Math.cosh(a.im), Math.cos(a.re) * Math.sinh(a.im));
      const cos = (a) => C(Math.cos(a.re) * Math.cosh(a.im), -Math.sin(a.re) * Math.sinh(a.im));
      const tan = (a) => div(sin(a), cos(a));
      const sec = (a) => recip(cos(a));
      const csc = (a) => recip(sin(a));
      const cot = (a) => div(cos(a), sin(a));

      const sinh = (a) => C(Math.sinh(a.re) * Math.cos(a.im), Math.cosh(a.re) * Math.sin(a.im));
      const cosh = (a) => C(Math.cosh(a.re) * Math.cos(a.im), Math.sinh(a.re) * Math.sin(a.im));
      const tanh = (a) => div(sinh(a), cosh(a));

      // Обратные — через логарифм (главные ветви). На самих разрезах композиции
      // вида (1−z²) теряют знак нуля, поэтому точки разреза (im=±0 либо re=±0)
      // обрабатываются явно со знаком, согласованным с C99 (сверено с cmath).
      const asin = (a) => {
        if (a.im === 0 && Math.abs(a.re) > 1)
          // разрез |x|>1
          return C(copysign(Math.PI / 2, a.re), copysign(Math.acosh(Math.abs(a.re)), a.im));
        return mul(neg(I), log(add(mul(I, a), sqrt(sub(ONE, mul(a, a))))));
      };
      const acos = (a) => sub(C(Math.PI / 2, 0), asin(a)); // наследует корректность asin
      const atan = (a) => {
        if (a.re === 0 && Math.abs(a.im) > 1)
          // разрез на мнимой оси
          return C(copysign(Math.PI / 2, a.re), Math.atanh(1 / a.im));
        return mul(scale(I, 0.5), sub(log(sub(ONE, mul(I, a))), log(add(ONE, mul(I, a)))));
      };
      const asinh = (a) => {
        if (a.re === 0 && Math.abs(a.im) > 1)
          // разрез на мнимой оси
          return C(copysign(Math.acosh(Math.abs(a.im)), a.re), copysign(Math.PI / 2, a.im));
        return log(add(a, sqrt(add(mul(a, a), ONE))));
      };
      const acosh = (a) => {
        if (a.im === 0 && a.re < 1) {
          // разрез (-∞, 1]
          if (a.re >= -1) return C(0, copysign(Math.acos(a.re), a.im));
          return C(Math.acosh(-a.re), copysign(Math.PI, a.im));
        }
        return log(add(a, mul(sqrt(add(a, ONE)), sqrt(sub(a, ONE)))));
      };
      const atanh = (a) => {
        if (a.im === 0 && Math.abs(a.re) > 1)
          // разрез |x|>1
          return C(0.5 * Math.log(Math.abs((1 + a.re) / (1 - a.re))), copysign(Math.PI / 2, a.im));
        return mul(HALF, log(div(add(ONE, a), sub(ONE, a))));
      };

      /* ------------------------------------------------- ФОРМАТ / РАЗБОР */

      const toString = (a, digits = 6) => {
        if (a.inf) return "∞";
        if (a.nan || Number.isNaN(a.re) || Number.isNaN(a.im)) return "NaN";
        const f = (x) => {
          const s = +x.toFixed(digits);
          return Number.isInteger(s) ? String(s) : String(s);
        };
        if (a.im === 0) return f(a.re);
        if (a.re === 0) return (a.im === 1 ? "" : a.im === -1 ? "-" : f(a.im)) + "i";
        const sign = a.im < 0 ? " - " : " + ";
        const ai = Math.abs(a.im);
        return f(a.re) + sign + (ai === 1 ? "" : f(ai)) + "i";
      };

      const parse = (s) => {
        s = String(s).replace(/\s+/g, "").replace(/\*/g, "");
        const m = s.match(/^([+-]?[\d.eE+-]*?)?([+-]?[\d.eE]*)?i$/);
        // простой разбор форм: a, bi, a+bi, a-bi
        const re = /([+-]?(?:\d+\.?\d*|\.\d+)(?:[eE][+-]?\d+)?)(?![i\d.])/g;
        // надёжнее — ручной парс
        let real = 0,
          imag = 0;
        const tokens =
          s.match(/[+-]?(?:\d+\.?\d*|\.\d+)?i?|[+-]?\d+\.?\d*(?:[eE][+-]?\d+)?/g) || [];
        for (let t of tokens) {
          if (t === "") continue;
          if (t.endsWith("i")) {
            let c = t.slice(0, -1);
            if (c === "" || c === "+") imag += 1;
            else if (c === "-") imag -= 1;
            else imag += parseFloat(c);
          } else {
            real += parseFloat(t);
          }
        }
        return C(real, imag);
      };

      /* ============================================================ АНАЛИЗ */

      // Численная производная аналитической функции.
      // Для аналитической f производная не зависит от направления → вещественный шаг
      // + экстраполяция Ричардсона (порядок повышается до ~8).
      const derivative = (f, z, { h = 1e-3 } = {}) => {
        z = toC(z);
        const D = (step) => {
          const fp = f(C(z.re + step, z.im));
          const fm = f(C(z.re - step, z.im));
          return scale(sub(fp, fm), 1 / (2 * step));
        };
        const d1 = D(h),
          d2 = D(h / 2),
          d3 = D(h / 4);
        const r1 = add(scale(d2, 4 / 3), scale(d1, -1 / 3)); // Ричардсон, шаг 1
        const r2 = add(scale(d3, 4 / 3), scale(d2, -1 / 3));
        return add(scale(r2, 16 / 15), scale(r1, -1 / 15)); // шаг 2
      };

      // --- Контуры: γ(t), γ'(t) на t ∈ [0,1] ----------------------------
      const Path = (gamma, deriv) => ({ gamma, deriv });

      const segment = (a, b) => {
        a = toC(a);
        b = toC(b);
        const d = sub(b, a);
        return Path(
          (t) => add(a, scale(d, t)),
          () => d,
        );
      };

      const circle = (center, radius, ccw = true) => {
        const c = toC(center),
          s = ccw ? 1 : -1,
          w = 2 * Math.PI * s;
        return Path(
          (t) => add(c, fromPolar(radius, w * t)),
          (t) => scale(mul(I, fromPolar(radius, w * t)), w),
        );
      };

      const arc = (center, radius, t0, t1, ccw = true) => {
        const c = toC(center),
          span = (t1 - t0) * (ccw ? 1 : 1);
        return Path(
          (t) => add(c, fromPolar(radius, t0 + span * t)),
          (t) => scale(mul(I, fromPolar(radius, t0 + span * t)), span),
        );
      };

      // Ломаная как составной путь (равные доли параметра на звено)
      const polyline = (pts, closed = false) => {
        const P = pts.map(toC);
        const segs = [];
        for (let i = 0; i < P.length - 1; i++) segs.push(segment(P[i], P[i + 1]));
        if (closed) segs.push(segment(P[P.length - 1], P[0]));
        const n = segs.length;
        return Path(
          (t) => {
            const k = Math.min(n - 1, Math.floor(t * n));
            return segs[k].gamma(t * n - k);
          },
          (t) => {
            const k = Math.min(n - 1, Math.floor(t * n));
            return scale(segs[k].deriv(t * n - k), n);
          },
        );
      };

      // Контурный интеграл ∮ f dz = ∫₀¹ f(γ(t))·γ'(t) dt.
      // Трапеция по умолчанию: для замкнутых (периодических) контуров она
      // спектрально точна — экспоненциальная сходимость. Для незамкнутых — Симпсон.
      const integrate = (f, path, { n = 2048, rule = "trapezoid" } = {}) => {
        const g = (t) => mul(f(path.gamma(t)), path.deriv(t));
        let acc = ZERO;
        if (rule === "simpson") {
          const m = n % 2 ? n + 1 : n,
            h = 1 / m;
          acc = add(g(0), g(1));
          for (let k = 1; k < m; k++) acc = add(acc, scale(g(k * h), k % 2 ? 4 : 2));
          return scale(acc, h / 3);
        }
        // периодическая трапеция: γ(0)=γ(1) ⇒ суммируем по узлам без дублей
        const h = 1 / n;
        for (let k = 0; k < n; k++) acc = add(acc, g(k * h));
        return scale(acc, h);
      };

      // Вычет в z0: (1/2πi) ∮_{|z-z0|=r} f dz по малой окружности.
      const residue = (f, z0, { radius = 1e-2, n = 2048 } = {}) =>
        div(integrate(f, circle(z0, radius), { n }), scale(I, 2 * Math.PI));

      // Вычет в полюсе известного порядка m — предельная формула
      // (1/(m-1)!) limₖ d^{m-1}/dz^{m-1} [(z-z0)^m f(z)].
      const residueOrder = (f, z0, m, opts = {}) => {
        z0 = toC(z0);
        const g = (z) => mul(pow(sub(z, z0), m), f(z));
        if (m === 1) return g(z0);
        // (m-1)-я производная численно (повторное дифференцирование)
        let cur = g;
        for (let k = 0; k < m - 1; k++) {
          const prev = cur;
          cur = (z) => derivative(prev, z, opts);
        }
        let fact = 1;
        for (let k = 2; k <= m - 1; k++) fact *= k;
        return scale(cur(z0), 1 / fact);
      };

      // Принцип аргумента: (1/2πi) ∮ f'/f dz = (нули − полюсы) внутри контура.
      const argumentPrinciple = (f, path, { n = 4096 } = {}) => {
        const fp = (z) => derivative(f, z);
        const val = integrate((z) => div(fp(z), f(z)), path, { n });
        return Math.round(div(val, scale(I, 2 * Math.PI)).re);
      };

      // --- Корни многочлена методом Аберта–Эрлиха -----------------------
      // coeffs: старший коэффициент первым. Принимает числа или {re,im}.
      const polyEval = (coeffs, z) => coeffs.reduce((p, c) => add(mul(p, z), toC(c)), ZERO);

      const roots = (coeffs, { iters = 100, tol = 1e-14 } = {}) => {
        let c = coeffs.map(toC);
        while (c.length > 1 && isZero(c[0])) c = c.slice(1); // снять старшие нули
        const n = c.length - 1;
        if (n <= 0) return [];
        const an = c[0];
        const mon = c.map((k) => div(k, an)); // приведённый
        const deriv = mon.slice(0, n).map((k, i) => scale(k, n - i));
        // оценка радиуса (граница Коши) и стартовые приближения по окружности
        let R = 1;
        for (let i = 1; i <= n; i++) R = Math.max(R, abs(mon[i]));
        let zs = [];
        for (let k = 0; k < n; k++)
          zs.push(fromPolar(R * (0.5 + 0.5 * Math.random()), (2 * Math.PI * k) / n + 0.7));
        for (let it = 0; it < iters; it++) {
          let maxd = 0;
          const next = zs.map((zi, i) => {
            const p = polyEval(mon, zi),
              dp = polyEval(deriv, zi);
            if (isZero(dp, 1e-300)) return zi;
            const ratio = div(p, dp); // p/p'
            let s = ZERO;
            for (let j = 0; j < n; j++) if (j !== i) s = add(s, recip(sub(zi, zs[j])));
            const corr = div(ratio, sub(ONE, mul(ratio, s))); // поправка Аберта
            const zn = sub(zi, corr);
            maxd = Math.max(maxd, abs(corr));
            return zn;
          });
          zs = next;
          if (maxd < tol) break;
        }
        return zs.sort((a, b) => a.re - b.re || a.im - b.im);
      };

      /* ====================================================== КОНФОРМНЫЕ */

      // Дробно-линейное (Мёбиуса) отображение z ↦ (az+b)/(cz+d).
      const Mobius = (a, b, c, d) => {
        a = toC(a);
        b = toC(b);
        c = toC(c);
        d = toC(d);
        return {
          a,
          b,
          c,
          d,
          apply: (z) => {
            z = toC(z);
            return div(add(mul(a, z), b), add(mul(c, z), d));
          },
          inverse: () => Mobius(d, neg(b), neg(c), a),
          // (this ∘ m): сначала m, потом this — произведение матриц
          compose: (m) =>
            Mobius(
              add(mul(a, m.a), mul(b, m.c)),
              add(mul(a, m.b), mul(b, m.d)),
              add(mul(c, m.a), mul(d, m.c)),
              add(mul(c, m.b), mul(d, m.d)),
            ),
          det: () => sub(mul(a, d), mul(b, c)),
        };
      };

      // Преобразование, переводящее z1,z2,z3 → 0,1,∞ (через сложное отношение)
      const _toStd = (z1, z2, z3) => {
        z1 = toC(z1);
        z2 = toC(z2);
        z3 = toC(z3);
        return Mobius(
          sub(z2, z3),
          neg(mul(z1, sub(z2, z3))),
          sub(z2, z1),
          neg(mul(z3, sub(z2, z1))),
        );
      };
      // Единственное Мёбиуса с z_i ↦ w_i (i=1,2,3)
      const mobiusFromPoints = (z1, z2, z3, w1, w2, w3) =>
        _toStd(w1, w2, w3)
          .inverse()
          .compose(_toStd(z1, z2, z3));

      // Стандартные карты
      const joukowski = (z) => scale(add(z, recip(z)), 0.5); // профиль крыла
      const cayley = (z) => div(sub(z, I), add(z, I)); // верхн. п/пл → диск
      const cayleyInv = (w) => div(mul(I, add(ONE, w)), sub(ONE, w)); // диск → верхн. п/пл

      /* =================================================== ВИЗУАЛИЗАЦИЯ */

      // HSL (h°, s,l ∈ [0,1]) → {r,g,b} в 0..255
      const hsl2rgb = (h, s, l) => {
        h = (((h % 360) + 360) % 360) / 360;
        const k = (n) => (n + h * 12) % 12;
        const f = (n) => l - s * Math.min(l, 1 - l) * Math.max(-1, Math.min(k(n) - 3, 9 - k(n), 1));
        return { r: Math.round(255 * f(0)), g: Math.round(255 * f(8)), b: Math.round(255 * f(4)) };
      };

      // Доменная раскраска: оттенок ← arg, светлота ← |z|. Схемы (scheme):
      //   'classic'  — фаза + логарифмическая яркость по модулю (по умолчанию)
      //   'phase'    — чистый фазовый портрет (светлота фиксирована)
      //   'modulus'  — оттенок по фазе, дискретные кольца модуля (степени 2)
      //   'bands'    — фаза + кольца модуля + спицы фазы (полный «улучшенный» портрет)
      //   'falloff'  — радиальное затухание яркости по |z|
      //   'contours' / 'contours-scaled' — контурные линии log|z| и arg (сетка)
      //   'smooth-grid' — плавная сетка (произведение дробных частей)
      //   'checker' / 'checker-pm' — лог-полярная шахматка (XOR)
      const phaseColor = (
        z,
        {
          scheme = "classic",
          rings = false,
          spokes = 12,
          density = 4,
          falloff = 0.4,
          lnorm = 2,
          mono = false,
        } = {},
      ) => {
        z = toC(z);
        if (isInf(z)) {
          const c = { r: 255, g: 255, b: 255 };
          c.css = "rgb(255,255,255)";
          return c;
        }
        const m = abs(z),
          a = arg(z),
          aPos = a < 0 ? a + 2 * Math.PI : a;
        let hue = (aPos / (2 * Math.PI)) * 360;
        let light = m / (m + 1),
          sat = 1;
        // 6·density угловых полос на окружность ↔ шаг 1/density по ln|z| → квадратные ячейки в лог-полярных координатах
        const sectors = density * 6,
          ad = (aPos / (2 * Math.PI)) * sectors,
          fb = ad - Math.floor(ad);
        if (scheme === "phase") light = 0.5;
        else if (scheme === "modulus") {
          const lg = Math.log2(m || 1e-300);
          light = 0.5 + 0.18 * (lg - Math.floor(lg) - 0.5); // ступени-кольца
        } else if (scheme === "bands" || rings) {
          if (m > 0) {
            const lg = Math.log2(m),
              ring = Math.abs(lg - Math.round(lg));
            const spoke = Math.abs((((((a / (2 * Math.PI)) * spokes) % 1) + 1) % 1) - 0.5) * 2;
            light *= 0.85 + 0.15 * Math.pow(ring, 0.25);
            sat *= 0.85 + 0.15 * Math.pow(spoke, 0.4);
          }
        } else if (scheme === "falloff") {
          light = Math.exp(-Math.LN2 * m * falloff);
        } else if (scheme === "contours") {
          const lg = Math.log(m || 1e-300),
            fa = lg - Math.floor(lg);
          light = Math.min(fa, fb);
        } else if (scheme === "contours-scaled") {
          const lg = density * Math.log(m || 1e-300),
            fa = lg - Math.floor(lg);
          light = Math.min(fa, fb);
        } else if (scheme === "smooth-grid") {
          const lg = density * Math.log(m || 1e-300),
            fa = lg - Math.floor(lg);
          light = 0.5 + (fa * fb - 0.5) / (lnorm || 2); // контраст l как в v21: (произвед.−½)/l + ½
        } else if (scheme === "checker" || scheme === "checker-pm") {
          const lg = density * Math.abs(Math.log(m || 1e-300));
          let b1 = Math.floor(lg) % 2;
          if (scheme === "checker-pm") {
            const turn = m >= 1 ? 1 : 0;
            b1 = Math.floor(turn + (1 - 2 * turn) * b1) & 1;
          }
          const b2 = Math.floor((aPos / (2 * Math.PI)) * sectors) % 2;
          light = b1 ^ b2 ? 0.72 : 0.28;
        } else if (scheme === "checker-cart") {
          // декартова шахматка по Re f / Im f — классический показ конформности (прямая сетка, искривлённая отображением)
          const cs = (density || 4) / 4;
          const par = (Math.floor(z.re * cs) + Math.floor(z.im * cs)) & 1;
          const d2 = 0.5 / (lnorm || 2);
          light = 0.5 + (par ? d2 : -d2); // hue остаётся от arg f — портрет фазы с конформной сеткой
        }
        if (
          mono &&
          (scheme === "checker" || scheme === "checker-pm" || scheme === "checker-cart")
        ) {
          sat = 0; // без фазы — чистая чёрно-белая шахматка
          light = light >= 0.5 ? 0.92 : 0.1;
        }
        const c = hsl2rgb(hue, sat, light);
        c.css = `rgb(${c.r},${c.g},${c.b})`;
        return c;
      };

      // Рендер портрета w=f(z) в RGBA-буфер для canvas putImageData.
      // ВНИМАНИЕ: аллоцирует width·height пикселей — для анимации кэшируйте буфер.
      const renderToImageData = (f, region, { colorFn = phaseColor, colorOpts = {} } = {}) => {
        const { xmin, xmax, ymin, ymax, width, height } = region;
        const data = new Uint8ClampedArray(width * height * 4);
        const dx = (xmax - xmin) / width,
          dy = (ymax - ymin) / height;
        for (let j = 0; j < height; j++) {
          const y = ymax - (j + 0.5) * dy; // экранный y растёт вниз → инверсия
          for (let i = 0; i < width; i++) {
            const x = xmin + (i + 0.5) * dx;
            let col;
            try {
              col = colorFn(f(C(x, y)), colorOpts);
            } catch {
              col = { r: 0, g: 0, b: 0 };
            }
            const p = (j * width + i) * 4;
            data[p] = col.r;
            data[p + 1] = col.g;
            data[p + 2] = col.b;
            data[p + 3] = 255;
          }
        }
        return { width, height, data };
      };

      const linspace = (a, b, n) =>
        Array.from({ length: n }, (_, i) => a + ((b - a) * i) / (n - 1));

      // Образы линий декартовой сетки под f — для иллюстрации конформности.
      // Возвращает ломаные {kind:'h'|'v', pts:[Complex,…]} в плоскости-образе.
      const mapGrid = (f, region, { nx = 21, ny = 21, samples = 200 } = {}) => {
        const { xmin, xmax, ymin, ymax } = region;
        const lines = [];
        for (const y of linspace(ymin, ymax, ny))
          lines.push({ kind: "h", pts: linspace(xmin, xmax, samples).map((x) => f(C(x, y))) });
        for (const x of linspace(xmin, xmax, nx))
          lines.push({ kind: "v", pts: linspace(ymin, ymax, samples).map((y) => f(C(x, y))) });
        return lines;
      };

      /* ======================= спецфункции ======================= */
      const _Cr = (x) => C(x, 0);
      const _mulr = (z, r) => C(z.re * r, z.im * r);

      // Гамма (аппроксимация Ланцоша, g=7) с формулой отражения для Re z < 1/2.
      const _Lg = [
        0.99999999999980993, 676.5203681218851, -1259.1392167224028, 771.32342877765313,
        -176.61502916214059, 12.507343278686905, -0.13857109526572012, 9.9843695780195716e-6,
        1.5056327351493116e-7,
      ];
      const gamma = (z) => {
        z = toC(z);
        if (z.re < 0.5)
          return div(_Cr(Math.PI), mul(sin(mul(_Cr(Math.PI), z)), gamma(sub(ONE, z))));
        z = sub(z, ONE);
        let x = _Cr(_Lg[0]);
        for (let i = 1; i < 9; i++) x = add(x, div(_Cr(_Lg[i]), add(z, _Cr(i))));
        const t = add(z, _Cr(7.5));
        return mul(mul(mul(_Cr(Math.sqrt(2 * Math.PI)), pow(t, add(z, _Cr(0.5)))), exp(neg(t))), x);
      };
      const factorial = (z) => {
        z = toC(z);
        if (z.im === 0 && z.re >= 0 && z.re <= 170 && Number.isInteger(z.re)) {
          // целое n → n! итеративно
          let r = 1;
          for (let k = 2; k <= z.re; k++) r *= k;
          return C(r, 0);
        }
        return gamma(add(z, ONE));
      };

      // Функция ошибок через ряд Тейлора (2/√π)Σ(−1)ⁿz^(2n+1)/(n!(2n+1)).
      const erf = (z) => {
        z = toC(z);
        let sum = ZERO,
          term = z;
        for (let n = 0; n < 60; n++) {
          const t = div(term, _Cr(2 * n + 1));
          sum = n % 2 === 0 ? add(sum, t) : sub(sum, t);
          term = mul(term, div(mul(z, z), _Cr(n + 1)));
          if (abs(t) < 1e-17 && n > 4) break;
        }
        return _mulr(sum, 2 / Math.sqrt(Math.PI));
      };
      const erfc = (z) => sub(ONE, erf(z));

      const _EULER = 0.5772156649015328606;
      const Si = (z) => {
        z = toC(z);
        let sum = ZERO,
          zsq = mul(z, z),
          term = z;
        for (let k = 0; k < 40; k++) {
          const t = div(term, _Cr(2 * k + 1));
          sum = k % 2 === 0 ? add(sum, t) : sub(sum, t);
          term = mul(term, div(zsq, _Cr((2 * k + 2) * (2 * k + 3))));
          if (abs(t) < 1e-17 && k > 3) break;
        }
        return sum;
      };
      const Ci = (z) => {
        z = toC(z);
        let sum = add(log(z), _Cr(_EULER)),
          zsq = mul(z, z),
          term = ONE;
        for (let k = 1; k < 40; k++) {
          term = mul(term, div(zsq, _Cr((2 * k - 1) * (2 * k))));
          const t = div(term, _Cr(2 * k));
          sum = k % 2 === 1 ? sub(sum, t) : add(sum, t);
          if (abs(t) < 1e-17 && k > 3) break;
        }
        return sum;
      };
      const Ei = (z) => {
        z = toC(z);
        let sum = add(_Cr(_EULER), log(z)),
          term = ONE;
        for (let k = 1; k < 60; k++) {
          term = mul(term, div(z, _Cr(k)));
          const t = div(term, _Cr(k));
          sum = add(sum, t);
          if (abs(t) < 1e-18 && k > 3) break;
        }
        return sum;
      };

      // Дзета Римана через ускорение Борвейна — корректна на всей плоскости, кроме s=1.
      const zeta = (s) => {
        s = toC(s);
        if (Math.abs(s.re - 1) < 1e-12 && Math.abs(s.im) < 1e-12) return INFINITY;
        const N = 28,
          dk = new Float64Array(N + 1);
        let t = 1 / N;
        dk[0] = N * t;
        for (let i = 1; i <= N; i++) {
          t *= (4 * (N + i - 1) * (N - i + 1)) / (2 * i * (2 * i - 1));
          dk[i] = dk[i - 1] + N * t;
        }
        const dN = dk[N];
        let eta = ZERO;
        for (let k = 0; k < N; k++) {
          const coef = (k % 2 === 0 ? 1 : -1) * (dk[k] - dN);
          eta = add(eta, _mulr(pow(_Cr(k + 1), neg(s)), coef));
        }
        eta = _mulr(eta, -1 / dN);
        return div(eta, sub(ONE, pow(_Cr(2), sub(ONE, s))));
      };

      // Точные тождества (которых не было среди элементарных).
      const cbrt = (z) => pow(toC(z), _Cr(1 / 3));
      const sinc = (z) => {
        z = toC(z);
        return abs(z) < 1e-12 ? ONE : div(sin(z), z);
      };
      const gd = (z) => atan(sinh(toC(z)));
      const gdInv = (z) => asinh(tan(toC(z)));
      const asec = (z) => acos(recip(toC(z)));
      const acsc = (z) => asin(recip(toC(z)));
      const acot = (z) => atan(recip(toC(z)));
      const asech = (z) => acosh(recip(toC(z)));
      const acsch = (z) => asinh(recip(toC(z)));
      const acoth = (z) => atanh(recip(toC(z)));

      // Ортогональные полиномы по рекуррентам.
      const legendreP = (n, z) => {
        z = toC(z);
        if (n === 0) return ONE;
        if (n === 1) return z;
        let p0 = ONE,
          p1 = z;
        for (let k = 2; k <= n; k++) {
          const p = div(sub(_mulr(mul(z, p1), 2 * k - 1), _mulr(p0, k - 1)), _Cr(k));
          p0 = p1;
          p1 = p;
        }
        return p1;
      };
      const chebyshevT = (n, z) => {
        z = toC(z);
        if (n === 0) return ONE;
        if (n === 1) return z;
        let a = ONE,
          b = z;
        for (let k = 2; k <= n; k++) {
          const c = sub(_mulr(mul(z, b), 2), a);
          a = b;
          b = c;
        }
        return b;
      };
      const chebyshevU = (n, z) => {
        z = toC(z);
        if (n === 0) return ONE;
        if (n === 1) return _mulr(z, 2);
        let a = ONE,
          b = _mulr(z, 2);
        for (let k = 2; k <= n; k++) {
          const c = sub(_mulr(mul(z, b), 2), a);
          a = b;
          b = c;
        }
        return b;
      };

      // Полилогарифм Li_s(z) рядом (|z|<1).
      const polylog = (s, z) => {
        s = toC(s);
        z = toC(z);
        let sum = ZERO,
          zk = z;
        for (let k = 1; k <= 60; k++) {
          sum = add(sum, div(zk, pow(_Cr(k), s)));
          zk = mul(zk, z);
          if (abs(zk) < 1e-18) break;
        }
        return sum;
      };

      // Тэта-функции Якоби (исправленные q-ряды; по умолчанию ном q=0.5).
      const theta1 = (z, q = 0.5) => {
        z = toC(z);
        let s = ZERO;
        for (let n = 0; n < 24; n++)
          s = add(
            s,
            _mulr(sin(_mulr(z, 2 * n + 1)), Math.pow(-1, n) * Math.pow(q, (n + 0.5) * (n + 0.5))),
          );
        return _mulr(s, 2);
      };
      const theta2 = (z, q = 0.5) => {
        z = toC(z);
        let s = ZERO;
        for (let n = 0; n < 24; n++)
          s = add(s, _mulr(cos(_mulr(z, 2 * n + 1)), Math.pow(q, (n + 0.5) * (n + 0.5))));
        return _mulr(s, 2);
      };
      const theta3 = (z, q = 0.5) => {
        z = toC(z);
        let s = ONE;
        for (let n = 1; n < 24; n++)
          s = add(s, _mulr(cos(_mulr(z, 2 * n)), 2 * Math.pow(q, n * n)));
        return s;
      };
      const theta4 = (z, q = 0.5) => {
        z = toC(z);
        let s = ONE;
        for (let n = 1; n < 24; n++)
          s = add(s, _mulr(cos(_mulr(z, 2 * n)), 2 * Math.pow(-1, n) * Math.pow(q, n * n)));
        return s;
      };

      /* ===================== Спецфункции: ярусы A, B, C ===================== */

      /* —— Ярус A —— */

      // Эйри Ai, Bi через ряды Маклорена двух целых решений w''=zw.
      // f: степени 0,3,6…; g: степени 1,4,7…; a_{n+3}=a_n/((n+3)(n+2)).
      const _AIRY_A = 0.3550280538878172; //  3^(−2/3)/Γ(2/3) =  Ai(0)
      const _AIRY_B = 0.2588194037928068; //  3^(−1/3)/Γ(1/3) = −Ai'(0)
      const _airyFG = (z) => {
        z = toC(z);
        const z3 = mul(z, mul(z, z));
        let f = ONE,
          g = z,
          tf = ONE,
          tg = z;
        for (let n = 1; n < 80; n++) {
          tf = div(mul(tf, z3), _Cr(3 * n * (3 * n - 1)));
          tg = div(mul(tg, z3), _Cr((3 * n + 1) * (3 * n)));
          f = add(f, tf);
          g = add(g, tg);
          if (abs(tf) < 1e-18 && abs(tg) < 1e-18 && n > 3) break;
        }
        return [f, g];
      };
      const airyAi = (z) => {
        const [f, g] = _airyFG(z);
        return sub(_mulr(f, _AIRY_A), _mulr(g, _AIRY_B));
      };
      const airyBi = (z) => {
        const [f, g] = _airyFG(z);
        return _mulr(add(_mulr(f, _AIRY_A), _mulr(g, _AIRY_B)), Math.sqrt(3));
      };

      // Френель C(z)=∫₀ᶻcos(πt²/2)dt, S(z)=∫₀ᶻsin(πt²/2)dt — знакочередующиеся ряды.
      const fresnelC = (z) => {
        z = toC(z);
        const a2 = (Math.PI / 2) * (Math.PI / 2),
          z4 = mul(mul(z, z), mul(z, z));
        let sum = ZERO,
          base = z; // base_n = (π/2)^{2n}/(2n)! · z^{4n+1}
        for (let n = 0; n < 90; n++) {
          const t = div(base, _Cr(4 * n + 1));
          sum = n % 2 === 0 ? add(sum, t) : sub(sum, t);
          base = div(_mulr(mul(base, z4), a2), _Cr((2 * n + 1) * (2 * n + 2)));
          if (abs(t) < 1e-18 && n > 3) break;
        }
        return sum;
      };
      const fresnelS = (z) => {
        z = toC(z);
        const a = Math.PI / 2,
          a2 = a * a,
          z4 = mul(mul(z, z), mul(z, z));
        let sum = ZERO,
          base = _mulr(mul(z, mul(z, z)), a); // base_0 = (π/2) z³
        for (let n = 0; n < 90; n++) {
          const t = div(base, _Cr(4 * n + 3));
          sum = n % 2 === 0 ? add(sum, t) : sub(sum, t);
          base = div(_mulr(mul(base, z4), a2), _Cr((2 * n + 3) * (2 * n + 2)));
          if (abs(t) < 1e-18 && n > 3) break;
        }
        return sum;
      };

      // Ламберт W₀ (главная ветвь) — итерация Галлея, разрез по (−∞,−1/e].
      const lambertW = (z) => {
        z = toC(z);
        if (z.re === 0 && z.im === 0) return ZERO;
        let w;
        if (abs(z) < 1.2) {
          w = add(sub(z, mul(z, z)), _mulr(mul(z, mul(z, z)), 1.5)); // z − z² + 1.5 z³
        } else {
          const L = log(z);
          w = sub(L, log(L)); // ln z − ln ln z
        }
        for (let i = 0; i < 60; i++) {
          const ew = exp(w),
            f = sub(mul(w, ew), z);
          const denom = sub(mul(ew, add(w, ONE)), div(mul(add(w, TWO), f), mul(TWO, add(w, ONE))));
          const dw = div(f, denom);
          w = sub(w, dw);
          if (abs(dw) < 1e-15 * (1 + abs(w))) break;
        }
        return w;
      };

      /* —— Ярус B —— */

      // Бессель J_ν, I_ν общего порядка: Σ (∓1)ᵐ/(m! Γ(m+ν+1)) (z/2)^{2m+ν}.
      const _besselJI = (nu, z, sign) => {
        nu = toC(nu);
        z = toC(z);
        const h = _mulr(z, 0.5),
          hsq = sign < 0 ? neg(mul(h, h)) : mul(h, h);
        let term = div(pow(h, nu), gamma(add(nu, ONE))),
          sum = term;
        for (let m = 1; m < 80; m++) {
          term = div(mul(term, hsq), mul(_Cr(m), add(nu, _Cr(m))));
          sum = add(sum, term);
          if (abs(term) < 1e-18 * (1 + abs(sum)) && m > 3) break;
        }
        return sum;
      };
      const besselJ = (nu, z) => _besselJI(nu, z, -1);
      const besselI = (nu, z) => _besselJI(nu, z, 1);
      // Бессель Y₀, K₀ (порядок 0) — ряды с гармоническими числами Hₖ.
      const besselY0 = (z) => {
        z = toC(z);
        const h = _mulr(z, 0.5),
          hsq = mul(h, h),
          J0 = besselJ(ZERO, z);
        let sum = ZERO,
          pterm = ONE,
          hk = 0;
        for (let k = 1; k < 50; k++) {
          hk += 1 / k;
          pterm = div(mul(pterm, hsq), _Cr(k * k)); // ((z/2)²)ᵏ/(k!)²
          const t = _mulr(pterm, hk * (k % 2 === 1 ? 1 : -1)); // (−1)^{k+1} Hₖ …
          sum = add(sum, t);
          if (abs(t) < 1e-18 && k > 3) break;
        }
        return _mulr(add(mul(add(log(h), _Cr(_EULER)), J0), sum), 2 / Math.PI);
      };
      const besselK0 = (z) => {
        z = toC(z);
        const h = _mulr(z, 0.5),
          hsq = mul(h, h),
          I0 = besselI(ZERO, z);
        let sum = ZERO,
          pterm = ONE,
          hk = 0;
        for (let k = 1; k < 50; k++) {
          hk += 1 / k;
          pterm = div(mul(pterm, hsq), _Cr(k * k));
          sum = add(sum, _mulr(pterm, hk));
          if (abs(_mulr(pterm, hk)) < 1e-18 && k > 3) break;
        }
        return add(mul(neg(add(log(h), _Cr(_EULER))), I0), sum);
      };
      // Бессель Y_ν, K_ν: порядок 0 — точно; иначе формула связи (целые порядки слегка сдвигаются).
      const _nudge = (nu) =>
        Math.abs(nu.re - Math.round(nu.re)) < 1e-8 && Math.abs(nu.im) < 1e-12
          ? _Cr(nu.re + 1e-8)
          : nu;
      const besselY = (nu, z) => {
        nu = toC(nu);
        if (abs(nu) < 1e-12) return besselY0(z);
        const n = _nudge(nu),
          sp = sin(_mulr(n, Math.PI));
        return div(sub(mul(besselJ(n, z), cos(_mulr(n, Math.PI))), besselJ(neg(n), z)), sp);
      };
      const besselK = (nu, z) => {
        nu = toC(nu);
        if (abs(nu) < 1e-12) return besselK0(z);
        const n = _nudge(nu),
          sp = sin(_mulr(n, Math.PI));
        return div(_mulr(sub(besselI(neg(n), z), besselI(n, z)), Math.PI / 2), sp);
      };

      // Полные эллиптические K(m), E(m) через комплексный AGM (m = k²).
      const _agm = (a, b) => {
        const a1 = _mulr(add(a, b), 0.5);
        let g = sqrt(mul(a, b));
        if (abs(sub(a1, g)) > abs(add(a1, g))) g = neg(g); // оптимальная ветвь
        return [a1, g];
      };
      const ellipticK = (m) => {
        m = toC(m);
        let a = ONE,
          b = sqrt(sub(ONE, m));
        for (let i = 0; i < 60; i++) {
          const [a1, b1] = _agm(a, b);
          if (abs(sub(a1, b1)) < 1e-16 * (1 + abs(a1))) {
            a = a1;
            break;
          }
          a = a1;
          b = b1;
        }
        return div(_Cr(Math.PI / 2), a);
      };
      const ellipticE = (m) => {
        m = toC(m);
        if (abs(sub(ONE, m)) < 1e-12) return ONE; // E(1)=1 (AGM вырождается при m=1)
        let a = ONE,
          b = sqrt(sub(ONE, m));
        let sum = _mulr(m, 0.5),
          pw = 1; // Σ 2^{n−1} cₙ², старт n=0: ½·c₀² = ½m
        for (let i = 0; i < 60; i++) {
          const c1 = _mulr(sub(a, b), 0.5);
          const [a1, b1] = _agm(a, b);
          sum = add(sum, _mulr(mul(c1, c1), pw));
          pw *= 2;
          a = a1;
          b = b1;
          if (abs(c1) < 1e-16) break;
        }
        return mul(div(_Cr(Math.PI / 2), a), sub(ONE, sum));
      };

      /* —— Ярус C —— */

      // Тэта-функции с комплексным номом q (для Якоби); возвращает [θ1,θ2,θ3,θ4](z,q).
      const _thetas = (z, q) => {
        z = toC(z);
        q = toC(q);
        let t1 = ZERO,
          t2 = ZERO,
          t3 = ONE,
          t4 = ONE;
        for (let n = 0; n < 80; n++) {
          if (n >= 1) {
            const qn = pow(q, _Cr(n * n)),
              cz = cos(_mulr(z, 2 * n));
            t3 = add(t3, _mulr(mul(qn, cz), 2));
            t4 = add(t4, _mulr(mul(qn, cz), 2 * (n % 2 === 0 ? 1 : -1)));
          }
          const qe = pow(q, _Cr((n + 0.5) * (n + 0.5)));
          const s = mul(qe, sin(_mulr(z, 2 * n + 1)));
          t1 = n % 2 === 0 ? add(t1, s) : sub(t1, s);
          t2 = add(t2, mul(qe, cos(_mulr(z, 2 * n + 1))));
          if (n > 3 && abs(qe) < 1e-20) break;
        }
        return [_mulr(t1, 2), _mulr(t2, 2), t3, t4];
      };
      // Якоби sn, cn, dn через ном q(m) и тэта-функции.
      const _jacobi = (u, m, which) => {
        u = toC(u);
        m = toC(m);
        const K = ellipticK(m);
        const q = exp(neg(div(mul(_Cr(Math.PI), ellipticK(sub(ONE, m))), K)));
        const zeta = div(mul(_Cr(Math.PI), u), mul(TWO, K));
        const [t1z, t2z, t3z, t4z] = _thetas(zeta, q);
        const [, T2, T3, T4] = _thetas(ZERO, q);
        if (which === 0) return mul(div(T3, T2), div(t1z, t4z)); // sn
        if (which === 1) return mul(div(T4, T2), div(t2z, t4z)); // cn
        return mul(div(T4, T3), div(t3z, t4z)); // dn
      };
      const jacobiSN = (u, m) => _jacobi(u, m, 0);
      const jacobiCN = (u, m) => _jacobi(u, m, 1);
      const jacobiDN = (u, m) => _jacobi(u, m, 2);

      // Вейерштрасс ℘(z; g₂,g₃) — ряд Лорана 1/z² + Σ cₖ z^{2k}, сходится внутри ячейки.
      const weierstrassP = (z, g2, g3) => {
        z = toC(z);
        g2 = toC(g2);
        g3 = toC(g3);
        const N = 26,
          c = new Array(N + 1);
        c[1] = _mulr(g2, 1 / 20);
        c[2] = _mulr(g3, 1 / 28);
        for (let k = 3; k <= N; k++) {
          let s = ZERO;
          for (let j = 1; j <= k - 2; j++) s = add(s, mul(c[j], c[k - 1 - j]));
          c[k] = _mulr(s, 3 / ((2 * k + 3) * (k - 2)));
        }
        const z2 = mul(z, z);
        let sum = div(ONE, z2),
          zp = z2;
        for (let k = 1; k <= N; k++) {
          sum = add(sum, mul(c[k], zp));
          zp = mul(zp, z2);
        }
        return sum;
      };

      // ── дополнительные аналитические функции ──────────────────────────────────
      // Лоренциана 1/(1+(z/γ)²): рациональная, полюсы в ±iγ.
      const lorentz = (z, g = ONE) => {
        const q = div(toC(z), toC(g));
        return recip(add(ONE, mul(q, q)));
      };
      // Ядро Дирихле D_n(z) = 1 + 2·Σ_{k=1}^n cos(kz) — тригонометрический полином (целая функция).
      const dirichletKernel = (n, z) => {
        z = toC(z);
        const N = Math.max(0, Math.round(n && n.re !== undefined ? n.re : n));
        let s = ONE;
        for (let k = 1; k <= N; k++) s = add(s, _mulr(cos(_mulr(z, k)), 2));
        return s;
      };
      // Гумбель (двойная экспонента) e^{−e^{−z}} — целая; в v21 ошибочно назван «Ландау».
      const gumbel = (z) => exp(neg(exp(neg(toC(z)))));
      // Функция Райта (Фокса–Райта) W_{λ,μ}(z) = Σ_{k≥0} z^k/(k!·Γ(λk+μ)); целая при λ>−1.
      const wright = (lam, mu, z) => {
        lam = toC(lam);
        mu = toC(mu);
        z = toC(z);
        let s = ZERO,
          zk = ONE,
          kf = 1;
        for (let k = 0; k < 200; k++) {
          if (k > 0) kf *= k;
          const t = div(zk, _mulr(gamma(add(_mulr(lam, k), mu)), kf));
          if (isFiniteC(t)) s = add(s, t);
          if (k > 4 && abs(t) < 1e-18 * (1 + abs(s))) break;
          zk = mul(zk, z);
        }
        return s;
      };
      // Тэта с характеристиками θ[a,b](z,τ)=Σ_n exp(πiτ(n+a)²+2πi(n+a)(z+b)); требует Im τ>0.
      const thetaGen = (z, tau, a = ZERO, b = ZERO) => {
        z = toC(z);
        tau = toC(tau);
        a = toC(a);
        b = toC(b);
        if (tau.im <= 1e-6) tau = C(tau.re, Math.max(1e-3, tau.im));
        const PIi = C(0, Math.PI),
          TWOPIi = C(0, 2 * Math.PI),
          zb = add(z, b);
        let s = ZERO;
        for (let n = 0; n < 400; n++) {
          const list = n === 0 ? [0] : [n, -n];
          let big = false;
          for (const nn of list) {
            const na = add(_Cr(nn), a);
            const t = exp(add(mul(PIi, mul(tau, mul(na, na))), mul(TWOPIi, mul(na, zb))));
            if (isFiniteC(t)) {
              s = add(s, t);
              if (abs(t) > 1e-18) big = true;
            }
          }
          if (n > 2 && !big) break;
        }
        return s;
      };
      // Гипергеометрические ряды через рекуррентное отношение членов.
      const _2f1series = (a, b, c, z) => {
        let s = ZERO,
          term = ONE;
        for (let k = 0; k < 2000; k++) {
          s = add(s, term);
          const num = mul(add(a, _Cr(k)), add(b, _Cr(k))),
            den = mul(add(c, _Cr(k)), _Cr(k + 1));
          term = mul(mul(term, div(num, den)), z);
          if (!isFiniteC(term) || abs(term) > 1e10) break; // ранний выход: расходимость (|arg|>1) или переполнение
          if (k > 4 && abs(term) < 1e-16 * (1 + abs(s))) break;
        }
        return s;
      };
      const hyp2f1 = (a, b, c, z) => {
        a = toC(a);
        b = toC(b);
        c = toC(c);
        z = toC(z);
        // прямой ряд сходится при |z|<1; преобразование Пфаффа даёт меньший аргумент при Re z<½ → почти вся плоскость, кроме разреза [1,∞)
        const w = div(z, sub(z, ONE)); // z/(z−1)
        if (abs(w) < abs(z) - 1e-12)
          return mul(pow(sub(ONE, z), neg(a)), _2f1series(a, sub(c, b), c, w));
        return _2f1series(a, b, c, z);
      };
      const hyp1f1 = (a, b, z) => {
        a = toC(a);
        b = toC(b);
        z = toC(z);
        let s = ZERO,
          term = ONE;
        for (let k = 0; k < 6000; k++) {
          s = add(s, term);
          const num = add(a, _Cr(k)),
            den = mul(add(b, _Cr(k)), _Cr(k + 1));
          term = mul(mul(term, div(num, den)), z);
          if (!isFiniteC(term)) break;
          if (k > 4 && abs(term) < 1e-16 * (1 + abs(s))) break;
        }
        return s;
      };
      const hyp0f1 = (b, z) => {
        b = toC(b);
        z = toC(z);
        let s = ZERO,
          term = ONE;
        for (let k = 0; k < 6000; k++) {
          s = add(s, term);
          const den = mul(add(b, _Cr(k)), _Cr(k + 1));
          term = mul(div(term, den), z);
          if (!isFiniteC(term)) break;
          if (k > 4 && abs(term) < 1e-16 * (1 + abs(s))) break;
        }
        return s;
      };
      // n-я производная по формуле Коши: f⁽ⁿ⁾(z) ≈ n!/(N·rⁿ)·Σ f(z+re^{iθ})·e^{−inθ}.
      const nthDeriv = (f, z, n, r = 0.6) => {
        z = toC(z);
        n = Math.max(0, Math.round(n));
        if (n === 0) return f(z);
        const N = Math.max(48, 12 * n);
        let s = ZERO,
          nf = 1;
        for (let j = 2; j <= n; j++) nf *= j;
        for (let j = 0; j < N; j++) {
          const th = (2 * Math.PI * j) / N,
            fw = f(add(z, fromPolar(r, th)));
          if (isFiniteC(fw)) s = add(s, mul(fw, fromPolar(1, -n * th)));
        }
        return _mulr(s, nf / (N * Math.pow(r, n)));
      };

      /* ============================== РЯДЫ, ВЕТВИ, КЛАССИФИКАЦИЯ ОСОБЫХ ТОЧЕК */

      // O(N²) ДПФ (без зависимостей); sign=-1 — прямое, +1 — обратное.
      const _dft = (samples, sign) => {
        const N = samples.length,
          out = new Array(N);
        for (let k = 0; k < N; k++) {
          let sr = 0,
            si = 0;
          for (let j = 0; j < N; j++) {
            const ang = (sign * 2 * Math.PI * k * j) / N;
            const cr = Math.cos(ang),
              ci = Math.sin(ang),
              s = samples[j];
            sr += s.re * cr - s.im * ci;
            si += s.re * ci + s.im * cr;
          }
          out[k] = C(sr, si);
        }
        return out;
      };

      // Коэффициенты Лорана вокруг z0 по окружности радиуса r (метод Фурье):
      //   f(z0 + r e^{iθ}) = Σ_k c_k r^k e^{ikθ}  ⇒  c_k r^k — это ДПФ значений.
      // Возвращает объект {k: Complex} для k ∈ [-terms, terms]. Вычет = coef[-1].
      const laurent = (f, z0, { radius = 1, terms = 8, N = 256 } = {}) => {
        z0 = toC(z0);
        const samp = new Array(N);
        for (let j = 0; j < N; j++) samp[j] = f(add(z0, fromPolar(radius, (2 * Math.PI * j) / N)));
        const F = _dft(samp, -1);
        const coef = {};
        for (let k = -terms; k <= terms; k++) {
          const idx = ((k % N) + N) % N;
          coef[k] = scale(F[idx], 1 / (N * Math.pow(radius, k)));
        }
        return coef;
      };

      // Коэффициенты Тейлора a_0..a_n (для аналитической в круге f).
      const taylor = (f, z0, { radius = 1, terms = 12, N = 256 } = {}) => {
        const c = laurent(f, z0, { radius, terms, N });
        return Array.from({ length: terms + 1 }, (_, k) => c[k]);
      };

      // Значение ряда Σ a_k (z-z0)^k по массиву коэффициентов (схема Горнера).
      const evalSeries = (coeffs, z0, z) => {
        z0 = toC(z0);
        z = toC(z);
        const d = sub(z, z0);
        let acc = ZERO;
        for (let k = coeffs.length - 1; k >= 0; k--) acc = add(mul(acc, d), coeffs[k]);
        return acc;
      };

      // Порядок полюса в z0 (0 — устранимая/регулярная, ∞-эвристика — существенная).
      const poleOrder = (f, z0, { radius = 1e-2, terms = 12, N = 256, tol = 1e-6 } = {}) => {
        const c = laurent(f, z0, { radius, terms, N });
        let m = 0,
          neg = 0;
        for (let k = -terms; k < 0; k++)
          if (abs(c[k]) > tol) {
            neg++;
            if (-k > m) m = -k;
          }
        return neg >= terms - 1 ? Infinity : m; // много ненулевых отриц. → существенная
      };

      // Классификация изолированной особой точки.
      const classifySingularity = (f, z0, opts = {}) => {
        const m = poleOrder(f, z0, opts);
        if (m === 0) return { type: "regular", order: 0 };
        if (m === Infinity) return { type: "essential", order: Infinity };
        return { type: "pole", order: m };
      };

      // Все ветви логарифма: генератор (k = 0, +1, -1, +2, -2, …) и срез |k| ≤ K.
      function* logAll(z) {
        z = toC(z);
        const L = Math.log(abs(z)),
          a = arg(z);
        yield C(L, a);
        for (let k = 1; ; k++) {
          yield C(L, a + 2 * Math.PI * k);
          yield C(L, a - 2 * Math.PI * k);
        }
      }
      const logBranches = (z, K = 3) =>
        Array.from({ length: 2 * K + 1 }, (_, i) => logBranch(z, i - K));

      /* ===================== АДАПТИВНОЕ ИНТЕГРИРОВАНИЕ (Гаусс–Кронрод 7–15) */

      // Узлы/веса G7–K15 на [-1,1] (стандарт QUADPACK).
      const _XGK = [
        0.991455371120813, 0.949107912342759, 0.864864423359769, 0.741531185599394,
        0.586087235467691, 0.405845151377397, 0.207784955007898, 0.0,
      ];
      const _WGK = [
        0.022935322010529, 0.063092092629979, 0.10479001032225, 0.140653259715525,
        0.169004726639267, 0.190350578064785, 0.204432940075298, 0.209482141084728,
      ];
      const _WG = [0.12948496616887, 0.279705391489277, 0.381830050505119, 0.417959183673469];

      // Одна оценка K15 на [a,b]: возвращает {val, err} (val — Complex, err — число).
      const _qk15 = (g, a, b) => {
        const c = 0.5 * (a + b),
          h = 0.5 * (b - a);
        const fc = g(c);
        let resg = scale(fc, _WG[3]),
          resk = scale(fc, _WGK[7]);
        for (let j = 0; j < 3; j++) {
          const x = h * _XGK[2 * j + 1];
          const s = add(g(c - x), g(c + x));
          resg = add(resg, scale(s, _WG[j]));
          resk = add(resk, scale(s, _WGK[2 * j + 1]));
        }
        for (let j = 0; j < 4; j++) {
          const x = h * _XGK[2 * j];
          const s = add(g(c - x), g(c + x));
          resk = add(resk, scale(s, _WGK[2 * j]));
        }
        return { val: scale(resk, h), err: abs(scale(sub(resk, resg), h)) };
      };

      // Адаптивное интегрирование g на [0,1] с дроблением по локальной ошибке.
      const _adaptive = (g, tol, maxDepth) => {
        const rec = (a, b, whole, depth) => {
          const m = 0.5 * (a + b);
          const left = _qk15(g, a, m),
            right = _qk15(g, m, b);
          const sum = add(left.val, right.val);
          const err = left.err + right.err;
          if (err < tol || depth >= maxDepth) return { val: sum, err };
          const l = rec(a, m, left, depth + 1),
            r = rec(m, b, right, depth + 1);
          return { val: add(l.val, r.val), err: l.err + r.err };
        };
        return rec(0, 1, _qk15(g, 0, 1), 0);
      };

      // Контурный интеграл с оценкой ошибки. Возвращает {value, error}.
      const integrateAdaptive = (f, path, { tol = 1e-10, maxDepth = 40 } = {}) => {
        const g = (t) => mul(f(path.gamma(t)), path.deriv(t));
        const r = _adaptive(g, tol, maxDepth);
        return { value: r.val, error: r.err };
      };

      /* ============================ СФЕРА РИМАНА: СТЕРЕОГРАФИЧЕСКАЯ ПРОЕКЦИЯ */

      // ℂ ∪ {∞} → единичная сфера S². Северный полюс (0,0,1) = ∞.
      const toSphere = (z) => {
        if (isInf(z)) return { x: 0, y: 0, z: 1 };
        const d = 1 + z.re * z.re + z.im * z.im;
        return { x: (2 * z.re) / d, y: (2 * z.im) / d, z: (d - 2) / d };
      };
      const fromSphere = ({ x, y, z }) => (1 - z < 1e-15 ? INFINITY : C(x / (1 - z), y / (1 - z)));

      // Хордальная (сферическая) метрика — корректна и в ∞.
      const chordalDistance = (a, b) => {
        const A = toSphere(a),
          B = toSphere(b);
        return Math.hypot(A.x - B.x, A.y - B.y, A.z - B.z);
      };

      /* ====================== NUMERIC FAST-PATH (без аллокаций в циклах) */

      // Операции над парой [re, im] в Float64Array(2) — на месте, без создания
      // объектов. Заводите буферы один раз и переиспользуйте в горячих циклах.
      const nC = (re = 0, im = 0) => {
        const a = new Float64Array(2);
        a[0] = re;
        a[1] = im;
        return a;
      };
      const nSet = (out, re, im) => {
        out[0] = re;
        out[1] = im;
        return out;
      };
      const nAdd = (out, b) => {
        out[0] += b[0];
        out[1] += b[1];
        return out;
      };
      const nSub = (out, b) => {
        out[0] -= b[0];
        out[1] -= b[1];
        return out;
      };
      const nMul = (out, b) => {
        const r = out[0] * b[0] - out[1] * b[1],
          i = out[0] * b[1] + out[1] * b[0];
        out[0] = r;
        out[1] = i;
        return out;
      };
      const nSqr = (out) => {
        const r = out[0] * out[0] - out[1] * out[1],
          i = 2 * out[0] * out[1];
        out[0] = r;
        out[1] = i;
        return out;
      };
      const nDiv = (out, b) => {
        const ar = out[0],
          ai = out[1],
          br = b[0],
          bi = b[1];
        if (Math.abs(br) >= Math.abs(bi)) {
          const r = bi / br,
            d = br + bi * r;
          out[0] = (ar + ai * r) / d;
          out[1] = (ai - ar * r) / d;
        } else {
          const r = br / bi,
            d = br * r + bi;
          out[0] = (ar * r + ai) / d;
          out[1] = (ai * r - ar) / d;
        }
        return out;
      };
      const nExp = (out) => {
        const e = Math.exp(out[0]);
        out[0] = e * Math.cos(out[1]);
        out[1] = e * Math.sin(out[1]);
        return out;
      };
      const nAbs2 = (out) => out[0] * out[0] + out[1] * out[1];
      const nAbs = (out) => Math.hypot(out[0], out[1]);

      // Доменная раскраска, пишущая RGBA прямо в буфер (без промежуточных объектов).
      const phaseColorRaw = (re, im, data, p) => {
        const m = Math.hypot(re, im);
        let a = Math.atan2(im, re);
        if (a < 0) a += 2 * Math.PI;
        const h = (a / (2 * Math.PI)) * 6,
          l = m / (m + 1),
          s = 1;
        const c = (1 - Math.abs(2 * l - 1)) * s,
          X = c * (1 - Math.abs((h % 2) - 1)),
          mm = l - c / 2;
        let r, g, b;
        if (h < 1) {
          r = c;
          g = X;
          b = 0;
        } else if (h < 2) {
          r = X;
          g = c;
          b = 0;
        } else if (h < 3) {
          r = 0;
          g = c;
          b = X;
        } else if (h < 4) {
          r = 0;
          g = X;
          b = c;
        } else if (h < 5) {
          r = X;
          g = 0;
          b = c;
        } else {
          r = c;
          g = 0;
          b = X;
        }
        data[p] = (r + mm) * 255;
        data[p + 1] = (g + mm) * 255;
        data[p + 2] = (b + mm) * 255;
        data[p + 3] = 255;
      };

      // Быстрый рендер. fFast(x, y, out) пишет результат в out (переиспользуется);
      // colorRaw(re, im, data, p) пишет RGBA. Аллокаций в цикле — ноль.
      const renderToImageDataFast = (fFast, region, colorRaw = phaseColorRaw) => {
        const { xmin, xmax, ymin, ymax, width, height } = region;
        const data = new Uint8ClampedArray(width * height * 4);
        const out = new Float64Array(2);
        const dx = (xmax - xmin) / width,
          dy = (ymax - ymin) / height;
        for (let j = 0; j < height; j++) {
          const y = ymax - (j + 0.5) * dy;
          for (let i = 0; i < width; i++) {
            fFast(xmin + (i + 0.5) * dx, y, out);
            colorRaw(out[0], out[1], data, (j * width + i) * 4);
          }
        }
        return { width, height, data };
      };

      // Фрактальные ядра (сглаженный счётчик итераций) — раскрытые в скаляры.
      const mandelbrot = (cx, cy, maxIter = 256, bail2 = 256) => {
        let zx = 0,
          zy = 0,
          i = 0,
          x2 = 0,
          y2 = 0;
        for (; i < maxIter; i++) {
          x2 = zx * zx;
          y2 = zy * zy;
          if (x2 + y2 > bail2) break;
          zy = 2 * zx * zy + cy;
          zx = x2 - y2 + cx;
        }
        return i === maxIter ? maxIter : i + 1 - Math.log(Math.log(Math.sqrt(x2 + y2))) / Math.LN2;
      };
      const julia = (zx, zy, cx, cy, maxIter = 256, bail2 = 256) => {
        let i = 0,
          x2 = 0,
          y2 = 0;
        for (; i < maxIter; i++) {
          x2 = zx * zx;
          y2 = zy * zy;
          if (x2 + y2 > bail2) break;
          zy = 2 * zx * zy + cy;
          zx = x2 - y2 + cx;
        }
        return i === maxIter ? maxIter : i + 1 - Math.log(Math.log(Math.sqrt(x2 + y2))) / Math.LN2;
      };
      // Мультиброт z^d + c (целое d≥2); параметрическая плоскость.
      const multibrot = (cx, cy, d = 3, maxIter = 256, bail2 = 1e4) => {
        let zx = 0,
          zy = 0,
          i = 0;
        for (; i < maxIter; i++) {
          if (zx * zx + zy * zy > bail2) break;
          let ax = zx,
            ay = zy;
          for (let k = 1; k < d; k++) {
            const nx = ax * zx - ay * zy,
              ny = ax * zy + ay * zx;
            ax = nx;
            ay = ny;
          }
          zx = ax + cx;
          zy = ay + cy;
        }
        return i === maxIter
          ? maxIter
          : i + 1 - Math.log(Math.log(Math.sqrt(zx * zx + zy * zy))) / Math.log(d);
      };
      // Жюлиа z^d + c (обобщённое на степень d).
      const juliaPow = (zx, zy, cx, cy, d = 2, maxIter = 256, bail2 = 1e4) => {
        let i = 0;
        for (; i < maxIter; i++) {
          if (zx * zx + zy * zy > bail2) break;
          let ax = zx,
            ay = zy;
          for (let k = 1; k < d; k++) {
            const nx = ax * zx - ay * zy,
              ny = ax * zy + ay * zx;
            ax = nx;
            ay = ny;
          }
          zx = ax + cx;
          zy = ay + cy;
        }
        return i === maxIter
          ? maxIter
          : i + 1 - Math.log(Math.log(Math.sqrt(zx * zx + zy * zy))) / Math.log(d);
      };
      // Трикорн (Mandelbar): z → conj(z)² + c — антиголоморфно (контрпример).
      const tricorn = (cx, cy, maxIter = 256, bail2 = 256) => {
        let zx = 0,
          zy = 0,
          i = 0,
          x2 = 0,
          y2 = 0;
        for (; i < maxIter; i++) {
          x2 = zx * zx;
          y2 = zy * zy;
          if (x2 + y2 > bail2) break;
          const nzy = -2 * zx * zy + cy; // conj → знак минус
          zx = x2 - y2 + cx;
          zy = nzy;
        }
        return i === maxIter ? maxIter : i + 1 - Math.log(Math.log(Math.sqrt(x2 + y2))) / Math.LN2;
      };
      // Burning Ship: z → (|Re z| + i|Im z|)² + c — неголоморфно (контрпример).
      const burningShip = (cx, cy, maxIter = 256, bail2 = 256) => {
        let zx = 0,
          zy = 0,
          i = 0,
          x2 = 0,
          y2 = 0;
        for (; i < maxIter; i++) {
          x2 = zx * zx;
          y2 = zy * zy;
          if (x2 + y2 > bail2) break;
          zy = 2 * Math.abs(zx) * Math.abs(zy) + cy;
          zx = x2 - y2 + cx;
        }
        return i === maxIter ? maxIter : i + 1 - Math.log(Math.log(Math.sqrt(x2 + y2))) / Math.LN2;
      };
      // Трансцендентное Жюлиа z → λ·g(z), g ∈ {exp, sin, cos} (kind 0/1/2). Существенная особенность на ∞.
      const juliaTrans = (zx, zy, lre, lim, kind = 0, maxIter = 128, bail = 50) => {
        const b2 = bail * bail;
        let i = 0;
        for (; i < maxIter; i++) {
          if (zx * zx + zy * zy > b2 || !isFinite(zx) || !isFinite(zy)) break;
          let gx, gy;
          if (kind === 0) {
            const e = Math.exp(zx);
            gx = e * Math.cos(zy);
            gy = e * Math.sin(zy);
          } else if (kind === 1) {
            gx = Math.sin(zx) * Math.cosh(zy);
            gy = Math.cos(zx) * Math.sinh(zy);
          } else {
            gx = Math.cos(zx) * Math.cosh(zy);
            gy = -Math.sin(zx) * Math.sinh(zy);
          }
          const nx = lre * gx - lim * gy,
            ny = lre * gy + lim * gx;
          zx = nx;
          zy = ny;
        }
        return i;
      };

      /* ========================= РАСШИРЕННАЯ ГАЛЕРЕЯ КОНФОРМНЫХ ОТОБРАЖЕНИЙ */

      const expMap = (z) => exp(z); // полоса → плоскость/кольцо
      const powerMap = (alpha) => (z) => pow(z, alpha); // клин (угол × alpha)

      // Автоморфизм единичного диска: e^{iθ}(z − a)/(1 − ā z), |a| < 1.
      const diskAutomorphism = (a, theta = 0) => {
        a = toC(a);
        return Mobius(fromPolar(1, theta), neg(mul(fromPolar(1, theta), a)), neg(conj(a)), ONE);
      };

      // --- Шварц–Кристоффель (формулировка на диске) ---
      // f(z) = A + C ∫₀ᶻ ∏ₖ (1 − w/zₖ)^{αₖ−1} dw,  zₖ — прообразы на |z|=1,
      // αₖπ — внутренние углы. Возвращает отображение диск → внутренность многоугольника.
      const schwarzChristoffel = (prevertices, angles, { C: Cc = ONE, A = ZERO, n = 400 } = {}) => {
        const zk = prevertices.map(toC);
        const integrand = (w) => {
          let prod = ONE;
          for (let i = 0; i < zk.length; i++)
            prod = mul(prod, pow(sub(ONE, div(w, zk[i])), C(angles[i] - 1, 0)));
          return prod;
        };
        return (z) =>
          add(A, mul(Cc, integrate(integrand, segment(ZERO, toC(z)), { rule: "simpson", n })));
      };

      // Правильный n-угольник: прообразы — корни из единицы, ∏(1−w/zₖ)=1−wⁿ,
      // поэтому подынтегральное упрощается до (1 − wⁿ)^{−2/n}. Точная карта диск → n-угольник.
      const regularPolygonMap = (n, { steps = 300 } = {}) => {
        const expo = C(-2 / n, 0);
        const integrand = (w) => pow(sub(ONE, pow(w, n)), expo);
        return (z) => integrate(integrand, segment(ZERO, toC(z)), { rule: "simpson", n: steps });
      };

      /* ===== расширения интерфейса (atlas-core) ===== */
      // Ядро интерфейсных расширений: компилятор формул, быстрые ядра, анализ.
      // Ссылается на функции модуля через переданное пространство имён M (в HTML — глобально).
      function makeAtlasCore(M) {
        const {
          C,
          I,
          PI_,
          E_,
          ZERO,
          ONE,
          add,
          sub,
          neg,
          mul,
          div,
          recip,
          pow,
          exp,
          log,
          sqrt,
          sin,
          cos,
          tan,
          sinh,
          cosh,
          tanh,
          asin,
          acos,
          atan,
          asinh,
          acosh,
          atanh,
          conj,
          abs,
          arg,
          derivative,
          residue,
          classifySingularity,
          taylor,
          laurent,
          roots,
          circle,
          integrateAdaptive,
          argumentPrinciple,
          toString,
          isFiniteC,
          gamma,
          factorial,
          erf,
          erfc,
          Si,
          Ci,
          Ei,
          zeta,
