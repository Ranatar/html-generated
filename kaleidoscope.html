          dome: gl.getUniformLocation(P, 'u_dome'),
        };
        const F = this.progFoldG; this.floc = {};
        for(const u of ['g0','g1','g2','n','theta','mode','n1','n2','n3','tileFit','zoom','pan','anchor'])
          this.floc[u === 'tileFit' ? 'fit' : u] = gl.getUniformLocation(F, 'u_' + u);
        const Q = this.progPost;
        this.ploc = {
          fa: gl.getUniformLocation(Q, 'u_fa'), fb: gl.getUniformLocation(Q, 'u_fb'),
          ior: gl.getUniformLocation(Q, 'u_ior'), absorb: gl.getUniformLocation(Q, 'u_absorb'),
          refr: gl.getUniformLocation(Q, 'u_refr'), disp: gl.getUniformLocation(Q, 'u_disp'),
          bg: gl.getUniformLocation(Q, 'u_bg'), lightDir: gl.getUniformLocation(Q, 'u_lightDir'),
          rimCol: gl.getUniformLocation(Q, 'u_rimCol'), specInt: gl.getUniformLocation(Q, 'u_specInt'),
          specPow: gl.getUniformLocation(Q, 'u_specPow'), rimInt: gl.getUniformLocation(Q, 'u_rimInt'),
          tintMix: gl.getUniformLocation(Q, 'u_tintMix'),
        };
        const Z = this.progFinal;
        this.qloc = {
          src: gl.getUniformLocation(Z, 'u_src'), srcTexel: gl.getUniformLocation(Z, 'u_srcTexel'),
          barrel: gl.getUniformLocation(Z, 'u_barrel'),
          bloom: gl.getUniformLocation(Z, 'u_bloom'), mode: gl.getUniformLocation(Z, 'u_mode'),
          optics: gl.getUniformLocation(Z, 'u_optics'), exposure: gl.getUniformLocation(Z, 'u_exposure'),
        };
        const S = Config.chamberRadius * 2; this.S = S;
        this.gTex = [0, 1, 2].map(() => {
          const t = gl.createTexture(); gl.bindTexture(gl.TEXTURE_2D, t);
          gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA8, S, S, 0, gl.RGBA, gl.UNSIGNED_BYTE, null);
          gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.NEAREST);
          gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.NEAREST);
          gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
          gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
          return t;
        });
        this.gFBO = gl.createFramebuffer(); gl.bindFramebuffer(gl.FRAMEBUFFER, this.gFBO);
        for(let i = 0; i < 3; i++)
          gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0 + i, gl.TEXTURE_2D, this.gTex[i], 0);
        this.gDepth = gl.createRenderbuffer(); gl.bindRenderbuffer(gl.RENDERBUFFER, this.gDepth);
        gl.renderbufferStorage(gl.RENDERBUFFER, gl.DEPTH_COMPONENT16, S, S);
        gl.framebufferRenderbuffer(gl.FRAMEBUFFER, gl.DEPTH_ATTACHMENT, gl.RENDERBUFFER, this.gDepth);
        gl.drawBuffers([gl.COLOR_ATTACHMENT0, gl.COLOR_ATTACHMENT1, gl.COLOR_ATTACHMENT2]);
        if(gl.checkFramebufferStatus(gl.FRAMEBUFFER) !== gl.FRAMEBUFFER_COMPLETE) return false;
        // Экранный свёрнутый G-buffer (fTexA: альбедо+покрытие, fTexB: нормаль+толщина).
        // Размер зависит от канвы — выделяется в resize()/_allocFold().
        this.fFBO = gl.createFramebuffer();
        this.fTexA = gl.createTexture();
        this.fTexB = gl.createTexture();
        this.pFBO = gl.createFramebuffer();   // линейный буфер освещения (Этап 7)
        this.pTex = gl.createTexture();
        this._fw = 0; this._fh = 0;
        gl.bindFramebuffer(gl.FRAMEBUFFER, null);
        this.domeVAO = gl.createVertexArray();
        this.bodyVBO = gl.createBuffer();
        this._gen = -1; this.ranges = [];
        return true;
      } catch(e){ console.warn('Glass init failed:', e); return false; }
    },

    // (Пере)выделение текстур экранного свёрнутого G-buffer и буфера освещения
    _allocFold(w, h){
      const gl = this.gl;
      if(w === this._fw && h === this._fh) return;
      this._fw = w; this._fh = h;
      // fTexA — альбедо свёрнутого поля, с мипами (сглаживание спектрального шиммера)
      gl.bindTexture(gl.TEXTURE_2D, this.fTexA);
      gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA8, w, h, 0, gl.RGBA, gl.UNSIGNED_BYTE, null);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR_MIPMAP_LINEAR);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
      // fTexB — экранная нормаль+толщина (без мипов: нормали не размываем) и pTex — линейный цвет
      for(const t of [this.fTexB, this.pTex]){
        gl.bindTexture(gl.TEXTURE_2D, t);
        gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA8, w, h, 0, gl.RGBA, gl.UNSIGNED_BYTE, null);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
      }
      gl.bindFramebuffer(gl.FRAMEBUFFER, this.fFBO);
      gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, this.fTexA, 0);
      gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT1, gl.TEXTURE_2D, this.fTexB, 0);
      gl.drawBuffers([gl.COLOR_ATTACHMENT0, gl.COLOR_ATTACHMENT1]);
      gl.bindFramebuffer(gl.FRAMEBUFFER, this.pFBO);
      gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, this.pTex, 0);
      gl.drawBuffers([gl.COLOR_ATTACHMENT0]);
      gl.bindFramebuffer(gl.FRAMEBUFFER, null);
    },

    // Сборка статического VBO куполов всех тел (перестраивается при смене сцены)
    _buildBuffers(){
      const gl = this.gl, bodies = Scene.bodies;
      let total = 0; for(const b of bodies) total += b.dome.length;
      const data = new Float32Array(total);
      this.ranges = []; let o = 0, voff = 0;
      const N = Math.max(1, bodies.length);
      for(let i = 0; i < bodies.length; i++){
        const b = bodies[i]; data.set(b.dome, o); o += b.dome.length;
        const count = b.dome.length / 5;
        this.ranges.push({ off: voff, count, body: b, depth: 0.9 - 1.8 * (i / N) });
        voff += count;
      }
      gl.bindVertexArray(this.domeVAO);
      gl.bindBuffer(gl.ARRAY_BUFFER, this.bodyVBO);
      gl.bufferData(gl.ARRAY_BUFFER, data, gl.STATIC_DRAW);
      gl.enableVertexAttribArray(0); gl.vertexAttribPointer(0, 2, gl.FLOAT, false, 20, 0);
      gl.enableVertexAttribArray(1); gl.vertexAttribPointer(1, 1, gl.FLOAT, false, 20, 8);
      gl.enableVertexAttribArray(2); gl.vertexAttribPointer(2, 2, gl.FLOAT, false, 20, 12);
      this._gen = Scene.generation;
    },

    resize(R, dpr){
      this.R = R; this.DPR = dpr;
      this.canvas.style.width = this.canvas.style.height = (R * 2) + 'px';
      this.canvas.width = this.canvas.height = Math.floor(R * 2 * dpr);
      if(this.glassReady) this._allocFold(this.canvas.width, this.canvas.height);
    },
    setScene(scene){ this.scene = scene; },

    render(state){
      const gl = this.gl; if(!gl) return;
      const useGlass = Config.glass.on && this.glassReady;
      const W = this.canvas.width, H = this.canvas.height;

      if(useGlass){
        if(this._gen !== Scene.generation) this._buildBuffers();
        const sc = Config.quality.scale;
        const iw = Math.max(2, Math.round(W * sc)), ih = Math.max(2, Math.round(H * sc));
        this._allocFold(iw, ih);
        this._passGBuffer(state.alpha);
        this._passFold(state, iw, ih);
        this._passLight(iw, ih);
        this._passFinal(null, W, H, iw, ih);
        this.stats.drawCalls = this.ranges.length + 3;
        return;
      }

      // --- плоский путь Этапа 3/4: загрузка Chamber.cv, фолдинг -> экран ---
      gl.bindFramebuffer(gl.FRAMEBUFFER, null);
      gl.viewport(0, 0, W, H);
      gl.activeTexture(gl.TEXTURE0);
      gl.bindTexture(gl.TEXTURE_2D, this.tex);
      gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, Chamber.cv);
      gl.useProgram(this.prog);
      gl.uniform1i(this.loc.cham, 0);
      this._setFoldUniforms(this.loc, state);
      gl.bindVertexArray(this.vao);
      gl.drawArrays(gl.TRIANGLES, 0, 3);
      this.stats.drawCalls = 1;
    },

    // (A) G-buffer камеры: купола тел -> gFBO (MRT)
    _passGBuffer(alpha){
      const gl = this.gl, S = this.S;
      gl.bindFramebuffer(gl.FRAMEBUFFER, this.gFBO);
      gl.drawBuffers([gl.COLOR_ATTACHMENT0, gl.COLOR_ATTACHMENT1, gl.COLOR_ATTACHMENT2]);
      gl.viewport(0, 0, S, S);
      gl.clearColor(0, 0, 0, 0); gl.clearDepth(1.0);
      gl.enable(gl.DEPTH_TEST); gl.depthFunc(gl.LEQUAL);
      gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);
      gl.useProgram(this.progDome);
      gl.uniform1f(this.dloc.rc, Config.chamberRadius);
      gl.uniform1f(this.dloc.dome, Config.glass.dome);
      gl.bindVertexArray(this.domeVAO);
      for(const rg of this.ranges){
        const b = rg.body;
        const x = lerp(b.prev.x, b.pos.x, alpha), y = lerp(b.prev.y, b.pos.y, alpha), a = lerp(b.prevA, b.a, alpha);
        gl.uniform2f(this.dloc.pos, x, y);
        gl.uniform2f(this.dloc.rot, Math.cos(a), Math.sin(a));
        gl.uniform1f(this.dloc.depth, rg.depth);
        gl.uniform3f(this.dloc.tint, b.mat.baseColor[0] / 255, b.mat.baseColor[1] / 255, b.mat.baseColor[2] / 255);
        gl.uniform1f(this.dloc.thick, b.mat.thickness);
        gl.drawArrays(gl.TRIANGLES, rg.off, rg.count);
      }
      gl.disable(gl.DEPTH_TEST);
    },

    // (C) фолдинг G-buffer -> экранный свёрнутый G-buffer (нормаль протащена сквозь зеркала)
    _passFold(state, iw, ih){
      const gl = this.gl;
      gl.bindFramebuffer(gl.FRAMEBUFFER, this.fFBO);
      gl.drawBuffers([gl.COLOR_ATTACHMENT0, gl.COLOR_ATTACHMENT1]);
      gl.viewport(0, 0, iw, ih);
      gl.useProgram(this.progFoldG);
      gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, this.gTex[0]); gl.uniform1i(this.floc.g0, 0);
      gl.activeTexture(gl.TEXTURE1); gl.bindTexture(gl.TEXTURE_2D, this.gTex[1]); gl.uniform1i(this.floc.g1, 1);
      gl.activeTexture(gl.TEXTURE2); gl.bindTexture(gl.TEXTURE_2D, this.gTex[2]); gl.uniform1i(this.floc.g2, 2);
      this._setFoldUniforms(this.floc, state);
      gl.bindVertexArray(this.vao);
      gl.drawArrays(gl.TRIANGLES, 0, 3);
      gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, this.fTexA); gl.generateMipmap(gl.TEXTURE_2D);
    },

    // (D) освещение + по-канальная дисперсия -> линейный pTex
    _passLight(iw, ih){
      const gl = this.gl, optics = Config.optics.on;
      gl.bindFramebuffer(gl.FRAMEBUFFER, this.pFBO);
      gl.drawBuffers([gl.COLOR_ATTACHMENT0]);
      gl.viewport(0, 0, iw, ih);
      gl.useProgram(this.progPost);
      gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, this.fTexA); gl.uniform1i(this.ploc.fa, 0);
      gl.activeTexture(gl.TEXTURE1); gl.bindTexture(gl.TEXTURE_2D, this.fTexB); gl.uniform1i(this.ploc.fb, 1);
      gl.uniform1f(this.ploc.ior, Config.glass.ior);
      gl.uniform1f(this.ploc.absorb, Config.glass.absorb);
      gl.uniform1f(this.ploc.refr, Config.glass.refr);
      gl.uniform1f(this.ploc.disp, optics ? Config.optics.dispersion : 0.0);
      const L = Lightings[Config.lighting] || Lightings[0];
      const hx = L.bg[0], br = parseInt(hx.slice(1, 3), 16) / 255, bg_ = parseInt(hx.slice(3, 5), 16) / 255, bb = parseInt(hx.slice(5, 7), 16) / 255;
      gl.uniform3f(this.ploc.bg, br, bg_, bb);
      gl.uniform3f(this.ploc.lightDir, L.dir[0], L.dir[1], L.dir[2]);
      gl.uniform3f(this.ploc.rimCol, L.rim[0], L.rim[1], L.rim[2]);
      gl.uniform1f(this.ploc.specInt, L.spec);
      gl.uniform1f(this.ploc.specPow, L.specPow);
      gl.uniform1f(this.ploc.rimInt, L.rimInt);
      gl.uniform1f(this.ploc.tintMix, L.tintMix);
      gl.bindVertexArray(this.vao);
      gl.drawArrays(gl.TRIANGLES, 0, 3);
    },

    // (E) финал: даунсэмплинг(AA) + дисторсия + bloom + виньетка + тон-маппинг
    _passFinal(targetFBO, W, H, iw, ih){
      const gl = this.gl, optics = Config.optics.on;
      gl.bindFramebuffer(gl.FRAMEBUFFER, targetFBO);
      gl.viewport(0, 0, W, H);
      gl.useProgram(this.progFinal);
      gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, this.pTex); gl.uniform1i(this.qloc.src, 0);
      gl.uniform2f(this.qloc.srcTexel, 1 / iw, 1 / ih);
      gl.uniform1f(this.qloc.barrel, Config.optics.barrel);
      gl.uniform1f(this.qloc.bloom, Config.optics.bloom);
      gl.uniform1f(this.qloc.mode, Config.mode === 'tiling' ? 1 : 0);
      gl.uniform1f(this.qloc.optics, optics ? 1 : 0);
      gl.uniform1f(this.qloc.exposure, (Lightings[Config.lighting] || Lightings[0]).exposure);
      gl.bindVertexArray(this.vao);
      gl.drawArrays(gl.TRIANGLES, 0, 3);
    },

    // Снимок высокого разрешения через FBO-readback (px×px, RGBA, снизу вверх)
    snapshot(px){
      const gl = this.gl; if(!gl) return null;
      if(!this.sFBO){ this.sFBO = gl.createFramebuffer(); this.sTex = gl.createTexture(); this._sw = 0; }
      if(this._sw !== px){
        this._sw = px;
        gl.bindTexture(gl.TEXTURE_2D, this.sTex);
        gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA8, px, px, 0, gl.RGBA, gl.UNSIGNED_BYTE, null);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
        gl.bindFramebuffer(gl.FRAMEBUFFER, this.sFBO);
        gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, this.sTex, 0);
      }
      const st = { alpha: 1, theta: ChamberSim.theta };
      if(Config.glass.on && this.glassReady){
        if(this._gen !== Scene.generation) this._buildBuffers();
        this._allocFold(px, px);
        this._passGBuffer(1);
        this._passFold(st, px, px);
        this._passLight(px, px);
        this._passFinal(this.sFBO, px, px, px, px);
      } else {
        gl.bindFramebuffer(gl.FRAMEBUFFER, this.sFBO);
        gl.viewport(0, 0, px, px);
        gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, this.tex);
        gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, Chamber.cv);
        gl.useProgram(this.prog); gl.uniform1i(this.loc.cham, 0);
        this._setFoldUniforms(this.loc, st);
        gl.bindVertexArray(this.vao); gl.drawArrays(gl.TRIANGLES, 0, 3);
      }
      const buf = new Uint8Array(px * px * 4);
      gl.bindFramebuffer(gl.FRAMEBUFFER, this.sFBO);
      gl.readPixels(0, 0, px, px, gl.RGBA, gl.UNSIGNED_BYTE, buf);
      gl.bindFramebuffer(gl.FRAMEBUFFER, null);
      return { buf, px };
    },

    // Общие uniform'ы фолдинга (розетка/мозаика) для FOLDG_FS и плоского FS
    _setFoldUniforms(loc, state){
      const gl = this.gl;
      gl.uniform1f(loc.n, Config.symmetry);
      gl.uniform1f(loc.theta, state.theta % TAU);
      const tiling = Config.mode === 'tiling';
      gl.uniform1f(loc.mode, tiling ? 1 : 0);
      if(tiling){
        if(Config.triangle !== this._triIdx){
          this._tri = buildTriangle(Triangles[Config.triangle].ang);
          this._triIdx = Config.triangle;
        }
        const t = this._tri;
        gl.uniform2f(loc.n1, t.n[0][0], t.n[0][1]);
        gl.uniform2f(loc.n2, t.n[1][0], t.n[1][1]);
        gl.uniform2f(loc.n3, t.n[2][0], t.n[2][1]);
        gl.uniform1f(loc.fit, t.fit);
        gl.uniform1f(loc.zoom, Config.zoom);
        gl.uniform2f(loc.pan, Config.pan.x, Config.pan.y);
        gl.uniform1f(loc.anchor, t.anchor);
      }
    },
  };

  /* ----------------------------------------------------------------------
   *  RendererGL1 — узкая WebGL1-прослойка (GLSL ES 1.00). Плоский фолдинг:
   *  розетка + бесконечная мозаика (тот же шейдер складывания, что и плоский
   *  путь WebGL2), камера грузится из Chamber.cv в текстуру. Без MRT/dFdx и
   *  без объёмного стекла — они остаются эксклюзивом WebGL2 (RendererGL).
   *  Тот же интерфейс init/resize/setScene/render/snapshot, своя канва-контекст.
   * -------------------------------------------------------------------- */
  const RendererGL1 = {
    name: 'GL¹', supported: false, glassReady: false,
    canvas: null, gl: null, prog: null, tex: null, buf: null, loc: {},
    R: 320, DPR: 1, stats: { drawCalls: 0 }, _triIdx: -1, _tri: null,

    VS: `attribute vec2 a_pos;
varying vec2 v_uv;
void main(){
  v_uv = a_pos * 0.5 + 0.5;
  gl_Position = vec4(a_pos, 0.0, 1.0);
}`,
    FS: `precision highp float;
varying vec2 v_uv;
uniform sampler2D u_cham;
uniform float u_n;
uniform float u_theta;
uniform float u_mode;
uniform vec2  u_n1;
uniform vec2  u_n2;
uniform vec2  u_n3;
uniform float u_tileFit;
uniform float u_zoom;
uniform vec2  u_pan;
uniform float u_anchor;
const float PI = 3.141592653589793;
void main(){
  vec2 p = v_uv * 2.0 - 1.0;
  p.y = -p.y;
  float r = length(p);
  vec3 col;
  if(u_mode > 0.5){
    vec2 q = p * u_zoom + u_pan;
    for(int i = 0; i < 16; i++){
      bool ref = false;
      float s1 = dot(u_n1, q) - 1.0; if(s1 > 1e-4){ q -= 2.0 * s1 * u_n1; ref = true; }
      float s2 = dot(u_n2, q) - 1.0; if(s2 > 1e-4){ q -= 2.0 * s2 * u_n2; ref = true; }
      float s3 = dot(u_n3, q) - 1.0; if(s3 > 1e-4){ q -= 2.0 * s3 * u_n3; ref = true; }
      if(!ref) break;
    }
    vec2 sp = q * u_tileFit; float ph = u_anchor, ct = cos(ph), st = sin(ph);
    sp = vec2(ct * sp.x - st * sp.y, st * sp.x + ct * sp.y);
    col = texture2D(u_cham, sp * 0.5 + 0.5).rgb;
    col *= mix(0.80, 1.0, smoothstep(1.0, 0.55, r));
  } else {
    float ang = atan(p.y, p.x); float tw = PI / u_n;
    float a = abs(mod(ang, 2.0 * tw) - tw); float beta = tw - a + (1.5707963267 - tw * 0.5);
    vec2 dir = vec2(cos(beta), sin(beta));
    vec2 sp = dir * r;
    col = texture2D(u_cham, sp * 0.5 + 0.5).rgb;
    float vig = smoothstep(1.0, 0.5, r);
    col *= mix(0.55, 1.0, vig);
    col += vec3(0.05) * smoothstep(0.45, 0.0, r);
  }
  gl_FragColor = vec4(col, 1.0);
}`,

    _shader(type, src){
      const gl = this.gl, s = gl.createShader(type);
      gl.shaderSource(s, src); gl.compileShader(s);
      if(!gl.getShaderParameter(s, gl.COMPILE_STATUS)){
        console.warn('GL1 shader error:', gl.getShaderInfoLog(s)); gl.deleteShader(s); return null;
      }
      return s;
    },
    _program(vs, fs){
      const gl = this.gl;
      const v = this._shader(gl.VERTEX_SHADER, vs), f = this._shader(gl.FRAGMENT_SHADER, fs);
      if(!v || !f) return null;
      const p = gl.createProgram();
      gl.attachShader(p, v); gl.attachShader(p, f); gl.linkProgram(p);
      if(!gl.getProgramParameter(p, gl.LINK_STATUS)){ console.warn('GL1 link error:', gl.getProgramInfoLog(p)); return null; }
      return p;
    },

    init(canvas){
      this.canvas = canvas;
      let gl = null;
      try { gl = canvas.getContext('webgl', { alpha: false, antialias: true, premultipliedAlpha: false })
                || canvas.getContext('experimental-webgl', { alpha: false, antialias: true }); }
      catch(e){ gl = null; }
      if(!gl){ this.supported = false; return false; }
      this.gl = gl;
      this.prog = this._program(this.VS, this.FS);
      if(!this.prog){ this.supported = false; return false; }
      for(const u of ['cham','n','theta','mode','n1','n2','n3','tileFit','zoom','pan','anchor'])
        this.loc[u === 'tileFit' ? 'fit' : u] = gl.getUniformLocation(this.prog, 'u_' + u);
      this.loc.pos = gl.getAttribLocation(this.prog, 'a_pos');
      this.buf = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, this.buf);
      gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 3, -1, -1, 3]), gl.STATIC_DRAW);
      this.tex = gl.createTexture();
      gl.bindTexture(gl.TEXTURE_2D, this.tex);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
      this.supported = true;
      return true;
    },
    resize(R, dpr){
      this.R = R; this.DPR = dpr;
      this.canvas.style.width = this.canvas.style.height = (R * 2) + 'px';
      this.canvas.width = this.canvas.height = Math.floor(R * 2 * dpr);
    },
    setScene(scene){ this.scene = scene; },

    _setFoldUniforms(state){
      const gl = this.gl, loc = this.loc;
      gl.uniform1f(loc.n, Config.symmetry);
      gl.uniform1f(loc.theta, state.theta % TAU);
      const tiling = Config.mode === 'tiling';
      gl.uniform1f(loc.mode, tiling ? 1 : 0);
      if(tiling){
        if(Config.triangle !== this._triIdx){ this._tri = buildTriangle(Triangles[Config.triangle].ang); this._triIdx = Config.triangle; }
        const t = this._tri;
        gl.uniform2f(loc.n1, t.n[0][0], t.n[0][1]);
        gl.uniform2f(loc.n2, t.n[1][0], t.n[1][1]);
        gl.uniform2f(loc.n3, t.n[2][0], t.n[2][1]);
        gl.uniform1f(loc.fit, t.fit);
        gl.uniform1f(loc.zoom, Config.zoom);
        gl.uniform2f(loc.pan, Config.pan.x, Config.pan.y);
        gl.uniform1f(loc.anchor, t.anchor);
      }
    },
    _drawFold(state){
      const gl = this.gl;
      gl.activeTexture(gl.TEXTURE0);
      gl.bindTexture(gl.TEXTURE_2D, this.tex);
      gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, Chamber.cv);
      gl.useProgram(this.prog);
      gl.uniform1i(this.loc.cham, 0);
      this._setFoldUniforms(state);
      gl.bindBuffer(gl.ARRAY_BUFFER, this.buf);
      gl.enableVertexAttribArray(this.loc.pos);
      gl.vertexAttribPointer(this.loc.pos, 2, gl.FLOAT, false, 0, 0);
      gl.drawArrays(gl.TRIANGLES, 0, 3);
    },
    render(state){
      const gl = this.gl; if(!gl) return;
      gl.bindFramebuffer(gl.FRAMEBUFFER, null);
      gl.viewport(0, 0, this.canvas.width, this.canvas.height);
      this._drawFold(state);
      this.stats.drawCalls = 1;
    },
    // Снимок высокого разрешения (FBO-readback, px×px, RGBA, снизу вверх)
    snapshot(px){
      const gl = this.gl; if(!gl) return null;
      if(!this.sFBO){ this.sFBO = gl.createFramebuffer(); this.sTex = gl.createTexture(); this._sw = 0; }
      if(this._sw !== px){
        this._sw = px;
        gl.bindTexture(gl.TEXTURE_2D, this.sTex);
        gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, px, px, 0, gl.RGBA, gl.UNSIGNED_BYTE, null);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
        gl.bindFramebuffer(gl.FRAMEBUFFER, this.sFBO);
        gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, this.sTex, 0);
      }
      gl.bindFramebuffer(gl.FRAMEBUFFER, this.sFBO);
      gl.viewport(0, 0, px, px);
      this._drawFold({ theta: ChamberSim.theta });
      const buf = new Uint8Array(px * px * 4);
      gl.readPixels(0, 0, px, px, gl.RGBA, gl.UNSIGNED_BYTE, buf);
      gl.bindFramebuffer(gl.FRAMEBUFFER, null);
      return { buf, px };
    },
  };

  /* ----------------------------------------------------------------------
   *  PeekView — окошко «камера» + отладочные слои (коллайдеры/контакты/скорости)
   * -------------------------------------------------------------------- */
  const PeekView = {
    el: null, canvas: null, ctx: null, S: 65, _triIdx: -1, _tri: null,
    init(){ this.el = document.getElementById('peek'); this.canvas = document.getElementById('peekCanvas'); this.ctx = this.canvas.getContext('2d'); },
    resize(dpr){ this.canvas.width = this.canvas.height = Math.floor(130 * dpr); this.ctx.setTransform(dpr, 0, 0, dpr, 0, 0); },
    setVisible(v){ this.el.classList.toggle('hidden', !v); },

    render(alpha, theta){
      const dbg = Config.debug;
      const anyDbg = dbg.show && (dbg.colliders || dbg.contacts || dbg.velocities);
      if(!Config.showPeek && !anyDbg) return;

      const RC = Config.chamberRadius, S = this.S, k = S / RC, p = this.ctx;
      const tiling = Config.mode === 'tiling';
      p.clearRect(0, 0, 130, 130);
      p.save();
      p.beginPath(); p.arc(S, S, S, 0, TAU); p.clip();
      p.translate(S, S);
      p.scale(k, k);                  // камера как есть: гравитация постоянна вниз, куча оседает внизу
      drawChamber(p, alpha);
      if(anyDbg) this._drawDebug(p, alpha, RC / S);
      p.restore();

      p.save(); p.translate(S, S);
      p.strokeStyle = 'rgba(200,164,92,.6)'; p.lineWidth = 1;
      if(tiling){
        // неподвижный фундаментальный треугольник — реальная область выборки (с привязкой anchor)
        if(Config.triangle !== this._triIdx){ this._tri = buildTriangle(Triangles[Config.triangle].ang); this._triIdx = Config.triangle; }
        const t = this._tri, a = t.anchor, ca = Math.cos(a), sa = Math.sin(a);
        p.lineWidth = 1.2;
        p.beginPath();
        for(let i = 0; i < 3; i++){
          const x = t.verts[i][0] * t.fit, y = t.verts[i][1] * t.fit;   // q·fit -> норм. камеры (радиус 1 = обод)
          const sx = (ca * x - sa * y) * S, sy = (sa * x + ca * y) * S;  // rot(anchor) -> экран миникарты
          if(i === 0) p.moveTo(sx, sy); else p.lineTo(sx, sy);
        }
        p.closePath(); p.stroke();
      } else {
        // розетка: неподвижный клин из пары зеркал, направлен вниз (к куче)
        const tw = Math.PI / Config.symmetry, phi0 = Math.PI / 2 - tw / 2;
        p.beginPath();
        p.moveTo(0, 0); p.lineTo((S + 5) * Math.cos(phi0),      (S + 5) * Math.sin(phi0));
        p.moveTo(0, 0); p.lineTo((S + 5) * Math.cos(phi0 + tw), (S + 5) * Math.sin(phi0 + tw));
        p.stroke();
      }
      p.restore();
    },

    _drawDebug(ctx, alpha, invK){
      const dbg = Config.debug, lw = 1.3 * invK;
      // коллайдеры (выпуклые части) и сон
      if(dbg.colliders){
        for(const b of Scene.bodies){
          const x = lerp(b.prev.x, b.pos.x, alpha), y = lerp(b.prev.y, b.pos.y, alpha), a = lerp(b.prevA, b.a, alpha);
          const ca = Math.cos(a), sa = Math.sin(a);
          ctx.lineWidth = lw;
          ctx.strokeStyle = b.sleeping ? 'rgba(150,150,160,.7)' : (b.touching ? 'rgba(255,120,120,.9)' : 'rgba(120,220,255,.85)');
          for(const col of b.colliders){
            ctx.beginPath();
            if(col.type === 'circle'){ ctx.arc(x, y, col.r, 0, TAU); }
            else {
              const L = col.local;
              for(let i = 0; i < L.length; i++){
                const wx = x + ca * L[i][0] - sa * L[i][1], wy = y + sa * L[i][0] + ca * L[i][1];
                if(i === 0) ctx.moveTo(wx, wy); else ctx.lineTo(wx, wy);
              }
              ctx.closePath();
            }
            ctx.stroke();
          }
        }
      }
      // скорости
      if(dbg.velocities){
        ctx.strokeStyle = 'rgba(255,220,120,.9)'; ctx.lineWidth = lw;
        for(const b of Scene.bodies){
          const x = lerp(b.prev.x, b.pos.x, alpha), y = lerp(b.prev.y, b.pos.y, alpha);
          ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x + b.vel.x * 0.12, y + b.vel.y * 0.12); ctx.stroke();
        }
      }
      // контакты + нормали
      if(dbg.contacts){
        const r = 3 * invK, nl = 12 * invK;
        for(const c of ChamberSim.debugContacts){
          ctx.fillStyle = 'rgba(255,80,90,.95)';
          ctx.beginPath(); ctx.arc(c.x, c.y, r, 0, TAU); ctx.fill();
          ctx.strokeStyle = 'rgba(120,255,150,.95)'; ctx.lineWidth = lw;
          ctx.beginPath(); ctx.moveTo(c.x, c.y); ctx.lineTo(c.x + c.nx * nl, c.y + c.ny * nl); ctx.stroke();
        }
      }
    },
  };

  /* ----------------------------------------------------------------------
   *  Debug — оверлей метрик
   * -------------------------------------------------------------------- */
  const Debug = {
    el: null, els: {}, fps: 0, _n: 0, _t: 0,
    init(){
      this.el = document.getElementById('dbg');
      this.els = {
        fps: document.getElementById('d_fps'), rnd: document.getElementById('d_rnd'),
        bodies: document.getElementById('d_bodies'), contacts: document.getElementById('d_contacts'),
        sleep: document.getElementById('d_sleep'), dc: document.getElementById('d_dc'),
        steps: document.getElementById('d_steps'),
      };
    },
    setVisible(v){ this.el.classList.toggle('show', v); },
    sample(now){
      this._n++; if(this._t === 0) this._t = now;
      if(now - this._t >= 200){
        this.fps = Math.round(this._n * 1000 / (now - this._t)); this._n = 0; this._t = now;
        if(Config.debug.show){
          this.els.fps.textContent = this.fps;
          this.els.rnd.textContent = App.renderer.name;
          this.els.bodies.textContent = Scene.bodies.length;
          this.els.contacts.textContent = ChamberSim.lastContacts;
          this.els.sleep.textContent = ChamberSim.lastSleeping;
          this.els.dc.textContent = App.renderer.stats.drawCalls;
          this.els.steps.textContent = ChamberSim.lastSteps;
        }
      }
    },
  };

  /* ----------------------------------------------------------------------
   *  Input
   * -------------------------------------------------------------------- */
  const Input = {
    dragPrev: 0, lastX: 0, lastY: 0,
    attach(el){
      const angleAt = (e) => {
        const rect = el.getBoundingClientRect();
        const cx = rect.left + rect.width / 2, cy = rect.top + rect.height / 2;
        const px = e.touches ? e.touches[0].clientX : e.clientX;
        const py = e.touches ? e.touches[0].clientY : e.clientY;
        return Math.atan2(py - cy, px - cx);
      };
      el.addEventListener('pointerdown', e => {
        ChamberSim.dragging = true;
        this.dragPrev = angleAt(e);
        this.lastX = e.clientX; this.lastY = e.clientY;
        el.setPointerCapture(e.pointerId);
      });
      el.addEventListener('pointermove', e => {
        if(!ChamberSim.dragging) return;
        if(Config.mode === 'tiling'){
          // панорамирование бесконечного поля (содержимое следует за курсором)
          const k = Config.zoom / Math.max(1, App.R);
          Config.pan.x -= (e.clientX - this.lastX) * k;
          Config.pan.y -= (e.clientY - this.lastY) * k;
          this.lastX = e.clientX; this.lastY = e.clientY;
        } else {
          const a = angleAt(e); let d = a - this.dragPrev;
          if(d > Math.PI) d -= TAU; if(d < -Math.PI) d += TAU;
          ChamberSim.applyDrag(d); this.dragPrev = a;
        }
      });
      const end = () => { ChamberSim.dragging = false; };
      el.addEventListener('pointerup', end); el.addEventListener('pointercancel', end);
      el.addEventListener('wheel', e => {
        if(Config.mode !== 'tiling') return;
        e.preventDefault();
        Config.zoom = clamp(Config.zoom * (1 + e.deltaY * 0.0012), 0.6, 20);
      }, { passive: false });
    },
  };

      shapeBtn.textContent = Shapes[Config.shapeMode].name;
      shapeBtn.addEventListener('click', () => {

      $('vol').addEventListener('input', e => { const v = +e.target.value; $('volVal').textContent = v.toFixed(2); Sound.setVolume(v); });

      const peekBtn = $('peekBtn');
      peekBtn.addEventListener('click', e => { Config.showPeek = !Config.showPeek; PeekView.setVisible(Config.showPeek); e.target.classList.toggle('on', Config.showPeek); });
      const dbgBtn = $('dbgBtn');
      dbgBtn.addEventListener('click', e => { Config.debug.show = !Config.debug.show; Debug.setVisible(Config.debug.show); e.target.classList.toggle('on', Config.debug.show); });

      const rndBtn = $('rndBtn');
      const modeBtn = $('modeBtn');
      const triBtn = $('triBtn');
      const glassBtn = $('glassBtn');
      const opticsBtn = $('opticsBtn');

      if(!RendererGL.supported || !RendererGL.glassReady){
        glassBtn.disabled = true; glassBtn.classList.remove('on');
        glassBtn.title = 'Объёмное стекло требует WebGL2/MRT';
        opticsBtn.disabled = true; opticsBtn.classList.remove('on');
        opticsBtn.title = 'Пост-оптика требует WebGL2/MRT';
      } else {
        glassBtn.classList.toggle('on', Config.glass.on);
        glassBtn.addEventListener('click', e => {
          Config.glass.on = !Config.glass.on;
          e.target.classList.toggle('on', Config.glass.on);
        });
        opticsBtn.classList.toggle('on', Config.optics.on);
        opticsBtn.addEventListener('click', e => {
          Config.optics.on = !Config.optics.on;
          e.target.classList.toggle('on', Config.optics.on);
        });
      }
      const hint = document.querySelector('.hint');
      const setHint = () => {
        hint.textContent = Config.mode === 'tiling'
          ? 'Тяните — панорама · колесо — масштаб'
          : 'Тяните по кругу, чтобы вращать вручную';
      };
      triBtn.textContent = Triangles[Config.triangle].name;

      if(!App.glRenderer){
        rndBtn.disabled = true; rndBtn.textContent = '2D';
        rndBtn.title = 'WebGL недоступен — используется Canvas 2D';
      } else {
        rndBtn.textContent = Config.renderer === 'gl' ? 'GL' : '2D';
        rndBtn.title = App.glTier === 'gl1' ? 'Зеркала: Canvas 2D ↔ WebGL1' : 'Зеркала: Canvas 2D ↔ WebGL2';
        rndBtn.classList.toggle('on', Config.renderer === 'gl');
        rndBtn.addEventListener('click', () => {
          const mode = Config.renderer === 'gl' ? '2d' : 'gl';
          App.setRenderer(mode);
          rndBtn.textContent = mode === 'gl' ? 'GL' : '2D';
          rndBtn.classList.toggle('on', mode === 'gl');
          UI.sync();   // пересчитать доступность «Стекло»/«Оптика» под новый рендерер
        });
      }

      // Мозаика и треугольник доступны всегда — мозаика работает и в Canvas 2D
      modeBtn.addEventListener('click', () => {
        if(Config.mode === 'tiling'){
          Config.mode = 'rosette';
          modeBtn.classList.remove('on'); modeBtn.textContent = 'Розетка';
        } else {
          Config.mode = 'tiling';
          Config.pan.x = Config.pan.y = 0; Config.zoom = 4.0;
          modeBtn.classList.add('on'); modeBtn.textContent = 'Мозаика';
        }
        setHint();
        UI.sync();   // обновить доступность кнопки треугольника под режим
      });
      triBtn.addEventListener('click', () => {
        Config.triangle = (Config.triangle + 1) % Triangles.length;
        triBtn.textContent = Triangles[Config.triangle].name;
      });

      const ensurePeek = () => { if(!Config.showPeek){ Config.showPeek = true; PeekView.setVisible(true); peekBtn.classList.add('on'); } };
      $('d_col').addEventListener('change', e => { Config.debug.colliders  = e.target.checked; if(e.target.checked) ensurePeek(); });
      $('d_con').addEventListener('change', e => { Config.debug.contacts   = e.target.checked; if(e.target.checked) ensurePeek(); });
      $('d_vel').addEventListener('change', e => { Config.debug.velocities = e.target.checked; if(e.target.checked) ensurePeek(); });

      // Этап 8: экспорт и пресеты
      $('snapBtn').addEventListener('click', () => Export.png(2048));
      const recBtn = $('recBtn'); Recorder.btn = recBtn;
      if(!Recorder.supported()){
        recBtn.disabled = true; recBtn.title = 'Запись WebM не поддерживается этим браузером';
      } else {
        recBtn.addEventListener('click', () => Recorder.toggle());
      }
      $('saveBtn').addEventListener('click', () => Presets.download());
      $('copyBtn').addEventListener('click', () => Presets.copy());
      const sceneSel = $('sceneSel');
      if(sceneSel){
        ScenePresets.forEach((p, i) => {
          const o = document.createElement('option'); o.value = String(i); o.textContent = p.name; sceneSel.appendChild(o);
        });
        sceneSel.addEventListener('change', e => {
          const i = +e.target.value;
          if(i >= 0 && ScenePresets[i]) Presets.applyScene(ScenePresets[i].cfg);
          sceneSel.value = '-1';   // вернуть плейсхолдер, чтобы пресет можно было выбрать снова
        });

      const presetFile = $('presetFile');
      $('loadBtn').addEventListener('click', () => presetFile.click());
      presetFile.addEventListener('change', e => {
        const f = e.target.files && e.target.files[0]; if(!f) return;
        const rd = new FileReader();
        rd.onload = () => Presets.import(String(rd.result));
        rd.readAsText(f); presetFile.value = '';
      });

      this._refs = { peekBtn, dbgBtn, rndBtn, modeBtn, triBtn, glassBtn, opticsBtn, lightBtn, shapeBtn, setHint };
      this.sync();
    },

    // Синхронизация всех контролов/кнопок из Config (после импорта пресета или старта)
    sync(){
      const $ = id => document.getElementById(id);
      const set = (id, v, val) => { const el = $(id); if(el) el.value = v; if(val !== undefined){ const b = $(val.id); if(b) b.textContent = val.t; } };
      set('sym', Config.symmetry, { id: 'symVal', t: String(Config.symmetry) });
      set('spd', Config.spin, { id: 'spdVal', t: Config.spin.toFixed(2) });
      set('cnt', Scene.bodies.length, { id: 'cntVal', t: String(Scene.bodies.length) });
      set('alp', Config.glass.opacity, { id: 'alpVal', t: Config.glass.opacity.toFixed(2) });
      set('ior', Config.glass.ior, { id: 'iorVal', t: Config.glass.ior.toFixed(2) });
      set('disp', Config.optics.dispersion, { id: 'dispVal', t: Config.optics.dispersion.toFixed(2) });
      set('bloom', Config.optics.bloom, { id: 'bloomVal', t: Config.optics.bloom.toFixed(2) });
      set('barrel', Config.optics.barrel, { id: 'barVal', t: Config.optics.barrel.toFixed(2) });
      set('qual', Config.quality.scale, { id: 'qualVal', t: Config.quality.scale.toFixed(2) });
      set('vol', Config.sound.volume, { id: 'volVal', t: Config.sound.volume.toFixed(2) });
      const r = this._refs; if(!r) return;
      r.peekBtn.classList.toggle('on', Config.showPeek); PeekView.setVisible(Config.showPeek);
      r.dbgBtn.classList.toggle('on', Config.debug.show); Debug.setVisible(Config.debug.show);
      // Стекло/оптика — пост-обработка WebGL2; активны только когда реально рисует GL-рендерер
      const glCan = App.glRenderer && App.glTier === 'gl2' && RendererGL.glassReady;
      const glAct = glCan && App.renderer === App.glRenderer;
      if(r.glassBtn && r.opticsBtn){
        r.glassBtn.disabled = !glAct; r.opticsBtn.disabled = !glAct;
        r.glassBtn.classList.toggle('on', glAct && Config.glass.on);
        r.opticsBtn.classList.toggle('on', glAct && Config.optics.on);
        r.glassBtn.title  = glAct ? 'Объёмное стекло (G-buffer, преломление фона)'
                          : (glCan ? 'Стекло доступно в WebGL — переключите 2D → GL' : 'Объёмное стекло требует WebGL2/MRT');
        r.opticsBtn.title = glAct ? 'Пост-оптика: дисперсия, свечение, дисторсия линзы'
                          : (glCan ? 'Оптика доступна в WebGL — переключите 2D → GL' : 'Пост-оптика требует WebGL2/MRT');
      }
      r.triBtn.textContent = Triangles[Config.triangle].name;
      if(r.lightBtn) r.lightBtn.textContent = Lightings[Config.lighting].name;
      if(r.shapeBtn) r.shapeBtn.textContent = Shapes[Config.shapeMode].name;
      const tiling = Config.mode === 'tiling';
      // треугольник задаёт фундаментальную область только для мозаики; в розетке он неактивен
      r.triBtn.disabled = !tiling;
      r.triBtn.title = tiling ? 'Треугольник мозаики (группа орнамента)'
                              : 'Треугольник доступен в режиме «Мозаика» (розетка задаётся «Симметрией»)';
      r.modeBtn.classList.toggle('on', tiling); r.modeBtn.textContent = tiling ? 'Мозаика' : 'Розетка';
      if(App.glRenderer){
        const gl = Config.renderer === 'gl';
        r.rndBtn.textContent = gl ? 'GL' : '2D'; r.rndBtn.classList.toggle('on', gl);
      }
      r.setHint();
    },
  };

  /* ----------------------------------------------------------------------
   *  Presets — весь настроечный Config <-> JSON (файл / буфер / localStorage).
   *  Сериализуется только белый список настроек (без рантайм-состояния тел).
   * -------------------------------------------------------------------- */
  const Presets = {
    LS_KEY: 'kaleidoscope.preset.v1',
    serialize(){
      const C = Config;
      return {
        symmetry: C.symmetry, spin: C.spin, bodyCount: Scene.bodies.length,
        paletteIndex: C.paletteIndex, lighting: C.lighting, shapeMode: C.shapeMode,
        renderer: C.renderer, mode: C.mode,
        triangle: C.triangle, zoom: C.zoom, showPeek: C.showPeek,
        glass:  { on: C.glass.on, ior: C.glass.ior, absorb: C.glass.absorb, refr: C.glass.refr, dome: C.glass.dome, opacity: C.glass.opacity },
        optics: { on: C.optics.on, dispersion: C.optics.dispersion, bloom: C.optics.bloom, barrel: C.optics.barrel },
        quality:{ scale: C.quality.scale, auto: C.quality.auto },
      };
    },
    toJSON(){ return JSON.stringify(this.serialize(), null, 2); },
    // только Config (без сцены/DOM/рендерера) — для применения до сборки сцены
    applyConfig(o){
      if(!o || typeof o !== 'object') return;
      const C = Config, num = (v, d) => (typeof v === 'number' && isFinite(v)) ? v : d;
      const mod = (v, n) => ((v % n) + n) % n;
      C.symmetry = clamp(Math.round(num(o.symmetry, C.symmetry)), 3, 24);
      C.spin = clamp(num(o.spin, C.spin), -2, 2);
      C.paletteIndex = mod(Math.round(num(o.paletteIndex, C.paletteIndex)), Palettes.length);
      C.lighting = mod(Math.round(num(o.lighting, C.lighting)), Lightings.length);
      C.shapeMode = mod(Math.round(num(o.shapeMode, C.shapeMode)), Shapes.length);
      C.triangle = mod(Math.round(num(o.triangle, C.triangle)), Triangles.length);
      C.zoom = clamp(num(o.zoom, C.zoom), 0.6, 20);
      if(typeof o.showPeek === 'boolean') C.showPeek = o.showPeek;
      if(o.renderer === 'gl' || o.renderer === '2d') C.renderer = o.renderer;
      if(o.mode === 'tiling' || o.mode === 'rosette') C.mode = o.mode;
      C.bodyCount = clamp(Math.round(num(o.bodyCount, C.bodyCount)), 4, 120);
      if(o.glass){ const g = o.glass;
        if(typeof g.on === 'boolean') C.glass.on = g.on;
        C.glass.ior = clamp(num(g.ior, C.glass.ior), 1, 2);
        C.glass.absorb = clamp(num(g.absorb, C.glass.absorb), 0, 4);
        C.glass.refr = clamp(num(g.refr, C.glass.refr), 0, 1);
        C.glass.dome = clamp(num(g.dome, C.glass.dome), 0, 3);
        C.glass.opacity = clamp(num(g.opacity, C.glass.opacity), 0.25, 1);
      }
      if(o.optics){ const p = o.optics;
        if(typeof p.on === 'boolean') C.optics.on = p.on;
        C.optics.dispersion = clamp(num(p.dispersion, C.optics.dispersion), 0, 1);
        C.optics.bloom = clamp(num(p.bloom, C.optics.bloom), 0, 1.5);
        C.optics.barrel = clamp(num(p.barrel, C.optics.barrel), -0.3, 0.4);
      }
      if(o.quality){ const q = o.quality;
        C.quality.scale = clamp(num(q.scale, C.quality.scale), C.quality.min, C.quality.max);
        if(typeof q.auto === 'boolean') C.quality.auto = q.auto;
      }
    },
    // полное применение (с пересборкой сцены, сменой рендерера и обновлением UI)
    import(text){
      let o; try { o = JSON.parse(text); } catch(e){ return false; }
      this.applyConfig(o);
      Scene.build(Config.bodyCount);
      Scene.recolor();
      App.setRenderer(Config.mode === 'tiling' ? 'gl' : Config.renderer);
      UI.sync();
      this.saveLocal();
      return true;
    },
    // применить готовую конфигурацию из ScenePresets (объект Config)
    applyScene(cfg){
      this.applyConfig(cfg);
      Scene.build(Config.bodyCount);
      Scene.recolor();
      App.setRenderer(Config.mode === 'tiling' ? 'gl' : Config.renderer);
      UI.sync();
      this.saveLocal();
    },
    read(){ try { const s = localStorage.getItem(this.LS_KEY); return s ? JSON.parse(s) : null; } catch(e){ return null; } },
    saveLocal(){ try { localStorage.setItem(this.LS_KEY, this.toJSON()); } catch(e){ /* fallback: без сохранения */ } },
    download(){
      const blob = new Blob([this.toJSON()], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob); a.download = 'kaleidoscope_preset.json';
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(() => URL.revokeObjectURL(a.href), 2000);
    },
    copy(){ try { navigator.clipboard.writeText(this.toJSON()); } catch(e){ /* буфер недоступен */ } },
  };

  /* ----------------------------------------------------------------------
   *  Export — снимок PNG высокого разрешения (GL: FBO-readback; 2D: канва)
   * -------------------------------------------------------------------- */
  const Export = {
    png(size = 2048){
      const r = App.renderer;
      if(r && typeof r.snapshot === 'function'){
        const snap = r.snapshot(size);
        if(snap){ this._fromBuf(snap.buf, snap.px); return; }
      }
      this._from2D(size);
    },
    _fromBuf(buf, px){
      const cv = document.createElement('canvas'); cv.width = px; cv.height = px;
      const ctx = cv.getContext('2d'); const img = ctx.createImageData(px, px);
      for(let y = 0; y < px; y++){                       // переворот по Y (GL снизу вверх)
        const sy = px - 1 - y;
        img.data.set(buf.subarray(sy * px * 4, (sy + 1) * px * 4), y * px * 4);
      }
      ctx.putImageData(img, 0, 0);
      cv.toBlob(b => this._dl(b));
    },
    _from2D(px){
      Renderer2D.resize(Math.floor(px / 2), 1);
      Chamber.draw(1);
      Renderer2D.render({ theta: ChamberSim.theta, alpha: 1 });
      Renderer2D.canvas.toBlob(b => { this._dl(b); App.layout(); });
    },
    _dl(blob){
      if(!blob) return;
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob); a.download = 'kaleidoscope_' + Date.now() + '.png';
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(() => URL.revokeObjectURL(a.href), 2000);
    },
  };

  /* ----------------------------------------------------------------------
   *  Recorder — запись WebM с активной канвы (captureStream + MediaRecorder).
   *  По умолчанию пишет один полный оборот трубы (Δθ = 2π), затем сам
   *  останавливается и скачивает файл; предохранитель — 30 c. Повторный
   *  клик останавливает раньше. При смене рендерера запись корректно встаёт.
   * -------------------------------------------------------------------- */
  const Recorder = {
    rec: null, chunks: [], active: false, startTheta: 0, startTime: 0, btn: null,
    supported(){
      return typeof MediaRecorder !== 'undefined' && typeof HTMLCanvasElement !== 'undefined' &&
        !!(HTMLCanvasElement.prototype.captureStream || HTMLCanvasElement.prototype.mozCaptureStream);
    },
    _mime(){
      const cands = ['video/webm;codecs=vp9', 'video/webm;codecs=vp8', 'video/webm'];
      for(const m of cands){ try { if(MediaRecorder.isTypeSupported(m)) return m; } catch(e){} }
      return '';
    },
    start(){
      if(this.active) return false;
      const canvas = App.renderer.canvas;
      const cap = canvas.captureStream || canvas.mozCaptureStream;
      if(!cap) return false;
      let stream; try { stream = cap.call(canvas, 60); } catch(e){ return false; }
      const mime = this._mime();
      try { this.rec = new MediaRecorder(stream, mime ? { mimeType: mime, videoBitsPerSecond: 12000000 } : undefined); }
      catch(e){ try { this.rec = new MediaRecorder(stream); } catch(e2){ return false; } }
      this.chunks = [];
      this.rec.ondataavailable = e => { if(e.data && e.data.size) this.chunks.push(e.data); };
      this.rec.onstop = () => this._finalize();
      try { this.rec.start(); } catch(e){ return false; }
      this.active = true;
      this.startTheta = ChamberSim.theta;
      this.startTime = performance.now();
      this._ui();
      return true;
    },
    stop(){
      if(!this.active) return;
      this.active = false;
      try { this.rec.stop(); } catch(e){ this._finalize(); }
      this._ui();
    },
    toggle(){ this.active ? this.stop() : this.start(); },
    // вызывается каждый кадр: авто-стоп по завершении оборота или по предохранителю
    tick(){
      if(!this.active) return;
      const dTheta = Math.abs(ChamberSim.theta - this.startTheta);
      if(dTheta >= TAU || (performance.now() - this.startTime) > 30000) this.stop();
    },
    _finalize(){
      if(!this.chunks.length) return;
      const blob = new Blob(this.chunks, { type: 'video/webm' });
      this.chunks = [];
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob); a.download = 'kaleidoscope_' + Date.now() + '.webm';
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(() => URL.revokeObjectURL(a.href), 4000);
    },
    _ui(){ if(this.btn){ this.btn.classList.toggle('on', this.active); this.btn.textContent = this.active ? 'Стоп ●' : 'Запись'; } },
  };

  /* ----------------------------------------------------------------------
   *  Sound — генеративное звуковое окружение (Web Audio, без библиотек).
   *  Слои: (1) удары тел -> ноты-колокольчики (импульс->громкость/яркость,
   *  цвет->высота в гамме, размер->октава, стена/тело->тембр, позиция->панорама);
   *  (2) дроновая подушка (аккорд из гаммы, громкость ~ скорость вращения);
   *  (3) большой ревербератор. Гамма выбирается пресетом освещения.
   * -------------------------------------------------------------------- */
  const Sound = {
    ctx: null, master: null, busIn: null, drone: null, on: false,
    _voices: 0, _nextChord: 0, _lastTrig: 0,
    // гаммы по индексу освещения (День/Ночь/Свеча/Витрина) — пентатоники
    scales: [
      { root: 69, notes: [0, 2, 4, 7, 9] },    // День — A мажорная пентатоника
      { root: 57, notes: [0, 3, 5, 7, 10] },   // Ночь — A минорная пентатоника (ниже/темнее)
      { root: 62, notes: [0, 2, 4, 7, 9] },    // Свеча — D пентатоника (тёплая середина)
      { root: 72, notes: [0, 2, 4, 7, 9] },    // Витрина — C5 яркая пентатоника
    ],
    _scale(){ return this.scales[Config.lighting] || this.scales[0]; },
    _hue(c){
      const r = c[0] / 255, g = c[1] / 255, b = c[2] / 255;
      const mx = Math.max(r, g, b), mn = Math.min(r, g, b), d = mx - mn;
      if(d < 1e-4) return 0;
      let h; if(mx === r) h = ((g - b) / d) % 6; else if(mx === g) h = (b - r) / d + 2; else h = (r - g) / d + 4;
      h *= 60; if(h < 0) h += 360; return h;
    },
    _makeIR(ctx, dur, decay){
      const rate = ctx.sampleRate, len = Math.max(1, Math.floor(rate * dur)), buf = ctx.createBuffer(2, len, rate);
      for(let ch = 0; ch < 2; ch++){ const d = buf.getChannelData(ch); for(let i = 0; i < len; i++){ const t = i / len; d[i] = (Math.random() * 2 - 1) * Math.pow(1 - t, decay); } }
      return buf;
    },
    init(){
      const AC = window.AudioContext || window.webkitAudioContext;
      if(!AC) throw new Error('no WebAudio');
      const ctx = new AC(); this.ctx = ctx;
      const master = ctx.createGain(); master.gain.value = Config.sound.volume;
      const comp = ctx.createDynamicsCompressor();   // мягкий лимитер на мастере
      comp.threshold.value = -8; comp.knee.value = 6; comp.ratio.value = 12; comp.attack.value = 0.003; comp.release.value = 0.25;
      master.connect(comp); comp.connect(ctx.destination);
      const busIn = ctx.createGain(); this.busIn = busIn;
      const dry = ctx.createGain(); dry.gain.value = 0.7;
      const wet = ctx.createGain(); wet.gain.value = 0.55;
      const conv = ctx.createConvolver(); conv.buffer = this._makeIR(ctx, 2.6, 2.4);
      busIn.connect(dry); dry.connect(master);
      busIn.connect(conv); conv.connect(wet); wet.connect(master);
      this.master = master;
      // дрон-подушка: тот же мягкий материал, что у колокольчиков (синус+треугольник),
      // лёгкий хор (расстройка), «дыхание» фильтра и мягкие набегания на смене аккорда
      const dg = ctx.createGain(); dg.gain.value = 0;            // уровень (от активности вращения)
      const swell = ctx.createGain(); swell.gain.value = 1;      // квантованная пульсация аккорда
      const df = ctx.createBiquadFilter(); df.type = 'lowpass'; df.frequency.value = 620; df.Q.value = 0.7;
      dg.connect(swell); swell.connect(df); df.connect(busIn);
      const lfo = ctx.createOscillator(); lfo.type = 'sine'; lfo.frequency.value = 0.07;
      const lfoG = ctx.createGain(); lfoG.gain.value = 240;      // «дыхание» среза фильтра
      lfo.connect(lfoG); lfoG.connect(df.frequency); lfo.start();
      const voices = [];
      for(let i = 0; i < 3; i++){
        const a = ctx.createOscillator(); a.type = 'sine';
        const b = ctx.createOscillator(); b.type = 'triangle'; b.detune.value = (i % 2 ? 7 : -7);
        const bg = ctx.createGain(); bg.gain.value = 0.45;
        const vg = ctx.createGain(); vg.gain.value = (i === 0 ? 0.5 : i === 1 ? 0.34 : 0.26);
        a.connect(vg); b.connect(bg); bg.connect(vg); vg.connect(dg);
        a.start(); b.start(); voices.push({ a, b });
      }
      this.drone = { gain: dg, swell, filt: df, voices };
      this._nextChord = 0; this._lastTrig = 0; this._voices = 0;
    },
    enable(){
      if(!this.ctx){ try { this.init(); } catch(e){ return false; } }
      if(this.ctx.state === 'suspended') this.ctx.resume();
      this.on = true; Config.sound.on = true; return true;
    },
    disable(){
      this.on = false; Config.sound.on = false;
      if(this.drone && this.ctx) this.drone.gain.gain.setTargetAtTime(0, this.ctx.currentTime, 0.4);
    },
    setVolume(v){
      Config.sound.volume = v;
      if(this.master && this.ctx) this.master.gain.setTargetAtTime(v, this.ctx.currentTime, 0.05);
    },
    _trigger(ev, when){
      if(this._voices > 26) return;
      const ctx = this.ctx, sc = this._scale();
      const notes = sc.notes, deg = Math.floor(this._hue(ev.col) / 360 * notes.length) % notes.length;
      let oct = Math.round((38 - ev.r) / 10); oct = clamp(oct, -1, 3);    // крупное -> ниже
      let midi = sc.root + notes[deg] + oct * 12; if(ev.wall) midi -= 12;  // стенка глуше/ниже
      const f = 440 * Math.pow(2, (midi - 69) / 12);
      const vel = clamp(ev.v / 360, 0.05, 1);
      const g = ctx.createGain(), lp = ctx.createBiquadFilter();
      lp.type = 'lowpass';
      const o1 = ctx.createOscillator(), o2 = ctx.createOscillator(), o2g = ctx.createGain();
      if(ev.wall){ o1.type = 'sine'; o2.type = 'sine'; o2.frequency.value = f * 2.0; o2g.gain.value = 0.12; lp.frequency.value = 500 + vel * 1100; }
      else       { o1.type = 'triangle'; o2.type = 'sine'; o2.frequency.value = f * 2.01; o2g.gain.value = 0.3; lp.frequency.value = 1300 + vel * 5200; }
      o1.frequency.value = f;
      o1.connect(lp); o2.connect(o2g); o2g.connect(lp); lp.connect(g);
      let out = g;
      if(ctx.createStereoPanner){ const pan = ctx.createStereoPanner(); pan.pan.value = clamp(ev.x / Config.chamberRadius, -1, 1); g.connect(pan); out = pan; this._panNode = pan; }
      out.connect(this.busIn);
      const peak = (ev.wall ? 0.5 : 0.72) * vel;
      const dur = ev.wall ? 0.5 : (0.9 + Math.random() * 0.7);
      const t = when;
      g.gain.setValueAtTime(0.0001, t);
      g.gain.linearRampToValueAtTime(peak, t + (ev.wall ? 0.012 : 0.004));
      g.gain.exponentialRampToValueAtTime(0.0008, t + dur);
      o1.start(t); o2.start(t); o1.stop(t + dur + 0.05); o2.stop(t + dur + 0.05);
      this._voices++;
      const self = this, pn = out !== g ? out : null;
      o1.onended = () => { try { o1.disconnect(); o2.disconnect(); o2g.disconnect(); lp.disconnect(); g.disconnect(); if(pn) pn.disconnect(); } catch(e){} self._voices--; };
    },
    _updateDrone(){
      if(!this.drone) return;
      const ctx = this.ctx, now = ctx.currentTime;
      const act = clamp(Math.abs(Config.spin) / 1.0, 0, 1);
      this.drone.gain.gain.setTargetAtTime(this.on ? (0.05 + 0.06 * act) : 0, now, 0.8);
      if(now > this._nextChord){
        this._nextChord = now + 5 + Math.random() * 4;
        const sc = this._scale(), base = sc.root - 12;
        const top = sc.notes[(Math.random() * sc.notes.length) | 0];
        const degs = [0, 7, top + 12];                       // корень, квинта, дрейфующая верхняя ступень
        this.drone.voices.forEach((v, i) => {
          const f = 440 * Math.pow(2, (base + degs[i] - 69) / 12);
          v.a.frequency.setTargetAtTime(f, now, 2.0);
          v.b.frequency.setTargetAtTime(f, now, 2.0);
        });
        const sw = this.drone.swell.gain;                    // мягкое набегание вместо ровного гудения
        sw.cancelScheduledValues(now);
        sw.setTargetAtTime(0.4, now, 0.6);
        sw.setTargetAtTime(1.0, now + 1.6, 1.4);
      }
    },
    tick(){
      const hits = ChamberSim._hits;
      if(!this.on || !this.ctx){ if(hits.length) hits.length = 0; return; }
      const now = this.ctx.currentTime;
      let budget = 3;                                             // не более 3 нот/кадр (анти-спам)
      for(let i = 0; i < hits.length && budget > 0; i++){
        this._trigger(hits[i], now + (3 - budget) * 0.02);        // лёгкий разнос по времени
        budget--;
      }
      hits.length = 0;
      this._updateDrone();
    },
  };

  /* ----------------------------------------------------------------------
   *  App
   * -------------------------------------------------------------------- */
  const App = {
    renderer: Renderer2D, glRenderer: null, glTier: null, R: 320, DPR: 1, last: 0,

    setRenderer(mode){
      if(mode === 'gl' && !this.glRenderer) mode = '2d';
      if(typeof Recorder !== 'undefined' && Recorder.active) Recorder.stop();   // канва меняется — закрываем запись
      Config.renderer = mode;
      this.renderer = mode === 'gl' ? this.glRenderer : Renderer2D;
      document.getElementById('scope').style.display   = mode === '2d' ? 'block' : 'none';
      document.getElementById('scopeGL').style.display = mode === 'gl' ? 'block' : 'none';
      this.layout();
    },
    layout(){
      // рендерим с запасом разрешения (суперсэмплинг): минимум 2× к CSS-размеру,
      // браузер даунскейлит буфер -> сглаживание краёв тел даже при dpr=1
      this.DPR = Math.min(Math.max(window.devicePixelRatio || 1, 2), 2.5);
      // измеряем реальные зоны: подсказка сверху и панель снизу (обе fixed)
      const rectOf = el => { try { return el && el.getBoundingClientRect ? el.getBoundingClientRect() : null; } catch(e){ return null; } };
      const hb = rectOf(document.querySelector('.hint'));
      const pb = rectOf(document.querySelector('.panel'));
      const hintB  = (hb && isFinite(hb.bottom)) ? hb.bottom : 100;
      const panelH = (pb && isFinite(pb.height)) ? pb.height : 150;
      const topRes = hintB + 18;
      const botRes = panelH + 22 + 18;            // 22 = .panel bottom-offset
      const availH = window.innerHeight - topRes - botRes;
      const availW = window.innerWidth - 56;
      const dia = Math.min(availW, availH);        // внешний диаметр оправы (с паддингом 2×16)
      this.R = clamp(Math.floor((dia - 32) / 2), 130, 360);
      // центрируем оправу в доступной полосе, а не в полном окне
      const stage = document.querySelector('.stage');
      if(stage) stage.style.transform = `translateY(${Math.round((topRes - botRes) / 2)}px)`;
      Renderer2D.resize(this.R, this.DPR);
      if(RendererGL.supported)  RendererGL.resize(this.R, this.DPR);
      if(RendererGL1.supported) RendererGL1.resize(this.R, this.DPR);
      PeekView.resize(this.DPR);
    },
    frame(now){
      const dt = (now - App.last) / 1000; App.last = now;
      const alpha = ChamberSim.update(dt);
      const theta = lerp(ChamberSim.prevTheta, ChamberSim.theta, alpha);
      const glassActive = App.renderer === RendererGL && Config.glass.on && RendererGL.glassReady;
      if(!glassActive) Chamber.draw(alpha);   // плоский путь (2D или GL без стекла)
      App.renderer.render({ alpha, theta });
      PeekView.render(alpha, theta);
      Debug.sample(now);
      Recorder.tick();
      Sound.tick();
      // адаптивное качество: подгон масштаба суперсэмплинга по кадровому времени (только GL+стекло)
      if(Config.quality.auto && glassActive && dt > 0 && dt < 0.5){
        App._ft = App._ft ? App._ft * 0.9 + dt * 0.1 : dt;
        if((App._acd = (App._acd || 0) + 1) > 40){
          App._acd = 0;
          const ms = App._ft * 1000, q = Config.quality;
          if(ms > 20 && q.scale > q.min) q.scale = Math.max(q.min, +(q.scale - 0.1).toFixed(2));
          else if(ms < 12 && q.scale < q.max) q.scale = Math.min(q.max, +(q.scale + 0.1).toFixed(2));
        }
      }
      requestAnimationFrame(App.frame);
    },
    start(){
      Chamber.init();
      Renderer2D.init(document.getElementById('scope')); Renderer2D.setScene(Scene);
      // Выбор GL-тира на общей канве #scopeGL: WebGL2 (стекло) -> WebGL1 (фолдинг+мозаика) -> нет
      const glCanvas = document.getElementById('scopeGL');
      RendererGL.init(glCanvas);
      if(!RendererGL.supported) RendererGL1.init(glCanvas);
      this.glRenderer = RendererGL.supported ? RendererGL : (RendererGL1.supported ? RendererGL1 : null);
      this.glTier = RendererGL.supported ? 'gl2' : (RendererGL1.supported ? 'gl1' : null);
      if(RendererGL.supported)  RendererGL.setScene(Scene);
      if(RendererGL1.supported) RendererGL1.setScene(Scene);
      PeekView.init(); Debug.init();
      // мобильная ветка качества (меньше внутреннее разрешение) + загрузка пресета
      const mobile = (window.matchMedia && window.matchMedia('(pointer:coarse)').matches) ||
                     Math.min(window.innerWidth, window.innerHeight) < 560;
      if(mobile){ Config.quality.scale = 0.85; Config.quality.max = 1.0; }
      const saved = Presets.read(); if(saved) Presets.applyConfig(saved);
      Scene.build(Config.bodyCount);
      this.setRenderer(Config.mode === 'tiling' ? 'gl' : Config.renderer);
      window.addEventListener('resize', () => this.layout());
      window.addEventListener('beforeunload', () => Presets.saveLocal());
      Input.attach(document.getElementById('bezel'));
      UI.bind();
      this.last = performance.now();
      requestAnimationFrame(this.frame);
    },
  };

  App.start();
})();
</script>
</body>
</html>
